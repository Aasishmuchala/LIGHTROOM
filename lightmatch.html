  lookup(target, id) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return null;
    if (!pack._index) {
      pack._index = {};
      for (const e of pack.entries) pack._index[e.id] = e;
    }
    return pack._index[id] || null;
  },

  // Numeric values are clamped into the entry's range; strings and non-range kinds pass through.
  clamp(target, id, value) {
    const e = this.lookup(target, id);
    if (!e || typeof value !== "number" || !Number.isFinite(value) || !(e.range[0] < e.range[1]))
      return { value, clamped: false };
    const v = Math.min(e.range[1], Math.max(e.range[0], value));
    return { value: v, clamped: v !== value };
  },

  // Compact one-line-per-param listing for the system prompt: id, ui_path, kind, unit, range, default, notes.
  promptFragment(target) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return "";
    const lines = pack.entries.map(e => {
      const unit = e.unit ? ` unit:${e.unit}` : "";
      const range = e.range[0] < e.range[1] ? ` range:[${e.range[0]},${e.range[1]}]` : "";
      return `${e.id} — ${e.ui_path} — kind:${e.kind}${unit}${range} default:${JSON.stringify(e.default)} — ${e.notes}`;
    });
    return `TARGET: ${pack.label}. Allowed parameter ids — choose ONLY from these; numeric values must stay inside the stated ranges:\n` + lines.join("\n");
  }
};

  // -- emit_recipe: the full-analysis tool. Byte-fixed by the plan (Step 4.1) — do
  // not restructure into the spec's grouped shape (environment/sun/fills[]/exposure/
  // color_mapping/step_order[]); flat values[] with a per-value `step: 1..5` is the
  // locked contract because it is far easier to validate parametrically and is
  // information-equivalent (fill placement + key:fill ratio already live as
  // kind:"placement" pack entries; step_order is redundant given the fixed order in
  // the system prompt). ------------------------------------------------------------
  emit_recipe: {
    name: "emit_recipe", strict: true, input_schema: {
      type: "object", additionalProperties: false,
      required: ["baseline", "values", "rationale", "hdri_mood", "gi_notes", "status"],
      properties: {
        baseline: { type: "string", enum: ["factory_defaults", "settings_screenshot"] },
        hdri_mood: { type: "string", description: "One line: what HDRI to reach for" },
        values: {
          type: "array", minItems: 4, maxItems: 24, items: {
            type: "object", additionalProperties: false,
            required: ["param", "set", "from", "step", "confidence", "why"],
            properties: {
              param: { type: "string", description: "MUST be an id from the provided pack" },
              set: { type: ["number", "string"] }, from: { type: ["number", "string"] },
              step: { type: "integer", minimum: 1, maximum: 5 },
              confidence: { type: "string", enum: ["high", "medium", "low"] },
              why: { type: "string" }
            }
          }
        },
        rationale: { type: "string" }, gi_notes: { type: "string" },
        status: { type: "string", enum: ["continue", "handoff_to_grade"] },
        status_reason: { type: "string" }
      }
    }
  },

  // -- emit_correction: the refine-round tool. Same value-object shape as
  // emit_recipe.values[] (locked identically: param/step/confidence/why, integer
  // step 1..5), but the array is `moves` (minItems 1, maxItems 5 — "small trims beat
  // re-matching") and the value key is `to` (not `set`, since a correction targets an
  // already-applied baseline rather than a fresh factory/screenshot one). Adds
  // `applied_assumed: boolean` — true when the model had to assume every prior-round
  // move was applied as recommended (the UI's per-row "applied" toggle can turn
  // individual moves off; when that toggle state isn't available to the model, it
  // must declare the assumption explicitly rather than silently guessing). ---------
  emit_correction: {
    name: "emit_correction", strict: true, input_schema: {
      type: "object", additionalProperties: false,
      required: ["moves", "rationale", "status", "status_reason", "applied_assumed"],
      properties: {
        moves: {
          type: "array", minItems: 1, maxItems: 5, items: {
            type: "object", additionalProperties: false,
            required: ["param", "to", "from", "step", "confidence", "why"],
            properties: {
              param: { type: "string", description: "MUST be an id from the provided pack" },
              to: { type: ["number", "string"] }, from: { type: ["number", "string"] },
              step: { type: "integer", minimum: 1, maximum: 5 },
              confidence: { type: "string", enum: ["high", "medium", "low"] },
              why: { type: "string" }
            }
          }
        },
        rationale: { type: "string" },
        status: { type: "string", enum: ["continue", "handoff_to_grade"] },
        status_reason: { type: "string" },
        applied_assumed: { type: "boolean" }
      }
    }
  },

  // -- systemPrompt(target, mode): full persona + contract text for one gateway call.
  // mode: "recipe" (full analysis, emit_recipe) | "correction" (refine round,
  // emit_correction). Deliberately target-agnostic in its own prose — every
  // parameter specific, unit, range, or host quirk (e.g. "this sun has no kelvin
  // spinner") comes from PACKS.promptFragment(target) appended at the end, never
  // hardcoded here. That keeps this function identical in shape for every future
  // pack (adding a host is a data task, per the spec's non-goals). -----------------
  systemPrompt(target, mode) {
    const isCorrection = mode === "correction";
    const lines = [];

    lines.push("You are a lighting technical director (TD) — the same disciplined, surgical role you would play " +
      "grading a shot against a reference plate, now applied to matching a 3D render's LIGHTING to a reference " +
      "image before any color grade happens.");
    lines.push("");
    lines.push("You do not measure. Measurements are provided to you as computed evidence — deterministic canvas " +
      "photometry run on both images before this prompt was assembled. Your job is to translate that evidence into " +
      "exact parameter moves in the target application's native vocabulary. Trust your eyes for direction, the " +
      "numbers for magnitude: the images tell you WHICH way something is wrong (warmer, brighter, softer shadows), " +
      "the measurements tell you HOW FAR to push it and confirm you are not chasing a false read.");
    lines.push("");
    lines.push("Parameter discipline: choose ONLY parameter ids that appear in the pack listing below — never invent " +
      "a setting, never rename one, never describe a control the pack does not list. Every numeric value you set " +
      "must stay inside that parameter's stated range; the app will clamp and flag anything outside it, so get it " +
      "right the first time.");
    lines.push("");
    lines.push("Baseline convention: unless a settings screenshot is supplied, assume the target is at its FACTORY " +
      "DEFAULTS and declare baseline:\"factory_defaults\" — every `from` value is then that parameter's pack " +
      "default. If a settings screenshot IS supplied, read the actual on-screen values from it and use those as " +
      "`from`, declaring baseline:\"settings_screenshot\" instead of assuming defaults.");
    lines.push("");
    lines.push("Fixed step order — always move in this sequence, and tag every value's `step` field accordingly:");
    lines.push("  1. exposure/WB lock — camera or VFB exposure and white balance, decided and held first.");
    lines.push("  2. sun/key — the primary light's direction, intensity, and color.");
    lines.push("  3. dome/environment — HDRI or skylight fill, mood, and rotation.");
    lines.push("  4. fills/rim — secondary/artificial lights and their key:fill ratio.");
    lines.push("  5. color mapping — highlight burn, contrast, saturation, and any display-side correction.");
    lines.push("Why this order is fixed, not a suggestion: doubling the sun's intensity and opening the camera by " +
      "+1 EV produce nearly the same pixels — it is a genuine degeneracy, not a matter of taste. Locking exposure " +
      "and WB FIRST removes that ambiguity before you touch the light itself; without a fixed order the refine " +
      "loop oscillates between \"brighten the sun\" and \"open the camera\" forever.");
    lines.push("");
    lines.push("Exactness goal: the user requires a ~99% match to the reference's lighting, not a pleasing " +
      "approximation. Be surgical, not tasteful — small, evidence-backed moves that close the measured gap beat " +
      "confident-sounding creative reinterpretation.");

    if (isCorrection) {
      lines.push("");
      lines.push("CORRECTION ROUND (refine mode): you are looking at an attempt that was rendered from a prior " +
        "recipe or correction, not a blank slate. The full move history from every previous round is provided to " +
        "you, along with which of those moves the user actually applied. Return a correction card, not a new " +
        "recipe: 3-5 moves max, each prioritized by how much of the remaining measured gap it closes. Small trims " +
        "beat re-matching from scratch.");
      lines.push("Oscillation guard: never reverse a prior move by more than half its distance from its own " +
        "`from` value — if round 2 pushed sun.kelvin from 6500 to 5000 (a move of 1500), round 3 may pull it back " +
        "toward 6500 by at most 750. If you see a metric ping-pong across rounds (it improves, then reverses, then " +
        "improves again), do not keep chasing it — name the exposure/light degeneracy to the user directly in " +
        "`status_reason` instead, so they understand why the number is not settling.");
      lines.push("Know when to stop: declare status:\"handoff_to_grade\" the moment the residual measured diff is " +
        "dominated by chromatic/tonal terms (tint, saturation, contrast curve) rather than light-transport terms " +
        "(luminance structure, where light enters the frame, shadow/highlight placement). At that point further " +
        "re-rendering will not help — the remaining 1% is a color grade, not a lighting problem, and belongs to a " +
        "grading tool, not this loop.");
    }

    lines.push("");
    lines.push(PACKS.promptFragment(target));

    return lines.join("\n");
  },

  // -- validateRecipe(obj, target, mode): local (pre-network) validation of a
  // model-returned tool call, before it ever reaches the UI. Handles BOTH shapes with
  // one function rather than two near-duplicate validators — recipe (`values[]`,
  // `set`) is the default when `mode` is omitted, `mode:"correction"` switches to
  // `moves[]`/`to`. Returns {ok, errors[], cleaned}:
  //   - unknown `param` (not in the target pack)      -> ERROR (value/move dropped from cleaned, ok:false)
  //   - non-finite numeric `set`/`to` (NaN/Infinity)   -> ERROR (never let it into cleaned; PACKS.clamp alone does
  //                                                        NOT catch this — it passes non-finite numbers through
  //                                                        unflagged by design, so this check is done HERE, first)
  //   - numeric `set`/`to` outside the pack's range    -> WARNING only: PACKS.clamp clamps it into range and the
  //                                                        cleaned value/move carries `clamped:true`; ok stays true
  //   - `step` outside the integer range 1..5          -> ERROR
  //   - string `set`/`to` (dropdown/slot/placement)    -> passed through untouched, never flagged clamped
  // `cleaned` always has the same top-level shape as `obj` (values[] or moves[]), with
  // per-item `clamped` added where applicable; items that hit an ERROR are dropped
  // from cleaned so nothing invalid can flow downstream even if a caller ignores `ok`.
  validateRecipe(obj, target, mode) {
    const isCorrection = mode === "correction";
    const arrKey = isCorrection ? "moves" : "values";
    const valKey = isCorrection ? "to" : "set";
    const errors = [];

    const cleaned = Object.assign({}, obj);
    const items = Array.isArray(obj && obj[arrKey]) ? obj[arrKey] : [];
    const cleanedItems = [];

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const where = `${arrKey}[${i}]`;
      if (!item || typeof item.param !== "string") {
        errors.push(`${where}: missing or non-string "param"`);
        continue;
      }
      const entry = PACKS.lookup(target, item.param);
      if (!entry) {
        errors.push(`${where}: unknown param "${item.param}" — not in pack "${target}"`);
        continue;
      }
      if (typeof item.step !== "number" || !Number.isInteger(item.step) || item.step < 1 || item.step > 5) {
        errors.push(`${where} (${item.param}): "step" must be an integer 1..5, got ${JSON.stringify(item.step)}`);
        continue;
      }

      const rawVal = item[valKey];
      let outItem = Object.assign({}, item);
      if (typeof rawVal === "number") {
        // Carry-forward fix (mandatory, Task 2 review): PACKS.clamp passes non-finite
        // numbers through UNFLAGGED — a NaN/Infinity `set`/`to` must be rejected here,
        // before clamp ever sees it, or it silently reaches `cleaned`.
        if (!Number.isFinite(rawVal)) {
          errors.push(`${where} (${item.param}): non-finite numeric "${valKey}" (${String(rawVal)}) — rejected`);
          continue;
        }
        const clampResult = PACKS.clamp(target, item.param, rawVal);
        outItem[valKey] = clampResult.value;
        outItem.clamped = clampResult.clamped;
      } else {
        // string (dropdown/slot/placement kinds): pass through untouched, unflagged.
        outItem.clamped = false;
      }
      cleanedItems.push(outItem);
    }

    cleaned[arrKey] = cleanedItems;
    return { ok: errors.length === 0, errors, cleaned };
  }
};

/* ===== SECTION: METRICS ===== */
// Pure canvas photometry: measure/diff/score a rendered image against a reference.
// No DOM reads beyond canvas creation + 2d context + createImageBitmap; no globals
// mutated. All functions accept a canvas, ImageBitmap, File, or Blob where noted.
const METRICS = {
  // -- constants -------------------------------------------------------------------
  HIST_BINS: 1024,
  CLIP_HI_THRESH: 250, // sRGB 0..255: a pixel counts toward clip.hi when max(r,g,b) >= this
  CLIP_LO_THRESH: 5,   // sRGB 0..255: a pixel counts toward clip.lo when max(r,g,b) <= this
  // Rationale for CLIP thresholds: max(r,g,b) (not min, not "all channels") is the
  // sRGB proxy used because it is monotone under a uniform exposure push (raising
  // exposure only ever raises max(r,g,b), never lowers it) and it satisfies the
  // three fixed points the contract requires: solid-255 -> hi===1 (max=255>=250 for
  // every pixel), solid-0 -> lo===1 (max=0<=5 for every pixel), solid-128 -> 0/0
  // (max=128 is on neither side). "All channels >=250" would under-count colored
  // highlights (e.g. blown-out warm sky where B never reaches 250); max(r,g,b) does
  // not have that blind spot.

  // -- linearize a single sRGB channel (0..1 in, 0..1 out) --------------------------
  _linearize(c) {
    return c <= 0.04045 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4;
  },

  // -- linear luminance from sRGB 0..1 channels --------------------------------------
  _lumLinear(r, g, b) {
    return 0.2126 * this._linearize(r) + 0.7152 * this._linearize(g) + 0.0722 * this._linearize(b);
  },

  // -- percentile bin INDICES via a fixed-bin histogram (0..nBins-1) ----------------
  // values: array-like of numbers already in [0,1]. ps: array of percentiles in [0,100].
  // Returns bin indices aligned with `ps`. Kept separate from the bin-center value
  // conversion below because shadow/highlight membership needs to compare each
  // pixel's OWN bin index against the cutoff bin index (self-consistent in the same
  // discretized space) rather than against the rounded bin-center value — comparing
  // a raw lum against a bin-center number can land it on the wrong side of <=/>= for
  // solid-color / low-cardinality inputs, since the bin center is a rounded stand-in
  // for the whole bin's value range, not the true percentile-rank value.
  _percentileBins(values, ps, nBins) {
    const bins = nBins || this.HIST_BINS;
    const hist = new Uint32Array(bins);
    const n = values.length;
    for (let i = 0; i < n; i++) {
      let idx = Math.floor(values[i] * bins);
      if (idx < 0) idx = 0; else if (idx >= bins) idx = bins - 1;
      hist[idx]++;
    }
    const out = new Array(ps.length);
    for (let pi = 0; pi < ps.length; pi++) {
      const target = (ps[pi] / 100) * n;
      let cum = 0, bin = bins - 1;
      for (let b = 0; b < bins; b++) {
        cum += hist[b];
        if (cum >= target) { bin = b; break; }
      }
      out[pi] = bin;
    }
    return out;
  },

  // -- percentile via a fixed-bin histogram; returns the bin-CENTER value -----------
  // Same binning as _percentileBins, converted to a representative 0..1 value.
  _percentiles(values, ps, nBins) {
    const bins = nBins || this.HIST_BINS;
    const binIdx = this._percentileBins(values, ps, bins);
    return binIdx.map(bin => (bin + 0.5) / bins);
  },

  // -- draw any supported source onto a canvas sized to fit within maxEdge, never
  //    upscaling (scale = min(1, maxEdge / longEdge)). Accepts a canvas or an
  //    ImageBitmap-like object (anything with width/height drawable via drawImage).
  thumb(source, maxEdge) {
    const sw = source.width, sh = source.height;
    const longEdge = Math.max(sw, sh);
    const scale = longEdge > maxEdge ? maxEdge / longEdge : 1;
    const w = Math.max(1, Math.round(sw * scale));
    const h = Math.max(1, Math.round(sh * scale));
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.drawImage(source, 0, 0, w, h);
    return c;
  },

  // -- core measurement --------------------------------------------------------------
  measure(imageBitmapOrCanvas) {
    const th = this.thumb(imageBitmapOrCanvas, 256);
    const ctx = th.getContext("2d");
    const w = th.width, h = th.height;
    const { data } = ctx.getImageData(0, 0, w, h);
    const n = w * h;

    const lumArr = new Float64Array(n);
    const satArr = new Float64Array(n);
    let clipHiCount = 0, clipLoCount = 0;
    let satSum = 0;
    let meanLinR = 0, meanLinG = 0, meanLinB = 0;

    for (let i = 0, p = 0; i < n; i++, p += 4) {
      const r255 = data[p], g255 = data[p + 1], b255 = data[p + 2];
      const r = r255 / 255, g = g255 / 255, b = b255 / 255;
      const lum = this._lumLinear(r, g, b);
      lumArr[i] = lum;

      const maxc = Math.max(r255, g255, b255);
      if (maxc >= this.CLIP_HI_THRESH) clipHiCount++;
      if (maxc <= this.CLIP_LO_THRESH) clipLoCount++;

      const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
      const s = mx === 0 ? 0 : (mx - mn) / mx;
      satArr[i] = s;
      satSum += s;

      meanLinR += this._linearize(r); meanLinG += this._linearize(g); meanLinB += this._linearize(b);
    }
    meanLinR /= n; meanLinG /= n; meanLinB /= n;

    // -- luminance percentiles (bin-center values, for the returned lum object) -------
    const [p1, p5, p25, p50, p75, p95, p99] = this._percentiles(lumArr, [1, 5, 25, 50, 75, 95, 99]);
    // -- same cutoffs as BIN INDICES, for robust shadow/highlight membership below.
    // See _percentileBins doc comment: comparing raw lum against the rounded
    // bin-center number can put every pixel of a solid-color / low-cardinality image
    // on the wrong side of <=/>= (e.g. solid red's true lum 0.2126 sits above its own
    // bin's center 0.21240..., so `lum <= p25(center)` is false for all pixels even
    // though the whole image IS the 25th percentile). Comparing bin index to bin
    // index is self-consistent and has no such rounding gap.
    const [p25Bin, p75Bin] = this._percentileBins(lumArr, [25, 75]);
    let lumSum = 0;
    for (let i = 0; i < n; i++) lumSum += lumArr[i];
    const lumMean = lumSum / n;

    // -- clip fractions ---------------------------------------------------------------
    const clip = { hi: clipHiCount / n, lo: clipLoCount / n };

    // -- contrast -----------------------------------------------------------------------
    const contrast = { spread: p95 - p5, midSlope: (p75 - p25) / 0.5 };

    // -- white balance: shadow = lum-bin<=p25-bin, highlight = lum-bin>=p75-bin,
    //    mean LINEAR channels over each set ------------------------------------------
    let shR = 0, shG = 0, shB = 0, shN = 0;
    let hiR = 0, hiG = 0, hiB = 0, hiN = 0;
    for (let i = 0, p = 0; i < n; i++, p += 4) {
      let binIdx = Math.floor(lumArr[i] * this.HIST_BINS);
      if (binIdx < 0) binIdx = 0; else if (binIdx >= this.HIST_BINS) binIdx = this.HIST_BINS - 1;
      const r = this._linearize(data[p] / 255), g = this._linearize(data[p + 1] / 255), b = this._linearize(data[p + 2] / 255);
      if (binIdx <= p25Bin) { shR += r; shG += g; shB += b; shN++; }
      if (binIdx >= p75Bin) { hiR += r; hiG += g; hiB += b; hiN++; }
    }
    // shN/hiN are always >=1 for any non-empty image: p25Bin/p75Bin are themselves
    // bin indices occupied by at least one real pixel, so at least the pixel(s) that
    // produced that bin satisfy the corresponding inequality (guards against
    // div-by-zero on degenerate 1-pixel inputs).
    const shadow = { r: shN ? shR / shN : 0, g: shN ? shG / shN : 0, b: shN ? shB / shN : 0 };
    const highlight = { r: hiN ? hiR / hiN : 0, g: hiN ? hiG / hiN : 0, b: hiN ? hiB / hiN : 0 };
    const warmthShadow = (shadow.r - shadow.b) / (shadow.r + shadow.b + 1e-9);
    const warmthHighlight = (highlight.r - highlight.b) / (highlight.r + highlight.b + 1e-9);
    // tint is a single whole-image green/magenta statistic (mirrors sat.mean being a
    // whole-image stat rather than shadow/highlight-split) — warmthShadow/warmthHighlight
    // already cover the per-tonal-region warm/cool read; tint uses the overall mean
    // LINEAR r,g,b across every pixel in the thumb, not just the shadow/highlight
    // quartile subsets, since the contract's return shape has one `tint` field, not a
    // tintShadow/tintHighlight pair.
    const tint = meanLinG - (meanLinR + meanLinB) / 2;
    const wb = { shadow, highlight, warmthShadow, warmthHighlight, tint };

    // -- saturation ---------------------------------------------------------------------
    const satMean = satSum / n;
    const [satP95] = this._percentiles(satArr, [95]);
    const sat = { mean: satMean, p95: satP95 };

    // -- 4x4 grid: mean linear luminance per cell, row-major -----------------------------
    const grid = new Array(16).fill(0);
    const gridCount = new Array(16).fill(0);
    for (let y = 0; y < h; y++) {
      let gy = Math.floor((y / h) * 4); if (gy > 3) gy = 3;
      for (let x = 0; x < w; x++) {
        let gx = Math.floor((x / w) * 4); if (gx > 3) gx = 3;
        const cell = gy * 4 + gx;
        grid[cell] += lumArr[y * w + x];
        gridCount[cell]++;
      }
    }
    for (let i = 0; i < 16; i++) grid[i] = gridCount[i] ? grid[i] / gridCount[i] : 0;

    return {
      lum: { p1, p5, p25, p50, p75, p95, p99, mean: lumMean },
      clip,
      contrast,
      wb,
      sat,
      grid
    };
  },

  // -- flat diff: (b - a) per scalar, plus grid.0..grid.15 ---------------------------
  diff(a, b) {
    const out = {
      "lum.p1": b.lum.p1 - a.lum.p1,
      "lum.p5": b.lum.p5 - a.lum.p5,
      "lum.p25": b.lum.p25 - a.lum.p25,
      "lum.p50": b.lum.p50 - a.lum.p50,
      "lum.p75": b.lum.p75 - a.lum.p75,
      "lum.p95": b.lum.p95 - a.lum.p95,
      "lum.p99": b.lum.p99 - a.lum.p99,
      "lum.mean": b.lum.mean - a.lum.mean,
      "clip.hi": b.clip.hi - a.clip.hi,
      "clip.lo": b.clip.lo - a.clip.lo,
      "contrast.spread": b.contrast.spread - a.contrast.spread,
      "contrast.midSlope": b.contrast.midSlope - a.contrast.midSlope,
      "wb.warmthShadow": b.wb.warmthShadow - a.wb.warmthShadow,
      "wb.warmthHighlight": b.wb.warmthHighlight - a.wb.warmthHighlight,
      "wb.tint": b.wb.tint - a.wb.tint,
      "sat.mean": b.sat.mean - a.sat.mean,
      "sat.p95": b.sat.p95 - a.sat.p95
    };
    for (let i = 0; i < 16; i++) out[`grid.${i}`] = b.grid[i] - a.grid[i];
    return out;
  },

  // -- deterministic 0..100 look-distance score --------------------------------------
  // score = min(100, 100 * sqrt( Σ w_i·d_i² / Σ w_i ) / 0.35)
  // Uses exactly the diff keys + weights below; d_i are diff(refM, attemptM) values.
  SCORE_WEIGHTS: {
    "lum.p5": 3, "lum.p50": 3, "lum.p95": 3,
    "contrast.spread": 2, "contrast.midSlope": 2,
    "wb.warmthShadow": 2, "wb.warmthHighlight": 2, "wb.tint": 2,
    "clip.hi": 1.5, "clip.lo": 1.5,
    "sat.mean": 1,
    "grid.0": 0.5, "grid.1": 0.5, "grid.2": 0.5, "grid.3": 0.5,
    "grid.4": 0.5, "grid.5": 0.5, "grid.6": 0.5, "grid.7": 0.5,
    "grid.8": 0.5, "grid.9": 0.5, "grid.10": 0.5, "grid.11": 0.5,
    "grid.12": 0.5, "grid.13": 0.5, "grid.14": 0.5, "grid.15": 0.5
  },
  score(refM, attemptM) {
    const d = this.diff(refM, attemptM);
    let wsum = 0, wdsum = 0;
    for (const [key, w] of Object.entries(this.SCORE_WEIGHTS)) {
      const di = d[key] || 0;
      wsum += w;
      wdsum += w * di * di;
    }
    const raw = 100 * Math.sqrt(wdsum / wsum) / 0.35;
    return Math.min(100, raw);
  },

  // -- downscale a File/Blob/canvas/ImageBitmap for sending to the model; never
  //    upscales (scale = min(1, maxEdge / longEdge), same rule as thumb()). Two call
  //    shapes cover the plan: lossy default (1568, image/jpeg, q=0.85) and a lossless
  //    variant for the settings screenshot (2048, image/png — q is ignored by PNG
  //    encoders but accepted here for a uniform signature). Rejects (throws) if the
  //    source is a File/Blob that the browser cannot decode as an image — callers
  //    must wrap this in try/catch (see SECTION: ADAPTER header comment). -----------
  async downscaleForSend(fileOrBlobOrCanvas, maxEdge, type, q) {
    maxEdge = maxEdge === undefined ? 1568 : maxEdge;
    type = type === undefined ? "image/jpeg" : type;
    q = q === undefined ? 0.85 : q;

    let source = fileOrBlobOrCanvas;
    const isCanvasLike = source && typeof source.getContext === "function"
      && typeof source.width === "number" && typeof source.height === "number";
    const isBitmapLike = typeof ImageBitmap !== "undefined" && source instanceof ImageBitmap;
    let decodedHere = false;
    if (!isCanvasLike && !isBitmapLike) {
      // File or Blob: decode to an ImageBitmap first. We own this bitmap and must
      // close it ourselves once drawn — a caller-supplied ImageBitmap (isBitmapLike)
      // is never closed here, since the caller still owns its lifecycle.
      source = await createImageBitmap(fileOrBlobOrCanvas);
      decodedHere = true;
    }
    const sw = source.width, sh = source.height;

    const longEdge = Math.max(sw, sh);
    const scale = longEdge > maxEdge ? maxEdge / longEdge : 1;
    const w = Math.max(1, Math.round(sw * scale));
    const h = Math.max(1, Math.round(sh * scale));

    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.drawImage(source, 0, 0, w, h);
    if (decodedHere) source.close();
    const dataUrl = c.toDataURL(type, q);
    return { dataUrl, w, h };
  }
};

const SELFTEST = { fails: [], n: 0,
  ok(cond, msg) { this.n++; if (!cond) this.fails.push(msg); },
  close(a, b, tol, msg) { this.ok(Math.abs(a - b) <= tol, `${msg} (got ${a}, want ${b}±${tol})`); },
  async run() {
    for (const [name, fn] of Object.entries(SELFTEST.suites)) { try { await fn.call(SELFTEST); } catch (e) { this.fails.push(name + " threw: " + e.message); } }
    const line = this.fails.length ? `SELFTEST: FAIL\n` + this.fails.join("\n") : `SELFTEST: PASS (${this.n} asserts)`;
    document.body.textContent = line; document.title = line.split("\n")[0];
  }, suites: {} };

SELFTEST.suites.metrics = async function () {
  // -- synthetic canvas builders --------------------------------------------------
  function solidCanvas(w, h, r, g, b) {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, 0, w, h);
    return c;
  }
  // Held-black / ramp / held-white: flat margins guarantee the tail percentiles land
  // in the flat regions regardless of gamma compression (a plain 2-stop 0->255 ramp
  // asymptotically caps its linear-luminance p95 near 0.89 because of the sRGB gamma
  // curve — see docs/superpowers/plans note; this 4-stop shape is still an honest
  // "horizontal black->white gradient" test strip).
  function hGradientCanvas(w, h) {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    const grad = ctx.createLinearGradient(0, 0, w, 0);
    grad.addColorStop(0, "rgb(0,0,0)");
    grad.addColorStop(0.15, "rgb(0,0,0)");
    grad.addColorStop(0.85, "rgb(255,255,255)");
    grad.addColorStop(1, "rgb(255,255,255)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    return c;
  }
  // Two flat vertical halves of different solid colors — used to distinguish whole-image
  // vs shadow-only vs highlight-only statistics (unlike a solid-color canvas, where every
  // pixel is simultaneously the shadow AND highlight set, so the three interpretations
  // are numerically indistinguishable).
  function twoHalfCanvas(w, h, leftRgb, rightRgb) {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.fillStyle = `rgb(${leftRgb[0]},${leftRgb[1]},${leftRgb[2]})`;
    ctx.fillRect(0, 0, w / 2, h);
    ctx.fillStyle = `rgb(${rightRgb[0]},${rightRgb[1]},${rightRgb[2]})`;
    ctx.fillRect(w / 2, 0, w / 2, h);
    return c;
  }

  // -- solid gray 128 ---------------------------------------------------------------
  const gray = solidCanvas(64, 64, 128, 128, 128);
  const mGray = METRICS.measure(gray);
  this.close(mGray.lum.p50, 0.2159, 0.01, "gray128: lum.p50");
  this.ok(mGray.clip.hi === 0 && mGray.clip.lo === 0, "gray128: clip.hi===0 && clip.lo===0");
  this.close(mGray.sat.mean, 0, 0.001, "gray128: sat.mean≈0");
  for (let i = 0; i < 16; i++) this.close(mGray.grid[i], mGray.grid[0], 0.001, `gray128: grid[${i}] equals grid[0]`);

  // -- solid 255 / solid 0 ------------------------------------------------------------
  const white = solidCanvas(32, 32, 255, 255, 255);
  const mWhite = METRICS.measure(white);
  this.ok(mWhite.clip.hi === 1, "white255: clip.hi===1");
  this.ok(mWhite.clip.lo === 0, "white255: clip.lo===0 (sanity)");

  const black = solidCanvas(32, 32, 0, 0, 0);
  const mBlack = METRICS.measure(black);
  this.ok(mBlack.clip.lo === 1, "black0: clip.lo===1");
  this.ok(mBlack.clip.hi === 0, "black0: clip.hi===0 (sanity)");

  // -- horizontal black->white gradient ------------------------------------------------
  const grad = hGradientCanvas(256, 64);
  const mGrad = METRICS.measure(grad);
  this.ok(mGrad.grid[0] < mGrad.grid[3], "gradient: grid[0] < grid[3] (darker left, brighter right)");
  this.ok(mGrad.lum.p5 < 0.02, `gradient: lum.p5 < 0.02 (got ${mGrad.lum.p5})`);
  this.ok(mGrad.lum.p95 > 0.9, `gradient: lum.p95 > 0.9 (got ${mGrad.lum.p95})`);
  this.ok(mGrad.contrast.spread > 0.9, `gradient: contrast.spread > 0.9 (got ${mGrad.contrast.spread})`);

  // -- red vs blue: warmth sign -------------------------------------------------------
  const red = solidCanvas(32, 32, 255, 0, 0);
  const mRed = METRICS.measure(red);
  this.ok(mRed.wb.warmthShadow > 0, `red: wb.warmthShadow > 0 (got ${mRed.wb.warmthShadow})`);

  const blue = solidCanvas(32, 32, 0, 0, 255);
  const mBlue = METRICS.measure(blue);
  this.ok(mBlue.wb.warmthShadow < 0, `blue: wb.warmthShadow < 0 (got ${mBlue.wb.warmthShadow})`);

  // -- green: tint sign ---------------------------------------------------------------
  const green = solidCanvas(32, 32, 0, 255, 0);
  const mGreen = METRICS.measure(green);
  this.ok(mGreen.wb.tint > 0, `green: wb.tint > 0 (got ${mGreen.wb.tint})`);

  // -- tint design lock: whole-image mean linear r,g,b, not shadow-only or highlight-only.
  // The contract's return shape has a single `tint` field (no tintShadow/tintHighlight
  // pair), unlike warmth which is explicitly split. Left half = neutral dark gray
  // (would read tint~=0 if shadow-only), right half = green-tinted bright (would read
  // tint~=0.422 if highlight-only). Whole-image mean lands at ~0.211 (see the METRICS
  // section's tint comment for the full rationale).
  const twoTone = twoHalfCanvas(64, 32, [40, 40, 40], [200, 255, 200]);
  const mTwoTone = METRICS.measure(twoTone);
  this.close(mTwoTone.wb.tint, 0.2112, 0.01, `two-tone: wb.tint is the whole-image mean (not highlight-only 0.422, not shadow-only 0)`);

  // -- diff / score identities ---------------------------------------------------------
  const dSelf = METRICS.diff(mGray, mGray);
  let allZero = true;
  for (const k of Object.keys(dSelf)) if (Math.abs(dSelf[k]) > 1e-9) allZero = false;
  this.ok(allZero, "diff(m,m) is all-zero");
  this.ok(METRICS.score(mGray, mGray) === 0, "score(m,m) === 0");
  const s = METRICS.score(mGray, mGrad);
  this.ok(s > 10, `score(gray128, gradient) > 10 (got ${s})`);

  // -- weights<->diff lock: every SCORE_WEIGHTS key must exist in diff()'s output, so
  // score() never silently reads `undefined` (falls back to 0) for a weighted term
  // because a key drifted out of sync between the two tables.
  const diffKeys = new Set(Object.keys(METRICS.diff(mGray, mGray)));
  for (const key of Object.keys(METRICS.SCORE_WEIGHTS)) this.ok(diffKeys.has(key), `SCORE_WEIGHTS key "${key}" exists in diff() output`);

  // -- thumb contract ------------------------------------------------------------------
  const big = solidCanvas(4000, 2000, 200, 150, 100);
  const th = METRICS.thumb(big, 256);
  this.ok(th.width === 256 && th.height === 128, `thumb(4000x2000,256): width===256 && height===128 (got ${th.width}x${th.height})`);

  // -- downscaleForSend: lossy default (maxEdge=1568, image/jpeg) ---------------------
  const lossy = await METRICS.downscaleForSend(big, 1568, "image/jpeg", 0.85);
  this.ok(lossy.w === 1568 && lossy.h === 784, `downscaleForSend lossy: w===1568 && h===784 (got ${lossy.w}x${lossy.h})`);
  this.ok(typeof lossy.dataUrl === "string" && lossy.dataUrl.startsWith("data:image/jpeg"), "downscaleForSend lossy: dataUrl prefix matches image/jpeg");

  // -- downscaleForSend: lossless variant (maxEdge=2048, image/png) for the settings screenshot --
  const lossless = await METRICS.downscaleForSend(big, 2048, "image/png", 1.0);
  this.ok(lossless.w === 2048 && lossless.h === 1024, `downscaleForSend lossless: w===2048 && h===1024 (got ${lossless.w}x${lossless.h})`);
  this.ok(typeof lossless.dataUrl === "string" && lossless.dataUrl.startsWith("data:image/png"), "downscaleForSend lossless: dataUrl prefix matches image/png");

  // -- downscaleForSend: default args (no maxEdge/type/q passed) behave like the lossy defaults --
  const defaults = await METRICS.downscaleForSend(big);
  this.ok(defaults.w === 1568 && defaults.h === 784, `downscaleForSend defaults: w===1568 && h===784 (got ${defaults.w}x${defaults.h})`);
  this.ok(defaults.dataUrl.startsWith("data:image/jpeg"), "downscaleForSend defaults: dataUrl prefix image/jpeg");

  // -- downscaleForSend never upscales a source already <= maxEdge --------------------
  const small = solidCanvas(64, 48, 10, 20, 30);
  const notUpscaled = await METRICS.downscaleForSend(small, 1568, "image/jpeg", 0.85);
  this.ok(notUpscaled.w === 64 && notUpscaled.h === 48, `downscaleForSend: source <= maxEdge is not upscaled (got ${notUpscaled.w}x${notUpscaled.h})`);

  // -- edge case: 1x1 image does not crash and returns a well-formed measurement -------
  const onePx = solidCanvas(1, 1, 90, 60, 30);
  const mOnePx = METRICS.measure(onePx);
  this.ok(Number.isFinite(mOnePx.lum.p50), `1x1: lum.p50 is finite (got ${mOnePx.lum.p50})`);
  this.ok(Array.isArray(mOnePx.grid) && mOnePx.grid.length === 16 && mOnePx.grid.every(Number.isFinite), "1x1: grid is 16 finite numbers");
  this.ok(Number.isFinite(mOnePx.wb.warmthShadow) && Number.isFinite(mOnePx.wb.tint), "1x1: wb warmth/tint finite (shadow/highlight sets non-empty)");
  const thOnePx = METRICS.thumb(onePx, 256);
  this.ok(thOnePx.width === 1 && thOnePx.height === 1, `1x1: thumb does not upscale (got ${thOnePx.width}x${thOnePx.height})`);

  // -- edge case: extreme thin aspect ratio does not produce a zero-dimension thumb ----
  // 1000x1 at scale 256/1000=0.256 would round(1*0.256)=0 without a floor-of-1 guard.
  const thinWide = solidCanvas(1000, 1, 40, 80, 120);
  const thThinWide = METRICS.thumb(thinWide, 256);
  this.ok(thThinWide.width === 256 && thThinWide.height === 1, `thin 1000x1: thumb w===256,h===1 (got ${thThinWide.width}x${thThinWide.height})`);
  const mThinWide = METRICS.measure(thinWide);
  this.ok(Number.isFinite(mThinWide.lum.p50), "thin 1000x1: measure does not crash / produces finite lum.p50");

  const thinTall = solidCanvas(1, 1000, 40, 80, 120);
  const thThinTall = METRICS.thumb(thinTall, 256);
  this.ok(thThinTall.width === 1 && thThinTall.height === 256, `thin 1x1000: thumb w===1,h===256 (got ${thThinTall.width}x${thThinTall.height})`);

  // -- edge case: all-black wb/sat do not NaN (0/0-style guards) -----------------------
  this.ok(Number.isFinite(mBlack.wb.warmthShadow) && Number.isFinite(mBlack.wb.tint), "all-black: wb warmth/tint finite, not NaN");
  this.ok(Number.isFinite(mBlack.sat.mean) && mBlack.sat.mean === 0, "all-black: sat.mean===0, not NaN");
};

addEventListener("DOMContentLoaded", () => {
  if (location.search.includes("selftest")) SELFTEST.run(); else UI.boot();
});
</script></body></html>
