  // flag around every action it initiates). -----------------------------------------
  _focusedSlot: null,
  _busy: false,
  _els: {},

  // -- XSS discipline for this module: every render*Html()/*Html() helper below
  // builds markup via template strings (no DOM sanitizer dependency is allowed —
  // "no frameworks, no external assets"). ANY value that did not originate as a
  // hardcoded string literal in THIS file (model output: ui_path text passed through
  // is pack data so it's safe, but why/rationale/hdri_mood/gi_notes/status_reason/
  // param/value/unit ARE model output and MUST be escaped) is passed through
  // this.esc() before interpolation. The ONE non-esc() case is dataUrl <img src>
  // attributes: a dataUrl can arrive from an untrusted importJSON file, so it is
  // gated by this.safeSrc() (base64-image-only) rather than esc()'d — safeSrc's
  // locked-charset output cannot break out of the src="..." attribute, and esc()ing
  // a data URL would corrupt its base64 payload. NEVER interpolate a raw dataUrl. ---
  esc(s) {
    return String(s === undefined || s === null ? "" : s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
    }[c]));
  },

  // -- safeSrc(u): sink defense-in-depth for the three <img src="${...}"> points
  // (slot thumb, session-strip reference thumb, attempt thumb). Returns u only when
  // it is a clean base64 image data URL — reusing STORE.DATAURL_RE so the sink and
  // the importJSON boundary can never diverge — else "". A caller that gets "" must
  // render its placeholder instead of an <img>. This is the belt to importJSON's
  // braces: even a dataUrl that reached the session through some path OTHER than a
  // validated import (a future bug, a hand-edited IDB row) can't reach an img src as
  // an attribute-breakout payload. -------------------------------------------------
  safeSrc(u) {
    return typeof u === "string" && STORE.DATAURL_RE.test(u) ? u : "";
  },
  fmtVal(v) {
    if (typeof v === "number") return Number.isInteger(v) ? String(v) : String(Math.round(v * 1000) / 1000);
    return String(v);
  },

  // -- JSON copy: the raw validated object for the active chain's recipe/latest
  // correction, exactly as stored (no reshaping) — "Copy JSON" per the task. -------
  buildJSON(obj) {
    return JSON.stringify(obj, null, 2);
  },

  // -- copyText(text): navigator.clipboard when available (https/localhost), with a
  // synchronous textarea+execCommand fallback for file:// origins where
  // navigator.clipboard is frequently unavailable/blocked. Never throws past the
  // caller — a clipboard failure is a minor annoyance, not a crash. ----------------
  async copyText(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (e) { /* fall through to legacy path */ }
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  },

  // -- toast(msg): brief, auto-dismissing notice (used for the busy toast and copy
  // confirmations) — appended to #toasts, removed after a short delay. -------------
  toast(msg) {
    const host = this._els.toasts;
    if (!host) return;
    const el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    host.appendChild(el);
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 2600);
  },

  // ===================================================================================
  // BOOT: build the static shell once, wire every event listener, then load the
  // session and render.
  // ===================================================================================
  async boot() {
    const app = document.getElementById("app");
    app.innerHTML = `
      <div id="banners"></div>
      <div id="topbar"></div>
      <div id="main">
        <div id="leftrail"></div>
        <div id="recipearea"></div>
      </div>
      <div id="sessionstrip"></div>
      <div id="toasts"></div>
    `;
    this._els = {
      banners: document.getElementById("banners"),
      topbar: document.getElementById("topbar"),
      leftrail: document.getElementById("leftrail"),
      recipearea: document.getElementById("recipearea"),
      sessionstrip: document.getElementById("sessionstrip"),
      toasts: document.getElementById("toasts")
    };

    // -- global paste routing: Ctrl+V anywhere in the document. ----------------------
    document.addEventListener("paste", (ev) => this._onPaste(ev));

    // -- document-level drop guard (#12): a file dropped anywhere OUTSIDE a slot would
    // otherwise make the browser NAVIGATE to that file (leaving the app, silently
    // losing the session). preventDefault on document dragover+drop cancels that
    // default. The per-slot drop handlers still run first (bubbling reaches document
    // afterward) and already preventDefault + ingest their own drop, so this guard
    // never double-ingests — it only neutralizes the stray off-target drop. ---------
    document.addEventListener("dragover", (ev) => { ev.preventDefault(); });
    document.addEventListener("drop", (ev) => { ev.preventDefault(); });

    await ENGINE.boot();
    this.render();
  },

  // ===================================================================================
  // ACTIONS: thin wrappers around ENGINE calls — await, handle typed errors, render.
  // ===================================================================================

  // -- _runAction(fn): runs an ENGINE-calling async fn() with the shared busy/error
  // handling every action needs (spinner, error banner population, always re-render
  // at the end). Centralizes the try/catch so individual action methods stay short. -
  async _runAction(fn) {
    if (this._busy) { this.toast("Already working — one moment."); return; }
    this._busy = true;
    this.render();
    try {
      await fn();
    } catch (e) {
      if (e && e.kind === "busy") {
        this.toast("Already working — one moment.");
      }
      // Any other error is already recorded on ENGINE.lastError by _annotateError();
      // the banner renders from that on the next render() call below. A raw Error
      // ENGINE did not annotate (defensive) still gets a visible trace via lastError
      // being left as whatever it previously was — acceptable, since every ENGINE
      // action method in this codebase routes failures through _annotateError().
    } finally {
      this._busy = false;
      this.render();
    }
  },

  async ingestFile(slot, file) {
    const check = this.acceptsFile(file);
    if (!check.ok) {
      ENGINE.lastError = { kind: "ingest", name: "IngestRejected", message: check.reason, at: new Date().toISOString() };
      this.render();
      return;
    }
    // Clear the sticky focus at ingest time (#7): routing (routePaste) has already
    // consulted _focusedSlot by the time we get here, and a slot the user clicked to
    // target THIS one paste/drop must not silently capture the NEXT paste too (which,
    // once the session is analyzed, should become a fresh attempt — not re-fill that
    // slot). Cleared before _runAction so its trailing render() drops the focus ring.
    this._focusedSlot = null;
    if (slot === "attempt") {
      await this._runAction(() => ENGINE.addAttempt(file));
    } else {
      await this._runAction(() => ENGINE.setImage(slot, file));
    }
  },

  async doAnalyze() {
    await this._runAction(() => ENGINE.analyze());
  },

  async doReanalyzeOther() {
    await this._runAction(() => ENGINE.reanalyzeOtherTarget());
  },

  // -- setTarget: STORE.setPrefs is deliberately INSIDE the guarded callback, not
  // before it (code review finding) — _runAction's busy-guard can skip the actual
  // ENGINE.setActiveTarget call (toast-and-return) while leaving a caller-visible
  // side effect behind if the pref write happened unconditionally first; that would
  // desync STORE.prefs().target from ENGINE.activeTarget() until the next successful
  // switch. Writing the pref only once the guard has let the call through keeps both
  // in lockstep. --------------------------------------------------------------------
  async setTarget(target) {
    await this._runAction(async () => {
      STORE.setPrefs({ target });
      await ENGINE.setActiveTarget(target);
    });
  },

  async setModel(model) {
    STORE.setPrefs({ model });
    this.render();
  },

  async setKey(key) {
    STORE.setKey(key);
    this.render();
  },

  // -- setContextChip(group, value): single-select-per-group toggle (clicking the
  // already-active chip in a group clears it back to ""). Routes through
  // ENGINE.setContext(patch), the small addition this task explicitly calls for so
  // the UI never mutates session.context directly. The typeof guard is cheap
  // defensive insurance only — ENGINE.setContext always exists in this build. -----
  async setContextChip(group, value) {
    const s = ENGINE.session();
    const current = s.context || {};
    const next = { [group]: current[group] === value ? "" : value };
    if (typeof ENGINE.setContext === "function") {
      await this._runAction(async () => { await ENGINE.setContext(next); });
    } else {
      s.context = Object.assign({}, current, next);
      await STORE.saveSession(s);
      this.render();
    }
  },

  async toggleApplied(attemptIndex, param) {
    // Route through the ENGINE boundary (#9) so the correction-row toggle respects the
    // _inFlight busy gate and owns its own persist — no direct session mutation +
    // save from the UI. BusyError while an op is in flight surfaces as a toast; the
    // render() below snaps the checkbox back to the stored (unchanged) state.
    try {
      await ENGINE.toggleAttemptApplied(attemptIndex, param);
    } catch (e) {
      if (e && e.kind === "busy") this.toast("Already working — one moment.");
    }
    this.render();
  },

  async doExportSession() {
    const json = await STORE.exportJSON(ENGINE.session());
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `lightmatch-session-${ENGINE.session().id}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    this.toast("Session exported.");
  },

  doImportSessionClick() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "application/json";
    input.onchange = async () => {
      const file = input.files && input.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        await STORE.importJSON(text);
        await ENGINE.boot();
        this.toast("Session imported.");
      } catch (e) {
        this.toast("Import failed: " + (e && e.message));
      }
      this.render();
    };
    input.click();
  },

  // ===================================================================================
  // PASTE / DROP wiring
  // ===================================================================================
  _onPaste(ev) {
    const items = (ev.clipboardData && ev.clipboardData.items) || [];
    let file = null;
    for (const it of items) {
      if (it.kind === "file") { file = it.getAsFile(); break; }
    }
    if (!file) return;
    ev.preventDefault();
    const state = ENGINE.state();
    const s = ENGINE.session();
    const filled = { ref: !!s.ref, base: !!s.base, settings: !!s.settingsShot };
    const slot = this.routePaste(state, this._focusedSlot, filled);
    if (!slot) { this.toast("Nowhere to paste that yet — fill Reference and Base first."); return; }
    this.ingestFile(slot, file);
  },

  _onDrop(ev, dropSlotHint) {
    ev.preventDefault();
    const file = ev.dataTransfer && ev.dataTransfer.files && ev.dataTransfer.files[0];
    if (!file) return;
    const state = ENGINE.state();
    const s = ENGINE.session();
    const filled = { ref: !!s.ref, base: !!s.base, settings: !!s.settingsShot };
    // A drop ONTO a specific slot element focuses that slot for routing purposes
    // (dropping directly on the Base slot should fill Base, not follow the generic
    // priority order) — dropSlotHint plays the same role focusedSlot does for paste.
    const slot = this.routePaste(state, dropSlotHint || null, filled);
    if (!slot) { this.toast("Nowhere to drop that yet — fill Reference and Base first."); return; }
    this.ingestFile(slot, file);
  },

  // ===================================================================================
  // RENDER: one idempotent pass. Rebuilds every dynamic region from
  // ENGINE.state()/session()/attemptInfo()/activeChain(). No incremental patching.
  // ===================================================================================
  render() {
    const state = ENGINE.state();
    const session = ENGINE.session();
    const info = ENGINE.attemptInfo();
    const chain = ENGINE.activeChain();

    this._renderBanners(state, session);
    this._renderTopbar(session);
    this._renderLeftRail(state, session, info);
    this._renderRecipeArea(state, session, chain);
    this._renderSessionStrip(state, session, chain);
  },

  // -- banners: typed-error banners + persistence warning. Rendered FIRST/topmost. --
  // Every interpolated value below is either a hardcoded string literal or passed
  // through this.esc() first (err.message/err.raw are attacker-influenceable in
  // principle — err.raw is a raw gateway response body — so both are escaped).
  _renderBanners(state, session) {
    const host = this._els.banners;
    const parts = [];

    if (!STORE.persistent) {
      parts.push(`
        <div class="banner banner-warn">
          <span>Sessions cannot be saved persistently in this browser (IndexedDB unavailable) — export your session before closing the tab.</span>
          <button class="btn-small" data-action="export-session">Export session</button>
          <button class="btn-small" data-action="import-session">Import session</button>
        </div>
      `);
    }

    const err = ENGINE.lastError;
    if (err) {
      if (err.kind === "auth") {
        parts.push(`<div class="banner banner-error" data-error-kind="auth">Key rejected (401). Check your oc_ key.</div>`);
      } else if (err.name === "DecodeError") {
        parts.push(`<div class="banner banner-error" data-error-kind="decode">${this.esc(err.message || "LightMatch reads display-referred sRGB screenshots/saves — PNG or JPG from the VFB/Vantage, not linear EXR.")}</div>`);
      } else if (err.kind === "ingest") {
        parts.push(`<div class="banner banner-error" data-error-kind="ingest">${this.esc(err.message)}</div>`);
      } else if (err.kind === "network") {
        parts.push(`<div class="banner banner-error" data-error-kind="network">Gateway unreachable or timed out — retried 3×.</div>`);
      } else if (err.kind === "shape") {
        parts.push(`
          <div class="banner banner-error" data-error-kind="shape">
            <div>The gateway returned a non-recipe response.</div>
            <details class="raw-details"><summary>Show raw response</summary><pre class="raw">${this.esc(err.raw || "")}</pre></details>
          </div>
        `);
      } else if (err.kind === "busy") {
        // busy is surfaced as a toast (see _runAction), not a persistent banner.
      } else if (err.kind === "other") {
        parts.push(`<div class="banner banner-error" data-error-kind="other">${this.esc(err.message || "Something went wrong.")}</div>`);
      }
    }

    host.innerHTML = parts.join("\n");
    const exportBtn = host.querySelector('[data-action="export-session"]');
    if (exportBtn) exportBtn.onclick = () => this.doExportSession();
    const importBtn = host.querySelector('[data-action="import-session"]');
    if (importBtn) importBtn.onclick = () => this.doImportSessionClick();
    if (err && err.kind === "auth") {
      // focus the key field, per the task ("with key field focus")
      setTimeout(() => { const kf = document.getElementById("key-field"); if (kf) kf.focus(); }, 0);
    }
  },

  // -- _sessionIoHtml(): the always-available quiet Export/Import control (#15). A pure
  // markup helper (all-literal, no interpolation) so it is testable without the DOM and
  // so the topbar template stays readable. Buttons reuse the SAME data-action hooks the
  // IDB-warning banner wires, so a healthy browser reaches Export/Import without first
  // hitting the persistence-failure banner. -----------------------------------------
  _sessionIoHtml() {
    return `
      <div class="session-io">
        <button class="session-io-btn" data-action="export-session" title="Download this session as a JSON file">Export</button>
        <span class="session-io-sep" aria-hidden="true">·</span>
        <button class="session-io-btn" data-action="import-session" title="Load a session from a JSON file">Import</button>
      </div>`;
  },

  // -- topbar: title, target toggle, model picker, key status + field. Every
  // interpolated value is a hardcoded label/constant or this.esc()'d; the key value
  // itself is set via the DOM .value property in the wiring below, never interpolated
  // into the template string (a pasted key could contain HTML-special characters). --
  _renderTopbar(session) {
    const prefs = STORE.prefs();
    const hasKey = !!STORE.key();
    const host = this._els.topbar;
    host.innerHTML = `
      <div class="topbar-inner">
        <div class="brand">LightMatch</div>
        <div class="target-toggle" role="group" aria-label="Target renderer">
          <button class="toggle-btn ${prefs.target === "vray7max" ? "active" : ""}" data-target="vray7max">V-Ray 7</button>
          <button class="toggle-btn ${prefs.target === "vantage33" ? "active" : ""}" data-target="vantage33">Vantage 3.3</button>
        </div>
        <select id="model-picker" class="model-picker" aria-label="Model">
          ${UI.MODELS.map(m => `<option value="${this.esc(m.value)}" ${m.value === prefs.model ? "selected" : ""}>${this.esc(m.label)}</option>`).join("")}
        </select>
        <div class="key-area">
          <span class="key-dot ${hasKey ? "key-dot-ok" : "key-dot-missing"}" title="${hasKey ? "Key stored" : "No key set"}"></span>
          <input id="key-field" class="key-field" type="password" placeholder="oc_..." />
        </div>
      </div>
      <div class="privacy-row">
        ${this._sessionIoHtml()}
        <div class="privacy-line">Stored only in this browser.</div>
      </div>
    `;

    host.querySelectorAll("[data-target]").forEach(btn => {
      btn.onclick = () => this.setTarget(btn.getAttribute("data-target"));
    });
    // Always-available session Export/Import (#15) — reuses the same handlers the
    // IDB-unavailable warning banner wires, so a healthy browser can move a session
    // between profiles/machines without first having to hit the persistence failure.
    const exportIo = host.querySelector('[data-action="export-session"]');
    if (exportIo) exportIo.onclick = () => this.doExportSession();
    const importIo = host.querySelector('[data-action="import-session"]');
    if (importIo) importIo.onclick = () => this.doImportSessionClick();
    const picker = host.querySelector("#model-picker");
    if (picker) picker.onchange = () => this.setModel(picker.value);
    const keyField = host.querySelector("#key-field");
    if (keyField) {
      // Set via .value (a DOM property assignment, never HTML interpolation) so a
      // pasted key with special characters can never be misparsed as markup.
      keyField.value = hasKey ? "••••••••••••" : "";
      keyField.onfocus = () => { if (keyField.value.startsWith("••")) keyField.value = ""; };
      keyField.onblur = () => { if (keyField.value.trim()) this.setKey(keyField.value); else this.render(); };
    }
  },

  // -- left rail: 3 named slots + attempt slot (once state >= analyzed), context
  // chips, Analyze/Re-analyze buttons, notices. -------------------------------------
  SLOT_DEFS: [
    { key: "ref", label: "Reference" },
    { key: "base", label: "Base render" },
    { key: "settings", label: "Settings screenshot", hint: "optional anchor" }
  ],
  CHIP_GROUPS: [
    { key: "scene", label: "Scene", options: ["interior", "exterior", "product"] },
    { key: "time", label: "Time", options: ["day", "dusk", "night"] },
    { key: "rig", label: "Rig", options: ["HDRI dome", "sun", "both"] }
  ],
  _renderLeftRail(state, session, info) {
    const host = this._els.leftrail;
    const slotsHtml = this.SLOT_DEFS.map(def => this._slotHtml(def, session)).join("");
    const attemptSlotHtml = state === "analyzed" || state === "refining" ? this._attemptSlotHtml(info) : "";

    const chipsHtml = this.CHIP_GROUPS.map(group => `
      <div class="chip-group" data-chip-group="${group.key}">
        <div class="chip-group-label">${this.esc(group.label)}</div>
        <div class="chip-row">
          ${group.options.map(opt => `<button class="chip ${session.context && session.context[group.key] === opt ? "chip-active" : ""}" data-chip-group="${group.key}" data-chip-value="${this.esc(opt)}">${this.esc(opt)}</button>`).join("")}
        </div>
      </div>
    `).join("");

    const chain = ENGINE.activeChain();
    const hasRecipe = !!(chain && chain.recipe);
    const analyzeReady = state !== "empty";
    const analyzeLabel = this._busy ? "Analyzing…" : (hasRecipe ? "Re-analyze" : "Analyze");
    const otherTarget = STORE.prefs().target === "vray7max" ? "Chaos Vantage 3.3" : "V-Ray 7";

    host.innerHTML = `
      <div class="slots">
        ${slotsHtml}
        ${attemptSlotHtml}
      </div>
      <div class="attempt-hint">Same VFB display settings every attempt.</div>
      <div class="chips">${chipsHtml}</div>
      <button id="analyze-btn" class="btn-primary" ${analyzeReady ? "" : "disabled"}>${this._busy ? '<span class="spinner"></span> ' : ""}${this.esc(analyzeLabel)}</button>
      ${state === "analyzed" || state === "refining" ? `<button id="reanalyze-other-btn" class="btn-secondary">Re-analyze for ${this.esc(otherTarget)}</button>` : ""}
    `;

    this.SLOT_DEFS.forEach(def => this._wireSlot(host, def.key));
    if (state === "analyzed" || state === "refining") this._wireSlot(host, "attempt");

    host.querySelectorAll("[data-chip-group][data-chip-value]").forEach(btn => {
      btn.onclick = () => this.setContextChip(btn.getAttribute("data-chip-group"), btn.getAttribute("data-chip-value"));
    });

    const analyzeBtn = host.querySelector("#analyze-btn");
    if (analyzeBtn) analyzeBtn.onclick = () => this.doAnalyze();
    const reanalyzeBtn = host.querySelector("#reanalyze-other-btn");
    if (reanalyzeBtn) reanalyzeBtn.onclick = () => this.doReanalyzeOther();
  },

  // dataUrl is USUALLY produced by THIS app's own METRICS.downscaleForSend, but the
  // importJSON path can seed it from an untrusted file — so it goes through
  // this.safeSrc() (base64-image-only) at the sink, NOT raw. An empty result (a
  // dataUrl that isn't a clean image URL) renders the placeholder instead of an img.
  // safeSrc's output is a locked-charset data URL, so it is safe UNESCAPED inside the
  // src="..." attribute (escaping would corrupt the base64 payload). ---------------
  _slotHtml(def, session) {
    const val = def.key === "ref" ? session.ref : def.key === "base" ? session.base : session.settingsShot;
    const safe = val && val.dataUrl ? this.safeSrc(val.dataUrl) : "";
    const thumb = safe ? `<img class="slot-thumb" src="${safe}" alt="${this.esc(def.label)}" />` : "";
    const focused = this._focusedSlot === def.key ? "slot-focused" : "";
    return `
      <div class="slot ${safe ? "slot-filled" : ""} ${focused}" data-slot="${def.key}" tabindex="0">
        <div class="slot-label">${this.esc(def.label)}${def.hint ? ` <span class="slot-hint">(${this.esc(def.hint)})</span>` : ""}</div>
        <div class="slot-drop">
          ${thumb || '<div class="slot-empty">Drop, click to focus + paste, or choose a file</div>'}
        </div>
        <input type="file" class="slot-file-input" accept="image/png,image/jpeg,image/webp" />
      </div>
    `;
  },

  _attemptSlotHtml(info) {
    const focused = this._focusedSlot === "attempt" ? "slot-focused" : "";
    return `
      <div class="slot slot-attempt ${focused}" data-slot="attempt" tabindex="0">
        <div class="slot-label">Attempt <span class="slot-hint">(${info.n} so far, last ${info.stored} kept)</span></div>
        <div class="slot-drop"><div class="slot-empty">Drop, click to focus + paste, or choose a file — becomes attempt ${info.n + 1}</div></div>
        <input type="file" class="slot-file-input" accept="image/png,image/jpeg,image/webp" />
      </div>
    `;
  },

  _wireSlot(host, slotKey) {
    const el = host.querySelector(`[data-slot="${slotKey}"]`);
    if (!el) return;
    el.addEventListener("click", () => { this._focusedSlot = slotKey; this.render(); });
    el.addEventListener("focus", () => { this._focusedSlot = slotKey; });
    el.addEventListener("dragover", (ev) => { ev.preventDefault(); });
    el.addEventListener("drop", (ev) => this._onDrop(ev, slotKey));
    const input = el.querySelector(".slot-file-input");
    if (input) {
      input.addEventListener("click", (ev) => ev.stopPropagation());
      input.addEventListener("change", () => {
        const file = input.files && input.files[0];
        if (file) this.ingestFile(slotKey, file);
      });
    }
  },

  // -- recipe area: grouped-by-6-steps recipe card, or correction cards for attempts,
  // or an empty-state message. -------------------------------------------------------
  STEP_HEADERS: {
    1: "1 · Lock exposure & white balance",
    2: "2 · Sun / key",
    3: "3 · Environment / dome",
    4: "4 · Fills & rim",
    5: "5 · Color mapping",
    6: "6 · Atmosphere / weather"
  },
  _renderRecipeArea(state, session, chain) {
    const host = this._els.recipearea;
    if (state === "empty" || state === "ready" || !chain || !chain.recipe) {
      host.innerHTML = `
        <div class="empty-state">
          <div class="empty-inner">
            <div class="empty-mark" aria-hidden="true">◐</div>
            <div class="empty-title">Drop a Reference and a Base render, then Analyze to get a recipe.</div>
            <div class="empty-lead">LightMatch reads both frames and returns an exact, copy-able lighting recipe in your renderer's own UI vocabulary.</div>
            <div class="empty-steps">
              <div class="empty-step"><span class="empty-step-n">1</span><span>Drop the <strong>reference</strong> (the look you want) and your <strong>base render</strong> into the ports on the left.</span></div>
              <div class="empty-step"><span class="empty-step-n">2</span><span>Pick the target renderer and scene context, then press <strong>Analyze</strong>.</span></div>
              <div class="empty-step"><span class="empty-step-n">3</span><span>Apply the recipe, re-render, and drop the attempt back in to refine.</span></div>
            </div>
          </div>
        </div>`;
      return;
    }

    const target = session.activeTarget;
    const targetLabel = (PACKS[target] && PACKS[target].label) || target;
    const recipe = chain.recipe;
    const baselineText = recipe.baseline === "settings_screenshot" ? "settings screenshot" : "factory defaults";

    const stepGroups = [1, 2, 3, 4, 5, 6].map(step => {
      const rows = (recipe.values || []).filter(v => v.step === step);
      if (!rows.length) return "";
      return `
        <div class="step-group" data-step="${step}">
          <div class="step-header">${this.esc(this.STEP_HEADERS[step])}</div>
          ${rows.map(v => this._valueRowHtml(v, target, "recipe", null)).join("")}
        </div>
      `;
    }).join("");

    const correctionsHtml = (chain.attempts || []).map((att, idx) => this._correctionCardHtml(att, idx, target)).join("");

    host.innerHTML = `
      <div class="recipe-card">
        <div class="recipe-card-header">
          <div class="recipe-card-title">Recipe — ${this.esc(targetLabel)}</div>
          <div class="recipe-card-baseline">baseline: ${this.esc(baselineText)}</div>
          <div class="recipe-card-actions">
            <button class="btn-small" data-action="copy-sheet">Copy sheet</button>
            <button class="btn-small" data-action="copy-json">Copy JSON</button>
          </div>
        </div>
        ${stepGroups}
        <details class="rationale-foldout">
          <summary>Rationale</summary>
          <p>${this.esc(recipe.rationale)}</p>
        </details>
        <div class="hdri-mood">HDRI mood: ${this.esc(recipe.hdri_mood)}</div>
        <div class="gi-notes">${this.esc(recipe.gi_notes)}</div>
      </div>
      ${correctionsHtml}
    `;

    const copySheetBtn = host.querySelector('[data-action="copy-sheet"]');
    if (copySheetBtn) copySheetBtn.onclick = async () => { await this.copyText(this.buildSheet(recipe, target)); this.toast("Sheet copied."); };
    const copyJsonBtn = host.querySelector('[data-action="copy-json"]');
    if (copyJsonBtn) copyJsonBtn.onclick = async () => { await this.copyText(this.buildJSON(recipe)); this.toast("JSON copied."); };

    this._wireValueRowCopyButtons(host);
    this._wireAppliedToggles(host);
  },

  // -- one value row: verbatim ui_path as the PRIMARY label (never model text), value
  // + unit + "(from X)", confidence dot, clamped flag, applied toggle (default
  // checked; recipe rows carry data-recipe-applied and feed chain.recipeApplied via
  // ENGINE.setRecipeApplied so the FIRST correction call receives the real applied
  // set — init state comes from UI.isRecipeApplied(chain, param); correction rows
  // carry data-attempt-index and feed that attempt's appliedParams via
  // toggleApplied), copy button. kind:"placement" rows render as an instruction
  // line: the string `set`/`to` IS the placement text, no unit/(from) pair (per the
  // task). All model-sourced text (why, value when it's a placement string, ui_path
  // is PACK data — trusted — but included via esc() anyway for defense in depth) is
  // escaped. ------------------------------------------------------------------------
  _valueRowHtml(v, target, mode, attemptIndex) {
    const entry = PACKS.lookup(target, v.param);
    const uiPath = entry ? entry.ui_path : v.param;
    const isPlacement = entry && entry.kind === "placement";
    const valKey = mode === "correction" ? "to" : "set";
    const value = v[valKey];
    // Unit is appended only when the value is actually numeric — a spinner/dropdown
    // entry's `set`/`to` SHOULD always be the kind-appropriate type, but
    // SCHEMAS.validateRecipe does not itself reject a string on a spinner-kind entry
    // (only clamps numbers; strings pass through unflagged regardless of kind), so
    // this guards against a malformed model value producing nonsense like "40degdeg".
    const unit = entry && entry.unit && typeof value === "number" ? entry.unit : "";
    const confDot = `<span class="conf-dot conf-${this.esc(v.confidence)}" title="confidence: ${this.esc(v.confidence)}"></span>`;
    const clampedFlag = v.clamped ? `<span class="clamped-flag" title="Clamped to the parameter's legal range">clamped</span>` : "";
    const copyText = isPlacement ? `${uiPath} → ${value}` : `${uiPath} → ${value}${unit}`;

    let appliedHtml = "";
    if (mode === "recipe") {
      const recipeChecked = this.isRecipeApplied(ENGINE.activeChain(), v.param);
      appliedHtml = `<label class="applied-toggle"><input type="checkbox" ${recipeChecked ? "checked" : ""} data-recipe-applied data-applied-param="${this.esc(v.param)}" /> applied</label>`;
    } else if (mode === "correction") {
      const chain = ENGINE.activeChain();
      const att = chain && chain.attempts[attemptIndex];
      const appliedFalse = !!(att && att.appliedParams && att.appliedParams[v.param] === false);
      appliedHtml = `<label class="applied-toggle"><input type="checkbox" ${appliedFalse ? "" : "checked"} data-applied-param="${this.esc(v.param)}" data-attempt-index="${attemptIndex}" /> applied</label>`;
    }

    const valueDisplay = isPlacement
      ? `<span class="value-text">${this.esc(value)}</span>`
      : `<span class="value-text">${this.esc(value)}<span class="value-unit">${this.esc(unit)}</span></span> <span class="from-text">(from ${this.esc(v.from)})</span>`;

    // Presentation-only breadcrumb treatment of the verbatim ui_path (Task 7b): each
    // " ▸ "-separated segment is wrapped in a span (breadcrumbs recede, the final
    // control name carries the weight) — the rendered TEXT stays byte-identical to
    // the verbatim ui_path, and data-copy-text above still copies it verbatim.
    const pathParts = String(uiPath).split(" ▸ ");
    const pathLeaf = pathParts.pop();
    const pathHtml = (pathParts.length ? `${pathParts.map(p => this.esc(p)).join(`<span class="path-sep"> ▸ </span>`)}<span class="path-sep"> ▸ </span>` : "")
      + `<span class="path-leaf">${this.esc(pathLeaf)}</span>`;

    return `
      <div class="value-row ${isPlacement ? "value-row-placement" : ""}" data-param="${this.esc(v.param)}">
        ${confDot}
        <div class="value-row-main">
          <div class="value-row-label">${pathHtml}</div>
          <div class="value-row-value">${valueDisplay} ${clampedFlag}</div>
          <div class="value-row-why">${this.esc(v.why)}</div>
        </div>
        ${appliedHtml}
        <button class="row-copy-btn" data-copy-text="${this.esc(copyText)}" title="Copy">copy</button>
      </div>
    `;
  },

  // -- correction card: same row treatment as recipe rows, from correction.moves
  // (from -> to), plus status_reason. The task-mandated handoff banner (text: "...
  // take it to REFGRADE") is rendered exactly ONCE, in _renderSessionStrip (the
  // spec's named location, "bottom (session strip): ... plateau state renders the
  // REFGRADE handoff message") — not duplicated here, even though this card also
  // knows c.status; status_reason alone (no banner) is enough context on the card
  // itself, since the banner already carries the full REFGRADE sentence. ----------
  _correctionCardHtml(att, idx, target) {
    if (!att.correction) return "";
    const c = att.correction;
    const movesHtml = (c.moves || []).map(m => this._valueRowHtml(m, target, "correction", idx)).join("");
    // Monotonic attempt number (#8) so the card title matches the "ATTEMPT N:" the
    // model was told for this attempt, even after FIFO eviction relabels array indices.
    const attemptN = ENGINE.attemptNumberAt(idx);
    return `
      <div class="recipe-card correction-card" data-attempt-index="${idx}">
        <div class="recipe-card-header">
          <div class="recipe-card-title">Correction — attempt ${attemptN} <span class="score-inline">look distance <span class="score-num">${Math.round(att.score)}</span></span></div>
        </div>
        ${movesHtml}
        <div class="status-reason">${this.esc(c.status_reason || "")}</div>
      </div>
    `;
  },

  _wireValueRowCopyButtons(host) {
    host.querySelectorAll(".row-copy-btn").forEach(btn => {
      btn.onclick = async () => { await this.copyText(btn.getAttribute("data-copy-text")); this.toast("Copied."); };
    });
  },

  _wireAppliedToggles(host) {
    // Correction-row toggles: [data-attempt-index] -> that attempt's appliedParams.
    host.querySelectorAll("[data-applied-param][data-attempt-index]").forEach(cb => {
      cb.onchange = () => {
        const idx = parseInt(cb.getAttribute("data-attempt-index"), 10);
        const param = cb.getAttribute("data-applied-param");
        this.toggleApplied(idx, param);
      };
    });
    // Recipe-row toggles: [data-recipe-applied] -> chain.recipeApplied via ENGINE
    // (Task 7a follow-up: the first correction call receives this applied set).
    // setRecipeApplied throws BusyError while an op is in flight; the render() in
    // either path snaps the checkbox back to the stored (unchanged) state.
    host.querySelectorAll("[data-recipe-applied]").forEach(cb => {
      cb.onchange = async () => {
        try {
          await ENGINE.setRecipeApplied(cb.getAttribute("data-applied-param"), cb.checked);
        } catch (e) {
          if (e && e.kind === "busy") this.toast("Already working — one moment.");
        }
        this.render();
      };
    });
  },

  // -- session strip: ref thumb + per-attempt thumbs, score labeled "look distance
  // (0–100)", trend arrow vs previous, verbatim caveat text, handoff banner. Thumb
  // src values go through this.safeSrc() (a dataUrl can arrive from an untrusted
  // import) — an empty result renders a text placeholder in place of the <img>. ----
  _renderSessionStrip(state, session, chain) {
    const host = this._els.sessionstrip;
    if (state === "empty" || !session.ref) { host.innerHTML = ""; return; }

    const attempts = (chain && chain.attempts) || [];
    const refSafe = this.safeSrc(session.ref.dataUrl);
    const refImg = refSafe ? `<img src="${refSafe}" alt="Reference" />` : `<div class="slot-empty">image unavailable</div>`;
    const refThumb = `<div class="strip-thumb strip-ref">${refImg}<div class="strip-caption">Reference</div></div>`;

    const attemptThumbs = attempts.map((att, idx) => {
      const prev = idx > 0 ? attempts[idx - 1] : null;
      let trend = "";
      if (prev) {
        trend = att.score < prev.score ? '<span class="trend trend-up" title="Closer to reference">▲</span>'
          : att.score > prev.score ? '<span class="trend trend-down" title="Further from reference">▼</span>'
          : '<span class="trend trend-flat">–</span>';
      }
      // Monotonic attempt number (#8) in the thumb alt so it agrees with the card title.
      const attemptN = ENGINE.attemptNumberAt(idx);
      const attSafe = this.safeSrc(att.dataUrl);
      const attImg = attSafe ? `<img src="${attSafe}" alt="Attempt ${attemptN}" />` : `<div class="slot-empty">image unavailable</div>`;
      return `
        <div class="strip-thumb" data-attempt-index="${idx}">
          ${attImg}
          <div class="strip-caption">look distance (0–100): <span class="strip-score">${Math.round(att.score)}</span> ${trend}</div>
        </div>
      `;
    }).join("");

    // Handoff banner triggers on the latest handoff signal (#11): a correction round
    // that declared handoff_to_grade, OR — when there are no attempts yet — the INITIAL
    // recipe itself declaring handoff (the very first analysis can already conclude the
    // residual is a grade, not a lighting problem). The correction signal takes
    // precedence once attempts exist; the recipe carries the same status enum.
    const latestAtt = attempts.length ? attempts[attempts.length - 1] : null;
    const attHandoff = latestAtt && latestAtt.correction && latestAtt.correction.status === "handoff_to_grade";
    const recipeHandoff = !attHandoff && chain && chain.recipe && chain.recipe.status === "handoff_to_grade";
    const handoffReason = attHandoff ? (latestAtt.correction.status_reason || "")
      : recipeHandoff ? (chain.recipe.status_reason || "") : null;
    const handoff = handoffReason !== null;

    host.innerHTML = `
      ${handoff ? `<div class="banner banner-handoff">${this.esc(handoffReason)} — lighting is within noise of the reference — the rest is a grade; take it to REFGRADE.</div>` : ""}
      <div class="session-strip">
        ${refThumb}
        ${attemptThumbs}
      </div>
      <div class="strip-caveat">trust your eyes first, the numbers second</div>
    `;
  }
};

/* ===== SECTION: SELFTEST ===== */
const SELFTEST = { fails: [], n: 0,
  ok(cond, msg) { this.n++; if (!cond) this.fails.push(msg); },
  close(a, b, tol, msg) { this.ok(Math.abs(a - b) <= tol, `${msg} (got ${a}, want ${b}±${tol})`); },
  async run() {
    // IDB isolation (#6): run EVERY suite against a throwaway "lightmatch-selftest"
    // database, never the user's real "lightmatch" one. Even the retention suite's
    // real prune then only ever touches selftest rows. Restored + the throwaway DB
    // deleted in the finally so a ?selftest visit leaves the real database untouched.
    const _restoreDb = STORE._useDb("lightmatch-selftest");
    try {
      for (const [name, fn] of Object.entries(SELFTEST.suites)) { try { await fn.call(SELFTEST); } catch (e) { this.fails.push(name + " threw: " + e.message); } }
    } finally {
      try { await new Promise((res) => { const r = indexedDB.deleteDatabase("lightmatch-selftest"); r.onsuccess = r.onerror = r.onblocked = () => res(); }); } catch (e) {}
      STORE._useDb(_restoreDb);
    }
    const line = this.fails.length ? `SELFTEST: FAIL\n` + this.fails.join("\n") : `SELFTEST: PASS (${this.n} asserts)`;
    document.body.textContent = line; document.title = line.split("\n")[0];
  }, suites: {} };

  const FIELDS = ["id", "ui_path", "kind", "unit", "range", "default", "notes", "verified", "group", "lighting"];
  // ids the plan fixes per pack — drift guard

      "sun.placement_azimuth", "sun.placement_elevation", "sun.intensity_mult", "sun.size_mult", "sun.kelvin",
      "sun.turbidity", "fill.plane_intensity", "fill.plane_kelvin", "fill.sphere_intensity", "fill.key_fill_guidance",
      "cam.iso", "cam.fnumber", "cam.shutter", "cam.wb_kelvin", "cam.ev_readout",
      "cm.type", "cm.highlight_burn", "cm.contrast", "cm.saturation", "vfb.exposure", "gi.primary", "gi.secondary"],
    vantage33: ["env.hdri_slot", "env.intensity", "env.rotation", "env.background_mode",

      "cam.exposure_value", "cam.wb", "cam.dof_note", "post.tonemap_type", "post.contrast", "post.saturation"]

    for (const id of REQUIRED[target]) this.ok(!!PACKS.lookup(target, id), `${target}: plan-required id ${id} present`);
    const seen = new Set();
    for (const e of pack.entries) {
      const w = `${target}:${e.id}`;
      this.ok(!seen.has(e.id), `${w}: id unique`); seen.add(e.id);
      for (const f of FIELDS) this.ok(f in e, `${w}: has field ${f}`);
      this.ok(KINDS.includes(e.kind), `${w}: legal kind (${e.kind})`);
      this.ok(Array.isArray(e.range) && e.range.length === 2, `${w}: range is a pair`);
      this.ok(typeof e.ui_path === "string" && e.ui_path.length > 8, `${w}: ui_path non-trivial`);
      this.ok(typeof e.notes === "string" && e.notes.length > 0, `${w}: notes non-empty`);
      this.ok(e.verified === false || e.verified === "2026-07-02" || e.verified === "2026-07-03", `${w}: verified is check-date or false`);
      // -- Phase-1 sheet metadata: every entry carries a non-empty group string + boolean lighting flag
      this.ok(typeof e.group === "string" && e.group.length > 0, `${w}: group is a non-empty string`);
      this.ok(typeof e.lighting === "boolean", `${w}: lighting is a boolean`);
      if (e.kind === "spinner") {
        // value-carrying entries: strictly increasing range, numeric default inside it
        this.ok(e.range[0] < e.range[1], `${w}: spinner range[0]<range[1]`);
        this.ok(typeof e.default === "number" && e.default >= e.range[0] && e.default <= e.range[1], `${w}: default inside range`);
        const hi = PACKS.clamp(target, e.id, 1e9);
        this.ok(hi.value === e.range[1] && hi.clamped === true, `${w}: clamp(1e9) -> max, flagged`);
        const lo = PACKS.clamp(target, e.id, -1e9);
        this.ok(lo.value === e.range[0] && lo.clamped === true, `${w}: clamp(-1e9) -> min, flagged`);
        const mid = PACKS.clamp(target, e.id, e.default);
        this.ok(mid.value === e.default && mid.clamped === false, `${w}: clamp(default) unchanged`);
      } else if (e.kind === "slot") {
        // spec-fixed slot shape: range [0,0], default "none"
        this.ok(e.range[0] === 0 && e.range[1] === 0, `${w}: slot range [0,0]`);
        this.ok(e.default === "none", `${w}: slot default "none"`);
      } else if (e.kind === "dropdown") {
        this.ok(e.range[0] === 0 && e.range[1] === 0, `${w}: dropdown range [0,0]`);
        this.ok(typeof e.default === "string" && e.default.length > 0, `${w}: dropdown string default`);
        this.ok(e.notes.includes("Options:"), `${w}: dropdown carries option list in notes`);
        this.ok(e.notes.includes(e.default), `${w}: dropdown default is among the options text`);
      } else if (e.kind === "checkbox") {
        // checkbox shape: range [0,0], default "on"/"off"
        this.ok(e.range[0] === 0 && e.range[1] === 0, `${w}: checkbox range [0,0]`);
        this.ok(e.default === "on" || e.default === "off", `${w}: checkbox default "on"/"off" (got ${JSON.stringify(e.default)})`);
      } else if (e.kind === "color") {
        // color shape: range [0,0], default a non-empty description/hex-ish string
        this.ok(e.range[0] === 0 && e.range[1] === 0, `${w}: color range [0,0]`);
        this.ok(typeof e.default === "string" && e.default.length > 0, `${w}: color string default`);
      } else { // placement: instruction rows; numeric ones (angles, kelvin, ratio) keep honest bounds
        if (typeof e.default === "number") {
          this.ok(e.range[0] < e.range[1], `${w}: placement numeric range[0]<range[1]`);
          this.ok(e.default >= e.range[0] && e.default <= e.range[1], `${w}: placement default inside range`);
        } else {
          this.ok(typeof e.default === "string" && e.default.length > 0, `${w}: placement string default`);
        }
      }
    }
  }
  // lookup contract
  const sunK = PACKS.lookup("vray7max", "sun.kelvin");
  this.ok(!!sunK, "lookup finds vray7max sun.kelvin");
  this.ok(PACKS.lookup("vray7max", "no.such_param") === null, "lookup unknown id -> null");
  this.ok(PACKS.lookup("corona", "sun.kelvin") === null, "lookup unknown target -> null");
  // -- (#14) V-Ray sun elevation reaches twilight: range [-12, 90], default 35 still in
  // range, note mentions the twilight/dusk rationale.
  const sunEl = PACKS.lookup("vray7max", "sun.placement_elevation");
  this.ok(!!sunEl && sunEl.range[0] === -12 && sunEl.range[1] === 90, `elevation (#14): sun.placement_elevation range is [-12, 90] (got ${sunEl && JSON.stringify(sunEl.range)})`);
  this.ok(!!sunEl && sunEl.default === 35 && sunEl.default >= sunEl.range[0] && sunEl.default <= sunEl.range[1], `elevation (#14): default 35 stays inside the extended range (got ${sunEl && sunEl.default})`);
  this.ok(!!sunEl && /twilight|dusk/i.test(sunEl.notes), "elevation (#14): the note mentions twilight/dusk");
  // a below-horizon dusk elevation is now IN range (not clamped), while -13 still clamps.
  const elDusk = PACKS.clamp("vray7max", "sun.placement_elevation", -10);
  this.ok(elDusk.value === -10 && elDusk.clamped === false, `elevation (#14): -10 deg (dusk) is accepted un-clamped now (got ${JSON.stringify(elDusk)})`);
  const elTooLow = PACKS.clamp("vray7max", "sun.placement_elevation", -20);
  this.ok(elTooLow.value === -12 && elTooLow.clamped === true, `elevation (#14): -20 still clamps to the -12 floor (got ${JSON.stringify(elTooLow)})`);
  // clamp pass-through for strings / non-numeric kinds
  const str = PACKS.clamp("vray7max", "cm.type", "Reinhard");
  this.ok(str.value === "Reinhard" && str.clamped === false, "clamp passes string values through unflagged");
  // promptFragment contract — now FILTERED to lighting:true entries only
  const pf = PACKS.promptFragment("vray7max");
  this.ok(pf.includes("sun.kelvin"), 'promptFragment("vray7max") contains "sun.kelvin"');
  this.ok(pf.includes(sunK.ui_path), "promptFragment contains sun.kelvin verbatim ui_path");
  const vrayLit = PACKS.vray7max.entries.filter(e => e.lighting === true);
  this.ok(pf.split("\n").length === vrayLit.length + 1, `promptFragment: one line per lighting:true param + header (got ${pf.split("\n").length}, want ${vrayLit.length + 1})`);
  // filter is real: a lighting:false completeness control is withheld from the fragment
  const wire = PACKS.lookup("vray7max", "light.vp_wire_color");
  this.ok(!!wire && wire.lighting === false && !pf.includes(wire.ui_path), "promptFragment withholds a lighting:false control (light.vp_wire_color)");
  const evEntry = PACKS.lookup("vantage33", "cam.exposure_value");
  const pf2 = PACKS.promptFragment("vantage33");
  this.ok(pf2.includes("cam.exposure_value") && pf2.includes(evEntry.ui_path), "vantage33 fragment has cam.exposure_value + verbatim ui_path");
  const vanLit = PACKS.vantage33.entries.filter(e => e.lighting === true);
  this.ok(pf2.split("\n").length === vanLit.length + 1, `vantage33 promptFragment: one line per lighting:true param + header (got ${pf2.split("\n").length}, want ${vanLit.length + 1})`);
  this.ok(PACKS.promptFragment("corona") === "", "promptFragment unknown target -> empty string");
  // -- sheet contract: FULL entry list (lighting true+false), grouped, panel-ordered ----
  for (const target of PACKS.targets()) {
    const sheet = PACKS.sheet(target);
    this.ok(Array.isArray(sheet) && sheet.length > 0, `${target}: sheet() returns a non-empty array`);
    // every group has a non-empty name + at least one entry
    for (const grp of sheet) {
      this.ok(typeof grp.group === "string" && grp.group.length > 0, `${target}: sheet group has a name`);
      this.ok(Array.isArray(grp.entries) && grp.entries.length > 0, `${target}: sheet group "${grp.group}" has entries`);
      this.ok(grp.entries.every(e => e.group === grp.group), `${target}: sheet group "${grp.group}" only contains its own entries`);

    const flat = sheet.flatMap(g => g.entries);
    this.ok(flat.length === PACKS[target].entries.length, `${target}: sheet covers EVERY control (got ${flat.length}, want ${PACKS[target].entries.length})`);
    const flatIds = new Set(flat.map(e => e.id));
    this.ok(flatIds.size === PACKS[target].entries.length, `${target}: sheet ids unique + complete`);
    // group names are unique across the sheet (each group emitted once, in first-seen UI order)
    const gnames = sheet.map(g => g.group);
    this.ok(new Set(gnames).size === gnames.length, `${target}: sheet group order has no repeats`);
    // sheet includes lighting:false controls that the fragment omits
    this.ok(flat.some(e => e.lighting === false), `${target}: sheet includes display-only (lighting:false) controls`);
  }
  this.ok(PACKS.sheet("corona").length === 0, "sheet() unknown target -> empty array");
  // -- step-6 atmosphere/weather group (added 2026-07-03; docs/settings-research-atmospherics.md)
  for (const target of PACKS.targets()) {
    const ids = PACKS[target].entries.map(e => e.id);
    this.ok(ids.some(id => id.startsWith("fog.")), `${target}: atmosphere group has a fog.* id`);
    this.ok(ids.some(id => id.startsWith("clouds.")), `${target}: atmosphere group has a clouds.* id`);
  }
  this.ok(PACKS.vray7max.entries.some(e => e.id.startsWith("aerial.")), "vray7max: atmosphere group has an aerial.* id");
  this.ok(PACKS.vantage33.entries.some(e => e.id.startsWith("wet.")), "vantage33: atmosphere group has a wet.* (Wetting Beta) id");
  const fogMax = PACKS.lookup("vray7max", "fog.distance");
  this.ok(!!fogMax && pf.includes(fogMax.ui_path), "vray7max promptFragment carries fog.distance's verbatim ui_path");

  this.ok(!!fogVan && pf2.includes(fogVan.ui_path), "vantage33 promptFragment carries fog.visibility_range's verbatim ui_path");

    this.ok(/handoff_to_grade/i.test(spCorrection) && /chromatic|tonal/i.test(spCorrection), `systemPrompt(${target},correction): handoff_to_grade-when-chromatic/tonal clause present`);
    const spRecipe = SCHEMAS.systemPrompt(target, "recipe");
    this.ok(!/move history/i.test(spRecipe), `systemPrompt(${target},recipe): correction-only move-history clause absent in recipe mode`);
  }
  this.ok(SCHEMAS.systemPrompt("corona", "recipe") !== SCHEMAS.systemPrompt("vray7max", "recipe"), "systemPrompt: unknown target does not silently alias a known pack");

  // -- validateRecipe: recipe shape (values[]/set) -----------------------------------
  function baseRecipe() {
    return {
      baseline: "factory_defaults",
      hdri_mood: "soft overcast",
      values: [
        { param: "sun.kelvin", set: 5500, from: 5777, step: 2, confidence: "high", why: "warm the key" },
        { param: "cm.contrast", set: 0.1, from: 0, step: 5, confidence: "medium", why: "lift contrast" },
        { param: "vfb.exposure", set: 0.5, from: 0, step: 1, confidence: "high", why: "brighten" },
        { param: "dome.intensity", set: 1.2, from: 1.0, step: 3, confidence: "low", why: "brighten sky" }
      ],
      rationale: "test rationale", gi_notes: "brute force is fine",
      status: "continue", status_reason: ""
    };
  }
  const valid = SCHEMAS.validateRecipe(baseRecipe(), "vray7max");
  this.ok(valid.ok === true, `validateRecipe: valid object passes (errors: ${JSON.stringify(valid.errors)})`);
  this.ok(Array.isArray(valid.errors) && valid.errors.length === 0, "validateRecipe: valid object has zero errors");
  this.ok(!!valid.cleaned && Array.isArray(valid.cleaned.values) && valid.cleaned.values.length === 4, "validateRecipe: cleaned.values preserved for a valid object");

  const unknownParam = baseRecipe();
  unknownParam.values[0].param = "no.such_param";
  const rUnknown = SCHEMAS.validateRecipe(unknownParam, "vray7max");
  this.ok(rUnknown.ok === false, "validateRecipe: unknown param -> ok===false");
  this.ok(rUnknown.errors.some(e => /no\.such_param/.test(e)), "validateRecipe: unknown param error names the bad id");

  const outOfRange = baseRecipe();
  outOfRange.values[0] = { param: "sun.kelvin", set: 40000, from: 5777, step: 2, confidence: "high", why: "way too warm... or cold" };
  const rClamped = SCHEMAS.validateRecipe(outOfRange, "vray7max");
  this.ok(rClamped.ok === true, "validateRecipe: out-of-range numeric set is a warning, not a fail (ok===true)");
  const clampedVal = rClamped.cleaned.values.find(v => v.param === "sun.kelvin");
  this.ok(!!clampedVal, "validateRecipe: clamped value survives into cleaned");
  this.ok(clampedVal.set === PACKS.lookup("vray7max", "sun.kelvin").range[1], `validateRecipe: 40000 clamped to pack max (got ${clampedVal.set})`);
  this.ok(clampedVal.clamped === true, "validateRecipe: clamped value flagged clamped:true");

  const nanValue = baseRecipe();
  nanValue.values[0] = { param: "sun.kelvin", set: NaN, from: 5777, step: 2, confidence: "high", why: "broken" };
  const rNaN = SCHEMAS.validateRecipe(nanValue, "vray7max");
  this.ok(rNaN.ok === false, "validateRecipe: NaN set -> ok===false (ERROR, never passed through)");
  this.ok(rNaN.errors.some(e => /sun\.kelvin/.test(e)), "validateRecipe: NaN error names the offending param");
  this.ok(!rNaN.cleaned.values.some(v => v.param === "sun.kelvin" && (Number.isNaN(v.set))), "validateRecipe: NaN never survives into cleaned.values");

  const infValue = baseRecipe();
  infValue.values[0] = { param: "sun.kelvin", set: Infinity, from: 5777, step: 2, confidence: "high", why: "broken" };
  const rInf = SCHEMAS.validateRecipe(infValue, "vray7max");
  this.ok(rInf.ok === false, "validateRecipe: Infinity set -> ok===false (ERROR)");
  const negInfValue = baseRecipe();
  negInfValue.values[0] = { param: "sun.kelvin", set: -Infinity, from: 5777, step: 2, confidence: "high", why: "broken" };
  const rNegInf = SCHEMAS.validateRecipe(negInfValue, "vray7max");
  this.ok(rNegInf.ok === false, "validateRecipe: -Infinity set -> ok===false (ERROR)");

  const badStep = baseRecipe();
  badStep.values[0].step = 7;
  const rBadStep = SCHEMAS.validateRecipe(badStep, "vray7max");
  this.ok(rBadStep.ok === false, "validateRecipe: step 7 (outside 1..6) -> ok===false");

  const zeroStep = baseRecipe();
  zeroStep.values[0].step = 0;
  const rZeroStep = SCHEMAS.validateRecipe(zeroStep, "vray7max");
  this.ok(rZeroStep.ok === false, "validateRecipe: step 0 -> ok===false");

  const step6 = baseRecipe();
  step6.values[0].step = 6;
  const rStep6 = SCHEMAS.validateRecipe(step6, "vray7max");
  this.ok(rStep6.ok === true, `validateRecipe: step 6 (atmosphere/weather) validates OK (errors: ${JSON.stringify(rStep6.errors)})`);
  this.ok(rStep6.cleaned.values.length === 4, "validateRecipe: step-6 value survives into cleaned.values");

  // string `set` (dropdown/slot/placement kinds) passes through untouched, unflagged
  const stringSet = baseRecipe();
  stringSet.values[1] = { param: "cm.type", set: "Reinhard", from: "Reinhard", step: 5, confidence: "high", why: "keep default" };
  const rString = SCHEMAS.validateRecipe(stringSet, "vray7max");
  this.ok(rString.ok === true, "validateRecipe: string set (dropdown) passes");
  const cleanedString = rString.cleaned.values.find(v => v.param === "cm.type");
  this.ok(cleanedString.set === "Reinhard" && !cleanedString.clamped, "validateRecipe: string set untouched, not flagged clamped");

  // -- validateRecipe: correction shape (moves[]/to) ---------------------------------
  function baseCorrection() {
    return {
      moves: [
        { param: "sun.kelvin", to: 5200, from: 5500, step: 2, confidence: "high", why: "cool it slightly" }
      ],
      rationale: "small trim", status: "continue", status_reason: "", applied_assumed: false
    };
  }
  const validCorrection = SCHEMAS.validateRecipe(baseCorrection(), "vray7max", "correction");
  this.ok(validCorrection.ok === true, `validateRecipe correction mode: valid object passes (errors: ${JSON.stringify(validCorrection.errors)})`);
  this.ok(Array.isArray(validCorrection.cleaned.moves) && validCorrection.cleaned.moves.length === 1, "validateRecipe correction mode: cleaned.moves preserved");

  const correctionOutOfRange = baseCorrection();
  correctionOutOfRange.moves[0].to = -500;
  const rCorrectionClamped = SCHEMAS.validateRecipe(correctionOutOfRange, "vray7max", "correction");
  this.ok(rCorrectionClamped.ok === true, "validateRecipe correction mode: out-of-range `to` is a warning, not a fail");
  const clampedMove = rCorrectionClamped.cleaned.moves[0];
  this.ok(clampedMove.to === PACKS.lookup("vray7max", "sun.kelvin").range[0] && clampedMove.clamped === true, `validateRecipe correction mode: -500 clamped to pack min, flagged (got ${clampedMove.to})`);

  const correctionNaN = baseCorrection();
  correctionNaN.moves[0].to = NaN;
  const rCorrectionNaN = SCHEMAS.validateRecipe(correctionNaN, "vray7max", "correction");
  this.ok(rCorrectionNaN.ok === false, "validateRecipe correction mode: NaN `to` -> ok===false (ERROR)");

  const correctionUnknownParam = baseCorrection();
  correctionUnknownParam.moves[0].param = "no.such_param";
  const rCorrectionUnknown = SCHEMAS.validateRecipe(correctionUnknownParam, "vray7max", "correction");
  this.ok(rCorrectionUnknown.ok === false, "validateRecipe correction mode: unknown param -> ok===false");

  // mode defaults to "recipe" when omitted (2-arg call keeps working for the recipe shape)
  const rDefaultMode = SCHEMAS.validateRecipe(baseRecipe(), "vray7max");
  this.ok(rDefaultMode.ok === true, "validateRecipe: 2-arg call (mode omitted) defaults to recipe mode");

  // unknown target: every param lookup fails -> every value errors
  const rUnknownTarget = SCHEMAS.validateRecipe(baseRecipe(), "corona");
  this.ok(rUnknownTarget.ok === false, "validateRecipe: unknown target -> ok===false (no params resolve)");

  // -- (#4a) blank / partial recipe rejection: an empty or field-missing emit is NOT a
  // successful empty recipe. {} and {values:[]} both fail; a recipe missing a
  // schema-required top-level field fails and the error names that field. -----------
  const rEmptyObj = SCHEMAS.validateRecipe({}, "vray7max");
  this.ok(rEmptyObj.ok === false, "validateRecipe (#4a): {} -> ok===false (blank recipe is not a success)");
  const rEmptyValues = SCHEMAS.validateRecipe({ values: [] }, "vray7max");
  this.ok(rEmptyValues.ok === false, "validateRecipe (#4a): {values:[]} -> ok===false (empty values array rejected)");
  this.ok(rEmptyValues.errors.some(e => /values.*absent or empty|absent or empty/i.test(e)), `validateRecipe (#4a): empty-values error explains the absent/empty array (got ${JSON.stringify(rEmptyValues.errors)})`);
  // a recipe that has values but is missing a required top-level field (status) fails,
  // and the error names the missing field.
  const missingStatus = baseRecipe();
  delete missingStatus.status;
  const rMissingStatus = SCHEMAS.validateRecipe(missingStatus, "vray7max");
  this.ok(rMissingStatus.ok === false, "validateRecipe (#4a): a recipe missing a required top-level field (status) -> ok===false");
  this.ok(rMissingStatus.errors.some(e => /status/.test(e)), `validateRecipe (#4a): the missing-field error names "status" (got ${JSON.stringify(rMissingStatus.errors)})`);
  // correction mode: empty moves + missing required field both rejected.
  const rEmptyMoves = SCHEMAS.validateRecipe({ moves: [] }, "vray7max", "correction");
  this.ok(rEmptyMoves.ok === false, "validateRecipe (#4a): {moves:[]} in correction mode -> ok===false");
  const missingApplied = baseCorrection();
  delete missingApplied.applied_assumed;
  const rMissingApplied = SCHEMAS.validateRecipe(missingApplied, "vray7max", "correction");
  this.ok(rMissingApplied.ok === false && rMissingApplied.errors.some(e => /applied_assumed/.test(e)), `validateRecipe (#4a): a correction missing applied_assumed -> ok===false naming the field (got ${JSON.stringify(rMissingApplied.errors)})`);
  // a fully-populated valid recipe/correction still passes (no false positive from #4a).
  this.ok(SCHEMAS.validateRecipe(baseRecipe(), "vray7max").ok === true, "validateRecipe (#4a): a complete valid recipe still passes (no false reject)");
  this.ok(SCHEMAS.validateRecipe(baseCorrection(), "vray7max", "correction").ok === true, "validateRecipe (#4a): a complete valid correction still passes");
};

// -- suite: adapter (Task 5) -- NO LIVE NETWORK CALLS. Pure parts (classify(),
// BACKOFF_MS/TIMEOUT_MS, buildUserContent()) are exercised directly; ADAPTER.call()'s
// retry/timeout/re-ask wiring is exercised against a STUBBED globalThis.fetch
// (saved and restored in try/finally, backoff shrunk to 1ms) — no socket is ever
// opened, honoring the plan's "do NOT make live network calls in selftests" rule.
// Live gateway behavior is separately verified by Task 8's smoke test.
SELFTEST.suites.adapter = async function () {
  // -- retry classifier: pure function, no fetch -------------------------------------
  this.ok(typeof ADAPTER.classify === "function", "ADAPTER.classify is a function");
  this.ok(ADAPTER.classify(429) === "retry", "classify(429) -> retry");
  this.ok(ADAPTER.classify(500) === "retry", "classify(500) -> retry");
  this.ok(ADAPTER.classify(502) === "retry", "classify(502) -> retry (5xx family)");
  this.ok(ADAPTER.classify(503) === "retry", "classify(503) -> retry (5xx family)");
  this.ok(ADAPTER.classify(599) === "retry", "classify(599) -> retry (5xx family upper bound)");
  this.ok(ADAPTER.classify(401) === "auth", "classify(401) -> auth");
  this.ok(ADAPTER.classify(400) === "fatal", "classify(400) -> fatal");
  this.ok(ADAPTER.classify(403) === "fatal", "classify(403) -> fatal (not 401, not retryable)");
  this.ok(ADAPTER.classify(404) === "fatal", "classify(404) -> fatal");
  this.ok(ADAPTER.classify(200) === "fatal", "classify(200) -> fatal (success status never reaches the classifier in practice, but must not read as retry/auth)");

  // -- backoff schedule + per-attempt timeout: constants, not functions — testable
  // without fetch ---------------------------------------------------------------------
  this.ok(Array.isArray(ADAPTER.BACKOFF_MS), "ADAPTER.BACKOFF_MS is an array");
  this.ok(JSON.stringify(ADAPTER.BACKOFF_MS) === JSON.stringify([2000, 6000, 15000]), `ADAPTER.BACKOFF_MS is [2000,6000,15000] (got ${JSON.stringify(ADAPTER.BACKOFF_MS)})`);
  this.ok(ADAPTER.TIMEOUT_MS === 120000, `ADAPTER.TIMEOUT_MS is 120000 (got ${ADAPTER.TIMEOUT_MS})`);

  // -- error types: constructible and distinguishable without a network call ---------
  this.ok(typeof ADAPTER.AuthError === "function", "ADAPTER.AuthError is a constructor");
  this.ok(typeof ADAPTER.ShapeError === "function", "ADAPTER.ShapeError is a constructor");
  const authErr = new ADAPTER.AuthError("bad key");
  this.ok(authErr instanceof Error && authErr.name === "AuthError", "AuthError instance: is an Error, name===AuthError");
  const shapeErr = new ADAPTER.ShapeError("no tool_use", "raw text here");
  this.ok(shapeErr instanceof Error && shapeErr.name === "ShapeError", "ShapeError instance: is an Error, name===ShapeError");
  this.ok(shapeErr.raw === "raw text here", "ShapeError carries the raw response text");

  // -- buildUserContent: 1x1 PNG data URLs (tiny, no network, no image decode needed
  // since buildUserContent works on already-downscaled {dataUrl, mediaType} pairs — it
  // does NOT call downscaleForSend itself; ENGINE calls that upstream) --------------
  const PNG1 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=";
  const JPG1 = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAMCAgICAgMCAgIDAwMDBAYEBAQEBAgGBgUGCQgKCgkICQkKDA8MCgsOCwkJDRENDg8QEBEQCgwSExIQEw8QEBD/wAALCAABAAEBAREA/8QAFQABAQAAAAAAAAAAAAAAAAAAAAj/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/9oACAEBAAA/AJ8=";

  function findTextBlocks(content) { return content.filter(b => b.type === "text"); }
  function findImageBlocks(content) { return content.filter(b => b.type === "image"); }

  // -- analyze mode (initial): reference + base, no settings screenshot --------------
  const contentAnalyze = ADAPTER.buildUserContent({
    mode: "recipe",
    images: [
      { role: "reference", dataUrl: PNG1, mediaType: "image/png" },
      { role: "base", dataUrl: JPG1, mediaType: "image/jpeg" }
    ],
    metricsBundle: { ref: { lum: { p50: 0.2 } }, base: { lum: { p50: 0.3 } }, diff: { "lum.p50": 0.1 } },
    context: { scene: "exterior", time: "golden hour", rig: "sun+dome" }
  });
  this.ok(Array.isArray(contentAnalyze), "buildUserContent returns an array of blocks");
  // documented order: [text(REFERENCE label), image, text(BASE RENDER label), image, text(evidence+legend), text(context)]
  this.ok(contentAnalyze[0].type === "text" && /REFERENCE:/.test(contentAnalyze[0].text), "block 0: REFERENCE: label text");
  this.ok(contentAnalyze[1].type === "image", "block 1: reference image");
  this.ok(contentAnalyze[1].source.type === "base64" && contentAnalyze[1].source.media_type === "image/png", "block 1: image source is base64/image-png shaped");
  this.ok(contentAnalyze[2].type === "text" && /BASE RENDER:/.test(contentAnalyze[2].text), "block 2: BASE RENDER: label text");
  this.ok(contentAnalyze[3].type === "image" && contentAnalyze[3].source.media_type === "image/jpeg", "block 3: base render image, media_type image/jpeg");
  const evidenceBlock = contentAnalyze.find(b => b.type === "text" && /COMPUTED EVIDENCE/.test(b.text));
  this.ok(!!evidenceBlock, "an evidence block with the COMPUTED EVIDENCE marker exists");
  this.ok(/linearized 0.?.?1|0.?.?1.*linear/i.test(evidenceBlock.text) || /luminance values are linearized/i.test(evidenceBlock.text), "evidence block: units legend mentions linearized 0-1 luminance");
  this.ok(/\(R.?.?B\)\/\(R\+B\)|warmth.*R.*B.*R.*B/i.test(evidenceBlock.text), "evidence block: units legend states warmth* = (R-B)/(R+B)");
  this.ok(/positive = warmer/i.test(evidenceBlock.text), "evidence block: units legend states positive=warmer");
  this.ok(/few hundred kelvin|hundred kelvin/i.test(evidenceBlock.text), "evidence block: units legend gives the +-0.05 ~ a few hundred kelvin approximation");
  this.ok(/tint.*positive.*green|positive = green/i.test(evidenceBlock.text), "evidence block: units legend states tint positive=green");
  // (#10) the legend states the diff DIRECTION so the model never mis-signs a move.
  this.ok(/diff is reference minus current/i.test(evidenceBlock.text), "evidence block (#10): units legend states diff is reference minus current");
  this.ok(/positive = reference is higher/i.test(evidenceBlock.text), "evidence block (#10): units legend states positive = reference is higher (move that way)");
  this.ok(evidenceBlock.text.includes(JSON.stringify({ ref: { lum: { p50: 0.2 } }, base: { lum: { p50: 0.3 } }, diff: { "lum.p50": 0.1 } })), "evidence block contains JSON.stringify of the metricsBundle verbatim");
  const contextBlock = contentAnalyze.find(b => b.type === "text" && /exterior/.test(b.text) && /golden hour/.test(b.text));
  this.ok(!!contextBlock, "a context-chips block mentioning scene/time/rig exists");
  // evidence block must come after both images (documented order: images labeled first, then evidence)
  const evidenceIdx = contentAnalyze.indexOf(evidenceBlock);
  this.ok(evidenceIdx > 3, "evidence block appears after both labeled images");

  // -- analyze mode with settings screenshot: baseline label present, 3rd image -----
  const contentWithSettings = ADAPTER.buildUserContent({
    mode: "recipe",
    images: [
      { role: "reference", dataUrl: PNG1, mediaType: "image/png" },
      { role: "base", dataUrl: JPG1, mediaType: "image/jpeg" },
      { role: "settings", dataUrl: PNG1, mediaType: "image/png" }
    ],
    metricsBundle: { ref: {}, base: {}, diff: {} },
    context: { scene: "interior", time: "midday", rig: "dome only" }
  });
  const settingsLabelBlock = contentWithSettings.find(b => b.type === "text" && /SETTINGS SCREENSHOT \(baseline\):/.test(b.text));
  this.ok(!!settingsLabelBlock, "settings-screenshot label block present verbatim: 'SETTINGS SCREENSHOT (baseline):'");
  this.ok(findImageBlocks(contentWithSettings).length === 3, "3 images produce 3 image blocks (ref, base, settings)");

  // -- refine mode: attempt image labeled "ATTEMPT N:", move history + applied set --
  const contentRefine = ADAPTER.buildUserContent({
    mode: "correction",
    images: [
      { role: "reference", dataUrl: PNG1, mediaType: "image/png" },
      { role: "attempt", n: 2, dataUrl: JPG1, mediaType: "image/jpeg" }
    ],
    metricsBundle: { ref: {}, attempt: {}, diff: {} },
    context: { scene: "exterior", time: "dusk", rig: "sun+dome" },
    history: [
      { round: 1, moves: [{ param: "sun.kelvin", from: 6500, to: 5200, applied: true }] }
    ]
  });
  const attemptLabelBlock = contentRefine.find(b => b.type === "text" && /ATTEMPT 2:/.test(b.text));
  this.ok(!!attemptLabelBlock, "attempt label block present verbatim: 'ATTEMPT 2:'");
  const historyBlock = contentRefine.find(b => b.type === "text" && /sun\.kelvin/.test(b.text) && /5200/.test(b.text));
  this.ok(!!historyBlock, "refine mode: move history block present and mentions a prior move's param/value");
  this.ok(/applied/i.test(historyBlock.text), "refine mode: history block mentions the applied set");
  // recipe (non-refine) mode must NOT include a history block, even if history were accidentally passed
  this.ok(!contentAnalyze.some(b => b.type === "text" && /round.*1.*moves|move history/i.test(b.text)), "recipe mode: no move-history block appears");

  // -- alternating text/image order contract: every image block is immediately
  // preceded by a text block (the label) --------------------------------------------
  for (const content of [contentAnalyze, contentWithSettings, contentRefine]) {
    for (let i = 0; i < content.length; i++) {
      if (content[i].type === "image") this.ok(content[i - 1] && content[i - 1].type === "text", `image block at index ${i} is immediately preceded by a text block`);
    }
  }

  // -- call/buildUserContent structural checks (no network) --------------------------
  this.ok(typeof ADAPTER.call === "function", "ADAPTER.call is a function");
  this.ok(typeof ADAPTER.buildUserContent === "function", "ADAPTER.buildUserContent is a function");

  // -- STORE.setKey trims pasted whitespace/newlines (mystifying-401 guard) ----------
  // Restores whatever key was there before, so a real user key survives a ?selftest run.
  const priorKey = localStorage.getItem("lm_key");
  try {
    STORE.setKey("  oc_padded\n");
    this.ok(STORE.key() === "oc_padded", `STORE.setKey trims whitespace/newlines (got ${JSON.stringify(STORE.key())})`);
  } finally {
    if (priorKey === null) localStorage.removeItem("lm_key"); else localStorage.setItem("lm_key", priorKey);
  }

  // -- evidence precision: numbers in the metrics bundle serialize at 4 decimals -----
  const contentPrecision = ADAPTER.buildUserContent({
    mode: "recipe",
    images: [],
    metricsBundle: { diff: { "lum.p50": 0.123456789012345, "wb.tint": -0.0333333333333333 } },
    context: {}
  });
  const evPrec = contentPrecision.find(b => b.type === "text" && /COMPUTED EVIDENCE/.test(b.text));
  this.ok(!!evPrec && !/\.\d{9,}/.test(evPrec.text), "evidence text carries no digit-run longer than 8 after a decimal point");
  this.ok(evPrec.text.includes("0.1235"), `long-precision number rounded to 4 decimals in evidence text (got: ${evPrec.text.slice(evPrec.text.indexOf("{"))})`);

  // -- mocked-fetch coverage of ADAPTER.call's retry / auth / shape / re-ask / timeout
  // paths. globalThis.fetch is stubbed (no socket ever opens) and restored in finally,
  // as are BACKOFF_MS (→1ms so retries don't stall the suite) and TIMEOUT_MS. --------
  const realFetch = globalThis.fetch;
  const realBackoff = ADAPTER.BACKOFF_MS;
  const realTimeout = ADAPTER.TIMEOUT_MS;
  try {
    ADAPTER.BACKOFF_MS = [1, 1, 1];
    let calls = [];
    let queue = [];
    globalThis.fetch = (url, opts) => {
      calls.push({ url, opts, body: JSON.parse(opts.body) });
      const next = queue.shift();
      if (!next) return Promise.reject(new Error("fetch stub queue exhausted"));
      return next(url, opts);
    };
    const res200 = json => () => Promise.resolve({ ok: true, status: 200, json: async () => json, text: async () => JSON.stringify(json) });
    const resStatus = status => () => Promise.resolve({ ok: false, status, json: async () => ({}), text: async () => "" });
    const TOOL = { name: "emit_recipe" };
    const okBody = { content: [{ type: "tool_use", id: "tu_ok1", name: "emit_recipe", input: { fine: true } }] };

    // (a) 429 then 200-with-tool_use -> resolves; exactly 2 fetch calls
    calls = []; queue = [resStatus(429), res200(okBody)];
    const rA = await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL });
    this.ok(rA.fine === true, "mocked (a): 429 then 200 resolves with the tool input");
    this.ok(calls.length === 2, `mocked (a): exactly 2 fetch calls (got ${calls.length})`);

    // (b) 401 -> AuthError; exactly 1 call
    calls = []; queue = [resStatus(401)];
    let threwB = null;
    try { await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL }); } catch (e) { threwB = e; }
    this.ok(threwB instanceof ADAPTER.AuthError, "mocked (b): 401 throws ADAPTER.AuthError");
    this.ok(calls.length === 1, `mocked (b): exactly 1 fetch call, no retry (got ${calls.length})`);

    // (c) 200 with no tool_use block -> ShapeError carrying .raw
    calls = []; queue = [res200({ content: [{ type: "text", text: "prose answer, no tool call" }] })];
    let threwC = null;
    try { await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL }); } catch (e) { threwC = e; }
    this.ok(threwC instanceof ADAPTER.ShapeError, "mocked (c): 200 without tool_use throws ShapeError");
    this.ok(!!threwC && typeof threwC.raw === "string" && threwC.raw.includes("prose answer"), "mocked (c): ShapeError carries .raw with the response text");

    // (d) validate-fail then valid: second request body must be WIRE-VALID — the
    // assistant tool_use turn answered by a user turn whose content[0] is a
    // tool_result with the matching tool_use_id, is_error true, and the mandated
    // sentence; returns cleaned; exactly 2 calls.
    const badBody = { content: [{ type: "tool_use", id: "tu_bad1", name: "emit_recipe", input: { bad: true } }] };
    const validateFn = inp => inp.bad ? { ok: false, errors: ["values[0]: nonsense"], cleaned: null } : { ok: true, errors: [], cleaned: { cleaned: true } };
    calls = []; queue = [res200(badBody), res200(okBody)];
    const rD = await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL, validate: validateFn });
    this.ok(rD.cleaned === true, "mocked (d): re-ask returns the validated cleaned object");
    this.ok(calls.length === 2, `mocked (d): exactly 2 fetch calls (got ${calls.length})`);
    const secondMsgs = calls[1] ? calls[1].body.messages : [];
    this.ok(secondMsgs.length === 3, `mocked (d): second request has 3 messages (got ${secondMsgs.length})`);
    this.ok(secondMsgs[1] && secondMsgs[1].role === "assistant" && Array.isArray(secondMsgs[1].content) && secondMsgs[1].content.some(b => b.type === "tool_use" && b.id === "tu_bad1"), "mocked (d): second request carries the assistant turn with the original tool_use block");
    const reAskTurn = secondMsgs[2] || {};
    this.ok(reAskTurn.role === "user" && Array.isArray(reAskTurn.content), "mocked (d): final turn is a user turn with array content");
    const toolResult = Array.isArray(reAskTurn.content) ? reAskTurn.content[0] : null;
    this.ok(!!toolResult && toolResult.type === "tool_result", "mocked (d): user turn content[0] is a tool_result block (wire-valid re-ask)");
    this.ok(!!toolResult && toolResult.tool_use_id === "tu_bad1", `mocked (d): tool_result.tool_use_id matches the assistant tool_use id (got ${toolResult && toolResult.tool_use_id})`);
    this.ok(!!toolResult && toolResult.is_error === true, "mocked (d): tool_result.is_error === true");
    this.ok(!!toolResult && typeof toolResult.content === "string" && toolResult.content.includes("Your emit was invalid") && toolResult.content.includes("Re-emit the full corrected tool call."), "mocked (d): tool_result content carries the mandated re-ask sentence");

    // (e) validate fails twice -> throws; exactly 2 calls, never a third
    calls = []; queue = [res200(badBody), res200(badBody)];
    let threwE = null;
    try { await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL, validate: validateFn }); } catch (e) { threwE = e; }
    this.ok(!!threwE, "mocked (e): double validate-fail throws");
    this.ok(calls.length === 2, `mocked (e): exactly 2 fetch calls, never a third (got ${calls.length})`);

    // (f) hung fetch: never resolves on its own, rejects with AbortError when the
    // per-attempt TIMEOUT_MS AbortController fires -> treated as retryable, then a
    // 200 succeeds on attempt 2.
    ADAPTER.TIMEOUT_MS = 50;
    calls = [];
    queue = [
      (url, opts) => new Promise((resolve, reject) => {
        opts.signal.addEventListener("abort", () => {
          const e = new Error("The operation was aborted.");
          e.name = "AbortError";
          reject(e);
        });
      }),
      res200(okBody)
    ];
    const rF = await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL });
    this.ok(rF.fine === true, "mocked (f): hung fetch aborts at TIMEOUT_MS, retries, succeeds on attempt 2");
    this.ok(calls.length === 2, `mocked (f): exactly 2 fetch calls (got ${calls.length})`);
    this.ok(calls[0].opts.signal instanceof AbortSignal, "mocked (f): fetch receives a per-attempt AbortSignal");

    // (g) #3 — the BODY read (not just headers) is covered by the timeout: headers
    // arrive fine (res.ok true) but res.json() never resolves on its own. The
    // AbortController that armed the fetch must still be live, so the abort fires and
