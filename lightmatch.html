  lookup(target, id) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return null;
    if (!pack._index) {
      pack._index = {};
      for (const e of pack.entries) pack._index[e.id] = e;
    }
    return pack._index[id] || null;
  },

  // Numeric values are clamped into the entry's range; strings and non-range kinds pass through.
  clamp(target, id, value) {
    const e = this.lookup(target, id);
    if (!e || typeof value !== "number" || !Number.isFinite(value) || !(e.range[0] < e.range[1]))
      return { value, clamped: false };
    const v = Math.min(e.range[1], Math.max(e.range[0], value));
    return { value: v, clamped: v !== value };
  },

  // Compact one-line-per-param listing for the system prompt: id, ui_path, kind, unit, range, default, notes.
  promptFragment(target) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return "";
    const lines = pack.entries.map(e => {
      const unit = e.unit ? ` unit:${e.unit}` : "";
      const range = e.range[0] < e.range[1] ? ` range:[${e.range[0]},${e.range[1]}]` : "";
      return `${e.id} — ${e.ui_path} — kind:${e.kind}${unit}${range} default:${JSON.stringify(e.default)} — ${e.notes}`;
    });
    return `TARGET: ${pack.label}. Allowed parameter ids — choose ONLY from these; numeric values must stay inside the stated ranges:\n` + lines.join("\n");
  }
};

/* ===== SECTION: ENGINE ===== */
const ENGINE = {};

/* ===== SECTION: UI ===== */
const UI = { boot() {} };

/* ===== SECTION: SELFTEST ===== */
const SELFTEST = { fails: [], n: 0,
  ok(cond, msg) { this.n++; if (!cond) this.fails.push(msg); },
  close(a, b, tol, msg) { this.ok(Math.abs(a - b) <= tol, `${msg} (got ${a}, want ${b}±${tol})`); },
  async run() {
    for (const [name, fn] of Object.entries(SELFTEST.suites)) { try { await fn.call(SELFTEST); } catch (e) { this.fails.push(name + " threw: " + e.message); } }
    const line = this.fails.length ? `SELFTEST: FAIL\n` + this.fails.join("\n") : `SELFTEST: PASS (${this.n} asserts)`;
    document.body.textContent = line; document.title = line.split("\n")[0];
  }, suites: {} };

// -- suite: packs (Task 2) -----------------------------------------------------------
SELFTEST.suites.packs = async function () {
  const KINDS = ["spinner", "dropdown", "slot", "placement"];
  const FIELDS = ["id", "ui_path", "kind", "unit", "range", "default", "notes", "verified"];
  // ids the plan fixes per pack — drift guard
  const REQUIRED = {
    vray7max: ["env.gi_skylight_mult", "dome.texture_slot", "dome.intensity", "dome.rotation_h", "dome.invisible",
      "sun.placement_azimuth", "sun.placement_elevation", "sun.intensity_mult", "sun.size_mult", "sun.kelvin",
      "sun.turbidity", "fill.plane_intensity", "fill.plane_kelvin", "fill.sphere_intensity", "fill.key_fill_guidance",
      "cam.iso", "cam.fnumber", "cam.shutter", "cam.wb_kelvin", "cam.ev_readout",
      "cm.type", "cm.highlight_burn", "cm.contrast", "cm.saturation", "vfb.exposure", "gi.primary", "gi.secondary"],
    vantage33: ["env.hdri_slot", "env.intensity", "env.rotation", "env.background_mode",
      "sun.enabled", "sun.intensity", "sun.azimuth", "sun.elevation", "sun.size",
      "cam.exposure_value", "cam.wb", "cam.dof_note", "post.tonemap_type", "post.contrast", "post.saturation"]
  };
  for (const target of PACKS.targets()) {
    const pack = PACKS[target];
    this.ok(pack && Array.isArray(pack.entries), `${target}: pack exists with entries[]`);
    this.ok(pack.entries.length >= 25, `${target}: at least 25 entries (got ${pack.entries.length})`);
    for (const id of REQUIRED[target]) this.ok(!!PACKS.lookup(target, id), `${target}: plan-required id ${id} present`);
    const seen = new Set();
    for (const e of pack.entries) {
      const w = `${target}:${e.id}`;
      this.ok(!seen.has(e.id), `${w}: id unique`); seen.add(e.id);
      for (const f of FIELDS) this.ok(f in e, `${w}: has field ${f}`);
      this.ok(KINDS.includes(e.kind), `${w}: legal kind (${e.kind})`);
      this.ok(Array.isArray(e.range) && e.range.length === 2, `${w}: range is a pair`);
      this.ok(typeof e.ui_path === "string" && e.ui_path.length > 8, `${w}: ui_path non-trivial`);
      this.ok(typeof e.notes === "string" && e.notes.length > 0, `${w}: notes non-empty`);
      this.ok(e.verified === false || e.verified === "2026-07-02", `${w}: verified is check-date or false`);
      if (e.kind === "spinner") {
        // value-carrying entries: strictly increasing range, numeric default inside it
        this.ok(e.range[0] < e.range[1], `${w}: spinner range[0]<range[1]`);
        this.ok(typeof e.default === "number" && e.default >= e.range[0] && e.default <= e.range[1], `${w}: default inside range`);
        const hi = PACKS.clamp(target, e.id, 1e9);
        this.ok(hi.value === e.range[1] && hi.clamped === true, `${w}: clamp(1e9) -> max, flagged`);
        const lo = PACKS.clamp(target, e.id, -1e9);
        this.ok(lo.value === e.range[0] && lo.clamped === true, `${w}: clamp(-1e9) -> min, flagged`);
        const mid = PACKS.clamp(target, e.id, e.default);
        this.ok(mid.value === e.default && mid.clamped === false, `${w}: clamp(default) unchanged`);
      } else if (e.kind === "slot") {
        // spec-fixed slot shape: range [0,0], default "none"
        this.ok(e.range[0] === 0 && e.range[1] === 0, `${w}: slot range [0,0]`);
        this.ok(e.default === "none", `${w}: slot default "none"`);
      } else if (e.kind === "dropdown") {
        this.ok(e.range[0] === 0 && e.range[1] === 0, `${w}: dropdown range [0,0]`);
        this.ok(typeof e.default === "string" && e.default.length > 0, `${w}: dropdown string default`);
        this.ok(e.notes.includes("Options:"), `${w}: dropdown carries option list in notes`);
        this.ok(e.notes.includes(e.default), `${w}: dropdown default is among the options text`);
      } else { // placement: instruction rows; numeric ones (angles, kelvin, ratio) keep honest bounds
        if (typeof e.default === "number") {
          this.ok(e.range[0] < e.range[1], `${w}: placement numeric range[0]<range[1]`);
          this.ok(e.default >= e.range[0] && e.default <= e.range[1], `${w}: placement default inside range`);
        } else {
          this.ok(typeof e.default === "string" && e.default.length > 0, `${w}: placement string default`);
        }
      }
    }
  }
  // lookup contract
  const sunK = PACKS.lookup("vray7max", "sun.kelvin");
  this.ok(!!sunK, "lookup finds vray7max sun.kelvin");
  this.ok(PACKS.lookup("vray7max", "no.such_param") === null, "lookup unknown id -> null");
  this.ok(PACKS.lookup("corona", "sun.kelvin") === null, "lookup unknown target -> null");
  // clamp pass-through for strings / non-numeric kinds
  const str = PACKS.clamp("vray7max", "cm.type", "Reinhard");
  this.ok(str.value === "Reinhard" && str.clamped === false, "clamp passes string values through unflagged");
  // promptFragment contract
  const pf = PACKS.promptFragment("vray7max");
  this.ok(pf.includes("sun.kelvin"), 'promptFragment("vray7max") contains "sun.kelvin"');
  this.ok(pf.includes(sunK.ui_path), "promptFragment contains sun.kelvin verbatim ui_path");
  this.ok(pf.split("\n").length === PACKS.vray7max.entries.length + 1, "promptFragment: one line per param + header");
  const evEntry = PACKS.lookup("vantage33", "cam.exposure_value");
  const pf2 = PACKS.promptFragment("vantage33");
  this.ok(pf2.includes("cam.exposure_value") && pf2.includes(evEntry.ui_path), "vantage33 fragment has cam.exposure_value + verbatim ui_path");
  this.ok(PACKS.promptFragment("corona") === "", "promptFragment unknown target -> empty string");
};

addEventListener("DOMContentLoaded", () => {
  if (location.search.includes("selftest")) SELFTEST.run(); else UI.boot();
});
</script></body></html>
