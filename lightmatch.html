  // call genuinely receives which recipe rows the user skipped. Busy discipline
  // matches setImage: a typed BusyError while _inFlight — flipping the applied set
  // mid-addAttempt would change session state out from under the history the
  // in-flight call already assembled. The map is cleared by a fresh analyze() (a new
  // recipe's rows default back to applied; see _analyzeImpl). -----------------------
  async setRecipeApplied(param, applied) {
    if (this._inFlight) {
      throw this._annotateError(new this.BusyError("ENGINE.setRecipeApplied(): an analyze/attempt/reanalyze call is already in flight — wait for it to finish before changing the applied set."));
    }
    const chain = this.activeChain();
    if (!chain) return null;
    if (!chain.recipeApplied || typeof chain.recipeApplied !== "object") chain.recipeApplied = {};
    chain.recipeApplied[param] = !!applied;
    await this._persist();
    return chain.recipeApplied;
  },

  // -- lookup(paramId): UI's display-string API, delegates to PACKS for the ACTIVE
  // target. -----------------------------------------------------------------------
  lookup(paramId) {
    return PACKS.lookup(this.activeTarget(), paramId);
  },

  // -- activeChain(): read-only view of the active target's own chain object
  // ({recipe, attempts[], _attemptCount, _evictedScores?}). Public accessor (Task 7a
  // hardening) so the UI never reaches into session().chains[activeTarget] directly —
  // one call, always correctly scoped to whichever target is currently active. This
  // returns the LIVE object (same identity as session().chains[activeTarget]), not a
  // defensive copy, matching session()'s own "live object, treat as ENGINE-owned"
  // contract documented above — callers must not mutate it directly. ----------------
  activeChain() {
    const s = this.session();
    return s.chains[s.activeTarget] || null;
  },

  // -- attemptInfo(): {n, cap, stored} for the active chain — the UI's one-stop
  // accessor for attempt-count display so it never reads chain._attemptCount or
  // chain.attempts.length paths directly. `n` is the monotonic per-chain counter
  // (keeps climbing past the cap — matches the "ATTEMPT N:" label sent to the model);
  // `cap` is ENGINE.ATTEMPTS_CAP; `stored` is the actual attempts[] array length
  // (pinned at cap once eviction starts). n and stored are equal until the cap is
  // first reached, then diverge — both are meaningful ("attempt 9 of up to 8 kept"
  // reads correctly with n=9, stored=8). --------------------------------------------
  attemptInfo() {
    const chain = this.activeChain();
    const n = chain && typeof chain._attemptCount === "number" ? chain._attemptCount : (chain ? chain.attempts.length : 0);
    const stored = chain ? chain.attempts.length : 0;
    return { n, cap: this.ATTEMPTS_CAP, stored };
  },

  // -- _persist(): save the current session via STORE after every mutation, per the
  // plan ("wires ... STORE.saveSession after every mutation"). Centralized here so
  // every action method just calls this instead of repeating the STORE.saveSession
  // call + boilerplate. ----------------------------------------------------------
  async _persist() {
    await STORE.saveSession(this._session);
    return this._session;
  },

  // -- error classification: maps a thrown error to a short `kind` string the UI can
  // switch on without re-deriving instanceof checks itself. Kept intentionally small
  // per the task note ("keep it simple") — auth/shape/network/other covers every
  // ADAPTER-thrown case (AuthError, ShapeError, plain Error from a network reject or
  // fatal HTTP status) plus anything ENGINE itself throws (e.g. an image decode
  // rejection), which falls to "other". ----------------------------------------------
  _classifyError(e) {
    if (e instanceof ADAPTER.AuthError) return "auth";
    if (e instanceof ADAPTER.ShapeError) return "shape";
    if (e instanceof this.BusyError) return "busy";
    if (e && (e.name === "TypeError" || e.name === "AbortError" || /network|fetch/i.test(e.message || ""))) return "network";
    return "other";
  },

  // -- _annotateError(e): records ENGINE.lastError = {kind, message, raw?, at} and
  // returns the SAME error (never a replacement) so callers can rethrow it unchanged —
  // instanceof checks against ADAPTER.AuthError/ShapeError keep working for a caller
  // that prefers that style, while ENGINE.lastError.kind gives the UI a ready-made
  // string for the common case. -------------------------------------------------------
  _annotateError(e) {
    this.lastError = {
      kind: this._classifyError(e),
      name: e && e.name,
      message: e && e.message,
      raw: e && e.raw, // present only for ShapeError
      at: new Date().toISOString()
    };
    return e;
  },

  // -- setImage(slot, fileOrCanvas): slots ref|base|settings (+ addAttempt() below
  // reuses the same downscale/measure pipeline for the "attempt" case, which is not a
  // named session slot but a chain entry). Runs METRICS.downscaleForSend (wrapped in
  // try/catch — it rejects on undecodable files) and METRICS.measure (decoded from the
  // SAME source where practical, not re-decoded from the dataUrl, so we do the decode
  // once and hand the resulting bitmap/canvas to both downscale and measure). Settings
  // slot uses the lossless PNG variant (2048/png/1.0); ref/base use the lossy JPEG
  // default (1568/jpeg/0.85). ---------------------------------------------------------
  async _decodeSource(fileOrCanvas) {
    const isCanvasLike = fileOrCanvas && typeof fileOrCanvas.getContext === "function"
      && typeof fileOrCanvas.width === "number" && typeof fileOrCanvas.height === "number";
    const isBitmapLike = typeof ImageBitmap !== "undefined" && fileOrCanvas instanceof ImageBitmap;
    if (isCanvasLike || isBitmapLike) return { source: fileOrCanvas, owned: false };
    // File/Blob: decode once here so both downscaleForSend and measure() work from the
    // same decoded bitmap rather than each independently re-decoding (downscaleForSend
    // would otherwise decode its OWN bitmap from the raw file a second time).
    let bitmap;
    try {
      bitmap = await createImageBitmap(fileOrCanvas);
    } catch (e) {
      const decodeErr = new Error("Could not decode image file — unsupported or corrupt image data.");
      decodeErr.name = "DecodeError";
      throw decodeErr;
    }
    return { source: bitmap, owned: true };
  },

  async _captureSlot(fileOrCanvas, { lossless } = {}) {
    let decoded;
    try {
      decoded = await this._decodeSource(fileOrCanvas);
    } catch (e) {
      throw this._annotateError(e);
    }
    const { source, owned } = decoded;
    try {
      const sendOpts = lossless ? [2048, "image/png", 1.0] : [1568, "image/jpeg", 0.85];
      let downscaled;
      try {
        downscaled = await METRICS.downscaleForSend(source, ...sendOpts);
      } catch (e) {
        const wrapped = new Error("Image downscale failed: " + (e && e.message));
        wrapped.name = "DecodeError";
        throw this._annotateError(wrapped);
      }
      // METRICS.measure moved inside the annotated try/catch (Task 7a hardening): it
      // previously ran AFTER this block closed, unguarded — a measure-time throw (e.g.
      // a degenerate 0-area canvas) would propagate un-annotated past ENGINE's error
      // boundary. "decode" is reused here (not a new "measure" kind) because from the
      // caller's perspective both failures mean the same thing — "this image could not
      // be turned into usable pixel data" — and the UI's decode-error banner text
      // already covers that case; anything unexpected falls to "other" via the same
      // _classifyError() path _annotateError() already runs.
      let metrics;
      try {
        metrics = METRICS.measure(source);
      } catch (e) {
        const wrapped = new Error("Image measurement failed: " + (e && e.message));
        wrapped.name = "DecodeError";
        throw this._annotateError(wrapped);
      }
      return { dataUrl: downscaled.dataUrl, metrics };
    } finally {
      if (owned && typeof source.close === "function") source.close();
    }
  },

  async setImage(slot, fileOrCanvas) {
    // Task 7a hardening: swapping ref/base/settings while analyze()/addAttempt()/
    // reanalyzeOtherTarget() is in flight would silently mismatch the session the
    // model is currently evaluating against the session the UI displays afterward —
    // throw a typed, catchable BusyError instead of letting that race happen.
    if (this._inFlight) {
      throw this._annotateError(new this.BusyError("ENGINE.setImage(): an analyze/attempt/reanalyze call is already in flight — wait for it to finish before swapping images."));
    }
    const captured = await this._captureSlot(fileOrCanvas, { lossless: slot === "settings" });
    const s = this.session();
    if (slot === "ref") s.ref = captured;
    else if (slot === "base") s.base = captured;
    else if (slot === "settings") s.settingsShot = { dataUrl: captured.dataUrl };
    else throw new Error(`ENGINE.setImage: unknown slot "${slot}" (expected ref|base|settings)`);
    await this._persist();
    return captured;
  },

  // -- analyze(): requires ready-state (ref+base present). Builds metricsBundle =
  // {reference, base, diff} where diff = METRICS.diff(base, ref) — the diff() contract
  // is diff(a,b) = b-a, so diff(base,ref) reads as "reference minus base", i.e. what
  // must change to go FROM base TO reference. Images ordered ref, base, (settings).
  // Calls ADAPTER.call with SCHEMAS.emit_recipe + a validate callback bound to the
  // active target/mode; on success stores the cleaned recipe under
  // chains[activeTarget].recipe, persists, and returns it. ---------------------------
  // Task 7a hardening: the public entry point is a thin _guarded() wrapper around
  // _analyzeImpl — reanalyzeOtherTarget() calls _analyzeImpl DIRECTLY (not analyze()),
  // since by the time it does so it is already running INSIDE the shared _inFlight
  // gate; routing it back through analyze()/_guarded() would see the gate already
  // held (by reanalyzeOtherTarget's own outer call) and just hand back that same
  // promise instead of ever performing the actual analysis — a silent deadlock-shaped
  // bug, not a hang, but the analysis would simply never run. ------------------------
  analyze() {
    return this._guarded(() => this._analyzeImpl());
  },
  async _analyzeImpl() {
    const s = this.session();
    if (this.state() === "empty") {
      throw new Error("ENGINE.analyze(): requires both reference and base images to be set first.");
    }
    const target = s.activeTarget;
    const mode = "recipe";
    const metricsBundle = {
      reference: s.ref.metrics,
      base: s.base.metrics,
      diff: METRICS.diff(s.base.metrics, s.ref.metrics)
    };
    const images = [{ role: "reference", dataUrl: s.ref.dataUrl, mediaType: "image/jpeg" },
                     { role: "base", dataUrl: s.base.dataUrl, mediaType: "image/jpeg" }];
    if (s.settingsShot) images.push({ role: "settings", dataUrl: s.settingsShot.dataUrl, mediaType: "image/png" });

    const system = SCHEMAS.systemPrompt(target, mode);
    // buildUserContent is pure content-assembly (no network) — always the real ADAPTER,
    // even when ENGINE._adapter is a stub. Only .call() (the network-performing method)
    // is the injectable seam; see the SECTION: ADAPTER header ("ENGINE builds ...
    // userContent via ADAPTER.buildUserContent").
    const userContent = ADAPTER.buildUserContent({ mode, images, metricsBundle, context: s.context });
    const tool = SCHEMAS.emit_recipe;
    const validate = obj => SCHEMAS.validateRecipe(obj, target, undefined);

    let cleaned;
    try {
      cleaned = await (this._adapter || ADAPTER).call({ model: STORE.prefs().model, system, userContent, tool, validate });
    } catch (e) {
      throw this._annotateError(e);
    }

    s.chains[target].recipe = cleaned;
    // A fresh recipe resets the applied-toggle map: its rows default back to applied
    // (checked). Without this, an untick recorded against the PREVIOUS recipe would
    // silently leak onto a same-named param in the new one (Task 7a follow-up).
    s.chains[target].recipeApplied = null;
    await this._persist();
    return cleaned;
  },

  // -- addAttempt(fileOrCanvas): valid in analyzed/refining (i.e. the active target
  // already has a recipe — state() is "analyzed" or "refining", never "empty"/"ready").
  // Measures the attempt, scores it against the reference, builds metricsBundle =
  // {reference, attempt, diff: diff(attempt, ref)} (same base->reference convention:
  // diff(a,b)=b-a, so diff(attempt,ref) = "what must still change from this attempt to
  // reach the reference"), sends history = every prior round's moves (recipe's
  // values[] normalized into the same {param,from,to,applied,why} shape as a "round 0"
  // entry, then each stored attempt's correction.moves as subsequent rounds) with
  // per-move `applied` flags read from the real toggle maps (chain.recipeApplied for
  // round 0, att.appliedParams for correction rounds; absent map = all-true defaults,
  // and the round is then marked applied_assumed:true — see _historyForActiveChain).
  // "applied_assumed" also exists as the model's own flag in its OUTPUT schema; the
  // input-side round marker here is the honest mirror of it.
  // Stores {dataUrl, metrics, score, correction, appliedParams} in the chain, caps at
  // ATTEMPTS_CAP (oldest dataUrl dropped, its score retained — see _pushAttempt). ----
  // Round shape: {round, applied_assumed, moves[]}. `applied_assumed` is the honest
  // input-side marker (Task 7a follow-up): true ONLY when that round's backing map
  // (chain.recipeApplied for round 0, att.appliedParams for correction rounds) is
  // absent — its all-true applied flags are then defaults/assumptions, not
  // user-confirmed toggle state. When a map exists, applied_assumed is false and the
  // per-move `applied` values are the user's real toggle state. ADAPTER's history
  // text renders the per-move applied flags (the part the model acts on);
  // applied_assumed rides on the round object for tests/consumers of the structure.
  _historyForActiveChain() {
    const s = this.session();
    const chain = s.chains[s.activeTarget];
    const rounds = [];
    if (chain.recipe && Array.isArray(chain.recipe.values)) {
      rounds.push({
        round: 0,
        applied_assumed: !chain.recipeApplied,
        moves: chain.recipe.values.map(v => ({
          param: v.param, from: v.from, to: v.set,
          applied: chain.recipeApplied ? chain.recipeApplied[v.param] !== false : true,
          why: v.why
        }))
      });
    }
    chain.attempts.forEach((att, idx) => {
      if (att.correction && Array.isArray(att.correction.moves)) {
        rounds.push({
          round: idx + 1,
          applied_assumed: !att.appliedParams,
          moves: att.correction.moves.map(m => ({
            param: m.param, from: m.from, to: m.to,
            applied: !att.appliedParams || att.appliedParams[m.param] !== false,
            why: m.why
          }))
        });
      }
    });
    return rounds;
  },

  // -- _pushAttempt(chain, entry): appends, then enforces ATTEMPTS_CAP by evicting from
  // the front. The array itself stays at exactly ATTEMPTS_CAP entries (per the plan's
  // 9th-attempt example: "keeps only the last 8"), but each evicted entry's `score` is
  // preserved on `chain._evictedScores` (dataUrl/metrics/correction are dropped — those
  // are the large fields; the plan only calls out the score as worth retaining).
  // `_evictedScores` itself is intentionally left UNCAPPED — it holds only a tiny
  // `{score}` per evicted attempt, cheap enough over a chain's whole lifetime that
  // bounding it is not worth the complexity (unlike attempts[] and its dataUrls). --
  _pushAttempt(chain, entry) {
    chain.attempts.push(entry);
    while (chain.attempts.length > this.ATTEMPTS_CAP) {
      const evicted = chain.attempts.shift();
      if (!Array.isArray(chain._evictedScores)) chain._evictedScores = [];
      chain._evictedScores.push({ score: evicted.score });
    }
  },

  // Task 7a hardening: public entry point is a thin _guarded() wrapper; see the
  // analyze()/_analyzeImpl() split comment above for why the guard lives at this
  // outer layer rather than inside the implementation.
  addAttempt(fileOrCanvas) {
    return this._guarded(() => this._addAttemptImpl(fileOrCanvas));
  },
  async _addAttemptImpl(fileOrCanvas) {
    const s = this.session();
    const state = this.state();
    if (state !== "analyzed" && state !== "refining") {
      throw new Error(`ENGINE.addAttempt(): active target must have a recipe first (state is "${state}"); call analyze() first.`);
    }
    const target = s.activeTarget;
    const chain = s.chains[target];
    const captured = await this._captureSlot(fileOrCanvas);
    const score = METRICS.score(s.ref.metrics, captured.metrics);

    const metricsBundle = {
      reference: s.ref.metrics,
      attempt: captured.metrics,
      diff: METRICS.diff(captured.metrics, s.ref.metrics)
    };
    // Monotonic attempt number for the "ATTEMPT N:" label — NOT chain.attempts.length+1,
    // which would stick at (ATTEMPTS_CAP+1) forever once eviction keeps the array length
    // pinned at the cap. Falls back to attempts.length+1 for a chain restored from a
    // session saved before _attemptCount existed (older STORE data / hand-built object).
    if (typeof chain._attemptCount !== "number") chain._attemptCount = chain.attempts.length;
    chain._attemptCount++;
    const attemptN = chain._attemptCount;
    const images = [
      { role: "reference", dataUrl: s.ref.dataUrl, mediaType: "image/jpeg" },
      { role: "attempt", n: attemptN, dataUrl: captured.dataUrl, mediaType: "image/jpeg" }
    ];
    const history = this._historyForActiveChain();
    const system = SCHEMAS.systemPrompt(target, "correction");
    const userContent = ADAPTER.buildUserContent({ mode: "correction", images, metricsBundle, context: s.context, history });
    const tool = SCHEMAS.emit_correction;
    const validate = obj => SCHEMAS.validateRecipe(obj, target, "correction");

    let cleaned;
    try {
      cleaned = await (this._adapter || ADAPTER).call({ model: STORE.prefs().model, system, userContent, tool, validate });
    } catch (e) {
      throw this._annotateError(e);
    }

    // appliedParams: created all-applied for the NEW attempt's own moves — the user
    // hasn't re-rendered against this correction yet, so "applied" is the truthful
    // starting state; UI.toggleApplied() updates individual entries afterward.
    const appliedParams = {};
    for (const mv of cleaned.moves) appliedParams[mv.param] = true;

    this._pushAttempt(chain, { dataUrl: captured.dataUrl, metrics: captured.metrics, score, correction: cleaned, appliedParams });
    await this._persist();
    return { score, correction: cleaned };
  },

  // -- reanalyzeOtherTarget(): flips activeTarget to the OTHER pack, then runs
  // analyze() against it using the ALREADY-STORED ref/base images/metrics (no
  // re-upload — analyze() reads from s.ref/s.base, which are untouched by this
  // switch). Leaves the original target's chain completely untouched: analyze()
  // writes only to chains[NEW activeTarget].recipe. -----------------------------------
  // Task 7a hardening: guarded at THIS outer layer; the impl calls _analyzeImpl()
  // directly (never the public analyze(), which would re-enter _guarded() and just
  // return the already-held in-flight promise without actually running).
  reanalyzeOtherTarget() {
    return this._guarded(() => this._reanalyzeOtherTargetImpl());
  },
  async _reanalyzeOtherTargetImpl() {
    const s = this.session();
    if (!s.ref || !s.base) throw new Error("ENGINE.reanalyzeOtherTarget(): requires reference and base images to already be set.");
    const other = s.activeTarget === "vray7max" ? "vantage33" : "vray7max";
    s.activeTarget = other;
    await this._persist();
    return this._analyzeImpl();
  },

  // -- _pruneSessions(): keeps only the newest SESSION_RETENTION_CAP sessions in IDB,
  // deleting older rows by `created` (highest survives — same ordering rule as
  // STORE.loadLatest()'s lexical-ISO comparison). Best-effort: a failure here (e.g.
  // STORE degraded to the in-memory fallback and _all()/deleteSession behave
  // unexpectedly) must never block boot() — caught and swallowed by the caller. -----
  async _pruneSessions() {
    const all = await STORE._all();
    if (all.length <= this.SESSION_RETENTION_CAP) return;
    const sorted = all.slice().sort((a, b) => (a.created > b.created ? -1 : a.created < b.created ? 1 : 0));
    const toDelete = sorted.slice(this.SESSION_RETENTION_CAP);
    for (const s of toDelete) {
      try { await STORE.deleteSession(s.id); } catch (e) { /* best-effort; one bad row must not stop the rest */ }
    }
  },

  // -- boot(): loads the latest session on startup. Never throws — a fresh install (no
  // session in STORE yet), or a STORE that degraded to in-memory-only, both just fall
  // through to a blank session via reset(). After loading (never before — pruning must
  // not delete the very session about to be restored), prunes IDB down to the newest
  // SESSION_RETENTION_CAP sessions (Task 7a hardening). Pruning failures are swallowed
  // here too — retention hygiene must never prevent the app from opening. -----------
  async boot() {
    try {
      const latest = await STORE.loadLatest();
      this._session = latest || this._blankSession();
    } catch (e) {
      this._annotateError(e);
      this._session = this._blankSession();
    }
    try {
      await this._pruneSessions();
    } catch (e) { /* retention hygiene is best-effort; never block boot on it */ }
    return this._session;
  }
};
ENGINE._adapter = ADAPTER;

/* ===== SECTION: UI ===== */
// DOM rendering + events. UI -> ENGINE only (pack display strings — ui_path, units —
// arrive through ENGINE.lookup()/activeChain()/attemptInfo(), never by reading PACKS
// or session().chains[...] directly). Every ENGINE call is awaited, then followed by
// one UI.render() — no incremental DOM patching; render() is idempotent, rebuilding
// #app's contents from ENGINE.state()/session()/attemptInfo()/activeChain() each time.
const UI = {
  // -- MODELS: the two gateway model picker options. ONE constant (per the task) so
  // a live-smoke id correction touches exactly one place. Values are the exact
  // gateway model id strings sent as `model` in every ADAPTER.call; STORE.prefs()'s
  // own default ("claude-opus-4-8") already matches this list's first entry. ------
  MODELS: [
    { value: "claude-opus-4-8", label: "Opus 4.8" },
    { value: "gpt-5.5", label: "GPT-5.5" }
  ],

  // -- routePaste(state, focusedSlot, filled) -> slot name | null. Pure decision
  // function (no DOM) shared by BOTH the Ctrl+V paste handler and the drag/drop
  // handler (drops never carry a focused slot, so calling this with focusedSlot=null
  // is exactly "drop mid-session = new attempt", per the task).
  //   state: "empty"|"ready"|"analyzed"|"refining" (ENGINE.state()'s exact vocabulary)
  //   focusedSlot: "ref"|"base"|"settings"|"attempt"|null — whichever slot the user
  //     last clicked to focus, if any; a focused slot ALWAYS wins outright, even over
  //     an earlier-priority empty slot, since focusing a slot is an explicit target.
  //   filled: {ref, base, settings} booleans — whether each NAMED slot already holds
  //     an image (the Attempt "slot" is not part of this map; it is never "empty" in
  //     the same sense — every paste/drop mid-session creates a brand new attempt).
  // Priority: focused slot -> first EMPTY named slot in Reference->Base->Settings
  // order -> (only once every named slot is filled) new attempt IF state is
  // analyzed/refining -> otherwise null (nothing sensible to route to; caller must
  // not silently overwrite an anchor slot with an unfocused, unrouted paste). -----
  routePaste(state, focusedSlot, filled) {
    if (focusedSlot) return focusedSlot;
    if (!filled.ref) return "ref";
    if (!filled.base) return "base";
    if (!filled.settings) return "settings";
    if (state === "analyzed" || state === "refining") return "attempt";
    return null;
  },

  // -- acceptsFile(file) -> {ok, reason}. Pure function over a File-like object
  // (reads only .type/.name — works against a real File/Blob or a plain fake object
  // in tests). Accepts exactly the three types the canvas decoder reliably handles
  // (image/png, image/jpeg, image/webp); rejects everything else — including a
  // completely empty type/name — with the spec's exact explanatory message so the
  // user knows WHY (not a generic "unsupported file" dead end). -------------------
  ACCEPTED_TYPES: ["image/png", "image/jpeg", "image/webp"],
  REJECT_MESSAGE: "LightMatch reads display-referred sRGB screenshots/saves — PNG or JPG from the VFB/Vantage, not linear EXR.",
  acceptsFile(file) {
    const type = (file && file.type) || "";
    if (this.ACCEPTED_TYPES.includes(type)) return { ok: true, reason: "" };
    return { ok: false, reason: this.REJECT_MESSAGE };
  },

  // -- isRecipeApplied(chain, param) -> bool. Pure init-state helper for the
  // recipe-row applied checkboxes (Task 7a follow-up): checked unless the chain's
  // recipeApplied map explicitly records false for this param. Deliberately the SAME
  // "absent/true = applied" rule ENGINE._historyForActiveChain applies to round-0
  // moves, so what the checkbox shows and what the next correction call sends can
  // never disagree. --------------------------------------------------------------
  isRecipeApplied(chain, param) {
    return !(chain && chain.recipeApplied && chain.recipeApplied[param] === false);
  },

  // -- buildSheet(recipe, target) -> human-readable copy-sheet text. Title line
  // "<target label> — LightMatch recipe" + a baseline line naming factory defaults
  // vs the settings screenshot in human words (not the raw enum string) + one
  // numbered line per value: "N. <ui_path>: <value><unit> (from <from>) — <why>" for
  // spinner/dropdown/slot rows, or "N. <ui_path>: <set> — <why>" (no unit, no "(from
  // ...)" pair — kind:"placement" values are instructions, not a baseline-anchored
  // measurement) for placement rows. Never throws on an unknown target — PACKS.lookup
  // degrades to null there and this function falls back to the bare param id rather
  // than dereferencing a null entry's .ui_path. ------------------------------------
  buildSheet(recipe, target) {
    const pack = PACKS[target];
    const label = pack ? pack.label : target;
    const lines = [`${label} — LightMatch recipe`];
    const baselineText = recipe.baseline === "settings_screenshot" ? "settings screenshot" : "factory defaults";
    lines.push(`baseline: ${baselineText}`);
    lines.push("");
    const values = Array.isArray(recipe.values) ? recipe.values : (Array.isArray(recipe.moves) ? recipe.moves : []);
    const valKey = Array.isArray(recipe.moves) ? "to" : "set";
    values.forEach((v, i) => {
      const entry = PACKS.lookup(target, v.param);
      const uiPath = entry ? entry.ui_path : v.param;
      const isPlacement = entry && entry.kind === "placement";
      const n = i + 1;
      const why = v.why ? ` — ${v.why}` : "";
      if (isPlacement) {
        lines.push(`${n}. ${uiPath}: ${v[valKey]}${why}`);
      } else {
        // Unit appended only for a genuinely numeric value — see the matching guard
        // in _valueRowHtml (SECTION: UI DOM rendering) for the malformed-model-value
        // rationale (a spinner-kind entry's value SHOULD always be numeric, but
        // SCHEMAS.validateRecipe does not itself enforce that by kind).
        const unit = entry && entry.unit && typeof v[valKey] === "number" ? entry.unit : "";
        lines.push(`${n}. ${uiPath}: ${v[valKey]}${unit} (from ${v.from})${why}`);
      }
    });
    return lines.join("\n");
  },

  // -- transient (non-persisted) UI-only state: which slot is currently focused
  // (click-to-focus, per spec) and whether an ENGINE action is in flight (drives the
  // Analyze button's spinner/disabled state — separate from ENGINE._inFlight, which
  // UI has no business reading directly; UI tracks its OWN "am I awaiting a call"
  // flag around every action it initiates). -----------------------------------------
  _focusedSlot: null,
  _busy: false,
  _els: {},

  // -- XSS discipline for this module: every render*Html()/*Html() helper below
  // builds markup via template strings (no DOM sanitizer dependency is allowed —
  // "no frameworks, no external assets"). ANY value that did not originate as a
  // hardcoded string literal in THIS file (model output: ui_path text passed through
  // is pack data so it's safe, but why/rationale/hdri_mood/gi_notes/status_reason/
  // param/value/unit ARE model output and MUST be escaped) is passed through
  // this.esc() before interpolation. Exceptions, documented at each call site:
  // dataUrl attributes (img src) are produced by THIS app's own canvas pipeline
  // (METRICS.downscaleForSend), never taken verbatim from an external source, so a
  // data: URL string is not attacker-controllable content here. ---------------------
  esc(s) {
    return String(s === undefined || s === null ? "" : s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
    }[c]));
  },
  fmtVal(v) {
    if (typeof v === "number") return Number.isInteger(v) ? String(v) : String(Math.round(v * 1000) / 1000);
    return String(v);
  },

  // -- JSON copy: the raw validated object for the active chain's recipe/latest
  // correction, exactly as stored (no reshaping) — "Copy JSON" per the task. -------
  buildJSON(obj) {
    return JSON.stringify(obj, null, 2);
  },

  // -- copyText(text): navigator.clipboard when available (https/localhost), with a
  // synchronous textarea+execCommand fallback for file:// origins where
  // navigator.clipboard is frequently unavailable/blocked. Never throws past the
  // caller — a clipboard failure is a minor annoyance, not a crash. ----------------
  async copyText(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (e) { /* fall through to legacy path */ }
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  },

  // -- toast(msg): brief, auto-dismissing notice (used for the busy toast and copy
  // confirmations) — appended to #toasts, removed after a short delay. -------------
  toast(msg) {
    const host = this._els.toasts;
    if (!host) return;
    const el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    host.appendChild(el);
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 2600);
  },

  // ===================================================================================
  // BOOT: build the static shell once, wire every event listener, then load the
  // session and render.
  // ===================================================================================
  async boot() {
    const app = document.getElementById("app");
    app.innerHTML = `
      <div id="banners"></div>
      <div id="topbar"></div>
      <div id="main">
        <div id="leftrail"></div>
        <div id="recipearea"></div>
      </div>
      <div id="sessionstrip"></div>
      <div id="toasts"></div>
    `;
    this._els = {
      banners: document.getElementById("banners"),
      topbar: document.getElementById("topbar"),
      leftrail: document.getElementById("leftrail"),
      recipearea: document.getElementById("recipearea"),
      sessionstrip: document.getElementById("sessionstrip"),
      toasts: document.getElementById("toasts")
    };

    // -- global paste routing: Ctrl+V anywhere in the document. ----------------------
    document.addEventListener("paste", (ev) => this._onPaste(ev));

    await ENGINE.boot();
    this.render();
  },

  // ===================================================================================
  // ACTIONS: thin wrappers around ENGINE calls — await, handle typed errors, render.
  // ===================================================================================

  // -- _runAction(fn): runs an ENGINE-calling async fn() with the shared busy/error
  // handling every action needs (spinner, error banner population, always re-render
  // at the end). Centralizes the try/catch so individual action methods stay short. -
  async _runAction(fn) {
    if (this._busy) { this.toast("Already working — one moment."); return; }
    this._busy = true;
    this.render();
    try {
      await fn();
    } catch (e) {
      if (e && e.kind === "busy") {
        this.toast("Already working — one moment.");
      }
      // Any other error is already recorded on ENGINE.lastError by _annotateError();
      // the banner renders from that on the next render() call below. A raw Error
      // ENGINE did not annotate (defensive) still gets a visible trace via lastError
      // being left as whatever it previously was — acceptable, since every ENGINE
      // action method in this codebase routes failures through _annotateError().
    } finally {
      this._busy = false;
      this.render();
    }
  },

  async ingestFile(slot, file) {
    const check = this.acceptsFile(file);
    if (!check.ok) {
      ENGINE.lastError = { kind: "ingest", name: "IngestRejected", message: check.reason, at: new Date().toISOString() };
      this.render();
      return;
    }
    if (slot === "attempt") {
      await this._runAction(() => ENGINE.addAttempt(file));
    } else {
      await this._runAction(() => ENGINE.setImage(slot, file));
    }
  },

  async doAnalyze() {
    await this._runAction(() => ENGINE.analyze());
  },

  async doReanalyzeOther() {
    await this._runAction(() => ENGINE.reanalyzeOtherTarget());
  },

  // -- setTarget: STORE.setPrefs is deliberately INSIDE the guarded callback, not
  // before it (code review finding) — _runAction's busy-guard can skip the actual
  // ENGINE.setActiveTarget call (toast-and-return) while leaving a caller-visible
  // side effect behind if the pref write happened unconditionally first; that would
  // desync STORE.prefs().target from ENGINE.activeTarget() until the next successful
  // switch. Writing the pref only once the guard has let the call through keeps both
  // in lockstep. --------------------------------------------------------------------
  async setTarget(target) {
    await this._runAction(async () => {
      STORE.setPrefs({ target });
      await ENGINE.setActiveTarget(target);
    });
  },

  async setModel(model) {
    STORE.setPrefs({ model });
    this.render();
  },

  async setKey(key) {
    STORE.setKey(key);
    this.render();
  },

  // -- setContextChip(group, value): single-select-per-group toggle (clicking the
  // already-active chip in a group clears it back to ""). Routes through
  // ENGINE.setContext(patch), the small addition this task explicitly calls for so
  // the UI never mutates session.context directly. The typeof guard is cheap
  // defensive insurance only — ENGINE.setContext always exists in this build. -----
  async setContextChip(group, value) {
    const s = ENGINE.session();
    const current = s.context || {};
    const next = { [group]: current[group] === value ? "" : value };
    if (typeof ENGINE.setContext === "function") {
      await this._runAction(async () => { await ENGINE.setContext(next); });
    } else {
      s.context = Object.assign({}, current, next);
      await STORE.saveSession(s);
      this.render();
    }
  },

  async toggleApplied(attemptIndex, param) {
    const chain = ENGINE.activeChain();
    if (!chain || !chain.attempts[attemptIndex]) return;
    const att = chain.attempts[attemptIndex];
    att.appliedParams = att.appliedParams || {};
    att.appliedParams[param] = att.appliedParams[param] === false ? true : false;
    await STORE.saveSession(ENGINE.session());
    this.render();
  },

  async doExportSession() {
    const json = await STORE.exportJSON(ENGINE.session());
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `lightmatch-session-${ENGINE.session().id}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    this.toast("Session exported.");
  },

  doImportSessionClick() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "application/json";
    input.onchange = async () => {
      const file = input.files && input.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        await STORE.importJSON(text);
        await ENGINE.boot();
        this.toast("Session imported.");
      } catch (e) {
        this.toast("Import failed: " + (e && e.message));
      }
      this.render();
    };
    input.click();
  },

  // ===================================================================================
  // PASTE / DROP wiring
  // ===================================================================================
  _onPaste(ev) {
    const items = (ev.clipboardData && ev.clipboardData.items) || [];
    let file = null;
    for (const it of items) {
      if (it.kind === "file") { file = it.getAsFile(); break; }
    }
    if (!file) return;
    ev.preventDefault();
    const state = ENGINE.state();
    const s = ENGINE.session();
    const filled = { ref: !!s.ref, base: !!s.base, settings: !!s.settingsShot };
    const slot = this.routePaste(state, this._focusedSlot, filled);
    if (!slot) { this.toast("Nowhere to paste that yet — fill Reference and Base first."); return; }
    this.ingestFile(slot, file);
  },

  _onDrop(ev, dropSlotHint) {
    ev.preventDefault();
    const file = ev.dataTransfer && ev.dataTransfer.files && ev.dataTransfer.files[0];
    if (!file) return;
    const state = ENGINE.state();
    const s = ENGINE.session();
    const filled = { ref: !!s.ref, base: !!s.base, settings: !!s.settingsShot };
    // A drop ONTO a specific slot element focuses that slot for routing purposes
    // (dropping directly on the Base slot should fill Base, not follow the generic
    // priority order) — dropSlotHint plays the same role focusedSlot does for paste.
    const slot = this.routePaste(state, dropSlotHint || null, filled);
    if (!slot) { this.toast("Nowhere to drop that yet — fill Reference and Base first."); return; }
    this.ingestFile(slot, file);
  },

  // ===================================================================================
  // RENDER: one idempotent pass. Rebuilds every dynamic region from
  // ENGINE.state()/session()/attemptInfo()/activeChain(). No incremental patching.
  // ===================================================================================
  render() {
    const state = ENGINE.state();
    const session = ENGINE.session();
    const info = ENGINE.attemptInfo();
    const chain = ENGINE.activeChain();

    this._renderBanners(state, session);
    this._renderTopbar(session);
    this._renderLeftRail(state, session, info);
    this._renderRecipeArea(state, session, chain);
    this._renderSessionStrip(state, session, chain);
  },

  // -- banners: typed-error banners + persistence warning. Rendered FIRST/topmost. --
  // Every interpolated value below is either a hardcoded string literal or passed
  // through this.esc() first (err.message/err.raw are attacker-influenceable in
  // principle — err.raw is a raw gateway response body — so both are escaped).
  _renderBanners(state, session) {
    const host = this._els.banners;
    const parts = [];

    if (!STORE.persistent) {
      parts.push(`
        <div class="banner banner-warn">
          <span>Sessions cannot be saved persistently in this browser (IndexedDB unavailable) — export your session before closing the tab.</span>
          <button class="btn-small" data-action="export-session">Export session</button>
          <button class="btn-small" data-action="import-session">Import session</button>
        </div>
      `);
    }

    const err = ENGINE.lastError;
    if (err) {
      if (err.kind === "auth") {
        parts.push(`<div class="banner banner-error" data-error-kind="auth">Key rejected (401). Check your oc_ key.</div>`);
      } else if (err.name === "DecodeError") {
        parts.push(`<div class="banner banner-error" data-error-kind="decode">${this.esc(err.message || "LightMatch reads display-referred sRGB screenshots/saves — PNG or JPG from the VFB/Vantage, not linear EXR.")}</div>`);
      } else if (err.kind === "ingest") {
        parts.push(`<div class="banner banner-error" data-error-kind="ingest">${this.esc(err.message)}</div>`);
      } else if (err.kind === "network") {
        parts.push(`<div class="banner banner-error" data-error-kind="network">Gateway unreachable or timed out — retried 3×.</div>`);
      } else if (err.kind === "shape") {
        parts.push(`
          <div class="banner banner-error" data-error-kind="shape">
            <div>The gateway returned a non-recipe response.</div>
            <details class="raw-details"><summary>Show raw response</summary><pre class="raw">${this.esc(err.raw || "")}</pre></details>
          </div>
        `);
      } else if (err.kind === "busy") {
        // busy is surfaced as a toast (see _runAction), not a persistent banner.
      } else if (err.kind === "other") {
        parts.push(`<div class="banner banner-error" data-error-kind="other">${this.esc(err.message || "Something went wrong.")}</div>`);
      }
    }

    host.innerHTML = parts.join("\n");
    const exportBtn = host.querySelector('[data-action="export-session"]');
    if (exportBtn) exportBtn.onclick = () => this.doExportSession();
    const importBtn = host.querySelector('[data-action="import-session"]');
    if (importBtn) importBtn.onclick = () => this.doImportSessionClick();
    if (err && err.kind === "auth") {
      // focus the key field, per the task ("with key field focus")
      setTimeout(() => { const kf = document.getElementById("key-field"); if (kf) kf.focus(); }, 0);
    }
  },

  // -- topbar: title, target toggle, model picker, key status + field. Every
  // interpolated value is a hardcoded label/constant or this.esc()'d; the key value
  // itself is set via the DOM .value property in the wiring below, never interpolated
  // into the template string (a pasted key could contain HTML-special characters). --
  _renderTopbar(session) {
    const prefs = STORE.prefs();
    const hasKey = !!STORE.key();
    const host = this._els.topbar;
    host.innerHTML = `
      <div class="topbar-inner">
        <div class="brand">LightMatch</div>
        <div class="target-toggle" role="group" aria-label="Target renderer">
          <button class="toggle-btn ${prefs.target === "vray7max" ? "active" : ""}" data-target="vray7max">V-Ray 7</button>
          <button class="toggle-btn ${prefs.target === "vantage33" ? "active" : ""}" data-target="vantage33">Vantage 3.3</button>
        </div>
        <select id="model-picker" class="model-picker" aria-label="Model">
          ${UI.MODELS.map(m => `<option value="${this.esc(m.value)}" ${m.value === prefs.model ? "selected" : ""}>${this.esc(m.label)}</option>`).join("")}
        </select>
        <div class="key-area">
          <span class="key-dot ${hasKey ? "key-dot-ok" : "key-dot-missing"}" title="${hasKey ? "Key stored" : "No key set"}"></span>
          <input id="key-field" class="key-field" type="password" placeholder="oc_..." />
        </div>
      </div>
      <div class="privacy-line">Stored only in this browser.</div>
    `;

    host.querySelectorAll("[data-target]").forEach(btn => {
      btn.onclick = () => this.setTarget(btn.getAttribute("data-target"));
    });
    const picker = host.querySelector("#model-picker");
    if (picker) picker.onchange = () => this.setModel(picker.value);
    const keyField = host.querySelector("#key-field");
    if (keyField) {
      // Set via .value (a DOM property assignment, never HTML interpolation) so a
      // pasted key with special characters can never be misparsed as markup.
      keyField.value = hasKey ? "••••••••••••" : "";
      keyField.onfocus = () => { if (keyField.value.startsWith("••")) keyField.value = ""; };
      keyField.onblur = () => { if (keyField.value.trim()) this.setKey(keyField.value); else this.render(); };
    }
  },

  // -- left rail: 3 named slots + attempt slot (once state >= analyzed), context
  // chips, Analyze/Re-analyze buttons, notices. -------------------------------------
  SLOT_DEFS: [
    { key: "ref", label: "Reference" },
    { key: "base", label: "Base render" },
    { key: "settings", label: "Settings screenshot", hint: "optional anchor" }
  ],
  CHIP_GROUPS: [
    { key: "scene", label: "Scene", options: ["interior", "exterior", "product"] },
    { key: "time", label: "Time", options: ["day", "dusk", "night"] },
    { key: "rig", label: "Rig", options: ["HDRI dome", "sun", "both"] }
  ],
  _renderLeftRail(state, session, info) {
    const host = this._els.leftrail;
    const slotsHtml = this.SLOT_DEFS.map(def => this._slotHtml(def, session)).join("");
    const attemptSlotHtml = state === "analyzed" || state === "refining" ? this._attemptSlotHtml(info) : "";

    const chipsHtml = this.CHIP_GROUPS.map(group => `
      <div class="chip-group" data-chip-group="${group.key}">
        <div class="chip-group-label">${this.esc(group.label)}</div>
        <div class="chip-row">
          ${group.options.map(opt => `<button class="chip ${session.context && session.context[group.key] === opt ? "chip-active" : ""}" data-chip-group="${group.key}" data-chip-value="${this.esc(opt)}">${this.esc(opt)}</button>`).join("")}
        </div>
      </div>
    `).join("");

    const chain = ENGINE.activeChain();
    const hasRecipe = !!(chain && chain.recipe);
    const analyzeReady = state !== "empty";
    const analyzeLabel = this._busy ? "Analyzing…" : (hasRecipe ? "Re-analyze" : "Analyze");
    const otherTarget = STORE.prefs().target === "vray7max" ? "Chaos Vantage 3.3" : "V-Ray 7";

    host.innerHTML = `
      <div class="slots">
        ${slotsHtml}
        ${attemptSlotHtml}
      </div>
      <div class="attempt-hint">Same VFB display settings every attempt.</div>
      <div class="chips">${chipsHtml}</div>
      <button id="analyze-btn" class="btn-primary" ${analyzeReady ? "" : "disabled"}>${this._busy ? '<span class="spinner"></span> ' : ""}${this.esc(analyzeLabel)}</button>
      ${state === "analyzed" || state === "refining" ? `<button id="reanalyze-other-btn" class="btn-secondary">Re-analyze for ${this.esc(otherTarget)}</button>` : ""}
    `;

    this.SLOT_DEFS.forEach(def => this._wireSlot(host, def.key));
    if (state === "analyzed" || state === "refining") this._wireSlot(host, "attempt");

    host.querySelectorAll("[data-chip-group][data-chip-value]").forEach(btn => {
      btn.onclick = () => this.setContextChip(btn.getAttribute("data-chip-group"), btn.getAttribute("data-chip-value"));
    });

    const analyzeBtn = host.querySelector("#analyze-btn");
    if (analyzeBtn) analyzeBtn.onclick = () => this.doAnalyze();
    const reanalyzeBtn = host.querySelector("#reanalyze-other-btn");
    if (reanalyzeBtn) reanalyzeBtn.onclick = () => this.doReanalyzeOther();
  },

  // dataUrl is produced ONLY by THIS app's own METRICS.downscaleForSend (canvas ->
  // toDataURL), never taken from an external source verbatim — safe to interpolate
  // as an img src without escaping (escaping would corrupt the base64 payload).
  _slotHtml(def, session) {
    const val = def.key === "ref" ? session.ref : def.key === "base" ? session.base : session.settingsShot;
    const thumb = val && val.dataUrl ? `<img class="slot-thumb" src="${val.dataUrl}" alt="${this.esc(def.label)}" />` : "";
    const focused = this._focusedSlot === def.key ? "slot-focused" : "";
    return `
      <div class="slot ${focused}" data-slot="${def.key}" tabindex="0">
        <div class="slot-label">${this.esc(def.label)}${def.hint ? ` <span class="slot-hint">(${this.esc(def.hint)})</span>` : ""}</div>
        <div class="slot-drop">
          ${thumb || '<div class="slot-empty">Drop, click to focus + paste, or choose a file</div>'}
        </div>
        <input type="file" class="slot-file-input" accept="image/png,image/jpeg,image/webp" />
      </div>
    `;
  },

  _attemptSlotHtml(info) {
    const focused = this._focusedSlot === "attempt" ? "slot-focused" : "";
    return `
      <div class="slot slot-attempt ${focused}" data-slot="attempt" tabindex="0">
        <div class="slot-label">Attempt <span class="slot-hint">(${info.n} so far, last ${info.stored} kept)</span></div>
        <div class="slot-drop"><div class="slot-empty">Drop, click to focus + paste, or choose a file — becomes attempt ${info.n + 1}</div></div>
        <input type="file" class="slot-file-input" accept="image/png,image/jpeg,image/webp" />
      </div>
    `;
  },

  _wireSlot(host, slotKey) {
    const el = host.querySelector(`[data-slot="${slotKey}"]`);
    if (!el) return;
    el.addEventListener("click", () => { this._focusedSlot = slotKey; this.render(); });
    el.addEventListener("focus", () => { this._focusedSlot = slotKey; });
    el.addEventListener("dragover", (ev) => { ev.preventDefault(); });
    el.addEventListener("drop", (ev) => this._onDrop(ev, slotKey));
    const input = el.querySelector(".slot-file-input");
    if (input) {
      input.addEventListener("click", (ev) => ev.stopPropagation());
      input.addEventListener("change", () => {
        const file = input.files && input.files[0];
        if (file) this.ingestFile(slotKey, file);
      });
    }
  },

  // -- recipe area: grouped-by-5-steps recipe card, or correction cards for attempts,
  // or an empty-state message. -------------------------------------------------------
  STEP_HEADERS: {
    1: "1 · Lock exposure & white balance",
    2: "2 · Sun / key",
    3: "3 · Environment / dome",
    4: "4 · Fills & rim",
    5: "5 · Color mapping"
  },
  _renderRecipeArea(state, session, chain) {
    const host = this._els.recipearea;
    if (state === "empty" || state === "ready" || !chain || !chain.recipe) {
      host.innerHTML = `<div class="empty-state">Drop a Reference and a Base render, then Analyze to get a recipe.</div>`;
      return;
    }

    const target = session.activeTarget;
    const targetLabel = (PACKS[target] && PACKS[target].label) || target;
    const recipe = chain.recipe;
    const baselineText = recipe.baseline === "settings_screenshot" ? "settings screenshot" : "factory defaults";

    const stepGroups = [1, 2, 3, 4, 5].map(step => {
      const rows = (recipe.values || []).filter(v => v.step === step);
      if (!rows.length) return "";
      return `
        <div class="step-group" data-step="${step}">
          <div class="step-header">${this.esc(this.STEP_HEADERS[step])}</div>
          ${rows.map(v => this._valueRowHtml(v, target, "recipe", null)).join("")}
        </div>
      `;
    }).join("");

    const correctionsHtml = (chain.attempts || []).map((att, idx) => this._correctionCardHtml(att, idx, target)).join("");

    host.innerHTML = `
      <div class="recipe-card">
        <div class="recipe-card-header">
          <div class="recipe-card-title">Recipe — ${this.esc(targetLabel)}</div>
          <div class="recipe-card-baseline">baseline: ${this.esc(baselineText)}</div>
          <div class="recipe-card-actions">
            <button class="btn-small" data-action="copy-sheet">Copy sheet</button>
            <button class="btn-small" data-action="copy-json">Copy JSON</button>
          </div>
        </div>
        ${stepGroups}
        <details class="rationale-foldout">
          <summary>Rationale</summary>
          <p>${this.esc(recipe.rationale)}</p>
        </details>
        <div class="hdri-mood">HDRI mood: ${this.esc(recipe.hdri_mood)}</div>
        <div class="gi-notes">${this.esc(recipe.gi_notes)}</div>
      </div>
      ${correctionsHtml}
    `;

    const copySheetBtn = host.querySelector('[data-action="copy-sheet"]');
    if (copySheetBtn) copySheetBtn.onclick = async () => { await this.copyText(this.buildSheet(recipe, target)); this.toast("Sheet copied."); };
    const copyJsonBtn = host.querySelector('[data-action="copy-json"]');
    if (copyJsonBtn) copyJsonBtn.onclick = async () => { await this.copyText(this.buildJSON(recipe)); this.toast("JSON copied."); };

    this._wireValueRowCopyButtons(host);
    this._wireAppliedToggles(host);
  },

  // -- one value row: verbatim ui_path as the PRIMARY label (never model text), value
  // + unit + "(from X)", confidence dot, clamped flag, applied toggle (default
  // checked; recipe rows carry data-recipe-applied and feed chain.recipeApplied via
  // ENGINE.setRecipeApplied so the FIRST correction call receives the real applied
  // set — init state comes from UI.isRecipeApplied(chain, param); correction rows
  // carry data-attempt-index and feed that attempt's appliedParams via
  // toggleApplied), copy button. kind:"placement" rows render as an instruction
  // line: the string `set`/`to` IS the placement text, no unit/(from) pair (per the
  // task). All model-sourced text (why, value when it's a placement string, ui_path
  // is PACK data — trusted — but included via esc() anyway for defense in depth) is
  // escaped. ------------------------------------------------------------------------
  _valueRowHtml(v, target, mode, attemptIndex) {
    const entry = PACKS.lookup(target, v.param);
    const uiPath = entry ? entry.ui_path : v.param;
    const isPlacement = entry && entry.kind === "placement";
    const valKey = mode === "correction" ? "to" : "set";
    const value = v[valKey];
    // Unit is appended only when the value is actually numeric — a spinner/dropdown
    // entry's `set`/`to` SHOULD always be the kind-appropriate type, but
    // SCHEMAS.validateRecipe does not itself reject a string on a spinner-kind entry
    // (only clamps numbers; strings pass through unflagged regardless of kind), so
    // this guards against a malformed model value producing nonsense like "40degdeg".
    const unit = entry && entry.unit && typeof value === "number" ? entry.unit : "";
    const confDot = `<span class="conf-dot conf-${this.esc(v.confidence)}" title="confidence: ${this.esc(v.confidence)}"></span>`;
    const clampedFlag = v.clamped ? `<span class="clamped-flag" title="Clamped to the parameter's legal range">clamped</span>` : "";
    const copyText = isPlacement ? `${uiPath} → ${value}` : `${uiPath} → ${value}${unit}`;

    let appliedHtml = "";
    if (mode === "recipe") {
      const recipeChecked = this.isRecipeApplied(ENGINE.activeChain(), v.param);
      appliedHtml = `<label class="applied-toggle"><input type="checkbox" ${recipeChecked ? "checked" : ""} data-recipe-applied data-applied-param="${this.esc(v.param)}" /> applied</label>`;
    } else if (mode === "correction") {
      const chain = ENGINE.activeChain();
      const att = chain && chain.attempts[attemptIndex];
      const appliedFalse = !!(att && att.appliedParams && att.appliedParams[v.param] === false);
      appliedHtml = `<label class="applied-toggle"><input type="checkbox" ${appliedFalse ? "" : "checked"} data-applied-param="${this.esc(v.param)}" data-attempt-index="${attemptIndex}" /> applied</label>`;
    }

    const valueDisplay = isPlacement
      ? `<span class="value-text">${this.esc(value)}</span>`
      : `<span class="value-text">${this.esc(value)}${this.esc(unit)}</span> <span class="from-text">(from ${this.esc(v.from)})</span>`;

    return `
      <div class="value-row ${isPlacement ? "value-row-placement" : ""}" data-param="${this.esc(v.param)}">
        ${confDot}
        <div class="value-row-main">
          <div class="value-row-label">${this.esc(uiPath)}</div>
          <div class="value-row-value">${valueDisplay} ${clampedFlag}</div>
          <div class="value-row-why">${this.esc(v.why)}</div>
        </div>
        ${appliedHtml}
        <button class="row-copy-btn" data-copy-text="${this.esc(copyText)}" title="Copy">copy</button>
      </div>
    `;
  },

  // -- correction card: same row treatment as recipe rows, from correction.moves
  // (from -> to), plus status_reason. The task-mandated handoff banner (text: "...
  // take it to REFGRADE") is rendered exactly ONCE, in _renderSessionStrip (the
  // spec's named location, "bottom (session strip): ... plateau state renders the
  // REFGRADE handoff message") — not duplicated here, even though this card also
  // knows c.status; status_reason alone (no banner) is enough context on the card
  // itself, since the banner already carries the full REFGRADE sentence. ----------
  _correctionCardHtml(att, idx, target) {
    if (!att.correction) return "";
    const c = att.correction;
    const movesHtml = (c.moves || []).map(m => this._valueRowHtml(m, target, "correction", idx)).join("");
    return `
      <div class="recipe-card correction-card" data-attempt-index="${idx}">
        <div class="recipe-card-header">
          <div class="recipe-card-title">Correction — attempt ${idx + 1} <span class="score-inline">look distance ${Math.round(att.score)}</span></div>
        </div>
        ${movesHtml}
        <div class="status-reason">${this.esc(c.status_reason || "")}</div>
      </div>
    `;
  },

  _wireValueRowCopyButtons(host) {
    host.querySelectorAll(".row-copy-btn").forEach(btn => {
      btn.onclick = async () => { await this.copyText(btn.getAttribute("data-copy-text")); this.toast("Copied."); };
    });
  },

  _wireAppliedToggles(host) {
    // Correction-row toggles: [data-attempt-index] -> that attempt's appliedParams.
    host.querySelectorAll("[data-applied-param][data-attempt-index]").forEach(cb => {
      cb.onchange = () => {
        const idx = parseInt(cb.getAttribute("data-attempt-index"), 10);
        const param = cb.getAttribute("data-applied-param");
        this.toggleApplied(idx, param);
      };
    });
    // Recipe-row toggles: [data-recipe-applied] -> chain.recipeApplied via ENGINE
    // (Task 7a follow-up: the first correction call receives this applied set).
    // setRecipeApplied throws BusyError while an op is in flight; the render() in
    // either path snaps the checkbox back to the stored (unchanged) state.
    host.querySelectorAll("[data-recipe-applied]").forEach(cb => {
      cb.onchange = async () => {
        try {
          await ENGINE.setRecipeApplied(cb.getAttribute("data-applied-param"), cb.checked);
        } catch (e) {
          if (e && e.kind === "busy") this.toast("Already working — one moment.");
        }
        this.render();
      };
    });
  },

  // -- session strip: ref thumb + per-attempt thumbs, score labeled "look distance
  // (0–100)", trend arrow vs previous, verbatim caveat text, handoff banner. Thumb
  // src values are dataUrls from this app's own pipeline (see _slotHtml's comment). -
  _renderSessionStrip(state, session, chain) {
    const host = this._els.sessionstrip;
    if (state === "empty" || !session.ref) { host.innerHTML = ""; return; }

    const attempts = (chain && chain.attempts) || [];
    const refThumb = `<div class="strip-thumb strip-ref"><img src="${session.ref.dataUrl}" alt="Reference" /><div class="strip-caption">Reference</div></div>`;

    const attemptThumbs = attempts.map((att, idx) => {
      const prev = idx > 0 ? attempts[idx - 1] : null;
      let trend = "";
      if (prev) {
        trend = att.score < prev.score ? '<span class="trend trend-up" title="Closer to reference">▲</span>'
          : att.score > prev.score ? '<span class="trend trend-down" title="Further from reference">▼</span>'
          : '<span class="trend trend-flat">–</span>';
      }
      return `
        <div class="strip-thumb" data-attempt-index="${idx}">
          <img src="${att.dataUrl}" alt="Attempt ${idx + 1}" />
          <div class="strip-caption">look distance (0–100): ${Math.round(att.score)} ${trend}</div>
        </div>
      `;
    }).join("");

    const latestAtt = attempts.length ? attempts[attempts.length - 1] : null;
    const handoff = latestAtt && latestAtt.correction && latestAtt.correction.status === "handoff_to_grade";

    host.innerHTML = `
      ${handoff ? `<div class="banner banner-handoff">${this.esc(latestAtt.correction.status_reason || "")} — lighting is within noise of the reference — the rest is a grade; take it to REFGRADE.</div>` : ""}
      <div class="session-strip">
        ${refThumb}
        ${attemptThumbs}
      </div>
      <div class="strip-caveat">trust your eyes first, the numbers second</div>
    `;
  }
};

/* ===== SECTION: SELFTEST ===== */
const SELFTEST = { fails: [], n: 0,
  ok(cond, msg) { this.n++; if (!cond) this.fails.push(msg); },
  close(a, b, tol, msg) { this.ok(Math.abs(a - b) <= tol, `${msg} (got ${a}, want ${b}±${tol})`); },
  async run() {
    for (const [name, fn] of Object.entries(SELFTEST.suites)) { try { await fn.call(SELFTEST); } catch (e) { this.fails.push(name + " threw: " + e.message); } }
    const line = this.fails.length ? `SELFTEST: FAIL\n` + this.fails.join("\n") : `SELFTEST: PASS (${this.n} asserts)`;
    document.body.textContent = line; document.title = line.split("\n")[0];
  }, suites: {} };

// -- suite: packs (Task 2) -----------------------------------------------------------
SELFTEST.suites.packs = async function () {
  const KINDS = ["spinner", "dropdown", "slot", "placement"];
  const FIELDS = ["id", "ui_path", "kind", "unit", "range", "default", "notes", "verified"];
  // ids the plan fixes per pack — drift guard
  const REQUIRED = {
    vray7max: ["env.gi_skylight_mult", "dome.texture_slot", "dome.intensity", "dome.rotation_h", "dome.invisible",
      "sun.placement_azimuth", "sun.placement_elevation", "sun.intensity_mult", "sun.size_mult", "sun.kelvin",
      "sun.turbidity", "fill.plane_intensity", "fill.plane_kelvin", "fill.sphere_intensity", "fill.key_fill_guidance",
      "cam.iso", "cam.fnumber", "cam.shutter", "cam.wb_kelvin", "cam.ev_readout",
      "cm.type", "cm.highlight_burn", "cm.contrast", "cm.saturation", "vfb.exposure", "gi.primary", "gi.secondary"],
    vantage33: ["env.hdri_slot", "env.intensity", "env.rotation", "env.background_mode",
      "sun.enabled", "sun.intensity", "sun.azimuth", "sun.elevation", "sun.size",
      "cam.exposure_value", "cam.wb", "cam.dof_note", "post.tonemap_type", "post.contrast", "post.saturation"]
  };
  for (const target of PACKS.targets()) {
    const pack = PACKS[target];
    this.ok(pack && Array.isArray(pack.entries), `${target}: pack exists with entries[]`);
    this.ok(pack.entries.length >= 25, `${target}: at least 25 entries (got ${pack.entries.length})`);
    for (const id of REQUIRED[target]) this.ok(!!PACKS.lookup(target, id), `${target}: plan-required id ${id} present`);
    const seen = new Set();
    for (const e of pack.entries) {
      const w = `${target}:${e.id}`;
      this.ok(!seen.has(e.id), `${w}: id unique`); seen.add(e.id);
      for (const f of FIELDS) this.ok(f in e, `${w}: has field ${f}`);
      this.ok(KINDS.includes(e.kind), `${w}: legal kind (${e.kind})`);
      this.ok(Array.isArray(e.range) && e.range.length === 2, `${w}: range is a pair`);
      this.ok(typeof e.ui_path === "string" && e.ui_path.length > 8, `${w}: ui_path non-trivial`);
      this.ok(typeof e.notes === "string" && e.notes.length > 0, `${w}: notes non-empty`);
      this.ok(e.verified === false || e.verified === "2026-07-02", `${w}: verified is check-date or false`);
      if (e.kind === "spinner") {
        // value-carrying entries: strictly increasing range, numeric default inside it
        this.ok(e.range[0] < e.range[1], `${w}: spinner range[0]<range[1]`);
        this.ok(typeof e.default === "number" && e.default >= e.range[0] && e.default <= e.range[1], `${w}: default inside range`);
        const hi = PACKS.clamp(target, e.id, 1e9);
        this.ok(hi.value === e.range[1] && hi.clamped === true, `${w}: clamp(1e9) -> max, flagged`);
        const lo = PACKS.clamp(target, e.id, -1e9);
        this.ok(lo.value === e.range[0] && lo.clamped === true, `${w}: clamp(-1e9) -> min, flagged`);
        const mid = PACKS.clamp(target, e.id, e.default);
        this.ok(mid.value === e.default && mid.clamped === false, `${w}: clamp(default) unchanged`);
      } else if (e.kind === "slot") {
        // spec-fixed slot shape: range [0,0], default "none"
        this.ok(e.range[0] === 0 && e.range[1] === 0, `${w}: slot range [0,0]`);
        this.ok(e.default === "none", `${w}: slot default "none"`);
      } else if (e.kind === "dropdown") {
        this.ok(e.range[0] === 0 && e.range[1] === 0, `${w}: dropdown range [0,0]`);
        this.ok(typeof e.default === "string" && e.default.length > 0, `${w}: dropdown string default`);
        this.ok(e.notes.includes("Options:"), `${w}: dropdown carries option list in notes`);
        this.ok(e.notes.includes(e.default), `${w}: dropdown default is among the options text`);
      } else { // placement: instruction rows; numeric ones (angles, kelvin, ratio) keep honest bounds
        if (typeof e.default === "number") {
          this.ok(e.range[0] < e.range[1], `${w}: placement numeric range[0]<range[1]`);
