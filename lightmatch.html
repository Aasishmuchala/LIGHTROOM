<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>LightMatch</title>
<style>
/* ===== SECTION: STYLE =====
   LightMatch — an instrument for a lighting artist's second monitor, glanced at
   between a render and a viewport under dim studio light. The redesign keeps the
   identity (dark, calm, tungsten-amber as the only saturated note, numbers as the
   jewels) and lifts it to an impeccable product-register bar. System fonts only;
   no external assets of any kind (CSP / offline / file://).

   Design system (documented, applied everywhere):
   · Two neutral layers. --chrome (topbar + input rail = the tool frame) sits cooler
     and quieter; --panel (the recipe) lifts above it as the focal content plane.
     Elevation is carried by HAIRLINES, never shadows — shadows appear only on true
     floats (toasts). Layer order: --bg < --chrome < --panel < --panel-2 < --ctl.
   · One accent. Tungsten amber marks the primary action, the current selection
     (target toggle / context chip), focus-visible, and live/current state ONLY.
     Never on an inactive control, never decorative.
   · Fixed rem type scale (root 13px, ratio ~1.15): 11 / 12 / 13 / 15 / 17 / 22 px.
     Hierarchy from weight / case / tracking, never font variety. Every micro-label
     (rail groups, step headers, slot labels) shares ONE grammar: 11px / 600 /
     0.12em caps in --text-3. Values + look-distance scores are --mono + tabular-nums
     and the largest ink on their line; the ui_path breadcrumb recedes to 11.5px.
   · Radius: 8px surfaces (cards / banners / slots / toasts) · 6px controls (buttons /
     chips / inputs / thumbs) · 4px nested-in-a-control · dots round.
   · Spacing rhythm 4/8/12/16/20/24/32: card pad 20×24, step-group gap 24, row pad 12.
   · Motion 160ms ease-out on state properties only (color/border/box-shadow) + a 1px
     press on buttons; everything collapses under prefers-reduced-motion.
   · Full control state set — default / hover / focus-visible / active / disabled /
     loading — standardized across buttons, chips, slots, selects, and the key field.

   Contrast (verified this pass, not eyeballed — worst small-text pairs):
   · --text on --panel .......... 14.9:1   · --text-2 on --panel ...... 7.4:1
   · --text-3 on --panel ......... 4.8:1   · --text-3 on --chrome ..... 5.1:1
   · --text-3 on --ctl ........... 4.6:1   · --accent-strong on --panel  6.9:1
   · --ok-text on --ok-wash ...... 8.1:1   · --err-text on --err-wash .. 7.0:1
   · --accent-ink on --accent .... 9.7:1 (primary button label)
   All body/label pairs clear WCAG AA (≥4.5:1 small, ≥3:1 large). */
:root {
  /* two neutral layers: bg (page) < chrome (tool frame) < panel (focal content) */
  --bg: #0d0e11;
  --chrome: #121317;
  --panel: #16171d;
  --panel-2: #191b22;
  --ctl: #1e202848;
  --ctl-solid: #1c1e25;
  --ctl-hover: #262933;
  --raised: #23252e;
  /* hairlines carry every edge; -2 is the emphasis line */
  --line: #23252c;
  --line-2: #30333d;
  --line-strong: #3c4049;
  /* ink ramp */
  --text: #eef0f3;
  --text-2: #aab0bb;
  --text-3: #8b93a0;
  /* the one accent — tungsten amber, the colour of light */
  --accent: #d9a15c;
  --accent-strong: #e8b878;
  --accent-ink: #17130c;
  --accent-line: #5a4324;
  --accent-wash: rgba(217, 161, 92, 0.12);
  --accent-wash-2: rgba(217, 161, 92, 0.18);
  --accent-glow: rgba(217, 161, 92, 0.22);
  /* semantic valence — restrained tints, full borders, never loud fills */
  --ok: #86c39a;
  --ok-line: #3f6b50;
  --ok-wash: #10190f14;
  --ok-bg: #111b15;
  --ok-text: #cbe4d5;
  --warn: #d4ad63;
  --warn-line: #6d5a30;
  --warn-bg: #1c1810;
  --warn-text: #e6d3ab;
  --err: #d97b6c;
  --err-line: #7a463d;
  --err-bg: #1f1412;
  --err-text: #edc4bc;
  --sans: "Segoe UI Variable Text", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
  --display: "Segoe UI Variable Display", "Segoe UI Variable Text", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, "Cascadia Mono", "Cascadia Code", Consolas, "SF Mono", Menlo, monospace;
  /* semantic z-index scale — no arbitrary 9999s */
  --z-strip: 1;
  --z-toast: 60;
  color-scheme: dark;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#app { padding: 22px 32px 64px; max-width: 1520px; margin: 0 auto; }
button, select, input { font: inherit; color: inherit; }
button { cursor: pointer; }
a { color: inherit; }
::selection { background: var(--accent-glow); color: var(--text); }

/* -- ONE focus model: a tungsten focus-visible ring, consistent on every control.
      Keyboard focus only (:focus-visible), so a pointer click never paints a ring. */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 6px;
}
* { scrollbar-width: thin; scrollbar-color: var(--line-2) transparent; }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--line-strong); background-clip: padding-box; }
::-webkit-scrollbar-track { background: transparent; }

/* state-transition contract: only colour / border / shadow / transform animate, and
   only for 160ms. Nothing here animates layout. */
button, .chip, .slot, input, select, summary, .applied-toggle, .row-copy-btn, .toggle-btn {
  transition: background-color 0.16s ease-out, border-color 0.16s ease-out,
              color 0.16s ease-out, box-shadow 0.16s ease-out;
}

/* ============================================================================
   BANNERS — full border + valence-tinted wash + a leading state glyph (drawn by
   ::before from a unicode char, no icon font / no asset). The valence lives in the
   whole frame, not a stripe; the message stays high-contrast and unshouting.
   ATTENTION: no border-left accent anywhere — that construction is banned.
   ============================================================================ */
.banner {
  position: relative;
  border: 1px solid var(--line-2);
  border-radius: 8px;
  padding: 13px 16px 13px 44px;   /* left pad reserves the glyph gutter */
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 13px;
  line-height: 1.55;
  color: var(--text-2);
}
/* the state glyph: absolutely placed in the reserved gutter, vertically centred on
   the first line. content + colour are set per valence below. */
.banner::before {
  content: "";
  position: absolute;
  left: 15px;
  top: 13px;
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  border-radius: 50%;
  border: 1.5px solid currentColor;
}
.banner-warn {
  border-color: var(--warn-line);
  background: var(--warn-bg);
  color: var(--warn-text);
}
.banner-warn::before { content: "!"; color: var(--warn); }
.banner-error {
  border-color: var(--err-line);
  background: var(--err-bg);
  color: var(--err-text);
}
.banner-error::before { content: "!"; color: var(--err); }
.banner-handoff {
  border-color: var(--ok-line);
  background: var(--ok-bg);
  color: var(--ok-text);
  padding-top: 14px;
  padding-bottom: 14px;
  font-size: 13px;
}
/* handoff is a positive milestone, not an alert — a check glyph, no ring border */
.banner-handoff::before {
  content: "\2713";           /* ✓ */
  color: var(--ok);
  border: none;
  font-size: 16px;
  top: 12px;
}
/* banner children keep their own rhythm; buttons trail to the right edge */
.banner > div { min-width: 0; }
.banner .btn-small { margin-left: 0; }
.banner .btn-small:first-of-type { margin-left: auto; }
.raw-details { width: 100%; }
.raw-details summary {
  cursor: pointer; color: var(--text-3); font-size: 12px;
  list-style: none; display: inline-flex; align-items: center; gap: 6px;
  width: fit-content;
}
.raw-details summary::-webkit-details-marker { display: none; }
.raw-details summary::before { content: "\203A"; font-size: 13px; transition: transform 0.16s ease-out; display: inline-block; }
.raw-details[open] summary::before { transform: rotate(90deg); }
.raw-details summary:hover { color: var(--text-2); }
.raw {
  white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow: auto;
  background: var(--bg); border: 1px solid var(--line); padding: 10px 12px; margin-top: 9px;
  border-radius: 6px; font-family: var(--mono); font-size: 11.5px; color: var(--text-2);
}

/* ============================================================================
   TOPBAR — the first neutral layer (the tool frame). A quiet engraved nameplate,
   one control cluster, the key status held to the far edge.
   ============================================================================ */
#topbar {
  background: var(--chrome);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 24px;
}
.topbar-inner { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.brand {
  font-family: var(--display); font-weight: 600; font-size: 13px;
  text-transform: uppercase; letter-spacing: 0.2em; color: var(--text);
  margin-right: 12px; white-space: nowrap;
}
/* segmented target toggle — the active segment carries the accent (current selection) */
.target-toggle {
  display: inline-flex; background: var(--ctl-solid); border: 1px solid var(--line-2);
  border-radius: 6px; padding: 2px; gap: 2px;
}
.toggle-btn {
  background: transparent; border: none; border-radius: 4px;
  padding: 5px 13px; font-size: 12px; font-weight: 500; color: var(--text-2);
  letter-spacing: 0.005em;
}
.toggle-btn:hover:not(.active) { color: var(--text); background: var(--ctl-hover); }
.toggle-btn:active:not(.active) { transform: translateY(0.5px); }
.toggle-btn.active {
  background: var(--accent-wash-2); color: var(--accent-strong); font-weight: 600;
  box-shadow: inset 0 0 0 1px var(--accent-line);
}
.model-picker {
  background: var(--ctl-solid); border: 1px solid var(--line-2); border-radius: 6px;
  padding: 6px 9px; font-size: 12px; color: var(--text-2);
}
.model-picker:hover { border-color: var(--line-strong); color: var(--text); }
.model-picker:focus-visible { border-color: var(--accent); }
.key-area { display: inline-flex; align-items: center; gap: 8px; margin-left: auto; }
.key-dot {
  width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0;
  box-shadow: 0 0 0 3px transparent;
}
.key-dot-ok { background: var(--ok); box-shadow: 0 0 0 3px rgba(134, 195, 154, 0.14); }
.key-dot-missing { background: var(--err); box-shadow: 0 0 0 3px rgba(217, 123, 108, 0.14); }
.key-field {
  background: var(--ctl-solid); border: 1px solid var(--line-2); border-radius: 6px;
  padding: 6px 10px; width: 164px; font-family: var(--mono); font-size: 12px;
  color: var(--text);
}
.key-field::placeholder { color: var(--text-3); }
.key-field:hover { border-color: var(--line-strong); }
.key-field:focus-visible, .key-field:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-wash);
}
/* privacy row: a caption-level ghost Export/Import + the verbatim privacy line */
.privacy-row { display: flex; align-items: baseline; gap: 12px; margin-top: 10px; padding: 0 2px; }
.session-io { display: inline-flex; align-items: baseline; gap: 8px; }
.session-io-btn {
  background: none; border: none; padding: 0; cursor: pointer;
  font-family: inherit; font-size: 11px; color: var(--text-3);
  letter-spacing: 0.01em; border-radius: 3px;
}
.session-io-btn:hover { color: var(--text-2); text-decoration: underline; text-underline-offset: 2px; }
.session-io-btn:focus-visible { outline-offset: 3px; }
.session-io-sep { color: var(--line-strong); font-size: 11px; }
.privacy-line { color: var(--text-3); font-size: 11px; text-align: right; margin-left: auto; }

/* ============================================================================
   MAIN two-column layout — the input rail (frame layer) beside the recipe (focal).
   ============================================================================ */
#main { display: flex; gap: 28px; align-items: flex-start; }
#leftrail {
  flex: 0 0 320px; min-width: 0;
  background: var(--chrome);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px 18px 20px;
  position: sticky; top: 22px;
}
#recipearea { flex: 1 1 auto; min-width: 0; }

/* ---- rail section rhythm: a hairline divider + shared micro-label grammar ---- */
.rail-title, .chip-group-label, .slot-label, .step-header {
  font-weight: 600; font-size: 11px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.12em;
}

/* ============================================================================
   SLOTS — labeled input ports. Empty = a quiet dashed invitation; filled = a solid
   confident frame; focused = an unmistakable tungsten ring (paste routing depends on
   perceived focus).
   ============================================================================ */
.slots { display: flex; flex-direction: column; gap: 10px; }
.slot {
  background: var(--panel);
  border: 1px dashed var(--line-2);
  border-radius: 8px;
  padding: 11px 12px 10px;
  cursor: pointer;
}
.slot:hover { border-color: var(--line-strong); background: var(--panel-2); }
.slot:active { transform: translateY(0.5px); }
.slot-filled { border-style: solid; border-color: var(--line-2); background: var(--panel); }
.slot-filled:hover { border-color: var(--line-strong); }
/* focused slot — the routing target. The accent ring is the signal. */
.slot-focused, .slot-focused:hover {
  border-style: solid; border-color: var(--accent); background: var(--panel);
  box-shadow: 0 0 0 3px var(--accent-wash);
}
.slot:focus-visible {
  border-style: solid; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-wash);
}
.slot-label {
  display: flex; align-items: baseline; gap: 7px; margin-bottom: 9px;
  color: var(--text-3);
}
.slot-focused .slot-label { color: var(--accent-strong); }
.slot-filled .slot-label { color: var(--text-2); }
.slot-hint {
  font-weight: 400; color: var(--text-3); font-size: 10.5px;
  text-transform: none; letter-spacing: 0.01em;
}
.slot-drop { min-height: 64px; display: flex; align-items: center; justify-content: center; }
.slot-empty {
  color: var(--text-3); text-align: center; font-size: 11.5px;
  padding: 6px 10px; line-height: 1.55;
}
.slot-thumb {
  width: 100%; max-height: 120px; object-fit: cover; display: block;
  border-radius: 4px; border: 1px solid var(--line);
}
.slot-file-input { margin-top: 10px; font-size: 10.5px; color: var(--text-3); max-width: 100%; }
.slot-file-input::file-selector-button {
  background: var(--ctl-solid); border: 1px solid var(--line-2); border-radius: 4px;
  color: var(--text-2); font: inherit; font-size: 10.5px; padding: 4px 10px;
  margin-right: 9px; cursor: pointer;
  transition: background-color 0.16s ease-out, border-color 0.16s ease-out, color 0.16s ease-out;
}
.slot-file-input::file-selector-button:hover { color: var(--text); border-color: var(--line-strong); background: var(--ctl-hover); }
.attempt-hint { color: var(--text-3); font-size: 11px; margin: 12px 2px 20px; line-height: 1.5; }

/* ============================================================================
   CHIPS — single-select context toggles. Active chip = current selection = accent.
   ============================================================================ */
.chips { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
.chip-group-label { margin-bottom: 8px; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  background: var(--ctl-solid); border: 1px solid var(--line-2); border-radius: 6px;
  padding: 5px 11px; font-size: 12px; color: var(--text-2); letter-spacing: 0.005em;
}
.chip:hover:not(.chip-active) { color: var(--text); border-color: var(--line-strong); background: var(--ctl-hover); }
.chip:active:not(.chip-active) { transform: translateY(0.5px); }
.chip-active, .chip-active:hover {
  background: var(--accent-wash-2); border-color: var(--accent);
  color: var(--accent-strong); font-weight: 600;
}

/* ============================================================================
   BUTTONS — ONE accent-filled primary (the single confident note); everything else
   is a quiet ghost. Full state set on each: hover / focus-visible / active / disabled
   / loading.
   ============================================================================ */
.btn-primary {
  background: var(--accent); color: var(--accent-ink); font-weight: 600;
  letter-spacing: 0.01em; border: 1px solid transparent; border-radius: 6px;
  padding: 11px 16px; width: 100%; font-size: 13px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-strong); }
.btn-primary:focus-visible { outline-offset: 3px; }
.btn-primary:active:not(:disabled) { transform: translateY(1px); background: var(--accent); }
.btn-primary:disabled {
  background: transparent; color: var(--text-3); cursor: default;
  border-color: var(--line-2); box-shadow: none;
}
/* loading: the label reads "Analyzing…" and the button is inert but keeps its frame */
.btn-primary:disabled .spinner { border-color: rgba(139, 147, 160, 0.30); border-top-color: var(--text-2); }
.btn-secondary {
  background: transparent; border: 1px solid var(--line-2); border-radius: 6px;
  padding: 10px 16px; width: 100%; margin-top: 10px; color: var(--text-2); font-size: 12.5px;
  font-weight: 500;
}
.btn-secondary:hover:not(:disabled) { color: var(--text); border-color: var(--line-strong); background: var(--ctl); }
.btn-secondary:focus-visible { outline-offset: 3px; }
.btn-secondary:active:not(:disabled) { transform: translateY(1px); }
.btn-secondary:disabled { color: var(--text-3); cursor: default; opacity: 0.6; }
.btn-small {
  background: transparent; border: 1px solid var(--line-2); border-radius: 6px;
  padding: 4px 11px; font-size: 11.5px; color: var(--text-2); font-weight: 500;
}
.btn-small:hover:not(:disabled) { color: var(--text); border-color: var(--line-strong); background: var(--ctl); }
.btn-small:focus-visible { outline-offset: 2px; }
.btn-small:active:not(:disabled) { transform: translateY(0.5px); }
.spinner {
  display: inline-block; width: 11px; height: 11px; vertical-align: -1px;
  border: 2px solid rgba(23, 19, 12, 0.35); border-top-color: var(--accent-ink);
  border-radius: 50%; animation: lm-spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes lm-spin { to { transform: rotate(360deg); } }

/* ============================================================================
   RECIPE CARD — the focal instrument. The strongest hierarchy on the page: a lifted
   content plane, an engraved title, step groups as calm bands. The breadcrumb
   provenance recedes; the control leaf + its value are the ink that matters.
   ============================================================================ */
.empty-state {
  color: var(--text-2);
  padding: 0;
  border: 1px dashed var(--line-2); border-radius: 8px;
  background: var(--panel);
  min-height: 460px;
  display: flex; align-items: center; justify-content: center;
}
/* empty state teaches the flow — a titled, stepped invitation, not "nothing here" */
.empty-inner { max-width: 380px; text-align: center; padding: 40px 32px; }
.empty-mark {
  width: 34px; height: 34px; margin: 0 auto 20px;
  border: 1.5px solid var(--line-strong); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 17px; line-height: 1;
}
.empty-title {
  font-family: var(--display); font-size: 15px; font-weight: 600; color: var(--text);
  letter-spacing: 0.005em; margin-bottom: 8px;
}
.empty-lead { font-size: 12.5px; color: var(--text-3); line-height: 1.6; margin-bottom: 22px; }
.empty-steps { display: flex; flex-direction: column; gap: 10px; text-align: left; }
.empty-step {
  display: flex; align-items: flex-start; gap: 11px;
  font-size: 12px; color: var(--text-2); line-height: 1.45;
}
.empty-step-n {
  flex: 0 0 auto; width: 19px; height: 19px; border-radius: 50%;
  border: 1px solid var(--line-2); background: var(--ctl);
  color: var(--text-3); font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  font-variant-numeric: tabular-nums;
}
.recipe-card {
  background: var(--panel); border: 1px solid var(--line-2); border-radius: 8px;
  padding: 20px 24px 16px; margin-bottom: 14px;
}
/* correction cards sit visually beneath the recipe — a step down in the hierarchy */
.correction-card { background: var(--panel-2); border-color: var(--line); }
.recipe-card-header {
  display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 6px;
}
.recipe-card-title {
  font-family: var(--display); font-weight: 600; font-size: 17px; letter-spacing: 0.004em;
  color: var(--text);
  display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  flex: 1 1 auto; min-width: 0;
}
.recipe-card-baseline {
  color: var(--text-2); font-size: 11px; background: var(--ctl-solid);
  border: 1px solid var(--line-2); border-radius: 4px; padding: 3px 9px;
  align-self: center; flex: 0 0 auto; letter-spacing: 0.01em;
  font-variant-numeric: tabular-nums;
}
.recipe-card-actions { margin-left: auto; display: flex; gap: 6px; align-self: center; }
/* the recipe header gets a hairline rule; correction header a lighter one */
.recipe-card > .recipe-card-header { padding-bottom: 16px; border-bottom: 1px solid var(--line-2); margin-bottom: 4px; }
.correction-card .recipe-card-header {
  border-bottom: 1px solid var(--line); padding-bottom: 13px; margin-bottom: 2px;
}
.score-inline {
  color: var(--text-3); font-weight: 400; font-size: 11px;
  margin-left: auto; padding-left: 12px; white-space: nowrap;
  display: inline-flex; align-items: baseline; gap: 6px;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.score-num {
  font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-weight: 600; font-size: 22px; color: var(--text); letter-spacing: -0.01em;
}
/* step group = a calm band; the header names the step, a hairline finishes the line */
.step-group { margin: 0; padding: 22px 0 0; }
.step-group:first-of-type { padding-top: 12px; }
.step-group:last-of-type { padding-bottom: 6px; }
.step-header {
  display: flex; align-items: center; gap: 12px;
  color: var(--text-3); margin-bottom: 2px;
}
.step-header::after { content: ""; flex: 1 1 auto; height: 1px; background: var(--line); }
.rationale-foldout {
  margin-top: 18px; padding-top: 15px; border-top: 1px solid var(--line-2);
  font-size: 12.5px; color: var(--text-2);
}
.rationale-foldout summary {
  cursor: pointer; color: var(--text-3); font-size: 12px;
  list-style: none; display: inline-flex; align-items: center; gap: 6px; width: fit-content;
}
.rationale-foldout summary::-webkit-details-marker { display: none; }
.rationale-foldout summary::before { content: "\203A"; font-size: 13px; display: inline-block; transition: transform 0.16s ease-out; }
.rationale-foldout[open] summary::before { transform: rotate(90deg); }
.rationale-foldout summary:hover { color: var(--text-2); }
/* rationale body: an indented quiet block — full construction, NO left-stripe */
.rationale-foldout p {
  margin: 11px 0 2px; padding: 12px 14px; background: var(--ctl);
  border: 1px solid var(--line); border-radius: 6px;
  max-width: 72ch; line-height: 1.6; color: var(--text-2);
}
.hdri-mood, .gi-notes { font-size: 12px; color: var(--text-3); margin-top: 9px; max-width: 72ch; line-height: 1.6; }
.status-reason { font-size: 12.5px; color: var(--text-2); margin-top: 12px; max-width: 72ch; line-height: 1.6; }

/* ============================================================================
   VALUE ROWS — provenance above, value below. The value is the jewel (13px mono
   against an 11.5px breadcrumb); the why is a quiet footnote. Copy affordance stays
   invisible until the row is hovered.
   ============================================================================ */
.value-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 8px 11px; margin: 0 -8px;
  border-top: 1px solid var(--line);
  border-radius: 6px;
}
.step-group .value-row:first-of-type, .correction-card .value-row:first-of-type { border-top-color: transparent; }
.value-row:hover { background: var(--ctl); }
.value-row-main { flex: 1 1 auto; min-width: 0; }
.value-row-label { font-size: 11.5px; color: var(--text-3); line-height: 1.55; }
.path-sep { color: var(--text-3); opacity: 0.5; padding: 0 1px; }
.path-leaf { color: var(--text); font-weight: 600; font-size: 12.5px; }
.value-row-value {
  font-size: 13px; margin-top: 5px;
  font-family: var(--mono); font-variant-numeric: tabular-nums;
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.value-text { color: var(--text); font-weight: 600; letter-spacing: -0.005em; }
.value-unit { color: var(--text-3); font-weight: 400; font-size: 11px; padding-left: 2px; }
/* placement rows are instructions, not measurements — sans, italic, softer */
.value-row-placement .value-row-value { font-family: var(--sans); }
.value-row-placement .value-text { font-weight: 450; font-style: italic; color: #d7dbe0; line-height: 1.5; }
.from-text { color: var(--text-3); font-family: var(--sans); font-size: 11px; font-weight: 400; }
.value-row-why { color: var(--text-3); font-size: 11px; margin-top: 5px; max-width: 64ch; line-height: 1.5; }
/* confidence dot — reads as a status cue, not decoration; muted so it never shouts */
.conf-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-top: 7px; flex-shrink: 0; }
.conf-high { background: var(--ok); }
.conf-medium { background: var(--warn); }
.conf-low { background: var(--err); }
/* clamped flag — a small mono badge, warn-toned, full border, tabular */
.clamped-flag {
  color: var(--warn); font-size: 9px; font-family: var(--mono); font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.07em;
  border: 1px solid var(--warn-line); background: var(--warn-bg); border-radius: 4px;
  padding: 2px 6px; align-self: center; line-height: 1;
}
.applied-toggle {
  font-size: 10.5px; color: var(--text-3); display: flex; align-items: center;
  gap: 6px; white-space: nowrap; margin-top: 3px; cursor: pointer; user-select: none;
  border-radius: 4px; padding: 2px 2px;
}
.applied-toggle:hover { color: var(--text-2); }
.applied-toggle input {
  accent-color: var(--accent); width: 13px; height: 13px; margin: 0; cursor: pointer;
}
.applied-toggle input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
/* row copy — quiet until the row is hovered, then a real ghost button with states */
.row-copy-btn {
  background: transparent; border: 1px solid transparent; border-radius: 6px;
  padding: 3px 9px; font-size: 10.5px; color: var(--text-3); font-weight: 500;
  align-self: flex-start; margin-top: 1px; opacity: 0;
}
.value-row:hover .row-copy-btn { opacity: 1; border-color: var(--line-2); color: var(--text-2); }
.row-copy-btn:hover { color: var(--text); border-color: var(--line-strong); background: var(--ctl-solid); }
.row-copy-btn:focus-visible { opacity: 1; outline-offset: 2px; }
.row-copy-btn:active { transform: translateY(0.5px); }

/* ============================================================================
   SESSION STRIP — the filmstrip ledger. Each attempt's score is its headline number;
   the reference stays anchored by a brighter frame.
   ============================================================================ */
#sessionstrip { margin-top: 32px; border-top: 1px solid var(--line-2); padding-top: 20px; }
#sessionstrip:empty { display: none; }
.session-strip { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; }
.strip-thumb { flex: 0 0 auto; width: 142px; text-align: center; }
.strip-thumb img {
  width: 142px; height: 94px; object-fit: cover; display: block;
  border-radius: 6px; border: 1px solid var(--line-2); background: var(--panel);
}
.strip-ref img { border-color: var(--line-strong); box-shadow: inset 0 0 0 1px var(--line); }
.strip-ref .strip-caption { color: var(--text-2); font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; font-size: 10px; }
.strip-thumb .slot-empty {
  width: 142px; height: 94px; display: flex; align-items: center; justify-content: center;
  border: 1px dashed var(--line-2); border-radius: 6px; box-sizing: border-box;
}
.strip-caption {
  font-size: 10px; color: var(--text-3); margin-top: 8px; line-height: 1.5;
  font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
}
.strip-score { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); padding-left: 2px; letter-spacing: -0.01em; }
.trend { font-size: 9px; padding-left: 1px; }
.trend-up { color: var(--ok); }
.trend-down { color: var(--err); }
.trend-flat { color: var(--text-3); }
.strip-caveat { font-size: 11px; color: var(--text-3); margin-top: 12px; font-style: italic; }

/* ============================================================================
   TOASTS — the only true floats, so the only place a shadow is earned.
   ============================================================================ */
#toasts { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: var(--z-toast); }
.toast {
  background: var(--raised); border: 1px solid var(--line-2); border-radius: 8px;
  padding: 10px 16px; font-size: 12px; color: var(--text);
  box-shadow: 0 14px 34px rgba(4, 5, 7, 0.6), 0 2px 6px rgba(4, 5, 7, 0.4);
  animation: lm-toast-in 0.18s ease-out;
}
@keyframes lm-toast-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ============================================================================
   RESPONSIVE — a half-of-a-monitor column. Structural collapse (rail unsticks and
   stacks above the recipe; the three named slots compress into a row). Type stays
   fixed — a lighting artist reads at a consistent DPI.
   ============================================================================ */
@media (max-width: 940px) {
  #main { flex-direction: column; gap: 20px; }
  #leftrail { flex: 1 1 auto; width: 100%; position: static; top: auto; }
  .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .slot-attempt { grid-column: 1 / -1; }
  #app { padding: 18px 18px 48px; }
  .recipe-card { padding: 18px 18px 14px; }
}
@media (max-width: 560px) {
  .slots { grid-template-columns: 1fr; }
  .topbar-inner { gap: 10px; }
  .key-area { margin-left: 0; width: 100%; }
  .key-field { flex: 1 1 auto; width: auto; }
}

@media (prefers-reduced-motion: reduce) {
  * { scroll-behavior: auto; }
  button, .chip, .slot, input, select, summary, .applied-toggle, .row-copy-btn, .toggle-btn { transition: none; }
  .btn-primary:active:not(:disabled), .btn-secondary:active:not(:disabled),
  .btn-small:active, .chip:active, .slot:active, .toggle-btn:active, .row-copy-btn:active { transform: none; }
  .raw-details summary::before, .rationale-foldout summary::before { transition: none; }
  .spinner { animation-duration: 1.6s; }
  .toast { animation: none; }
}

      { id: "ies.override_shape", ui_path: "VRayIES ▸ IES override ▸ Override shape", group: "VRayIES · IES override",
        kind: "checkbox", unit: "", range: [0, 0], default: "off", lighting: false, verified: "2026-07-03",
        notes: "Overrides the light's physical shape (adds inactive Shape/Height/Width/Length/Diameter fields). off = default (use the IES-defined shape). Shape-override detail — display-only." },

      // -- VRayLuminaire -------------------------------------------------------------
      { id: "lum.enabled", ui_path: "VRayLuminaire ▸ General ▸ Enabled", group: "VRayLuminaire · General",
        kind: "checkbox", unit: "", range: [0, 0], default: "on", lighting: true, verified: "2026-07-03",
        notes: "Master on/off for the luminaire (packaged fixture). on = default." },
      { id: "lum.file", ui_path: "VRayLuminaire ▸ General ▸ Luminaire file", group: "VRayLuminaire · General",
        kind: "slot", unit: "", range: [0, 0], default: "none", lighting: true, verified: "2026-07-03",
        notes: "The luminaire definition file. none = unset. Value = file or fixture description." },
      { id: "lum.scale", ui_path: "VRayLuminaire ▸ General ▸ Scale", group: "VRayLuminaire · General",
        kind: "spinner", unit: "x", range: [0, 1000], default: 1.0, lighting: true, verified: "2026-07-03",
        notes: "Geometric scale of the luminaire. 1.0 = default. Larger physical fixture." },
      { id: "lum.intensity", ui_path: "VRayLuminaire ▸ Intensity and color ▸ Intensity", group: "VRayLuminaire · Intensity and color",
        kind: "spinner", unit: "x", range: [0, 1000], default: 1.0, lighting: true, verified: "2026-07-03",
        notes: "Brightness multiplier of the luminaire. 1.0 = default. Raise/lower to match fixture output." },
      { id: "lum.color_mode", ui_path: "VRayLuminaire ▸ Intensity and color ▸ Color mode", group: "VRayLuminaire · Intensity and color",
        kind: "dropdown", unit: "", range: [0, 0], default: "Color", lighting: true, verified: "2026-07-03",
        notes: "Options: Color | Temperature. Color = default; Temperature enables the Kelvin field." },
      { id: "lum.color", ui_path: "VRayLuminaire ▸ Intensity and color ▸ Color", group: "VRayLuminaire · Intensity and color",
        kind: "color", unit: "", range: [0, 0], default: "white", lighting: true, verified: "2026-07-03",
        notes: "Luminaire color (active when Color mode = Color). white = neutral. Emit as a color instruction." },
      { id: "lum.color_temp", ui_path: "VRayLuminaire ▸ Intensity and color ▸ Color temperature", group: "VRayLuminaire · Intensity and color",
        kind: "spinner", unit: "K", range: [1000, 20000], default: 6500.0, lighting: true, verified: "2026-07-03",
        notes: "Kelvin color; active only when Color mode = Temperature. 6500 K = neutral daylight (inactive at default)." },
      { id: "lum.affect_diffuse", ui_path: "VRayLuminaire ▸ Options ▸ Affect diffuse", group: "VRayLuminaire · Options",
        kind: "spinner", unit: "", range: [0, 1], default: 1.0, lighting: true, verified: "2026-07-03",
        notes: "Diffuse contribution amount of the luminaire. 1.0 = default (full)." },
      { id: "lum.affect_specular", ui_path: "VRayLuminaire ▸ Options ▸ Affect specular", group: "VRayLuminaire · Options",
        kind: "spinner", unit: "", range: [0, 1], default: 1.0, lighting: true, verified: "2026-07-03",
        notes: "Specular contribution amount of the luminaire. 1.0 = default (full)." },
      { id: "lum.affect_atmos", ui_path: "VRayLuminaire ▸ Options ▸ Affect atmosph.", group: "VRayLuminaire · Options",
        kind: "spinner", unit: "", range: [0, 1], default: 1.0, lighting: true, verified: "2026-07-03",
        notes: "Atmospheric contribution amount of the luminaire. 1.0 = default (full)." },
      { id: "lum.cast_shadows", ui_path: "VRayLuminaire ▸ Options ▸ Cast shadows", group: "VRayLuminaire · Options",
        kind: "checkbox", unit: "", range: [0, 0], default: "on", lighting: true, verified: "2026-07-03",
        notes: "Whether the luminaire casts shadows. on = default." },
      { id: "lum.filtering", ui_path: "VRayLuminaire ▸ Sampling ▸ Filtering", group: "VRayLuminaire · Sampling",
        kind: "checkbox", unit: "", range: [0, 0], default: "on", lighting: false, verified: "2026-07-03",
        notes: "Enables sampling filtering (paired with a 3.0 amount spinner). on = default. Sampling detail — display-only." },
      { id: "lum.shadow_bias", ui_path: "VRayLuminaire ▸ Sampling ▸ Shadow bias", group: "VRayLuminaire · Sampling",
        kind: "spinner", unit: "", range: [0, 100], default: 0.02, lighting: false, verified: "2026-07-03",
        notes: "Offsets shadows to avoid self-shadowing. Sampling detail — display-only." },

      // -- VRayAmbientLight ----------------------------------------------------------
      { id: "amb.enabled", ui_path: "VRayAmbientLight ▸ Enabled", group: "VRayAmbientLight",
        kind: "checkbox", unit: "", range: [0, 0], default: "on", lighting: true, verified: "2026-07-03",
        notes: "Master on/off for the ambient light (adds a flat ambient term). on = default." },
      { id: "amb.mode", ui_path: "VRayAmbientLight ▸ Mode", group: "VRayAmbientLight",
        kind: "dropdown", unit: "", range: [0, 0], default: "Direct + GI", lighting: true, verified: "2026-07-03",
        notes: "Options: Direct + GI | Direct only | GI only — where the ambient term applies. Direct + GI = default." },
      { id: "amb.gi_min_distance", ui_path: "VRayAmbientLight ▸ GI min distance", group: "VRayAmbientLight",
        kind: "spinner", unit: "units", range: [0, 100000], default: 0.0, lighting: true, verified: "2026-07-03",
        notes: "Minimum distance used for the GI-based ambient term. 0 = default." },
      { id: "amb.color", ui_path: "VRayAmbientLight ▸ Color", group: "VRayAmbientLight",
        kind: "color", unit: "", range: [0, 0], default: "black", lighting: true, verified: "2026-07-03",
        notes: "Ambient light color. black = default (no ambient lift). Set a low grey to lift crushed shadows uniformly. Emit as a color instruction." },
      { id: "amb.intensity", ui_path: "VRayAmbientLight ▸ Intensity", group: "VRayAmbientLight",
        kind: "spinner", unit: "x", range: [0, 100], default: 1.0, lighting: true, verified: "2026-07-03",
        notes: "Ambient intensity multiplier (only meaningful once Color is above black). 1.0 = default." },
      { id: "amb.light_map", ui_path: "VRayAmbientLight ▸ Light map", group: "VRayAmbientLight",
        kind: "checkbox", unit: "", range: [0, 0], default: "on", lighting: true, verified: "2026-07-03",
        notes: "Enables a light-map contribution (paired with a 100.0 amount spinner). on = default. Folded amount default 100.0." },
      { id: "amb.compensate_exposure", ui_path: "VRayAmbientLight ▸ Compensate exposure", group: "VRayAmbientLight",
        kind: "checkbox", unit: "", range: [0, 0], default: "off", lighting: true, verified: "2026-07-03",
        notes: "Compensates the ambient term for camera exposure. off = default." },

      // ============================================================================
      // KEEP-LIST: previously-verified controls NOT present in the 2026-07-03 captures
      // (environment/dome, camera, color mapping, VFB, GI, fog, aerial, procedural clouds
      // as the fill/atmosphere workflow). Retained with group + lighting added.
      // ============================================================================

      // -- Render Setup · Environment (GI skylight) ----------------------------------
      { id: "env.gi_skylight_on", ui_path: "Render Setup ▸ V-Ray tab ▸ Environment rollout ▸ GI Environment (Skylight) ▸ On",
        group: "Render Setup · Environment", kind: "dropdown", unit: "", range: [0, 0], default: "off", lighting: true, verified: "2026-07-02",
        notes: "Options: on | off. Enables the GI environment (skylight) override; while off, the 3ds Max Environment dialog drives GI (docs)." },
      { id: "env.gi_skylight_mult", ui_path: "Render Setup ▸ V-Ray tab ▸ Environment rollout ▸ GI Environment (Skylight) ▸ Multiplier",
        group: "Render Setup · Environment", kind: "spinner", unit: "x", range: [0, 20], default: 1.0, lighting: true, verified: "2026-07-02",
        notes: "Practical range; UI spinner accepts far higher. Multiplies the override Color only — it does NOT affect an assigned environment texture (docs: use an Output map for texture brightness)." },

      // -- VRayLight (Dome) · General / Options (HDRI environment lighting) -----------
      { id: "dome.texture_slot", ui_path: "VRayLight (Dome) ▸ Modify panel ▸ General rollout ▸ Map (texture slot)",
        group: "VRayLight (Dome) · General", kind: "slot", unit: "", range: [0, 0], default: "none", lighting: true, verified: "2026-07-02",
        notes: "Load the HDRI via a VRayBitmap map in this slot; a texture overrides the light's Color/Temperature (docs). Value = HDRI file or mood description, not a number." },
      { id: "dome.intensity", ui_path: "VRayLight (Dome) ▸ Modify panel ▸ General rollout ▸ Multiplier",
        group: "VRayLight (Dome) · General", kind: "spinner", unit: "x", range: [0, 100], default: 1.0, lighting: true, verified: false,
        notes: "Practical range; UI accepts higher. With Units = Default (image) the multiplier scales the HDRI brightness directly. Factory creation value not stated in current Chaos docs (1.0 assumed)." },
      { id: "dome.rotation_h", ui_path: "Dome HDRI: VRayBitmap ▸ Mapping ▸ Horiz. rotation",
        group: "VRayLight (Dome) · General", kind: "spinner", unit: "deg", range: [0, 360], default: 0, lighting: true, verified: "2026-07-02",
        notes: "Rotates the environment map left/right; ignored when Mapping type = 3ds Max standard (docs). Alternative: rotate the Dome light icon with Dome Light rollout ▸ Lock texture to icon enabled." },
      { id: "dome.invisible", ui_path: "VRayLight (Dome) ▸ Modify panel ▸ Options rollout ▸ Invisible",
        group: "VRayLight (Dome) · Options", kind: "dropdown", unit: "", range: [0, 0], default: "off", lighting: true, verified: "2026-07-02",
        notes: "Options: on | off. Hides the dome from camera/refraction rays only; it still lights the scene and is still seen by GI rays (docs)." },
      { id: "dome.temperature", ui_path: "VRayLight (Dome) ▸ Modify panel ▸ General rollout ▸ Temperature (Mode = Temperature)",
        group: "VRayLight (Dome) · General", kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, lighting: true, verified: false,
        notes: "Tints an UNtextured dome; any Map in the texture slot overrides color (docs). Kelvin field active only when Mode = Temperature. Factory value not stated in current Chaos docs (6500 assumed)." },

      // -- VRayLight (fills) · workflow — the existing verified fill-placement levers --
      { id: "fill.plane_intensity", ui_path: "VRayLight (Plane) ▸ Modify panel ▸ General rollout ▸ Multiplier",
        group: "VRayLight (fills) · workflow", kind: "spinner", unit: "x", range: [0, 500], default: 30, lighting: true, verified: "2026-07-03",
        notes: "Fill-workflow lever for the plane light's Multiplier (same control as light.multiplier). With Units = Default (image) the intensity also depends on the light's SIZE (docs). Default 30.0 confirmed from the UI capture. Practical range; UI accepts higher." },
      { id: "fill.plane_kelvin", ui_path: "VRayLight (Plane) ▸ Modify panel ▸ General rollout ▸ Temperature (Mode = Temperature)",
        group: "VRayLight (fills) · workflow", kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, lighting: true, verified: "2026-07-03",
        notes: "Fill-workflow lever for the plane light's Temperature (same control as light.temperature). Kelvin field active only when Mode = Temperature (docs). 6500 K = neutral daylight." },
      { id: "fill.sphere_intensity", ui_path: "VRayLight (Sphere) ▸ Modify panel ▸ General rollout ▸ Multiplier",
        group: "VRayLight (fills) · workflow", kind: "spinner", unit: "x", range: [0, 500], default: 30, lighting: true, verified: false,
        notes: "Sphere size affects intensity with Default (image) / Luminance / Radiance units (docs). Practical range; UI accepts higher. Factory creation value not stated in current Chaos docs (30 assumed)." },
      { id: "fill.key_fill_guidance", ui_path: "Create menu ▸ Lights ▸ V-Ray ▸ V-Ray Plane/Sphere Light ▸ click and drag in a viewport",
        group: "VRayLight (fills) · workflow", kind: "placement", unit: ":1", range: [1, 10], default: 4, lighting: true, verified: "2026-07-02",
        notes: "Guidance entry: emit fill placement (position/aim relative to the key light) plus a key:fill intensity ratio — e.g. 4:1 reads moody, 2:1 reads soft. Rendered as an instruction row, not a spinner." },

      // -- VRayPhysicalCamera · Aperture / Color & Exposure --------------------------
      { id: "cam.iso", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Aperture ▸ Film speed (ISO)",
        group: "VRayPhysicalCamera · Aperture", kind: "spinner", unit: "ISO", range: [25, 6400], default: 100, lighting: true, verified: false,
        notes: "Higher = brighter (docs: a V-Ray Sun day scene looks best around 100 ISO). Affects brightness when Exposure = Physical Exposure. Practical range. Factory default not stated in current Chaos docs (100 assumed)." },
      { id: "cam.fnumber", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Aperture ▸ F-Number",
        group: "VRayPhysicalCamera · Aperture", kind: "spinner", unit: "f/", range: [0.7, 64], default: 8.0, lighting: true, verified: false,
        notes: "Lower = brighter + more DOF (docs). Affects brightness only when Exposure = Physical Exposure. Practical range. Factory default not stated in current Chaos docs (8.0 assumed)." },
      { id: "cam.shutter", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Aperture ▸ Shutter speed (s^-1)",
        group: "VRayPhysicalCamera · Aperture", kind: "spinner", unit: "s^-1", range: [1, 2000], default: 200, lighting: true, verified: false,
        notes: "Inverse seconds: 30 means 1/30 s (docs); LOWER value = brighter image. Practical range. Factory default not stated in current Chaos docs (200 assumed)." },
      { id: "cam.wb_kelvin", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Color & Exposure ▸ Temperature (K) (White balance = Temperature)",
        group: "VRayPhysicalCamera · Color & Exposure", kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, lighting: true, verified: false,
        notes: "Kelvin field applies only when the White balance dropdown = Temperature (docs); presets such as Daylight also exist. Factory value not stated in current Chaos docs (6500 assumed)." },
      { id: "cam.ev_readout", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Color & Exposure ▸ Exposure value",
        group: "VRayPhysicalCamera · Color & Exposure", kind: "spinner", unit: "EV", range: [-6, 26], default: 14, lighting: true, verified: "2026-07-02",
        notes: "derived: with Exposure = Physical Exposure this field is a greyed-out readout computed from ISO/F-Number/Shutter (docs); it is editable only when Exposure = Exposure Value (EV). Default shown is the approximate factory readout." },

      // -- Render Setup · Color mapping / V-Ray Frame Buffer -------------------------
      { id: "cm.type", ui_path: "Render Setup ▸ V-Ray tab ▸ Color mapping rollout ▸ Type",
        group: "Render Setup · Color mapping", kind: "dropdown", unit: "", range: [0, 0], default: "Reinhard", lighting: true, verified: "2026-07-02",
        notes: "Options: Linear multiply | Exponential | HSV exponential | Intensity exponential | Gamma correction (deprecated) | Intensity gamma (deprecated) | Reinhard. Factory default is Reinhard with Burn value 1.0 = linear result (docs)." },
      { id: "cm.highlight_burn", ui_path: "Render Setup ▸ V-Ray tab ▸ Color mapping rollout ▸ Burn value (Type = Reinhard)",
        group: "Render Setup · Color mapping", kind: "spinner", unit: "", range: [0, 1], default: 1.0, lighting: true, verified: "2026-07-02",
        notes: "Doc-stated range and default: 1.0 = Linear multiply, 0.0 = Exponential, in-between blends the two (docs). Lower it to tame blown highlights at the render level." },
      { id: "cm.contrast", ui_path: "V-Ray Frame Buffer ▸ Layers panel ▸ Exposure layer ▸ Contrast",
        group: "V-Ray Frame Buffer · Exposure layer", kind: "spinner", unit: "", range: [-1, 1], default: 0, lighting: true, verified: "2026-07-02",
        notes: "0 = no change; positive pushes colors away from mid grey, negative toward it (docs). Practical range; slider bounds not stated in docs. Display-side: keep identical across attempts. Layer is not in the VFB's default stack — add it via V-Ray Frame Buffer ▸ Layers panel ▸ + (Add layer) if not present (docs)." },
      { id: "cm.saturation", ui_path: "V-Ray Frame Buffer ▸ Layers panel ▸ Hue/Saturation layer ▸ Saturation",
        group: "V-Ray Frame Buffer · Hue/Saturation layer", kind: "spinner", unit: "", range: [-100, 100], default: 0, lighting: true, verified: "2026-07-02",
        notes: "Lower moves toward greyscale, higher intensifies colors (docs); 0 = no change. Display-side: keep identical across attempts. Layer is not in the VFB's default stack — add it via V-Ray Frame Buffer ▸ Layers panel ▸ + (Add layer) if not present (docs). Range pending in-product confirmation — Chaos docs don't print slider bounds; if the VFB Hue/Saturation slider is actually -1..1, this is a 100x scale mismatch (pending an in-product check)." },
      { id: "vfb.exposure", ui_path: "V-Ray Frame Buffer ▸ Layers panel ▸ Exposure layer ▸ Exposure",
        group: "V-Ray Frame Buffer · Exposure layer", kind: "spinner", unit: "stops", range: [-5, 5], default: 0, lighting: true, verified: "2026-07-02",
        notes: "Doc-stated default 0.0 = original brightness; +1.0 doubles, -1.0 halves (docs). Practical range; slider bounds not stated in docs. Display-side only — keep identical across attempts. Layer is not in the VFB's default stack — add it via V-Ray Frame Buffer ▸ Layers panel ▸ + (Add layer) if not present (docs)." },
      { id: "vfb.wb_kelvin", ui_path: "V-Ray Frame Buffer ▸ Layers panel ▸ White Balance layer ▸ Temperature",
        group: "V-Ray Frame Buffer · White Balance layer", kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, lighting: true, verified: "2026-07-02",
        notes: "Lower = bluer, higher = more amber (docs). 6500 K = layer-neutral (no correction; derived, not doc-stated). Pairs with the Magenta - Green tint slider in the same layer. Practical range. Layer is not in the VFB's default stack — add it via V-Ray Frame Buffer ▸ Layers panel ▸ + (Add layer) if not present (docs)." },

      // -- Render Setup · GI ---------------------------------------------------------
      { id: "gi.primary", ui_path: "Render Setup ▸ GI tab ▸ Global illumination rollout ▸ Primary engine",
        group: "Render Setup · GI", kind: "dropdown", unit: "", range: [0, 0], default: "Brute force", lighting: false, verified: "2026-07-02",
        notes: "Options: Irradiance map (deprecated, slated for removal) | Brute force | Light cache. Factory default: Brute force (docs, Universal V-Ray Settings). Notes-only: engine choice changes noise/speed character, not the lighting targets." },
      { id: "gi.secondary", ui_path: "Render Setup ▸ GI tab ▸ Global illumination rollout ▸ Secondary engine",
        group: "Render Setup · GI", kind: "dropdown", unit: "", range: [0, 0], default: "Light cache", lighting: false, verified: "2026-07-02",
        notes: "Options: None | Brute force | Light cache. Factory default: Light cache (docs). Brute force defaults to 3 bounces, Light cache works with ~100 (docs); None removes indirect color bleeding." },

      // -- VRayEnvironmentFog (volumetric fog) ---------------------------------------
      { id: "fog.enabled", ui_path: "Rendering menu ▸ Environment ▸ Add ▸ VRayEnvironmentFog",
        group: "VRayEnvironmentFog", kind: "dropdown", unit: "", range: [0, 0], default: "off", lighting: true, verified: "2026-07-03",
        notes: "Options: on | off. on = the VRayEnvironmentFog atmospheric effect is added via the docs' Add path; off = effect absent (neutral — no fog). Without gizmos it fills the scene below Fog height (docs). Docs recommend turning on Optimized atmospherics evaluation (Render Setup ▸ System rollout) with it." },
      { id: "fog.color", ui_path: "VRayEnvironmentFog ▸ General parameters ▸ Fog color",
        group: "VRayEnvironmentFog", kind: "color", unit: "", range: [0, 0], default: "white (untinted)", lighting: true, verified: "2026-07-03",
        notes: "Color swatch (texture-mappable): how the fog reacts to light — it does NOT change the volume transparency (docs). white = untinted scattering (derived neutral; factory value not printed). Emit as an instruction, e.g. 'pale warm grey for dusty evening air'." },
      { id: "fog.distance", ui_path: "VRayEnvironmentFog ▸ General parameters ▸ Fog distance",
        group: "VRayEnvironmentFog", kind: "spinner", unit: "units", range: [0.1, 10000], default: 50, lighting: true, verified: false,
        notes: "THE density control: larger = more transparent fog, smaller = denser (docs). Value in 3ds Max scene units (no fixed unit stated in docs); practical range. Factory creation value not printed in current Chaos docs (50 assumed — the docs' Fog height example pairs distance 50 with height 10)." },
      { id: "fog.height", ui_path: "VRayEnvironmentFog ▸ General parameters ▸ Fog height",
        group: "VRayEnvironmentFog", kind: "spinner", unit: "units", range: [0, 10000], default: 10, lighting: true, verified: false,
        notes: "Z-level the fog starts at, continuing downward indefinitely; IGNORED when gizmos are listed in the Nodes section (docs). Raising it darkens the scene (more fog blocks the sun) — compensate by raising Fog distance (docs). Factory value not printed (10 assumed, doc example)." },
      { id: "fog.phase", ui_path: "VRayEnvironmentFog ▸ General parameters ▸ Fog phase function",
        group: "VRayEnvironmentFog", kind: "spinner", unit: "", range: [-0.9, 0.9], default: 0.0, lighting: true, verified: "2026-07-03",
        notes: "Doc-stated default 0.0 = uniform scattering; positive = forward scatter (glow around backlights), negative = backward (docs). Docs warn values very close to +/-1.0 produce very directional scattering — practical range stops at 0.9." },
      { id: "fog.scatter_gi", ui_path: "VRayEnvironmentFog ▸ General parameters ▸ Scatter GI",
        group: "VRayEnvironmentFog", kind: "dropdown", unit: "", range: [0, 0], default: "off", lighting: true, verified: false,
        notes: "Options: on | off. When on, the fog scatters global illumination using the current GI engine — can be quite slow; docs suggest a simple Fog emission term as the substitute. Factory state not printed in current Chaos docs (off assumed). Folded sub-params (docs): Scatter bounces (active only while on; the dense-smoke example uses 100) and the Fog emission color swatch (fog self-illumination, the cheap GI substitute)." },

      // -- VRayAerialPerspective (distance haze) -------------------------------------
      { id: "aerial.enabled", ui_path: "Rendering menu ▸ Environment ▸ Add ▸ VRayAerialPerspective",
        group: "VRayAerialPerspective", kind: "dropdown", unit: "", range: [0, 0], default: "off", lighting: true, verified: "2026-07-03",
        notes: "Options: on | off. Distance-haze approximation that works together with VRaySun + VRaySky; renders faster than VRayEnvironmentFog but produces no volumetric shadows (docs). off = effect absent (neutral). The sun's Affect atmospherics option has NO effect on it (docs, VRaySun page). Folded sub-toggle: Affect environment rays (doc default OFF — the VRaySky already accounts for scattered sunlight; enable only for artistic low-visibility looks, docs)." },
      { id: "aerial.visibility_range", ui_path: "VRayAerialPerspective ▸ Parameters ▸ Visibility range (in meters)",
        group: "VRayAerialPerspective", kind: "spinner", unit: "m", range: [10, 100000], default: 10000, lighting: true, verified: false,
        notes: "Distance at which the haze has absorbed 90% of the light from objects behind it; lower = denser (docs). ALWAYS meters — converted internally from the current 3ds Max units (docs). Factory default not printed (10000 assumed; the docs' small demo scene uses 30-540 m)." },
      { id: "aerial.atmosphere_height", ui_path: "VRayAerialPerspective ▸ Parameters ▸ Atmosphere height (in meters)",
        group: "VRayAerialPerspective", kind: "spinner", unit: "m", range: [10, 100000], default: 10000, lighting: true, verified: false,
        notes: "Height of the atmosphere layer in meters, converted internally from the scene units; lower values exaggerate the effect artistically and interact with scene scale (docs). Factory default not printed (10000 assumed). Practical range." },
      { id: "aerial.inscatter", ui_path: "VRayAerialPerspective ▸ Parameters ▸ Inscattered light intensity",
        group: "VRayAerialPerspective", kind: "spinner", unit: "x", range: [0, 5], default: 1.0, lighting: true, verified: "2026-07-03",
        notes: "Doc-stated default 1.0 = physically accurate amount of sunlight scattered into the haze; lower/higher only for artistic purposes (docs). Practical range; spinner bounds not stated in docs." },
      { id: "aerial.filter_color", ui_path: "VRayAerialPerspective ▸ Parameters ▸ Filter color",
        group: "VRayAerialPerspective", kind: "color", unit: "", range: [0, 0], default: "white (no tint)", lighting: true, verified: "2026-07-03",
        notes: "Color swatch tinting the inscattered light (docs; their example shifts the hue of a red filter). white = untinted (derived neutral). Emit as an instruction, e.g. 'pale warm filter for golden-hour haze'." },
      { id: "aerial.affect_background", ui_path: "VRayAerialPerspective ▸ Parameters ▸ Affect background",
        group: "VRayAerialPerspective", kind: "dropdown", unit: "", range: [0, 0], default: "on", lighting: true, verified: "2026-07-03",
        notes: "Options: on | off. Doc-stated default ON — the haze also covers camera rays that hit a background other than VRaySky; disabling gives cut-out looks (docs)." }
    ]
  },

  vantage33: {
    label: "Chaos Vantage 3.3",
    entries: [
      // ============================================================================
      // GROUND-TRUTH 1:1 MIRROR of the Chaos Vantage 3.3 UI (docs/ui-capture-inventory.md,
      // 2026-07-03) PLUS the previously-verified controls. `group` = tab + panel; `lighting`
      // = true when the vision model may set it, false = display-only completeness control
      // (camera resolution/type/lens/DOF blades, auto-vertical-tilt, lens distortion, clipping,
      // per-channel color-mixer swatches, seed, scatter sub-params).

      // -- Environment · Sky ---------------------------------------------------------

  targets() { return ["vray7max", "vantage33"]; },

  lookup(target, id) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return null;
    if (!pack._index) {
      pack._index = {};
      for (const e of pack.entries) pack._index[e.id] = e;
    }
    return pack._index[id] || null;
  },

  // Numeric values are clamped into the entry's range; strings and non-range kinds pass through.
  clamp(target, id, value) {
    const e = this.lookup(target, id);
    if (!e || typeof value !== "number" || !Number.isFinite(value) || !(e.range[0] < e.range[1]))
      return { value, clamped: false };
    const v = Math.min(e.range[1], Math.max(e.range[0], value));
    return { value: v, clamped: v !== value };
  },

  // Compact one-line-per-param listing for the system prompt: id, ui_path, kind, unit, range, default, notes.
  // FILTERED to lighting:true entries only — the prompt shows the model only the controls it may
  // actually set (sun/sky/clouds/fog/fills/exposure/white-balance/color/environment). The display-only
  // completeness controls (viewport wire color, sampling/shadow-bias, night-sky/moon detail, camera
  // resolution/lens/DOF blades, seed, contrail sub-params, etc.) are carried in the pack for the Phase-2
  // settings sheet but withheld here to keep prompt token cost sane now that the packs are full 1:1 mirrors.
  promptFragment(target) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return "";
    const lines = pack.entries.filter(e => e.lighting === true).map(e => {
      const unit = e.unit ? ` unit:${e.unit}` : "";
      const range = e.range[0] < e.range[1] ? ` range:[${e.range[0]},${e.range[1]}]` : "";
      return `${e.id} — ${e.ui_path} — kind:${e.kind}${unit}${range} default:${JSON.stringify(e.default)} — ${e.notes}`;
    });
    return `TARGET: ${pack.label}. Allowed parameter ids — choose ONLY from these; numeric values must stay inside the stated ranges:\n` + lines.join("\n");
  },

  // Full entry list for the Phase-2 complete-settings SHEET: EVERY control (lighting:true and
  // lighting:false alike), ordered for display and grouped by the entry's `group` string. Groups are
  // returned in the order the real UI shows them — i.e. first-seen order in the pack's entries array,
  // which is authored top-to-bottom in UI panel order. Returns [] for an unknown target.
  // Shape: [{ group, entries: [entry, ...] }, ...] — a stable, panel-ordered scaffold. The recipe still
  // renders grouped by the model's per-move `step` (1-6) via the schema; this is an independent view.
  sheet(target) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return [];
    const order = [];
    const byGroup = new Map();
    for (const e of pack.entries) {
      if (!byGroup.has(e.group)) { byGroup.set(e.group, []); order.push(e.group); }
      byGroup.get(e.group).push(e);
    }
    return order.map(g => ({ group: g, entries: byGroup.get(g) }));
  }
};

// Tool schemas, system prompts, and local (pre-network) validation for the model's
// structured output. SCHEMAS depends only on PACKS (prompt fragment + clamp/lookup
// inside validateRecipe) — never on ADAPTER, ENGINE, or the DOM.
const SCHEMAS = {
  // -- emit_recipe: the full-analysis tool. Byte-fixed by the plan (Step 4.1) — do
  // not restructure into the spec's grouped shape (environment/sun/fills[]/exposure/
  // color_mapping/step_order[]); flat values[] with a per-value `step: 1..6` is the
  // locked contract because it is far easier to validate parametrically and is
  // information-equivalent (fill placement + key:fill ratio already live as
  // kind:"placement" pack entries; step_order is redundant given the fixed order in
  // the system prompt). Extended 2026-07-03: step max 5 -> 6 (atmosphere/weather) and
  // values maxItems 24 -> 32 for the atmosphere packs — SELFTEST byte-match updated
  // in lockstep. ---------------------------------------------------------------------
  emit_recipe: {
    name: "emit_recipe", strict: true, input_schema: {
      type: "object", additionalProperties: false,
      required: ["baseline", "values", "rationale", "hdri_mood", "gi_notes", "status"],
      properties: {
        baseline: { type: "string", enum: ["factory_defaults", "settings_screenshot"] },
        hdri_mood: { type: "string", description: "One line: what HDRI to reach for" },
        values: {
          type: "array", minItems: 4, maxItems: 32, items: {
            type: "object", additionalProperties: false,
            required: ["param", "set", "from", "step", "confidence", "why"],
            properties: {
              param: { type: "string", description: "MUST be an id from the provided pack" },
              set: { type: ["number", "string"] }, from: { type: ["number", "string"] },
              step: { type: "integer", minimum: 1, maximum: 6 },
              confidence: { type: "string", enum: ["high", "medium", "low"] },
              why: { type: "string" }
            }
          }
        },
        rationale: { type: "string" }, gi_notes: { type: "string" },
        status: { type: "string", enum: ["continue", "handoff_to_grade"] },
        status_reason: { type: "string" }
      }
    }
  },

  // -- emit_correction: the refine-round tool. Same value-object shape as
  // emit_recipe.values[] (locked identically: param/step/confidence/why, integer
  // step 1..6), but the array is `moves` (minItems 1, maxItems 5 — "small trims beat
  // re-matching") and the value key is `to` (not `set`, since a correction targets an
  // already-applied baseline rather than a fresh factory/screenshot one). Adds
  // `applied_assumed: boolean` — true when the model had to assume every prior-round
  // move was applied as recommended (the UI's per-row "applied" toggle can turn
  // individual moves off; when that toggle state isn't available to the model, it
  // must declare the assumption explicitly rather than silently guessing). ---------
  emit_correction: {
    name: "emit_correction", strict: true, input_schema: {
      type: "object", additionalProperties: false,
      required: ["moves", "rationale", "status", "status_reason", "applied_assumed"],
      properties: {
        moves: {
          type: "array", minItems: 1, maxItems: 5, items: {
            type: "object", additionalProperties: false,
            required: ["param", "to", "from", "step", "confidence", "why"],
            properties: {
              param: { type: "string", description: "MUST be an id from the provided pack" },
              to: { type: ["number", "string"] }, from: { type: ["number", "string"] },
              step: { type: "integer", minimum: 1, maximum: 6 },
              confidence: { type: "string", enum: ["high", "medium", "low"] },
              why: { type: "string" }
            }
          }
        },
        rationale: { type: "string" },
        status: { type: "string", enum: ["continue", "handoff_to_grade"] },
        status_reason: { type: "string" },
        applied_assumed: { type: "boolean" }
      }
    }
  },

  // -- systemPrompt(target, mode): full persona + contract text for one gateway call.
  // mode: "recipe" (full analysis, emit_recipe) | "correction" (refine round,
  // emit_correction). Deliberately target-agnostic in its own prose — every
  // parameter specific, unit, range, or host quirk (e.g. "this sun has no kelvin
  // spinner") comes from PACKS.promptFragment(target) appended at the end, never
  // hardcoded here. That keeps this function identical in shape for every future
  // pack (adding a host is a data task, per the spec's non-goals). -----------------
  systemPrompt(target, mode) {
    const isCorrection = mode === "correction";
    const lines = [];

    lines.push("You are a lighting technical director (TD) — the same disciplined, surgical role you would play " +
      "grading a shot against a reference plate, now applied to matching a 3D render's LIGHTING to a reference " +
      "image before any color grade happens.");
    lines.push("");
    lines.push("You do not measure. Measurements are provided to you as computed evidence — deterministic canvas " +
      "photometry run on both images before this prompt was assembled. Your job is to translate that evidence into " +
      "exact parameter moves in the target application's native vocabulary. Trust your eyes for direction, the " +
      "numbers for magnitude: the images tell you WHICH way something is wrong (warmer, brighter, softer shadows), " +
      "the measurements tell you HOW FAR to push it and confirm you are not chasing a false read.");
    lines.push("");
    lines.push("Parameter discipline: choose ONLY parameter ids that appear in the pack listing below — never invent " +
      "a setting, never rename one, never describe a control the pack does not list. Every numeric value you set " +
      "must stay inside that parameter's stated range; the app will clamp and flag anything outside it, so get it " +
      "right the first time.");
    lines.push("");
    lines.push("Baseline convention: unless a settings screenshot is supplied, assume the target is at its FACTORY " +
      "DEFAULTS and declare baseline:\"factory_defaults\" — every `from` value is then that parameter's pack " +
      "default. If a settings screenshot IS supplied, read the actual on-screen values from it and use those as " +
      "`from`, declaring baseline:\"settings_screenshot\" instead of assuming defaults.");
    lines.push("");
    lines.push("Fixed step order — always move in this sequence, and tag every value's `step` field accordingly:");
    lines.push("  1. exposure/WB lock — camera or VFB exposure and white balance, decided and held first.");
    lines.push("  2. sun/key — the primary light's direction, intensity, and color.");
    lines.push("  3. dome/environment — HDRI or skylight fill, mood, and rotation.");
    lines.push("  4. fills/rim — secondary/artificial lights and their key:fill ratio.");
    lines.push("  5. color mapping — highlight burn, contrast, saturation, and any display-side correction.");
    lines.push("  6. atmosphere/weather — fog, mist, haze, clouds, and any host-specific weather effects listed in " +
      "the pack: a mood layer matched to the reference's atmospheric depth.");
    lines.push("Why this order is fixed, not a suggestion: doubling the sun's intensity and opening the camera by " +
      "+1 EV produce nearly the same pixels — it is a genuine degeneracy, not a matter of taste. Locking exposure " +
      "and WB FIRST removes that ambiguity before you touch the light itself; without a fixed order the refine " +
      "loop oscillates between \"brighten the sun\" and \"open the camera\" forever.");
    lines.push("Atmosphere (step 6) is set only after the base is dialed — and because heavy fog or haze lifts " +
      "shadows and lowers contrast, re-confirm the exposure lock (step 1) after a large atmospheric change rather " +
      "than re-chasing the light.");
    lines.push("");
    lines.push("Exactness goal: the user requires a ~99% match to the reference's lighting, not a pleasing " +
      "approximation. Be surgical, not tasteful — small, evidence-backed moves that close the measured gap beat " +
      "confident-sounding creative reinterpretation.");

    if (isCorrection) {
      lines.push("");
      lines.push("CORRECTION ROUND (refine mode): you are looking at an attempt that was rendered from a prior " +
        "recipe or correction, not a blank slate. The full move history from every previous round is provided to " +
        "you, along with which of those moves the user actually applied. Return a correction card, not a new " +
        "recipe: 3-5 moves max, each prioritized by how much of the remaining measured gap it closes. Small trims " +
        "beat re-matching from scratch.");
      lines.push("Oscillation guard: never reverse a prior move by more than half its distance from its own " +
        "`from` value — if round 2 pushed sun.kelvin from 6500 to 5000 (a move of 1500), round 3 may pull it back " +
        "toward 6500 by at most 750. If you see a metric ping-pong across rounds (it improves, then reverses, then " +
        "improves again), do not keep chasing it — name the exposure/light degeneracy to the user directly in " +
        "`status_reason` instead, so they understand why the number is not settling.");
      lines.push("Know when to stop: declare status:\"handoff_to_grade\" the moment the residual measured diff is " +
        "dominated by chromatic/tonal terms (tint, saturation, contrast curve) rather than light-transport terms " +
        "(luminance structure, where light enters the frame, shadow/highlight placement). At that point further " +
        "re-rendering will not help — the remaining 1% is a color grade, not a lighting problem, and belongs to a " +
        "grading tool, not this loop.");
    }

    lines.push("");
    lines.push(PACKS.promptFragment(target));

    return lines.join("\n");
  },

  // -- validateRecipe(obj, target, mode): local (pre-network) validation of a
  // model-returned tool call, before it ever reaches the UI. Handles BOTH shapes with
  // one function rather than two near-duplicate validators — recipe (`values[]`,
  // `set`) is the default when `mode` is omitted, `mode:"correction"` switches to
  // `moves[]`/`to`. Returns {ok, errors[], cleaned}:
  //   - unknown `param` (not in the target pack)      -> ERROR (value/move dropped from cleaned, ok:false)
  //   - non-finite numeric `set`/`to` (NaN/Infinity)   -> ERROR (never let it into cleaned; PACKS.clamp alone does
  //                                                        NOT catch this — it passes non-finite numbers through
  //                                                        unflagged by design, so this check is done HERE, first)
  //   - numeric `set`/`to` outside the pack's range    -> WARNING only: PACKS.clamp clamps it into range and the
  //                                                        cleaned value/move carries `clamped:true`; ok stays true
  //   - `step` outside the integer range 1..6          -> ERROR
  //   - string `set`/`to` (dropdown/slot/placement)    -> passed through untouched, never flagged clamped
  // `cleaned` always has the same top-level shape as `obj` (values[] or moves[]), with
  // per-item `clamped` added where applicable; items that hit an ERROR are dropped
  // from cleaned so nothing invalid can flow downstream even if a caller ignores `ok`.
  validateRecipe(obj, target, mode) {
    const isCorrection = mode === "correction";
    const arrKey = isCorrection ? "moves" : "values";
    const valKey = isCorrection ? "to" : "set";
    const errors = [];

    const cleaned = Object.assign({}, obj);
    const items = Array.isArray(obj && obj[arrKey]) ? obj[arrKey] : [];
    const cleanedItems = [];

    // Blank/partial-recipe rejection (#4a): a `{}` / `{values:[]}` / a response
    // truncated so its move array never arrived must NOT read as a successful empty
    // recipe. Reject when the value/move array is absent or empty, and when any
    // top-level field the tool schema marks `required` is missing. Because validate
    // now returns ok:false here, ADAPTER.call's one-shot re-ask handles the empty
    // case the same way it handles any other invalid emit.
    if (!Array.isArray(obj && obj[arrKey]) || obj[arrKey].length === 0) {
      errors.push(`"${arrKey}" is absent or empty — an emit must carry at least one ${isCorrection ? "move" : "value"}`);
    }
    const schema = isCorrection ? SCHEMAS.emit_correction : SCHEMAS.emit_recipe;
    const required = (schema && schema.input_schema && schema.input_schema.required) || [];
    for (const field of required) {
      if (field === arrKey) continue; // the array is checked (presence + non-empty) just above
      if (!obj || !(field in obj)) errors.push(`missing required field "${field}"`);
    }

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const where = `${arrKey}[${i}]`;
      if (!item || typeof item.param !== "string") {
        errors.push(`${where}: missing or non-string "param"`);
        continue;
      }
      const entry = PACKS.lookup(target, item.param);
      if (!entry) {
        errors.push(`${where}: unknown param "${item.param}" — not in pack "${target}"`);
        continue;
      }
      if (typeof item.step !== "number" || !Number.isInteger(item.step) || item.step < 1 || item.step > 6) {
        errors.push(`${where} (${item.param}): "step" must be an integer 1..6, got ${JSON.stringify(item.step)}`);
        continue;
      }

      const rawVal = item[valKey];
      let outItem = Object.assign({}, item);
      if (typeof rawVal === "number") {
        // Carry-forward fix (mandatory, Task 2 review): PACKS.clamp passes non-finite
        // numbers through UNFLAGGED — a NaN/Infinity `set`/`to` must be rejected here,
        // before clamp ever sees it, or it silently reaches `cleaned`.
        if (!Number.isFinite(rawVal)) {
          errors.push(`${where} (${item.param}): non-finite numeric "${valKey}" (${String(rawVal)}) — rejected`);
          continue;
        }
        const clampResult = PACKS.clamp(target, item.param, rawVal);
        outItem[valKey] = clampResult.value;
        outItem.clamped = clampResult.clamped;
      } else {
        // string (dropdown/slot/placement kinds): pass through untouched, unflagged.
        outItem.clamped = false;
      }
      cleanedItems.push(outItem);
    }

    cleaned[arrKey] = cleanedItems;
    return { ok: errors.length === 0, errors, cleaned };
  }
};

/* ===== SECTION: METRICS ===== */
// Pure canvas photometry: measure/diff/score a rendered image against a reference.
// No DOM reads beyond canvas creation + 2d context + createImageBitmap; no globals
// mutated. All functions accept a canvas, ImageBitmap, File, or Blob where noted.
const METRICS = {
  // -- constants -------------------------------------------------------------------
  HIST_BINS: 1024,
  CLIP_HI_THRESH: 250, // sRGB 0..255: a pixel counts toward clip.hi when max(r,g,b) >= this
  CLIP_LO_THRESH: 5,   // sRGB 0..255: a pixel counts toward clip.lo when max(r,g,b) <= this
  // Rationale for CLIP thresholds: max(r,g,b) (not min, not "all channels") is the
  // sRGB proxy used because it is monotone under a uniform exposure push (raising
  // exposure only ever raises max(r,g,b), never lowers it) and it satisfies the
  // three fixed points the contract requires: solid-255 -> hi===1 (max=255>=250 for
  // every pixel), solid-0 -> lo===1 (max=0<=5 for every pixel), solid-128 -> 0/0
  // (max=128 is on neither side). "All channels >=250" would under-count colored
  // highlights (e.g. blown-out warm sky where B never reaches 250); max(r,g,b) does
  // not have that blind spot.

  // -- linearize a single sRGB channel (0..1 in, 0..1 out) --------------------------
  _linearize(c) {
    return c <= 0.04045 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4;
  },

  // -- linear luminance from sRGB 0..1 channels --------------------------------------
  _lumLinear(r, g, b) {
    return 0.2126 * this._linearize(r) + 0.7152 * this._linearize(g) + 0.0722 * this._linearize(b);
  },

  // -- percentile bin INDICES via a fixed-bin histogram (0..nBins-1) ----------------
  // values: array-like of numbers already in [0,1]. ps: array of percentiles in [0,100].
  // Returns bin indices aligned with `ps`. Kept separate from the bin-center value
  // conversion below because shadow/highlight membership needs to compare each
  // pixel's OWN bin index against the cutoff bin index (self-consistent in the same
  // discretized space) rather than against the rounded bin-center value — comparing
  // a raw lum against a bin-center number can land it on the wrong side of <=/>= for
  // solid-color / low-cardinality inputs, since the bin center is a rounded stand-in
  // for the whole bin's value range, not the true percentile-rank value.
  _percentileBins(values, ps, nBins) {
    const bins = nBins || this.HIST_BINS;
    const hist = new Uint32Array(bins);
    const n = values.length;
    for (let i = 0; i < n; i++) {
      let idx = Math.floor(values[i] * bins);
      if (idx < 0) idx = 0; else if (idx >= bins) idx = bins - 1;
      hist[idx]++;
    }
    const out = new Array(ps.length);
    for (let pi = 0; pi < ps.length; pi++) {
      const target = (ps[pi] / 100) * n;
      let cum = 0, bin = bins - 1;
      for (let b = 0; b < bins; b++) {
        cum += hist[b];
        if (cum >= target) { bin = b; break; }
      }
      out[pi] = bin;
    }
    return out;
  },

  // -- percentile via a fixed-bin histogram; returns the bin-CENTER value -----------
  // Same binning as _percentileBins, converted to a representative 0..1 value.
  _percentiles(values, ps, nBins) {
    const bins = nBins || this.HIST_BINS;
    const binIdx = this._percentileBins(values, ps, bins);
    return binIdx.map(bin => (bin + 0.5) / bins);
  },
