  // -- draw any supported source onto a canvas sized to fit within maxEdge, never
  //    upscaling (scale = min(1, maxEdge / longEdge)). Accepts a canvas or an
  //    ImageBitmap-like object (anything with width/height drawable via drawImage).
  thumb(source, maxEdge) {
    const sw = source.width, sh = source.height;
    const longEdge = Math.max(sw, sh);
    const scale = longEdge > maxEdge ? maxEdge / longEdge : 1;
    const w = Math.max(1, Math.round(sw * scale));
    const h = Math.max(1, Math.round(sh * scale));
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.drawImage(source, 0, 0, w, h);
    return c;
  },

  // -- core measurement --------------------------------------------------------------
  measure(imageBitmapOrCanvas) {
    const th = this.thumb(imageBitmapOrCanvas, 256);
    const ctx = th.getContext("2d");
    const w = th.width, h = th.height;
    const { data } = ctx.getImageData(0, 0, w, h);
    const n = w * h;

    const lumArr = new Float64Array(n);
    const satArr = new Float64Array(n);
    let clipHiCount = 0, clipLoCount = 0;
    let satSum = 0;
    let meanLinR = 0, meanLinG = 0, meanLinB = 0;

    for (let i = 0, p = 0; i < n; i++, p += 4) {
      const r255 = data[p], g255 = data[p + 1], b255 = data[p + 2];
      const r = r255 / 255, g = g255 / 255, b = b255 / 255;
      const lum = this._lumLinear(r, g, b);
      lumArr[i] = lum;

      const maxc = Math.max(r255, g255, b255);
      if (maxc >= this.CLIP_HI_THRESH) clipHiCount++;
      if (maxc <= this.CLIP_LO_THRESH) clipLoCount++;

      const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
      const s = mx === 0 ? 0 : (mx - mn) / mx;
      satArr[i] = s;
      satSum += s;

      meanLinR += this._linearize(r); meanLinG += this._linearize(g); meanLinB += this._linearize(b);
    }
    meanLinR /= n; meanLinG /= n; meanLinB /= n;

    // -- luminance percentiles (bin-center values, for the returned lum object) -------
    const [p1, p5, p25, p50, p75, p95, p99] = this._percentiles(lumArr, [1, 5, 25, 50, 75, 95, 99]);
    // -- same cutoffs as BIN INDICES, for robust shadow/highlight membership below.
    // See _percentileBins doc comment: comparing raw lum against the rounded
    // bin-center number can put every pixel of a solid-color / low-cardinality image
    // on the wrong side of <=/>= (e.g. solid red's true lum 0.2126 sits above its own
    // bin's center 0.21240..., so `lum <= p25(center)` is false for all pixels even
    // though the whole image IS the 25th percentile). Comparing bin index to bin
    // index is self-consistent and has no such rounding gap.
    const [p25Bin, p75Bin] = this._percentileBins(lumArr, [25, 75]);
    let lumSum = 0;
    for (let i = 0; i < n; i++) lumSum += lumArr[i];
    const lumMean = lumSum / n;

    // -- clip fractions ---------------------------------------------------------------
    const clip = { hi: clipHiCount / n, lo: clipLoCount / n };

    // -- contrast -----------------------------------------------------------------------
    const contrast = { spread: p95 - p5, midSlope: (p75 - p25) / 0.5 };

    // -- white balance: shadow = lum-bin<=p25-bin, highlight = lum-bin>=p75-bin,
    //    mean LINEAR channels over each set ------------------------------------------
    let shR = 0, shG = 0, shB = 0, shN = 0;
    let hiR = 0, hiG = 0, hiB = 0, hiN = 0;
    for (let i = 0, p = 0; i < n; i++, p += 4) {
      let binIdx = Math.floor(lumArr[i] * this.HIST_BINS);
      if (binIdx < 0) binIdx = 0; else if (binIdx >= this.HIST_BINS) binIdx = this.HIST_BINS - 1;
      const r = this._linearize(data[p] / 255), g = this._linearize(data[p + 1] / 255), b = this._linearize(data[p + 2] / 255);
      if (binIdx <= p25Bin) { shR += r; shG += g; shB += b; shN++; }
      if (binIdx >= p75Bin) { hiR += r; hiG += g; hiB += b; hiN++; }
    }
    // shN/hiN are always >=1 for any non-empty image: p25Bin/p75Bin are themselves
    // bin indices occupied by at least one real pixel, so at least the pixel(s) that
    // produced that bin satisfy the corresponding inequality (guards against
    // div-by-zero on degenerate 1-pixel inputs).
    const shadow = { r: shN ? shR / shN : 0, g: shN ? shG / shN : 0, b: shN ? shB / shN : 0 };
    const highlight = { r: hiN ? hiR / hiN : 0, g: hiN ? hiG / hiN : 0, b: hiN ? hiB / hiN : 0 };
    const warmthShadow = (shadow.r - shadow.b) / (shadow.r + shadow.b + 1e-9);
    const warmthHighlight = (highlight.r - highlight.b) / (highlight.r + highlight.b + 1e-9);
    // tint is a single whole-image green/magenta statistic (mirrors sat.mean being a
    // whole-image stat rather than shadow/highlight-split) — warmthShadow/warmthHighlight
    // already cover the per-tonal-region warm/cool read; tint uses the overall mean
    // LINEAR r,g,b across every pixel in the thumb, not just the shadow/highlight
    // quartile subsets, since the contract's return shape has one `tint` field, not a
    // tintShadow/tintHighlight pair.
    const tint = meanLinG - (meanLinR + meanLinB) / 2;
    const wb = { shadow, highlight, warmthShadow, warmthHighlight, tint };

    // -- saturation ---------------------------------------------------------------------
    const satMean = satSum / n;
    const [satP95] = this._percentiles(satArr, [95]);
    const sat = { mean: satMean, p95: satP95 };

    // -- 4x4 grid: mean linear luminance per cell, row-major -----------------------------
    const grid = new Array(16).fill(0);
    const gridCount = new Array(16).fill(0);
    for (let y = 0; y < h; y++) {
      let gy = Math.floor((y / h) * 4); if (gy > 3) gy = 3;
      for (let x = 0; x < w; x++) {
        let gx = Math.floor((x / w) * 4); if (gx > 3) gx = 3;
        const cell = gy * 4 + gx;
        grid[cell] += lumArr[y * w + x];
        gridCount[cell]++;
      }
    }
    for (let i = 0; i < 16; i++) grid[i] = gridCount[i] ? grid[i] / gridCount[i] : 0;

    return {
      lum: { p1, p5, p25, p50, p75, p95, p99, mean: lumMean },
      clip,
      contrast,
      wb,
      sat,
      grid
    };
  },

  // -- flat diff: (b - a) per scalar, plus grid.0..grid.15 ---------------------------
  diff(a, b) {
    const out = {
      "lum.p1": b.lum.p1 - a.lum.p1,
      "lum.p5": b.lum.p5 - a.lum.p5,
      "lum.p25": b.lum.p25 - a.lum.p25,
      "lum.p50": b.lum.p50 - a.lum.p50,
      "lum.p75": b.lum.p75 - a.lum.p75,
      "lum.p95": b.lum.p95 - a.lum.p95,
      "lum.p99": b.lum.p99 - a.lum.p99,
      "lum.mean": b.lum.mean - a.lum.mean,
      "clip.hi": b.clip.hi - a.clip.hi,
      "clip.lo": b.clip.lo - a.clip.lo,
      "contrast.spread": b.contrast.spread - a.contrast.spread,
      "contrast.midSlope": b.contrast.midSlope - a.contrast.midSlope,
      "wb.warmthShadow": b.wb.warmthShadow - a.wb.warmthShadow,
      "wb.warmthHighlight": b.wb.warmthHighlight - a.wb.warmthHighlight,
      "wb.tint": b.wb.tint - a.wb.tint,
      "sat.mean": b.sat.mean - a.sat.mean,
      "sat.p95": b.sat.p95 - a.sat.p95
    };
    for (let i = 0; i < 16; i++) out[`grid.${i}`] = b.grid[i] - a.grid[i];
    return out;
  },

  // -- deterministic 0..100 look-distance score --------------------------------------
  // score = min(100, 100 * sqrt( Σ w_i·d_i² / Σ w_i ) / 0.35)
  // Uses exactly the diff keys + weights below; d_i are diff(refM, attemptM) values.
  SCORE_WEIGHTS: {
    "lum.p5": 3, "lum.p50": 3, "lum.p95": 3,
    "contrast.spread": 2, "contrast.midSlope": 2,
    "wb.warmthShadow": 2, "wb.warmthHighlight": 2, "wb.tint": 2,
    "clip.hi": 1.5, "clip.lo": 1.5,
    "sat.mean": 1,
    "grid.0": 0.5, "grid.1": 0.5, "grid.2": 0.5, "grid.3": 0.5,
    "grid.4": 0.5, "grid.5": 0.5, "grid.6": 0.5, "grid.7": 0.5,
    "grid.8": 0.5, "grid.9": 0.5, "grid.10": 0.5, "grid.11": 0.5,
    "grid.12": 0.5, "grid.13": 0.5, "grid.14": 0.5, "grid.15": 0.5
  },
  score(refM, attemptM) {
    const d = this.diff(refM, attemptM);
    let wsum = 0, wdsum = 0;
    for (const [key, w] of Object.entries(this.SCORE_WEIGHTS)) {
      const di = d[key] || 0;
      wsum += w;
      wdsum += w * di * di;
    }
    const raw = 100 * Math.sqrt(wdsum / wsum) / 0.35;
    return Math.min(100, raw);
  },

  // -- downscale a File/Blob/canvas/ImageBitmap for sending to the model; never
  //    upscales (scale = min(1, maxEdge / longEdge), same rule as thumb()). Two call
  //    shapes cover the plan: lossy default (1568, image/jpeg, q=0.85) and a lossless
  //    variant for the settings screenshot (2048, image/png — q is ignored by PNG
  //    encoders but accepted here for a uniform signature). Rejects (throws) if the
  //    source is a File/Blob that the browser cannot decode as an image — callers
  //    must wrap this in try/catch (see SECTION: ADAPTER header comment). -----------
  async downscaleForSend(fileOrBlobOrCanvas, maxEdge, type, q) {
    maxEdge = maxEdge === undefined ? 1568 : maxEdge;
    type = type === undefined ? "image/jpeg" : type;
    q = q === undefined ? 0.85 : q;

    let source = fileOrBlobOrCanvas;
    const isCanvasLike = source && typeof source.getContext === "function"
      && typeof source.width === "number" && typeof source.height === "number";
    const isBitmapLike = typeof ImageBitmap !== "undefined" && source instanceof ImageBitmap;
    let decodedHere = false;
    if (!isCanvasLike && !isBitmapLike) {
      // File or Blob: decode to an ImageBitmap first. We own this bitmap and must
      // close it ourselves once drawn — a caller-supplied ImageBitmap (isBitmapLike)
      // is never closed here, since the caller still owns its lifecycle.
      source = await createImageBitmap(fileOrBlobOrCanvas);
      decodedHere = true;
    }
    const sw = source.width, sh = source.height;

    const longEdge = Math.max(sw, sh);
    const scale = longEdge > maxEdge ? maxEdge / longEdge : 1;
    const w = Math.max(1, Math.round(sw * scale));
    const h = Math.max(1, Math.round(sh * scale));

    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.drawImage(source, 0, 0, w, h);
    if (decodedHere) source.close();
    const dataUrl = c.toDataURL(type, q);
    return { dataUrl, w, h };
  }
};

/* ===== SECTION: STORE ===== */
// key()/setKey() (Task 5, localStorage) unchanged below. This task (6) adds:
//   - prefs()/setPrefs(): small localStorage JSON blob (model, target).
//   - IndexedDB session persistence: db "lightmatch" v1, one object store "sessions"
//     keyPath "id". Promisified, minimal, single shared connection (opened lazily on
//     first use, cached in _dbPromise so every call reuses the same connection rather
//     than re-opening per operation).
// Degrade-never-throw contract: if indexedDB.open(...) rejects/errors at runtime (a
// real failure mode — private browsing, disabled storage, exotic embedder policy),
// STORE falls back to an in-memory Map (_mem) and sets `persistent = false`. Nothing
// in STORE ever throws out of boot; a failed IDB open is caught internally and the
// in-memory path takes over silently for the rest of the page's lifetime.
const STORE = {
  key: () => localStorage.getItem("lm_key") || "",
  // trim: pasted keys carry trailing newlines/spaces and produce mystifying 401s.
  setKey: k => localStorage.setItem("lm_key", (k || "").trim()),

  // -- prefs: {model, target}, localStorage JSON, defaults filled in on read --------
  PREFS_DEFAULTS: { model: "claude-opus-4-8", target: "vray7max" },
  prefs() {
    let stored = {};
    try { stored = JSON.parse(localStorage.getItem("lm_prefs") || "{}") || {}; } catch (e) { stored = {}; }
    return Object.assign({}, this.PREFS_DEFAULTS, stored);
  },
  setPrefs(patch) {
    const merged = Object.assign({}, this.prefs(), patch || {});
    localStorage.setItem("lm_prefs", JSON.stringify(merged));
    return merged;
  },

  // -- IndexedDB plumbing -------------------------------------------------------------
  // DB_NAME is the real user database. _dbName is the ACTIVE database name (#6):
  // defaults to DB_NAME, but the selftest points it at "lightmatch-selftest" around
  // every IDB-touching suite so `?selftest` in the user's daily browser can never
  // read, prune, or delete their real "lightmatch" sessions. _useDb() below switches
  // it and drops the cached open handle so the next _openDB() opens the new database.
  DB_NAME: "lightmatch", DB_VERSION: 1, STORE_NAME: "sessions",
  _dbName: "lightmatch",
  persistent: true,
  _dbPromise: null,
  _mem: new Map(), // in-memory fallback, keyed by session id — used only if IDB open fails

  // -- _useDb(name): switch the active IDB database name and invalidate the cached
  // open promise (a later _openDB() reopens against the new name). Also clears the
  // in-memory fallback map so a degraded-mode selftest can't see the user's rows.
  // Returns the previous name so a caller can restore it in a finally. --------------
  _useDb(name) {
    const prev = this._dbName;
    this._dbName = name;
    this._dbPromise = null;
    this._mem = new Map();
    return prev;
  },

  _openDB() {
    if (this._dbPromise) return this._dbPromise;
    this._dbPromise = new Promise((resolve) => {
      let req;
      try {
        req = indexedDB.open(this._dbName, this.DB_VERSION);
      } catch (e) {
        this.persistent = false;
        resolve(null);
        return;
      }
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
          db.createObjectStore(this.STORE_NAME, { keyPath: "id" });
        }
      };
      req.onsuccess = () => { this.persistent = true; resolve(req.result); };
      req.onerror = () => { this.persistent = false; resolve(null); };
      req.onblocked = () => { this.persistent = false; resolve(null); };
    });
    return this._dbPromise;
  },

  // -- saveSession(s): upsert by id (IDB `put` is upsert-by-keyPath natively; the
  // in-memory fallback mirrors that with Map.set on the same id). Session fields must
  // stay JSON-safe (strings/numbers/booleans/plain objects/arrays/null) — the
  // in-memory path round-trips through JSON.parse(JSON.stringify(...)) to decouple the
  // stored copy from the caller's live object (matching IDB's own structured-clone
  // copy-on-write semantics), which would silently drop a Date/Function/undefined
  // field that the real IDB path would otherwise preserve. Every field this app
  // actually stores (dataUrls as strings, ISO date strings, numbers) already satisfies
  // this. ------------------------------------------------------------------------------
  async saveSession(s) {
    const db = await this._openDB();
    if (!db) { this._mem.set(s.id, JSON.parse(JSON.stringify(s))); return s; }
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, "readwrite");
      tx.objectStore(this.STORE_NAME).put(s);
      tx.oncomplete = () => resolve(s);
      tx.onerror = () => reject(tx.error);
    });
  },

  // -- _all(): every stored session, unordered. Internal helper for loadLatest() and
  // for selftest cleanup sweeps; not part of the plan's public API surface but kept
  // on STORE (not module-private) so both call sites can share one implementation.
  // In-memory path returns FRESH copies (not the live _mem-stored references) so it
  // matches IDB's getAll(), which always deserializes a new object per call — without
  // this, a caller mutating a session returned from _all()/loadLatest() in memory-
  // fallback mode would silently corrupt the "stored" copy with no saveSession() call. --
  async _all() {
    const db = await this._openDB();
    if (!db) return Array.from(this._mem.values()).map(s => JSON.parse(JSON.stringify(s)));
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, "readonly");
      const req = tx.objectStore(this.STORE_NAME).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  },

  // -- loadLatest(): the session with the highest `created` (ISO string — lexical
  // comparison is correct for same-format ISO-8601 timestamps). null if none exist. --
  async loadLatest() {
    const all = await this._all();
    if (!all.length) return null;
    let best = all[0];
    for (const s of all) if (s.created > best.created) best = s;
    return best;
  },

  // -- deleteSession(id): removes a session by id. Not one of the plan's headline API
  // methods (saveSession/loadLatest/exportJSON/importJSON), but the plan explicitly
  // calls for it as the selftest cleanup mechanism ("clean up test sessions afterward
  // ... use a test-only id you remove"); also the natural building block for a future
  // UI "delete session" action. ---------------------------------------------------------
  async deleteSession(id) {
    const db = await this._openDB();
    if (!db) { this._mem.delete(id); return; }
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, "readwrite");
      tx.objectStore(this.STORE_NAME).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },

  // -- exportJSON(session?) / importJSON(str): the file:// fallback for moving a
  // session between browser profiles/machines when IDB isn't usable (or just as a
  // manual backup). exportJSON accepts an explicit session object (so a caller who
  // already has one in hand — e.g. ENGINE.session() — exports exactly what's currently
  // in memory, including any not-yet-persisted edit) but falls back to STORE's own
  // "current" notion (the latest SAVED session) when called with no argument, per the
  // plan's "exportJSON() returns a JSON string of the current session". importJSON
  // validates the session shape — a parseable object with a string `id`, a `chains`
  // object whose every chain is {recipe, attempts:[]} (attempts an array; any recipe
  // carrying an array `values`), and no invalid image payloads (the XSS boundary
  // below) — then saves it. `created` is ALWAYS stamped to now (#5b): an imported
  // session is the one the user wants to work on right now, so it must sort as
  // loadLatest()'s newest and survive _pruneSessions regardless of its original
  // export timestamp. -------------------------------------------------------------
  async exportJSON(session) {
    const s = session !== undefined ? session : await this.loadLatest();
    return JSON.stringify(s);
  },

  // -- DATAURL_RE: a stored dataUrl is only ever a base64-encoded display-referred
  // image (png/jpeg/webp) produced by METRICS.downscaleForSend (canvas.toDataURL).
  // This is the SINGLE source of truth for "is this dataUrl safe to put in an
  // <img src>": importJSON validates against it at the trust boundary, and UI.safeSrc
  // re-checks it at the sink (defense in depth). Kept deliberately strict — the
  // charset is locked to [A-Za-z0-9+/=], so a smuggled quote/space/angle-bracket that
  // would break out of the src="..." attribute can never match. -------------------
  DATAURL_RE: /^data:image\/(png|jpe?g|webp);base64,[A-Za-z0-9+/=]+$/,

  // -- _validImportedDataUrl(v): a session field's dataUrl is acceptable when it is
  // absent/null (the shape allows null ref/base/settingsShot/etc.) OR a string that
  // matches DATAURL_RE. Any OTHER value (a non-matching string, a number, an object)
  // is a violation. Returns true=ok, false=violation. -----------------------------
  _validImportedDataUrl(v) {
    if (v === undefined || v === null) return true;
    return typeof v === "string" && this.DATAURL_RE.test(v);
  },

  async importJSON(str) {
    let obj;
    try { obj = JSON.parse(str); } catch (e) { throw new Error("importJSON: not valid JSON"); }
    if (!obj || typeof obj !== "object" || typeof obj.id !== "string" || !obj.id) {
      throw new Error("importJSON: missing/invalid session.id");
    }
    if (!obj.chains || typeof obj.chains !== "object") {
      throw new Error("importJSON: missing session.chains");
    }
    // -- SESSION-SHAPE VALIDATION (#5a): a malformed session must be rejected with a
    // clear message, not silently saved and later crash a render read. Every chain
    // must be a {recipe, attempts:[]} object with attempts an ARRAY, and any recipe
    // present must carry an array `values` (the shape every render/history path
    // assumes). Rejecting here — at the trust boundary — is the belt to the runtime
    // null-guards scattered downstream.
    for (const target of Object.keys(obj.chains)) {
      const chain = obj.chains[target];
      if (!chain || typeof chain !== "object") {
        throw new Error(`importJSON: chain "${target}" is not an object.`);
      }
      if (!Array.isArray(chain.attempts)) {
        throw new Error(`importJSON: chain "${target}" is missing an attempts[] array.`);
      }
      if (chain.recipe != null && !Array.isArray(chain.recipe.values)) {
        throw new Error(`importJSON: chain "${target}" has a recipe without an array "values".`);
      }
    }
    // -- ACTIVATE THE IMPORT (#5b): stamp `created` to now so loadLatest() returns the
    // imported session (it becomes the newest) AND _pruneSessions can't drop it as
    // stale. This deliberately overrides any timestamp in the file — an imported
    // session is the one the user wants to work on right now, so it must sort as the
    // latest regardless of when it was originally exported.
    obj.created = new Date().toISOString();
    // -- STORED-XSS BOUNDARY (CRITICAL): every dataUrl-bearing field in an imported
    // file is untrusted and flows into an <img src="${...}"> sink. Walk them all and
    // REJECT the whole import on the first bad payload — do NOT strip-and-continue,
    // since a tampered/corrupt file is something the user must be told about, not
    // silently repaired. Covers ref/base/settingsShot plus every attempt dataUrl in
    // both chains (any target, any attempt). ----------------------------------------
    const REJECT = "importJSON: session file contains an invalid image payload.";
    const slotVals = [obj.ref && obj.ref.dataUrl, obj.base && obj.base.dataUrl, obj.settingsShot && obj.settingsShot.dataUrl];
    for (const dv of slotVals) {
      if (!this._validImportedDataUrl(dv)) throw new Error(REJECT);
    }
    for (const target of Object.keys(obj.chains)) {
      const chain = obj.chains[target];
      const attempts = chain && Array.isArray(chain.attempts) ? chain.attempts : [];
      for (const att of attempts) {
        if (att && !this._validImportedDataUrl(att.dataUrl)) throw new Error(REJECT);
      }
    }
    await this.saveSession(obj);
    return obj;
  }
};

/* ===== SECTION: ADAPTER ===== */
// Omega gateway client (Anthropic Messages wire, non-streaming, forced tool_choice).
// ADAPTER→STORE (key read only, via STORE.key()); nothing else. ADAPTER does NOT call
// METRICS.downscaleForSend itself — buildUserContent works on already-downscaled
// {dataUrl, mediaType} pairs, so the decode-reject path documented on
// downscaleForSend (SECTION: METRICS) is ENGINE's responsibility to try/catch when it
// downscales images before calling ADAPTER.buildUserContent/ADAPTER.call (Task 6).
const ADAPTER = {
  // -- error types: thrown by call(), never returned as a value, so a caller can
  // `catch (e) { if (e instanceof ADAPTER.AuthError) ... }` without inspecting a
  // status code again. Attached to ADAPTER (not module-private) so selftests and
  // ENGINE can both construct/instanceof-check them without a network call. --------
  AuthError: class AuthError extends Error {
    constructor(message) { super(message); this.name = "AuthError"; }
  },
  ShapeError: class ShapeError extends Error {
    constructor(message, raw) { super(message); this.name = "ShapeError"; this.raw = raw; }
  },

  // -- backoff schedule: a CONSTANT (not a function of attempt number), so it is
  // directly assertable in a selftest without calling fetch. 3 entries = 3 retry
  // attempts after the first try, per the plan's "3 attempts, backoff 2s/6s/15s". --
  BACKOFF_MS: [2000, 6000, 15000],

  // -- per-attempt fetch timeout (ms): a gateway that accepts the socket but never
  // responds would otherwise wedge `await fetch` forever and the retry loop would
  // never trigger. A constant on ADAPTER (like BACKOFF_MS) so tests can override it;
  // an abort is treated exactly like a network reject (retryable with backoff). ----
  TIMEOUT_MS: 120000,

  // -- _sleep(ms): promise-wrapped setTimeout, used for the backoff waits. ----------
  _sleep(ms) { return new Promise(r => setTimeout(r, ms)); },

  // -- classify(status): pure function, no fetch, no `this`. Maps an HTTP status code
  // to one of three retry-loop actions:
  //   "retry" — 429 (rate limit) or any 5xx (server error): try again with backoff.
  //   "auth"  — 401: the key is wrong/expired; caller throws AuthError, no retry.
  //   "fatal" — everything else (400, 403, 404, ... and any 2xx/3xx that should never
  //             reach this classifier in practice): do not retry, surface the error.
  // Network errors (fetch rejects, no status at all) are classified as "retry" by the
  // caller directly — see call()'s catch block — since there is no status code to
  // pass here. -----------------------------------------------------------------------
  classify(status) {
    if (status === 429) return "retry";
    if (status >= 500 && status <= 599) return "retry";
    if (status === 401) return "auth";
    return "fatal";
  },

  // -- buildUserContent({mode, images, metricsBundle, context, history}): assembles
  // the single user-turn `content` array for the Messages API. Pure/no network.
  //   mode: "recipe" (initial analysis) | "correction" (refine round) — only gates
  //         whether the move-history block is included; image labeling is driven by
  //         each image's own `role`/`n`, not by `mode`, so a settings screenshot can
  //         appear in either mode.
  //   images: [{ role: "reference"|"base"|"settings"|"attempt", n, dataUrl, mediaType }]
  //         — dataUrl is a full `data:<mediaType>;base64,<data>` string as returned by
  //         METRICS.downscaleForSend (ENGINE's job to produce; this function does not
  //         downscale or decode anything itself, so it never touches ImageBitmap and
  //         has no decode-reject path of its own).
  //   metricsBundle: any JSON-serializable object — whatever measurements+diff shape
  //         ENGINE assembled (kept opaque here; SCHEMAS/ENGINE own that shape).
  //   context: plain object of scene chips (scene/time/rig/etc.) rendered as a line.
  //   history: (correction mode only) array of prior rounds' moves + applied state.
  // Documented block order (alternating text/image; every image is immediately
  // preceded by its own labeling text block):
  //   [label, image]* for every entry in `images`, in array order
  //   -> evidence text block (units legend + JSON.stringify(metricsBundle))
  //   -> context chips text block
  //   -> (correction mode only) move-history + applied-set text block
  // -----------------------------------------------------------------------------------
  buildUserContent({ mode, images, metricsBundle, context, history }) {
    const content = [];

    const LABELS = {
      reference: "REFERENCE:",
      base: "BASE RENDER:",
      settings: "SETTINGS SCREENSHOT (baseline):",
      attempt: n => `ATTEMPT ${n}:`
    };

    for (const img of (images || [])) {
      const label = img.role === "attempt" ? LABELS.attempt(img.n) : (LABELS[img.role] || `IMAGE (${img.role}):`);
      content.push({ type: "text", text: label });
      const base64 = img.dataUrl.includes(",") ? img.dataUrl.slice(img.dataUrl.indexOf(",") + 1) : img.dataUrl;
      content.push({ type: "image", source: { type: "base64", media_type: img.mediaType, data: base64 } });
    }

    // Units legend prefixes the raw JSON so the model does not have to guess what a
    // bare "0.211" or "-0.03" means — see METRICS section header for the same facts
    // from the producer's side (lum linearized 0..1; warmth = (R-B)/(R+B) on linear
    // means; tint = G-(R+B)/2, positive = green).
    const legend = "COMPUTED EVIDENCE — deterministic, trust for magnitude. Units: luminance values are " +
      "linearized 0-1 (not sRGB 0-255); warmth* is (R-B)/(R+B) computed on linear channel means, positive = " +
      "warmer, negative = cooler, roughly +-0.05 ~= a few hundred kelvin; tint is positive = green, negative = " +
      "magenta. " +
      "diff is reference minus current (positive = reference is higher; move that way).";
    // Token precision: 4 decimals is well past the metrics' meaningful resolution;
    // full float64 digit-runs only burn tokens and invite false precision.
    const round4 = (k, v) => typeof v === "number" && Number.isFinite(v) ? Math.round(v * 1e4) / 1e4 : v;
    content.push({ type: "text", text: `${legend}\n${JSON.stringify(metricsBundle, round4)}` });

    if (context && Object.keys(context).length) {
      const chips = Object.entries(context).map(([k, v]) => `${k}: ${v}`).join(", ");
      content.push({ type: "text", text: `SCENE CONTEXT — ${chips}` });
    }

    if (mode === "correction" && Array.isArray(history) && history.length) {
      const lines = ["MOVE HISTORY (prior rounds — do not reverse any move here by more than half; applied=false means the user skipped that row when re-rendering):"];
      for (const round of history) {
        for (const mv of (round.moves || [])) {
          lines.push(`  round ${round.round}: ${mv.param} ${mv.from} -> ${mv.to} (applied: ${mv.applied}) — ${mv.why || ""}`.trimEnd());
        }
      }
      content.push({ type: "text", text: lines.join("\n") });
    }

    return content;
  },

  // -- call({model, system, userContent, tool, validate}) -> Promise<toolInput>
  //   model:       exact gateway model id string (ADAPTER hardcodes none of these).
  //   system:      system prompt string (SCHEMAS.systemPrompt(...) output).
  //   userContent: the content array from buildUserContent(...).
  //   tool:        one SCHEMAS.emit_recipe / SCHEMAS.emit_correction object; also
  //                forced via tool_choice so the model cannot answer in prose.
  //   validate:    optional (toolInput) => {ok, errors[], cleaned} — when provided
  //                and the first response fails validation, call() re-asks ONCE by
  //                appending the assistant turn plus a wire-valid user turn whose
  //                content is a tool_result block (matching tool_use_id,
  //                is_error:true) naming the errors, then re-validates the second
  //                response. A second failure surfaces the validation error to the
  //                caller (throws) rather than looping again.
  // Retries (429/5xx/network/timeout): up to 3 retry attempts after the first try,
  // backoff BACKOFF_MS[attempt] between attempts. Each attempt is bounded by
  // TIMEOUT_MS via an AbortController; an abort is treated exactly like a network
  // reject (retryable). 401 throws AuthError immediately, no retry. A response with
  // no tool_use block throws ShapeError carrying the raw response text.
  // Note: this gateway family can return pseudo-errors as HTTP 200 — those surface
  // as ShapeError with .raw for the caller to inspect. -------------------------------
  async call({ model, system, userContent, tool, validate }) {
    const messages = [{ role: "user", content: userContent }];

    const send = async () => {
      let lastErr = null;
      for (let attempt = 0; attempt < this.BACKOFF_MS.length + 1; attempt++) {
        // A single AbortController + timeout spans the WHOLE attempt — the request
        // headers AND the response body read (#3). Clearing the timeout the moment
        // headers arrive (the old bug) left a gateway that streams headers then
        // stalls the body able to wedge `await res.json()` forever, so the retry loop
        // never fired. Keeping the signal armed through the body read means a stalled
        // body aborts too, and is treated exactly like any other network reject
        // (retryable with backoff), not a permanent hang.
        let outcome = null; // {json} on success, {retry, err} to retry, {fatal, err} to throw
        const ac = new AbortController();
        const t = setTimeout(() => ac.abort(), this.TIMEOUT_MS);
        try {
          const res = await fetch("https://omega.kesarcloud.in/v1/messages", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "authorization": "Bearer " + STORE.key(),
              "anthropic-version": "2023-06-01"
            },
            body: JSON.stringify({
              model, max_tokens: 4096, stream: false, system, messages,
              tools: [tool], tool_choice: { type: "tool", name: tool.name }
            }),
            signal: ac.signal
          });
          if (res.ok) {
            // Body read stays INSIDE the try, still under the live abort signal, so a
            // stalled body aborts here and falls into the network-retry catch below.
            const json = await res.json();
            outcome = { json };
          } else {
            const action = this.classify(res.status);
            if (action === "auth") {
              outcome = { fatal: new this.AuthError(`Gateway returned 401 — the API key is missing or invalid.`) };
            } else if (action === "retry") {
              outcome = { retry: true, err: new Error(`Gateway returned HTTP ${res.status}`) };
            } else {
              // .text() read is also under the live signal (part of the body read).
              const bodyText = await res.text().catch(() => "");
              outcome = { fatal: new Error(`Gateway request failed: HTTP ${res.status}${bodyText ? " — " + bodyText : ""}`) };
            }
          }
        } catch (networkErr) {
          // fetch rejected (offline, DNS, CORS preflight failure, ...) OR our
          // TIMEOUT_MS abort fired during EITHER the header wait or the body read
          // (gateway accepted the socket / streamed headers, then never finished).
          // No status code to classify in any case, but all ARE the "network" case in
          // the plan's "429/5xx/network" retry list — treated as retryable.
          outcome = { retry: true, err: networkErr };
        } finally {
          // Only now — after the body has been fully read (or the attempt failed) — is
          // it safe to disarm the timeout for this attempt.
          clearTimeout(t);
        }

        if (outcome.json !== undefined) return outcome.json;
        if (outcome.fatal) throw outcome.fatal;
        // retry
        lastErr = outcome.err;
        if (attempt < this.BACKOFF_MS.length) { await this._sleep(this.BACKOFF_MS[attempt]); continue; }
        throw lastErr;
      }
      // Defensive: the loop always returns or throws earlier; unreachable in practice.
      throw lastErr || new Error("Gateway request failed after retries.");
    };

    const extractToolInput = (json) => {
      // Truncation guard (#4b): a response cut off at the token cap ("stop_reason":
      // "max_tokens") almost always carries a half-written tool_use whose JSON input is
      // structurally incomplete — surface it as a ShapeError (with the raw body for the
      // banner's "show raw response") rather than letting a partial recipe flow into
      // validation as if it were a real, complete emit.
      if (json && json.stop_reason === "max_tokens") {
        throw new this.ShapeError("response truncated at max_tokens", JSON.stringify(json));
      }
      const block = Array.isArray(json.content) ? json.content.find(b => b.type === "tool_use") : null;
      if (!block) throw new this.ShapeError("Response contained no tool_use block.", JSON.stringify(json));
      return block.input;
    };

    const first = await send();
    let toolInput = extractToolInput(first);

    if (typeof validate === "function") {
      const result = validate(toolInput);
      if (!result.ok) {
        // Wire-valid re-ask: on the Anthropic Messages wire an assistant tool_use
        // turn MUST be answered by a user turn whose content holds a tool_result
        // block with the matching tool_use_id — a bare text turn is a 400
        // ("tool_use ids were found without tool_result blocks").
        const toolUse = first.content.find(b => b.type === "tool_use");
        messages.push({ role: "assistant", content: first.content });
        messages.push({ role: "user", content: [{
          type: "tool_result", tool_use_id: toolUse.id, is_error: true,
          content: `Your emit was invalid: ${JSON.stringify(result.errors)}. Re-emit the full corrected tool call.`
        }]});
        const second = await send();
        toolInput = extractToolInput(second);
        const secondResult = validate(toolInput);
        if (!secondResult.ok) {
          throw new Error(`Gateway response failed validation twice: ${JSON.stringify(secondResult.errors)}`);
        }
        return secondResult.cleaned;
      }
      return result.cleaned;
    }

    return toolInput;
  }
};

/* ===== SECTION: ENGINE ===== */
// Orchestration + session state machine. ENGINE→{METRICS, PACKS, SCHEMAS, STORE,
// ADAPTER} per the plan's dependency graph — never touches the DOM (no querySelector,
// no event listeners on page elements; UI owns all of that and drives ENGINE through
// its action methods). ENGINE._adapter defaults to the real ADAPTER and is the sole
// injection seam selftests use to avoid any network call.
//
// State machine: empty -> ready (ref+base present) -> analyzed(target) -> refining(target).
// State is DERIVED from the current session + activeTarget on every read (ENGINE.state()),
// not tracked as a separate mutable flag — this guarantees state can never drift out of
// sync with the data it describes. "analyzed"/"refining" are per the ACTIVE target's own
// chain: switching activeTarget can move you from "refining" (old target had attempts)
// back to "analyzed" or even "ready" for a target that has no recipe yet.
const ENGINE = {
  _adapter: null, // set to ADAPTER below, after ADAPTER is defined; selftests overwrite this
  _session: null,
  _testSessionId: null, // selftest-only override so STORE round-trips use a deterministic id
  lastError: null,

  // -- BusyError: thrown by setImage() when a call is in flight (Task 7a hardening —
  // see _inFlight below). Lives on ENGINE (not ADAPTER — ADAPTER is untouched by this
  // task) since being "busy" is an ENGINE-level concurrency concept, not a gateway
  // response classification. Carries `kind:"busy"` directly on the instance (unlike
  // ADAPTER.AuthError/ShapeError, which only get a `kind` string via
  // ENGINE._classifyError) so a caller can branch on it without going through
  // ENGINE.lastError at all — the busy state is synchronous/local, not a
  // network-classified failure. -----------------------------------------------------
  BusyError: class BusyError extends Error {
    constructor(message) { super(message); this.name = "BusyError"; this.kind = "busy"; }
  },

  // -- _inFlight: a single shared promise gate (Task 7a hardening). analyze(),
  // addAttempt(), and reanalyzeOtherTarget() all funnel through _guarded() below,
  // which sets this to the in-progress promise and clears it (finally) when that
  // promise settles — success OR failure. While set, a second call to any of those
  // three methods returns the SAME promise instead of starting a second network op
  // (two concurrent analyze() calls on the same session would otherwise race two
  // gateway calls against one chain and silently keep whichever response lands
  // last). setImage() checks this flag and throws a typed BusyError instead of
  // swapping session images out from under an in-flight call, which would produce a
  // recipe/correction that no longer matches what the model actually saw. --------
  _inFlight: null,

  // -- _guarded(fn): runs fn() (an async op) behind the _inFlight gate. If a gated op
  // is already running, returns THAT SAME promise unchanged (fn is never invoked a
  // second time). Otherwise starts fn(), stores its promise on _inFlight immediately
  // (synchronously, before any await inside fn can run) so a synchronously-following
  // second call sees the gate already set, and clears _inFlight in a finally so a
  // thrown/rejected op still unblocks the next call. ------------------------------
  _guarded(fn) {
    if (this._inFlight) return this._inFlight;
    // Clear any stale error banner at the entry of every guarded user action
    // (analyze/addAttempt/reanalyze) — a fresh attempt that then succeeds must not
    // leave the previous failure's banner on screen. If fn() itself fails,
    // _annotateError repopulates lastError with the new failure.
    this.lastError = null;
    const p = (async () => {
      try {
        return await fn();
      } finally {
        this._inFlight = null;
      }
    })();
    this._inFlight = p;
    return p;
  },

  // -- ATTEMPTS_CAP: keep the last N attempts per chain (plan: 8). A constant (not a
  // magic number inline) so the selftest and any future UI copy ("up to N attempts")
  // read the same source of truth. ---------------------------------------------------
  ATTEMPTS_CAP: 8,

  // -- SESSION_RETENTION_CAP: keep only the newest N whole sessions in IDB (Task 7a
  // hardening — sessions carry full-resolution image dataUrls per slot/attempt, and
  // an unbounded row count would eventually strain IndexedDB comfort the same way an
  // uncapped attempts[] array would). Pruned on boot(), after loading the latest
  // session (never before — boot must not delete the very session it is about to
  // restore). ---------------------------------------------------------------------
  SESSION_RETENTION_CAP: 5,

  // -- blank session factory: the shape documented in the plan/task, with both chains
  // pre-created (empty) so downstream code never has to null-check chains[target]. ---
  _blankSession() {
    return {
      id: this._testSessionId || ("lm-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8)),
      created: new Date().toISOString(),
      context: { scene: "", time: "", rig: "" },
      ref: null, base: null, settingsShot: null,
      activeTarget: STORE.prefs().target || "vray7max",
      // _attemptCount: monotonic per-chain counter, NEVER decremented by eviction — this
      // is what "ATTEMPT N:" labels (sent to the model) are numbered from, so numbering
      // keeps climbing truthfully past the ATTEMPTS_CAP window rather than sticking at
      // (cap+1) forever once chain.attempts.length itself stops growing.
      chains: {
        vray7max: { recipe: null, attempts: [], _attemptCount: 0 },
        vantage33: { recipe: null, attempts: [], _attemptCount: 0 }
      }
    };
  },

  // -- _mediaTypeFromDataUrl(dataUrl): read the real MIME from a data: URL prefix
  // (#13) instead of hardcoding "image/jpeg". ref/base are JPEG and settings is PNG
  // in the normal capture path, but an imported session can seed a slot with a PNG (or
  // WEBP) dataUrl, and sending it labeled image/jpeg is a wire lie that a strict vision
  // endpoint can reject. Falls back to image/jpeg only when the prefix is unreadable. -
  _mediaTypeFromDataUrl(dataUrl) {
    const m = typeof dataUrl === "string" ? dataUrl.match(/^data:([^;,]+)[;,]/) : null;
    return m ? m[1] : "image/jpeg";
  },

  // -- reset(): back to a blank "empty" session. Used by boot() when there is nothing
  // to restore, and by selftests between scenarios. ----------------------------------
  reset() {
    this._session = this._blankSession();
    this.lastError = null;
    return this._session;
  },

  // -- session()/activeTarget(): read accessors. session() returns the live object —
  // callers (UI, selftests) may read deeply into it, but should treat it as
  // ENGINE-owned; ENGINE always persists after mutating it. --------------------------
  session() { if (!this._session) this.reset(); return this._session; },
  activeTarget() { return this.session().activeTarget; },

  // -- state(): derives empty/ready/analyzed/refining from the current session, scoped
  // to the ACTIVE target's own chain (per the plan: "analyzed(target)"/"refining(target)"
  // are target-scoped states — the active target is the one the UI is looking at). ---
  state() {
    const s = this.session();
    if (!s.ref || !s.base) return "empty";
    const chain = s.chains[s.activeTarget];
    if (!chain || !chain.recipe) return "ready";
    if (chain.attempts.length > 0) return "refining";
    return "analyzed";
  },

  // -- setActiveTarget(target): flips which target's chain the UI/state() looks at,
  // WITHOUT running any analysis (plain switch — reanalyzeOtherTarget() is the action
  // that also triggers a fresh analyze() call). Persists the switch. -----------------
  async setActiveTarget(target) {
    const s = this.session();
    s.activeTarget = target;
    await this._persist();
    return s;
  },

  // -- setContext(patch): merge-patches session.context (scene/time/rig chips) and
  // persists — same shape as setActiveTarget's plain-switch-then-persist pattern.
  // Small, explicitly requested addition (Commit 2's UI wiring: "stored on
  // session.context via ENGINE — add a small ENGINE.setContext(patch) if missing") so
  // the UI never mutates session.context directly; every session field change still
  // flows through one ENGINE action method that owns the persist step. -------------
  async setContext(patch) {
    // A successful state change clears any stale error banner (#1).
    this.lastError = null;
    const s = this.session();
    s.context = Object.assign({}, s.context || {}, patch || {});
    await this._persist();
    return s;
  },

  // -- setRecipeApplied(param, applied): records the recipe-row applied toggle on the
  // ACTIVE chain as chain.recipeApplied[param] = bool ({param -> bool} map; absent or
  // true = applied), then persists — same shape as setContext (Task 7a follow-up;
  // spec: "untoggle anything you skipped; correction calls receive the applied set").
  // _historyForActiveChain()'s round-0 moves read this map, so the first correction
  // call genuinely receives which recipe rows the user skipped. Busy discipline
  // matches setImage: a typed BusyError while _inFlight — flipping the applied set
  // mid-addAttempt would change session state out from under the history the
  // in-flight call already assembled. The map is cleared by a fresh analyze() (a new
  // recipe's rows default back to applied; see _analyzeImpl). -----------------------
  async setRecipeApplied(param, applied) {
    if (this._inFlight) {
      throw this._annotateError(new this.BusyError("ENGINE.setRecipeApplied(): an analyze/attempt/reanalyze call is already in flight — wait for it to finish before changing the applied set."));
    }
    // A successful state change clears any stale error banner (#1).
    this.lastError = null;
    const chain = this.activeChain();
    if (!chain) return null;
    if (!chain.recipeApplied || typeof chain.recipeApplied !== "object") chain.recipeApplied = {};
    chain.recipeApplied[param] = !!applied;
    await this._persist();
    return chain.recipeApplied;
  },

  // -- toggleAttemptApplied(attemptIndex, param): flips a correction-row applied flag
  // on the active chain's stored attempt (#9). Mirrors setRecipeApplied's discipline —
  // an ENGINE action that owns the persist step and respects the _inFlight busy gate,
  // so the correction-row toggle can no longer mutate session state out from under an
  // in-flight addAttempt (whose _historyForActiveChain snapshot already read the old
  // appliedParams). Absent/false toggles to true, otherwise to false — identical
  // behavior to the prior direct UI mutation when idle. -----------------------------
  async toggleAttemptApplied(attemptIndex, param) {
    if (this._inFlight) {
      throw this._annotateError(new this.BusyError("ENGINE.toggleAttemptApplied(): an analyze/attempt/reanalyze call is already in flight — wait for it to finish before changing the applied set."));
    }
    // A successful state change clears any stale error banner (#1).
    this.lastError = null;
    const chain = this.activeChain();
    if (!chain || !chain.attempts[attemptIndex]) return null;
    const att = chain.attempts[attemptIndex];
    att.appliedParams = att.appliedParams || {};
    att.appliedParams[param] = att.appliedParams[param] === false ? true : false;
    await this._persist();
    return att.appliedParams;
  },

  // -- lookup(paramId): UI's display-string API, delegates to PACKS for the ACTIVE
  // target. -----------------------------------------------------------------------
  lookup(paramId) {
    return PACKS.lookup(this.activeTarget(), paramId);
  },

  // -- _attemptNumberForChain(chain, idx) / attemptNumberAt(idx): the MONOTONIC
  // attempt number (#8) for the stored attempt at array index `idx`. attempts[] keeps
  // only the last ATTEMPTS_CAP entries, but _attemptCount keeps climbing, so the
  // newest stored entry is #_attemptCount and index idx (0-based, oldest-kept first)
  // is _attemptCount - (length - 1 - idx). This is the SAME number the model was told
  // in that attempt's "ATTEMPT N:" image label, so the correction card title,
  // session-strip caption, and move-history round labels all agree with it — no more
  // "Correction — attempt 1" on the card while the model saw "ATTEMPT 9". Falls back to
  // idx+1 for a legacy chain that predates _attemptCount. ---------------------------
  _attemptNumberForChain(chain, idx) {
    if (!chain || !Array.isArray(chain.attempts)) return idx + 1;
    const L = chain.attempts.length;
    if (typeof chain._attemptCount !== "number") return idx + 1;
    return chain._attemptCount - (L - 1 - idx);
  },
  attemptNumberAt(idx) {
    return this._attemptNumberForChain(this.activeChain(), idx);
  },

  // -- activeChain(): read-only view of the active target's own chain object
  // ({recipe, attempts[], _attemptCount, _evictedScores?}). Public accessor (Task 7a
  // hardening) so the UI never reaches into session().chains[activeTarget] directly —
  // one call, always correctly scoped to whichever target is currently active. This
  // returns the LIVE object (same identity as session().chains[activeTarget]), not a
  // defensive copy, matching session()'s own "live object, treat as ENGINE-owned"
  // contract documented above — callers must not mutate it directly. ----------------
  activeChain() {
    const s = this.session();
    return s.chains[s.activeTarget] || null;
  },

  // -- attemptInfo(): {n, cap, stored} for the active chain — the UI's one-stop
  // accessor for attempt-count display so it never reads chain._attemptCount or
  // chain.attempts.length paths directly. `n` is the monotonic per-chain counter
  // (keeps climbing past the cap — matches the "ATTEMPT N:" label sent to the model);
  // `cap` is ENGINE.ATTEMPTS_CAP; `stored` is the actual attempts[] array length
  // (pinned at cap once eviction starts). n and stored are equal until the cap is
  // first reached, then diverge — both are meaningful ("attempt 9 of up to 8 kept"
  // reads correctly with n=9, stored=8). --------------------------------------------
  attemptInfo() {
    const chain = this.activeChain();
    const n = chain && typeof chain._attemptCount === "number" ? chain._attemptCount : (chain ? chain.attempts.length : 0);
    const stored = chain ? chain.attempts.length : 0;
    return { n, cap: this.ATTEMPTS_CAP, stored };
  },

  // -- _persist(): save the current session via STORE after every mutation, per the
  // plan ("wires ... STORE.saveSession after every mutation"). Centralized here so
  // every action method just calls this instead of repeating the STORE.saveSession
  // call + boilerplate. ----------------------------------------------------------
  async _persist() {
    await STORE.saveSession(this._session);
    return this._session;
  },

  // -- error classification: maps a thrown error to a short `kind` string the UI can
  // switch on without re-deriving instanceof checks itself. Kept intentionally small
  // per the task note ("keep it simple") — auth/shape/network/other covers every
  // ADAPTER-thrown case (AuthError, ShapeError, plain Error from a network reject or
  // fatal HTTP status) plus anything ENGINE itself throws (e.g. an image decode
  // rejection), which falls to "other". ----------------------------------------------
  _classifyError(e) {
    if (e instanceof ADAPTER.AuthError) return "auth";
    if (e instanceof ADAPTER.ShapeError) return "shape";
    if (e instanceof this.BusyError) return "busy";
    if (e && (e.name === "TypeError" || e.name === "AbortError" || /network|fetch/i.test(e.message || ""))) return "network";
    return "other";
  },

  // -- _annotateError(e): records ENGINE.lastError = {kind, message, raw?, at} and
  // returns the SAME error (never a replacement) so callers can rethrow it unchanged —
  // instanceof checks against ADAPTER.AuthError/ShapeError keep working for a caller
  // that prefers that style, while ENGINE.lastError.kind gives the UI a ready-made
  // string for the common case. -------------------------------------------------------
  _annotateError(e) {
    this.lastError = {
      kind: this._classifyError(e),
      name: e && e.name,
      message: e && e.message,
      raw: e && e.raw, // present only for ShapeError
      at: new Date().toISOString()
    };
    return e;
  },

  // -- setImage(slot, fileOrCanvas): slots ref|base|settings (+ addAttempt() below
  // reuses the same downscale/measure pipeline for the "attempt" case, which is not a
  // named session slot but a chain entry). Runs METRICS.downscaleForSend (wrapped in
  // try/catch — it rejects on undecodable files) and METRICS.measure (decoded from the
  // SAME source where practical, not re-decoded from the dataUrl, so we do the decode
  // once and hand the resulting bitmap/canvas to both downscale and measure). Settings
  // slot uses the lossless PNG variant (2048/png/1.0); ref/base use the lossy JPEG
  // default (1568/jpeg/0.85). ---------------------------------------------------------
  async _decodeSource(fileOrCanvas) {
    const isCanvasLike = fileOrCanvas && typeof fileOrCanvas.getContext === "function"
      && typeof fileOrCanvas.width === "number" && typeof fileOrCanvas.height === "number";
    const isBitmapLike = typeof ImageBitmap !== "undefined" && fileOrCanvas instanceof ImageBitmap;
    if (isCanvasLike || isBitmapLike) return { source: fileOrCanvas, owned: false };
    // File/Blob: decode once here so both downscaleForSend and measure() work from the
    // same decoded bitmap rather than each independently re-decoding (downscaleForSend
    // would otherwise decode its OWN bitmap from the raw file a second time).
    let bitmap;
    try {
      bitmap = await createImageBitmap(fileOrCanvas);
    } catch (e) {
      const decodeErr = new Error("Could not decode image file — unsupported or corrupt image data.");
      decodeErr.name = "DecodeError";
      throw decodeErr;
    }
    return { source: bitmap, owned: true };
  },

  async _captureSlot(fileOrCanvas, { lossless } = {}) {
    let decoded;
    try {
      decoded = await this._decodeSource(fileOrCanvas);
    } catch (e) {
      throw this._annotateError(e);
    }
    const { source, owned } = decoded;
    try {
      const sendOpts = lossless ? [2048, "image/png", 1.0] : [1568, "image/jpeg", 0.85];
      let downscaled;
      try {
        downscaled = await METRICS.downscaleForSend(source, ...sendOpts);
      } catch (e) {
        const wrapped = new Error("Image downscale failed: " + (e && e.message));
        wrapped.name = "DecodeError";
        throw this._annotateError(wrapped);
      }
      // METRICS.measure moved inside the annotated try/catch (Task 7a hardening): it
      // previously ran AFTER this block closed, unguarded — a measure-time throw (e.g.
      // a degenerate 0-area canvas) would propagate un-annotated past ENGINE's error
      // boundary. "decode" is reused here (not a new "measure" kind) because from the
      // caller's perspective both failures mean the same thing — "this image could not
      // be turned into usable pixel data" — and the UI's decode-error banner text
      // already covers that case; anything unexpected falls to "other" via the same
      // _classifyError() path _annotateError() already runs.
      let metrics;
      try {
        metrics = METRICS.measure(source);
      } catch (e) {
        const wrapped = new Error("Image measurement failed: " + (e && e.message));
        wrapped.name = "DecodeError";
        throw this._annotateError(wrapped);
      }
      return { dataUrl: downscaled.dataUrl, metrics };
    } finally {
      if (owned && typeof source.close === "function") source.close();
    }
  },

  async setImage(slot, fileOrCanvas) {
    // Task 7a hardening: swapping ref/base/settings while analyze()/addAttempt()/
    // reanalyzeOtherTarget() is in flight would silently mismatch the session the
    // model is currently evaluating against the session the UI displays afterward —
    // throw a typed, catchable BusyError instead of letting that race happen.
    if (this._inFlight) {
      throw this._annotateError(new this.BusyError("ENGINE.setImage(): an analyze/attempt/reanalyze call is already in flight — wait for it to finish before swapping images."));
    }
    // A successful image set clears any stale error banner (#1) — but only after the
    // busy check above, so an in-flight BusyError is still recorded. If _captureSlot
    // rejects (undecodable file), _annotateError repopulates lastError with the decode
    // error, so this early clear never hides a genuine failure.
    this.lastError = null;
    const captured = await this._captureSlot(fileOrCanvas, { lossless: slot === "settings" });
    const s = this.session();
    if (slot === "ref") s.ref = captured;
    else if (slot === "base") s.base = captured;
    else if (slot === "settings") s.settingsShot = { dataUrl: captured.dataUrl };
    else throw new Error(`ENGINE.setImage: unknown slot "${slot}" (expected ref|base|settings)`);
    await this._persist();
    return captured;
  },

  // -- analyze(): requires ready-state (ref+base present). Builds metricsBundle =
  // {reference, base, diff} where diff = METRICS.diff(base, ref) — the diff() contract
  // is diff(a,b) = b-a, so diff(base,ref) reads as "reference minus base", i.e. what
  // must change to go FROM base TO reference. Images ordered ref, base, (settings).
  // Calls ADAPTER.call with SCHEMAS.emit_recipe + a validate callback bound to the
  // active target/mode; on success stores the cleaned recipe under
  // chains[activeTarget].recipe, persists, and returns it. ---------------------------
  // Task 7a hardening: the public entry point is a thin _guarded() wrapper around
  // _analyzeImpl — reanalyzeOtherTarget() calls _analyzeImpl DIRECTLY (not analyze()),
  // since by the time it does so it is already running INSIDE the shared _inFlight
  // gate; routing it back through analyze()/_guarded() would see the gate already
  // held (by reanalyzeOtherTarget's own outer call) and just hand back that same
  // promise instead of ever performing the actual analysis — a silent deadlock-shaped
  // bug, not a hang, but the analysis would simply never run. ------------------------
  analyze() {
    return this._guarded(() => this._analyzeImpl());
  },
  async _analyzeImpl() {
    const s = this.session();
    if (this.state() === "empty") {
      throw new Error("ENGINE.analyze(): requires both reference and base images to be set first.");
    }
    const target = s.activeTarget;
    const mode = "recipe";
    const metricsBundle = {
      reference: s.ref.metrics,
      base: s.base.metrics,
      diff: METRICS.diff(s.base.metrics, s.ref.metrics)
    };
    const images = [{ role: "reference", dataUrl: s.ref.dataUrl, mediaType: this._mediaTypeFromDataUrl(s.ref.dataUrl) },
                     { role: "base", dataUrl: s.base.dataUrl, mediaType: this._mediaTypeFromDataUrl(s.base.dataUrl) }];
    if (s.settingsShot) images.push({ role: "settings", dataUrl: s.settingsShot.dataUrl, mediaType: this._mediaTypeFromDataUrl(s.settingsShot.dataUrl) });

    const system = SCHEMAS.systemPrompt(target, mode);
    // buildUserContent is pure content-assembly (no network) — always the real ADAPTER,
    // even when ENGINE._adapter is a stub. Only .call() (the network-performing method)
    // is the injectable seam; see the SECTION: ADAPTER header ("ENGINE builds ...
    // userContent via ADAPTER.buildUserContent").
    const userContent = ADAPTER.buildUserContent({ mode, images, metricsBundle, context: s.context });
    const tool = SCHEMAS.emit_recipe;
    const validate = obj => SCHEMAS.validateRecipe(obj, target, undefined);

    let cleaned;
    try {
      cleaned = await (this._adapter || ADAPTER).call({ model: STORE.prefs().model, system, userContent, tool, validate });
    } catch (e) {
      throw this._annotateError(e);
    }

    s.chains[target].recipe = cleaned;
    // A fresh recipe resets the applied-toggle map: its rows default back to applied
    // (checked). Without this, an untick recorded against the PREVIOUS recipe would
    // silently leak onto a same-named param in the new one (Task 7a follow-up).
    s.chains[target].recipeApplied = null;
    await this._persist();
    return cleaned;
  },

  // -- addAttempt(fileOrCanvas): valid in analyzed/refining (i.e. the active target
  // already has a recipe — state() is "analyzed" or "refining", never "empty"/"ready").
  // Measures the attempt, scores it against the reference, builds metricsBundle =
  // {reference, attempt, diff: diff(attempt, ref)} (same base->reference convention:
  // diff(a,b)=b-a, so diff(attempt,ref) = "what must still change from this attempt to
  // reach the reference"), sends history = every prior round's moves (recipe's
  // values[] normalized into the same {param,from,to,applied,why} shape as a "round 0"
  // entry, then each stored attempt's correction.moves as subsequent rounds) with
  // per-move `applied` flags read from the real toggle maps (chain.recipeApplied for
  // round 0, att.appliedParams for correction rounds; absent map = all-true defaults,
  // and the round is then marked applied_assumed:true — see _historyForActiveChain).
  // "applied_assumed" also exists as the model's own flag in its OUTPUT schema; the
  // input-side round marker here is the honest mirror of it.
  // Stores {dataUrl, metrics, score, correction, appliedParams} in the chain, caps at
  // ATTEMPTS_CAP (oldest dataUrl dropped, its score retained — see _pushAttempt). ----
  // Round shape: {round, applied_assumed, moves[]}. `applied_assumed` is the honest
  // input-side marker (Task 7a follow-up): true ONLY when that round's backing map
  // (chain.recipeApplied for round 0, att.appliedParams for correction rounds) is
  // absent — its all-true applied flags are then defaults/assumptions, not
  // user-confirmed toggle state. When a map exists, applied_assumed is false and the
  // per-move `applied` values are the user's real toggle state. ADAPTER's history
  // text renders the per-move applied flags (the part the model acts on);
  // applied_assumed rides on the round object for tests/consumers of the structure.
  _historyForActiveChain() {
    const s = this.session();
    const chain = s.chains[s.activeTarget];
    const rounds = [];
    if (chain.recipe && Array.isArray(chain.recipe.values)) {
      rounds.push({
        round: 0,
        applied_assumed: !chain.recipeApplied,
        moves: chain.recipe.values.map(v => ({
          param: v.param, from: v.from, to: v.set,
          applied: chain.recipeApplied ? chain.recipeApplied[v.param] !== false : true,
          why: v.why
        }))
      });
    }
    chain.attempts.forEach((att, idx) => {
      if (att.correction && Array.isArray(att.correction.moves)) {
        rounds.push({
          // Monotonic attempt number (#8), matching the "ATTEMPT N:" label the model
          // saw for this attempt — not the array index+1, which would relabel every
          // round after the FIFO cap starts evicting.
          round: this._attemptNumberForChain(chain, idx),
          applied_assumed: !att.appliedParams,
          moves: att.correction.moves.map(m => ({
            param: m.param, from: m.from, to: m.to,
            applied: !att.appliedParams || att.appliedParams[m.param] !== false,
            why: m.why
          }))
        });
      }
    });
    return rounds;
  },

  // -- _pushAttempt(chain, entry): appends, then enforces ATTEMPTS_CAP by evicting from
  // the front. The array itself stays at exactly ATTEMPTS_CAP entries (per the plan's
  // 9th-attempt example: "keeps only the last 8"), but each evicted entry's `score` is
  // preserved on `chain._evictedScores` (dataUrl/metrics/correction are dropped — those
  // are the large fields; the plan only calls out the score as worth retaining).
  // `_evictedScores` itself is intentionally left UNCAPPED — it holds only a tiny
  // `{score}` per evicted attempt, cheap enough over a chain's whole lifetime that
  // bounding it is not worth the complexity (unlike attempts[] and its dataUrls). --
  _pushAttempt(chain, entry) {
    chain.attempts.push(entry);
    while (chain.attempts.length > this.ATTEMPTS_CAP) {
      const evicted = chain.attempts.shift();
      if (!Array.isArray(chain._evictedScores)) chain._evictedScores = [];
      chain._evictedScores.push({ score: evicted.score });
    }
  },

  // Task 7a hardening: public entry point is a thin _guarded() wrapper; see the
  // analyze()/_analyzeImpl() split comment above for why the guard lives at this
  // outer layer rather than inside the implementation.
  addAttempt(fileOrCanvas) {
    return this._guarded(() => this._addAttemptImpl(fileOrCanvas));
  },
  async _addAttemptImpl(fileOrCanvas) {
    const s = this.session();
    const state = this.state();
    if (state !== "analyzed" && state !== "refining") {
      throw new Error(`ENGINE.addAttempt(): active target must have a recipe first (state is "${state}"); call analyze() first.`);
    }
    const target = s.activeTarget;
    const chain = s.chains[target];
    const captured = await this._captureSlot(fileOrCanvas);
    const score = METRICS.score(s.ref.metrics, captured.metrics);

    const metricsBundle = {
      reference: s.ref.metrics,
      attempt: captured.metrics,
      diff: METRICS.diff(captured.metrics, s.ref.metrics)
    };
    // Monotonic attempt number for the "ATTEMPT N:" label — NOT chain.attempts.length+1,
    // which would stick at (ATTEMPTS_CAP+1) forever once eviction keeps the array length
    // pinned at the cap. Falls back to attempts.length+1 for a chain restored from a
    // session saved before _attemptCount existed (older STORE data / hand-built object).
    if (typeof chain._attemptCount !== "number") chain._attemptCount = chain.attempts.length;
    chain._attemptCount++;
    const attemptN = chain._attemptCount;
    const images = [
      { role: "reference", dataUrl: s.ref.dataUrl, mediaType: this._mediaTypeFromDataUrl(s.ref.dataUrl) },
      { role: "attempt", n: attemptN, dataUrl: captured.dataUrl, mediaType: this._mediaTypeFromDataUrl(captured.dataUrl) }
    ];
    const history = this._historyForActiveChain();
    const system = SCHEMAS.systemPrompt(target, "correction");
    const userContent = ADAPTER.buildUserContent({ mode: "correction", images, metricsBundle, context: s.context, history });
    const tool = SCHEMAS.emit_correction;
    const validate = obj => SCHEMAS.validateRecipe(obj, target, "correction");

    let cleaned;
    try {
      cleaned = await (this._adapter || ADAPTER).call({ model: STORE.prefs().model, system, userContent, tool, validate });
    } catch (e) {
      throw this._annotateError(e);
    }

    // appliedParams: created all-applied for the NEW attempt's own moves — the user
    // hasn't re-rendered against this correction yet, so "applied" is the truthful
    // starting state; UI.toggleApplied() updates individual entries afterward.
    const appliedParams = {};
    for (const mv of cleaned.moves) appliedParams[mv.param] = true;

    this._pushAttempt(chain, { dataUrl: captured.dataUrl, metrics: captured.metrics, score, correction: cleaned, appliedParams });
    await this._persist();
    return { score, correction: cleaned };
  },

  // -- reanalyzeOtherTarget(): flips activeTarget to the OTHER pack, then runs
  // analyze() against it using the ALREADY-STORED ref/base images/metrics (no
  // re-upload — analyze() reads from s.ref/s.base, which are untouched by this
  // switch). Leaves the original target's chain completely untouched: analyze()
  // writes only to chains[NEW activeTarget].recipe. -----------------------------------
  // Task 7a hardening: guarded at THIS outer layer; the impl calls _analyzeImpl()
  // directly (never the public analyze(), which would re-enter _guarded() and just
  // return the already-held in-flight promise without actually running).
  reanalyzeOtherTarget() {
    return this._guarded(() => this._reanalyzeOtherTargetImpl());
  },
  async _reanalyzeOtherTargetImpl() {
    const s = this.session();
    if (!s.ref || !s.base) throw new Error("ENGINE.reanalyzeOtherTarget(): requires reference and base images to already be set.");
    const other = s.activeTarget === "vray7max" ? "vantage33" : "vray7max";
    s.activeTarget = other;
    // Keep STORE.prefs().target in lockstep with the flip (#2): the topbar target
    // toggle and the "Re-analyze for <other>" button both read prefs.target, so
    // without this they would keep showing the OLD target and a second click could
    // burn a paid call against the wrong pack.
    STORE.setPrefs({ target: other });
    await this._persist();
    return this._analyzeImpl();
  },

  // -- _pruneSessions(): keeps only the newest SESSION_RETENTION_CAP sessions in IDB,
  // deleting older rows by `created` (highest survives — same ordering rule as
  // STORE.loadLatest()'s lexical-ISO comparison). Best-effort: a failure here (e.g.
  // STORE degraded to the in-memory fallback and _all()/deleteSession behave
  // unexpectedly) must never block boot() — caught and swallowed by the caller. -----
  async _pruneSessions() {
    const all = await STORE._all();
    if (all.length <= this.SESSION_RETENTION_CAP) return;
    const sorted = all.slice().sort((a, b) => (a.created > b.created ? -1 : a.created < b.created ? 1 : 0));
    const toDelete = sorted.slice(this.SESSION_RETENTION_CAP);
    for (const s of toDelete) {
      try { await STORE.deleteSession(s.id); } catch (e) { /* best-effort; one bad row must not stop the rest */ }
    }
  },

  // -- boot(): loads the latest session on startup. Never throws — a fresh install (no
  // session in STORE yet), or a STORE that degraded to in-memory-only, both just fall
  // through to a blank session via reset(). After loading (never before — pruning must
  // not delete the very session about to be restored), prunes IDB down to the newest
  // SESSION_RETENTION_CAP sessions (Task 7a hardening). Pruning failures are swallowed
  // here too — retention hygiene must never prevent the app from opening. -----------
  async boot() {
    try {
      const latest = await STORE.loadLatest();
      this._session = latest || this._blankSession();
    } catch (e) {
      this._annotateError(e);
      this._session = this._blankSession();
    }
    try {
      await this._pruneSessions();
    } catch (e) { /* retention hygiene is best-effort; never block boot on it */ }
    return this._session;
  }
};
ENGINE._adapter = ADAPTER;

/* ===== SECTION: UI ===== */
// DOM rendering + events. UI -> ENGINE only (pack display strings — ui_path, units —
// arrive through ENGINE.lookup()/activeChain()/attemptInfo(), never by reading PACKS
// or session().chains[...] directly). Every ENGINE call is awaited, then followed by
// one UI.render() — no incremental DOM patching; render() is idempotent, rebuilding
// #app's contents from ENGINE.state()/session()/attemptInfo()/activeChain() each time.
const UI = {
  // -- MODELS: the two gateway model picker options. ONE constant (per the task) so
  // a live-smoke id correction touches exactly one place. Values are the exact
  // gateway model id strings sent as `model` in every ADAPTER.call; STORE.prefs()'s
  // own default ("claude-opus-4-8") already matches this list's first entry. ------
  MODELS: [
    { value: "claude-opus-4-8", label: "Opus 4.8" },
    { value: "gpt-5.5", label: "GPT-5.5" }
  ],

  // -- routePaste(state, focusedSlot, filled) -> slot name | null. Pure decision
  // function (no DOM) shared by BOTH the Ctrl+V paste handler and the drag/drop
  // handler (drops never carry a focused slot, so calling this with focusedSlot=null
  // is exactly "drop mid-session = new attempt", per the task).
  //   state: "empty"|"ready"|"analyzed"|"refining" (ENGINE.state()'s exact vocabulary)
  //   focusedSlot: "ref"|"base"|"settings"|"attempt"|null — whichever slot the user
  //     last clicked to focus, if any; a focused slot ALWAYS wins outright, even over
  //     an earlier-priority empty slot, since focusing a slot is an explicit target.
  //   filled: {ref, base, settings} booleans — whether each NAMED slot already holds
  //     an image (the Attempt "slot" is not part of this map; it is never "empty" in
  //     the same sense — every paste/drop mid-session creates a brand new attempt).
  // Sticky-focus reconciliation (#7): a focused slot no longer wins UNCONDITIONALLY.
  // It wins when it is a sensible target — the Attempt slot (explicit), or a named slot
  // that is genuinely EMPTY (the "click an empty slot, then paste" flow). But a STALE
  // focus left on an already-FILLED named slot must NOT hijack a mid-session paste and
  // silently overwrite that anchor: once the session is analyzed/refining with ref+base
  // both present, such a paste falls through to the empty-slot priority and then to a
  // NEW ATTEMPT. Before analysis a focused slot still wins outright (there is no attempt
  // target yet, and overwriting a not-yet-committed anchor is the user's intent).
  // Priority after the focus decision: first EMPTY named slot in Reference->Base->
  // Settings order -> (once every named slot is filled) new attempt IF analyzed/refining
  // -> otherwise null (nothing sensible to route to; caller must not silently overwrite
  // an anchor slot with an unfocused, unrouted paste). -----------------------------
  routePaste(state, focusedSlot, filled) {
    const midSession = (state === "analyzed" || state === "refining") && !!filled.ref && !!filled.base;
    if (focusedSlot === "attempt") return "attempt";
    if (focusedSlot) {
      const focusedIsEmptyNamed = filled[focusedSlot] === false;
      if (focusedIsEmptyNamed) return focusedSlot; // click an empty slot then paste -> honored
      if (!midSession) return focusedSlot;         // pre-analysis: focus still wins outright
      // else: a stale focus on a FILLED slot mid-session — do not overwrite; fall through.
    }
    if (!filled.ref) return "ref";
    if (!filled.base) return "base";
    if (!filled.settings) return "settings";
    if (state === "analyzed" || state === "refining") return "attempt";
    return null;
  },

  // -- acceptsFile(file) -> {ok, reason}. Pure function over a File-like object
  // (reads only .type/.name — works against a real File/Blob or a plain fake object
  // in tests). Accepts exactly the three types the canvas decoder reliably handles
  // (image/png, image/jpeg, image/webp); rejects everything else — including a
  // completely empty type/name — with the spec's exact explanatory message so the
  // user knows WHY (not a generic "unsupported file" dead end). -------------------
  ACCEPTED_TYPES: ["image/png", "image/jpeg", "image/webp"],
  REJECT_MESSAGE: "LightMatch reads display-referred sRGB screenshots/saves — PNG or JPG from the VFB/Vantage, not linear EXR.",
  acceptsFile(file) {
    const type = (file && file.type) || "";
    if (this.ACCEPTED_TYPES.includes(type)) return { ok: true, reason: "" };
    return { ok: false, reason: this.REJECT_MESSAGE };
  },

  // -- isRecipeApplied(chain, param) -> bool. Pure init-state helper for the
  // recipe-row applied checkboxes (Task 7a follow-up): checked unless the chain's
  // recipeApplied map explicitly records false for this param. Deliberately the SAME
  // "absent/true = applied" rule ENGINE._historyForActiveChain applies to round-0
  // moves, so what the checkbox shows and what the next correction call sends can
  // never disagree. --------------------------------------------------------------
  isRecipeApplied(chain, param) {
    return !(chain && chain.recipeApplied && chain.recipeApplied[param] === false);
  },

  // -- buildSheet(recipe, target) -> human-readable copy-sheet text. Title line
  // "<target label> — LightMatch recipe" + a baseline line naming factory defaults
  // vs the settings screenshot in human words (not the raw enum string) + one
  // numbered line per value: "N. <ui_path>: <value><unit> (from <from>) — <why>" for
  // spinner/dropdown/slot rows, or "N. <ui_path>: <set> — <why>" (no unit, no "(from
  // ...)" pair — kind:"placement" values are instructions, not a baseline-anchored
  // measurement) for placement rows. Never throws on an unknown target — PACKS.lookup
  // degrades to null there and this function falls back to the bare param id rather
  // than dereferencing a null entry's .ui_path. ------------------------------------
  buildSheet(recipe, target) {
    const pack = PACKS[target];
    const label = pack ? pack.label : target;
    const lines = [`${label} — LightMatch recipe`];
    const baselineText = recipe.baseline === "settings_screenshot" ? "settings screenshot" : "factory defaults";
    lines.push(`baseline: ${baselineText}`);
    lines.push("");
    const values = Array.isArray(recipe.values) ? recipe.values : (Array.isArray(recipe.moves) ? recipe.moves : []);
    const valKey = Array.isArray(recipe.moves) ? "to" : "set";
    values.forEach((v, i) => {
      const entry = PACKS.lookup(target, v.param);
      const uiPath = entry ? entry.ui_path : v.param;
      const isPlacement = entry && entry.kind === "placement";
      const n = i + 1;
      const why = v.why ? ` — ${v.why}` : "";
      if (isPlacement) {
        lines.push(`${n}. ${uiPath}: ${v[valKey]}${why}`);
      } else {
        // Unit appended only for a genuinely numeric value — see the matching guard
        // in _valueRowHtml (SECTION: UI DOM rendering) for the malformed-model-value
        // rationale (a spinner-kind entry's value SHOULD always be numeric, but
        // SCHEMAS.validateRecipe does not itself enforce that by kind).
        const unit = entry && entry.unit && typeof v[valKey] === "number" ? entry.unit : "";
        lines.push(`${n}. ${uiPath}: ${v[valKey]}${unit} (from ${v.from})${why}`);
      }
    });
    return lines.join("\n");
  },

  // -- transient (non-persisted) UI-only state: which slot is currently focused
  // (click-to-focus, per spec) and whether an ENGINE action is in flight (drives the
  // Analyze button's spinner/disabled state — separate from ENGINE._inFlight, which
  // UI has no business reading directly; UI tracks its OWN "am I awaiting a call"
