  const historyBlock = contentRefine.find(b => b.type === "text" && /sun\.kelvin/.test(b.text) && /5200/.test(b.text));
  this.ok(!!historyBlock, "refine mode: move history block present and mentions a prior move's param/value");
  this.ok(/applied/i.test(historyBlock.text), "refine mode: history block mentions the applied set");
  // recipe (non-refine) mode must NOT include a history block, even if history were accidentally passed
  this.ok(!contentAnalyze.some(b => b.type === "text" && /round.*1.*moves|move history/i.test(b.text)), "recipe mode: no move-history block appears");

  // -- alternating text/image order contract: every image block is immediately
  // preceded by a text block (the label) --------------------------------------------
  for (const content of [contentAnalyze, contentWithSettings, contentRefine]) {
    for (let i = 0; i < content.length; i++) {
      if (content[i].type === "image") this.ok(content[i - 1] && content[i - 1].type === "text", `image block at index ${i} is immediately preceded by a text block`);
    }
  }

  // -- call/buildUserContent structural checks (no network) --------------------------
  this.ok(typeof ADAPTER.call === "function", "ADAPTER.call is a function");
  this.ok(typeof ADAPTER.buildUserContent === "function", "ADAPTER.buildUserContent is a function");

  // -- STORE.setKey trims pasted whitespace/newlines (mystifying-401 guard) ----------
  // Restores whatever key was there before, so a real user key survives a ?selftest run.
  const priorKey = localStorage.getItem("lm_key");
  try {
    STORE.setKey("  oc_padded\n");
    this.ok(STORE.key() === "oc_padded", `STORE.setKey trims whitespace/newlines (got ${JSON.stringify(STORE.key())})`);
  } finally {
    if (priorKey === null) localStorage.removeItem("lm_key"); else localStorage.setItem("lm_key", priorKey);
  }

  // -- evidence precision: numbers in the metrics bundle serialize at 4 decimals -----
  const contentPrecision = ADAPTER.buildUserContent({
    mode: "recipe",
    images: [],
    metricsBundle: { diff: { "lum.p50": 0.123456789012345, "wb.tint": -0.0333333333333333 } },
    context: {}
  });
  const evPrec = contentPrecision.find(b => b.type === "text" && /COMPUTED EVIDENCE/.test(b.text));
  this.ok(!!evPrec && !/\.\d{9,}/.test(evPrec.text), "evidence text carries no digit-run longer than 8 after a decimal point");
  this.ok(evPrec.text.includes("0.1235"), `long-precision number rounded to 4 decimals in evidence text (got: ${evPrec.text.slice(evPrec.text.indexOf("{"))})`);

  // -- mocked-fetch coverage of ADAPTER.call's retry / auth / shape / re-ask / timeout
  // paths. globalThis.fetch is stubbed (no socket ever opens) and restored in finally,
  // as are BACKOFF_MS (→1ms so retries don't stall the suite) and TIMEOUT_MS. --------
  const realFetch = globalThis.fetch;
  const realBackoff = ADAPTER.BACKOFF_MS;
  const realTimeout = ADAPTER.TIMEOUT_MS;
  try {
    ADAPTER.BACKOFF_MS = [1, 1, 1];
    let calls = [];
    let queue = [];
    globalThis.fetch = (url, opts) => {
      calls.push({ url, opts, body: JSON.parse(opts.body) });
      const next = queue.shift();
      if (!next) return Promise.reject(new Error("fetch stub queue exhausted"));
      return next(url, opts);
    };
    const res200 = json => () => Promise.resolve({ ok: true, status: 200, json: async () => json, text: async () => JSON.stringify(json) });
    const resStatus = status => () => Promise.resolve({ ok: false, status, json: async () => ({}), text: async () => "" });
    const TOOL = { name: "emit_recipe" };
    const okBody = { content: [{ type: "tool_use", id: "tu_ok1", name: "emit_recipe", input: { fine: true } }] };

    // (a) 429 then 200-with-tool_use -> resolves; exactly 2 fetch calls
    calls = []; queue = [resStatus(429), res200(okBody)];
    const rA = await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL });
    this.ok(rA.fine === true, "mocked (a): 429 then 200 resolves with the tool input");
    this.ok(calls.length === 2, `mocked (a): exactly 2 fetch calls (got ${calls.length})`);

    // (b) 401 -> AuthError; exactly 1 call
    calls = []; queue = [resStatus(401)];
    let threwB = null;
    try { await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL }); } catch (e) { threwB = e; }
    this.ok(threwB instanceof ADAPTER.AuthError, "mocked (b): 401 throws ADAPTER.AuthError");
    this.ok(calls.length === 1, `mocked (b): exactly 1 fetch call, no retry (got ${calls.length})`);

    // (c) 200 with no tool_use block -> ShapeError carrying .raw
    calls = []; queue = [res200({ content: [{ type: "text", text: "prose answer, no tool call" }] })];
    let threwC = null;
    try { await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL }); } catch (e) { threwC = e; }
    this.ok(threwC instanceof ADAPTER.ShapeError, "mocked (c): 200 without tool_use throws ShapeError");
    this.ok(!!threwC && typeof threwC.raw === "string" && threwC.raw.includes("prose answer"), "mocked (c): ShapeError carries .raw with the response text");

    // (d) validate-fail then valid: second request body must be WIRE-VALID — the
    // assistant tool_use turn answered by a user turn whose content[0] is a
    // tool_result with the matching tool_use_id, is_error true, and the mandated
    // sentence; returns cleaned; exactly 2 calls.
    const badBody = { content: [{ type: "tool_use", id: "tu_bad1", name: "emit_recipe", input: { bad: true } }] };
    const validateFn = inp => inp.bad ? { ok: false, errors: ["values[0]: nonsense"], cleaned: null } : { ok: true, errors: [], cleaned: { cleaned: true } };
    calls = []; queue = [res200(badBody), res200(okBody)];
    const rD = await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL, validate: validateFn });
    this.ok(rD.cleaned === true, "mocked (d): re-ask returns the validated cleaned object");
    this.ok(calls.length === 2, `mocked (d): exactly 2 fetch calls (got ${calls.length})`);
    const secondMsgs = calls[1] ? calls[1].body.messages : [];
    this.ok(secondMsgs.length === 3, `mocked (d): second request has 3 messages (got ${secondMsgs.length})`);
    this.ok(secondMsgs[1] && secondMsgs[1].role === "assistant" && Array.isArray(secondMsgs[1].content) && secondMsgs[1].content.some(b => b.type === "tool_use" && b.id === "tu_bad1"), "mocked (d): second request carries the assistant turn with the original tool_use block");
    const reAskTurn = secondMsgs[2] || {};
    this.ok(reAskTurn.role === "user" && Array.isArray(reAskTurn.content), "mocked (d): final turn is a user turn with array content");
    const toolResult = Array.isArray(reAskTurn.content) ? reAskTurn.content[0] : null;
    this.ok(!!toolResult && toolResult.type === "tool_result", "mocked (d): user turn content[0] is a tool_result block (wire-valid re-ask)");
    this.ok(!!toolResult && toolResult.tool_use_id === "tu_bad1", `mocked (d): tool_result.tool_use_id matches the assistant tool_use id (got ${toolResult && toolResult.tool_use_id})`);
    this.ok(!!toolResult && toolResult.is_error === true, "mocked (d): tool_result.is_error === true");
    this.ok(!!toolResult && typeof toolResult.content === "string" && toolResult.content.includes("Your emit was invalid") && toolResult.content.includes("Re-emit the full corrected tool call."), "mocked (d): tool_result content carries the mandated re-ask sentence");

    // (e) validate fails twice -> throws; exactly 2 calls, never a third
    calls = []; queue = [res200(badBody), res200(badBody)];
    let threwE = null;
    try { await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL, validate: validateFn }); } catch (e) { threwE = e; }
    this.ok(!!threwE, "mocked (e): double validate-fail throws");
    this.ok(calls.length === 2, `mocked (e): exactly 2 fetch calls, never a third (got ${calls.length})`);

    // (f) hung fetch: never resolves on its own, rejects with AbortError when the
    // per-attempt TIMEOUT_MS AbortController fires -> treated as retryable, then a
    // 200 succeeds on attempt 2.
    ADAPTER.TIMEOUT_MS = 50;
    calls = [];
    queue = [
      (url, opts) => new Promise((resolve, reject) => {
        opts.signal.addEventListener("abort", () => {
          const e = new Error("The operation was aborted.");
          e.name = "AbortError";
          reject(e);
        });
      }),
      res200(okBody)
    ];
    const rF = await ADAPTER.call({ model: "m", system: "s", userContent: [], tool: TOOL });
    this.ok(rF.fine === true, "mocked (f): hung fetch aborts at TIMEOUT_MS, retries, succeeds on attempt 2");
    this.ok(calls.length === 2, `mocked (f): exactly 2 fetch calls (got ${calls.length})`);
    this.ok(calls[0].opts.signal instanceof AbortSignal, "mocked (f): fetch receives a per-attempt AbortSignal");
  } finally {
    globalThis.fetch = realFetch;
    ADAPTER.BACKOFF_MS = realBackoff;
    ADAPTER.TIMEOUT_MS = realTimeout;
  }
};

// -- suite: metrics (Task 3) ---------------------------------------------------------
SELFTEST.suites.metrics = async function () {
  // -- synthetic canvas builders --------------------------------------------------
  function solidCanvas(w, h, r, g, b) {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, 0, w, h);
    return c;
  }
  // Held-black / ramp / held-white: flat margins guarantee the tail percentiles land
  // in the flat regions regardless of gamma compression (a plain 2-stop 0->255 ramp
  // asymptotically caps its linear-luminance p95 near 0.89 because of the sRGB gamma
  // curve — see docs/superpowers/plans note; this 4-stop shape is still an honest
  // "horizontal black->white gradient" test strip).
  function hGradientCanvas(w, h) {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    const grad = ctx.createLinearGradient(0, 0, w, 0);
    grad.addColorStop(0, "rgb(0,0,0)");
    grad.addColorStop(0.15, "rgb(0,0,0)");
    grad.addColorStop(0.85, "rgb(255,255,255)");
    grad.addColorStop(1, "rgb(255,255,255)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    return c;
  }
  // Two flat vertical halves of different solid colors — used to distinguish whole-image
  // vs shadow-only vs highlight-only statistics (unlike a solid-color canvas, where every
  // pixel is simultaneously the shadow AND highlight set, so the three interpretations
  // are numerically indistinguishable).
  function twoHalfCanvas(w, h, leftRgb, rightRgb) {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.fillStyle = `rgb(${leftRgb[0]},${leftRgb[1]},${leftRgb[2]})`;
    ctx.fillRect(0, 0, w / 2, h);
    ctx.fillStyle = `rgb(${rightRgb[0]},${rightRgb[1]},${rightRgb[2]})`;
    ctx.fillRect(w / 2, 0, w / 2, h);
    return c;
  }

  // -- solid gray 128 ---------------------------------------------------------------
  const gray = solidCanvas(64, 64, 128, 128, 128);
  const mGray = METRICS.measure(gray);
  this.close(mGray.lum.p50, 0.2159, 0.01, "gray128: lum.p50");
  this.ok(mGray.clip.hi === 0 && mGray.clip.lo === 0, "gray128: clip.hi===0 && clip.lo===0");
  this.close(mGray.sat.mean, 0, 0.001, "gray128: sat.mean≈0");
  for (let i = 0; i < 16; i++) this.close(mGray.grid[i], mGray.grid[0], 0.001, `gray128: grid[${i}] equals grid[0]`);

  // -- solid 255 / solid 0 ------------------------------------------------------------
  const white = solidCanvas(32, 32, 255, 255, 255);
  const mWhite = METRICS.measure(white);
  this.ok(mWhite.clip.hi === 1, "white255: clip.hi===1");
  this.ok(mWhite.clip.lo === 0, "white255: clip.lo===0 (sanity)");

  const black = solidCanvas(32, 32, 0, 0, 0);
  const mBlack = METRICS.measure(black);
  this.ok(mBlack.clip.lo === 1, "black0: clip.lo===1");
  this.ok(mBlack.clip.hi === 0, "black0: clip.hi===0 (sanity)");

  // -- horizontal black->white gradient ------------------------------------------------
  const grad = hGradientCanvas(256, 64);
  const mGrad = METRICS.measure(grad);
  this.ok(mGrad.grid[0] < mGrad.grid[3], "gradient: grid[0] < grid[3] (darker left, brighter right)");
  this.ok(mGrad.lum.p5 < 0.02, `gradient: lum.p5 < 0.02 (got ${mGrad.lum.p5})`);
  this.ok(mGrad.lum.p95 > 0.9, `gradient: lum.p95 > 0.9 (got ${mGrad.lum.p95})`);
  this.ok(mGrad.contrast.spread > 0.9, `gradient: contrast.spread > 0.9 (got ${mGrad.contrast.spread})`);

  // -- red vs blue: warmth sign -------------------------------------------------------
  const red = solidCanvas(32, 32, 255, 0, 0);
  const mRed = METRICS.measure(red);
  this.ok(mRed.wb.warmthShadow > 0, `red: wb.warmthShadow > 0 (got ${mRed.wb.warmthShadow})`);

  const blue = solidCanvas(32, 32, 0, 0, 255);
  const mBlue = METRICS.measure(blue);
  this.ok(mBlue.wb.warmthShadow < 0, `blue: wb.warmthShadow < 0 (got ${mBlue.wb.warmthShadow})`);

  // -- green: tint sign ---------------------------------------------------------------
  const green = solidCanvas(32, 32, 0, 255, 0);
  const mGreen = METRICS.measure(green);
  this.ok(mGreen.wb.tint > 0, `green: wb.tint > 0 (got ${mGreen.wb.tint})`);

  // -- tint design lock: whole-image mean linear r,g,b, not shadow-only or highlight-only.
  // The contract's return shape has a single `tint` field (no tintShadow/tintHighlight
  // pair), unlike warmth which is explicitly split. Left half = neutral dark gray
  // (would read tint~=0 if shadow-only), right half = green-tinted bright (would read
  // tint~=0.422 if highlight-only). Whole-image mean lands at ~0.211 (see the METRICS
  // section's tint comment for the full rationale).
  const twoTone = twoHalfCanvas(64, 32, [40, 40, 40], [200, 255, 200]);
  const mTwoTone = METRICS.measure(twoTone);
  this.close(mTwoTone.wb.tint, 0.2112, 0.01, `two-tone: wb.tint is the whole-image mean (not highlight-only 0.422, not shadow-only 0)`);

  // -- diff / score identities ---------------------------------------------------------
  const dSelf = METRICS.diff(mGray, mGray);
  let allZero = true;
  for (const k of Object.keys(dSelf)) if (Math.abs(dSelf[k]) > 1e-9) allZero = false;
  this.ok(allZero, "diff(m,m) is all-zero");
  this.ok(METRICS.score(mGray, mGray) === 0, "score(m,m) === 0");
  const s = METRICS.score(mGray, mGrad);
  this.ok(s > 10, `score(gray128, gradient) > 10 (got ${s})`);

  // -- weights<->diff lock: every SCORE_WEIGHTS key must exist in diff()'s output, so
  // score() never silently reads `undefined` (falls back to 0) for a weighted term
  // because a key drifted out of sync between the two tables.
  const diffKeys = new Set(Object.keys(METRICS.diff(mGray, mGray)));
  for (const key of Object.keys(METRICS.SCORE_WEIGHTS)) this.ok(diffKeys.has(key), `SCORE_WEIGHTS key "${key}" exists in diff() output`);

  // -- thumb contract ------------------------------------------------------------------
  const big = solidCanvas(4000, 2000, 200, 150, 100);
  const th = METRICS.thumb(big, 256);
  this.ok(th.width === 256 && th.height === 128, `thumb(4000x2000,256): width===256 && height===128 (got ${th.width}x${th.height})`);

  // -- downscaleForSend: lossy default (maxEdge=1568, image/jpeg) ---------------------
  const lossy = await METRICS.downscaleForSend(big, 1568, "image/jpeg", 0.85);
  this.ok(lossy.w === 1568 && lossy.h === 784, `downscaleForSend lossy: w===1568 && h===784 (got ${lossy.w}x${lossy.h})`);
  this.ok(typeof lossy.dataUrl === "string" && lossy.dataUrl.startsWith("data:image/jpeg"), "downscaleForSend lossy: dataUrl prefix matches image/jpeg");

  // -- downscaleForSend: lossless variant (maxEdge=2048, image/png) for the settings screenshot --
  const lossless = await METRICS.downscaleForSend(big, 2048, "image/png", 1.0);
  this.ok(lossless.w === 2048 && lossless.h === 1024, `downscaleForSend lossless: w===2048 && h===1024 (got ${lossless.w}x${lossless.h})`);
  this.ok(typeof lossless.dataUrl === "string" && lossless.dataUrl.startsWith("data:image/png"), "downscaleForSend lossless: dataUrl prefix matches image/png");

  // -- downscaleForSend: default args (no maxEdge/type/q passed) behave like the lossy defaults --
  const defaults = await METRICS.downscaleForSend(big);
  this.ok(defaults.w === 1568 && defaults.h === 784, `downscaleForSend defaults: w===1568 && h===784 (got ${defaults.w}x${defaults.h})`);
  this.ok(defaults.dataUrl.startsWith("data:image/jpeg"), "downscaleForSend defaults: dataUrl prefix image/jpeg");

  // -- downscaleForSend never upscales a source already <= maxEdge --------------------
  const small = solidCanvas(64, 48, 10, 20, 30);
  const notUpscaled = await METRICS.downscaleForSend(small, 1568, "image/jpeg", 0.85);
  this.ok(notUpscaled.w === 64 && notUpscaled.h === 48, `downscaleForSend: source <= maxEdge is not upscaled (got ${notUpscaled.w}x${notUpscaled.h})`);

  // -- edge case: 1x1 image does not crash and returns a well-formed measurement -------
  const onePx = solidCanvas(1, 1, 90, 60, 30);
  const mOnePx = METRICS.measure(onePx);
  this.ok(Number.isFinite(mOnePx.lum.p50), `1x1: lum.p50 is finite (got ${mOnePx.lum.p50})`);
  this.ok(Array.isArray(mOnePx.grid) && mOnePx.grid.length === 16 && mOnePx.grid.every(Number.isFinite), "1x1: grid is 16 finite numbers");
  this.ok(Number.isFinite(mOnePx.wb.warmthShadow) && Number.isFinite(mOnePx.wb.tint), "1x1: wb warmth/tint finite (shadow/highlight sets non-empty)");
  const thOnePx = METRICS.thumb(onePx, 256);
  this.ok(thOnePx.width === 1 && thOnePx.height === 1, `1x1: thumb does not upscale (got ${thOnePx.width}x${thOnePx.height})`);

  // -- edge case: extreme thin aspect ratio does not produce a zero-dimension thumb ----
  // 1000x1 at scale 256/1000=0.256 would round(1*0.256)=0 without a floor-of-1 guard.
  const thinWide = solidCanvas(1000, 1, 40, 80, 120);
  const thThinWide = METRICS.thumb(thinWide, 256);
  this.ok(thThinWide.width === 256 && thThinWide.height === 1, `thin 1000x1: thumb w===256,h===1 (got ${thThinWide.width}x${thThinWide.height})`);
  const mThinWide = METRICS.measure(thinWide);
  this.ok(Number.isFinite(mThinWide.lum.p50), "thin 1000x1: measure does not crash / produces finite lum.p50");

  const thinTall = solidCanvas(1, 1000, 40, 80, 120);
  const thThinTall = METRICS.thumb(thinTall, 256);
  this.ok(thThinTall.width === 1 && thThinTall.height === 256, `thin 1x1000: thumb w===1,h===256 (got ${thThinTall.width}x${thThinTall.height})`);

  // -- edge case: all-black wb/sat do not NaN (0/0-style guards) -----------------------
  this.ok(Number.isFinite(mBlack.wb.warmthShadow) && Number.isFinite(mBlack.wb.tint), "all-black: wb warmth/tint finite, not NaN");
  this.ok(Number.isFinite(mBlack.sat.mean) && mBlack.sat.mean === 0, "all-black: sat.mean===0, not NaN");
};

// -- suite: engine (Task 6) -- STORE (localStorage prefs + IndexedDB sessions) and
// ENGINE (state machine + orchestration). ADAPTER is stubbed via ENGINE._adapter —
// NO real network call is ever made (globalThis.fetch is never touched here). All
// test session ids are prefixed "selftest-" and deleted at the end (in a finally)
// so repeated runs never accumulate rows in the real `lightmatch` IDB database.
SELFTEST.suites.engine = async function () {
  function solidCanvas(w, h, r, g, b) {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, 0, w, h);
    return c;
  }

  // -- STORE.prefs / setPrefs: localStorage-backed, defaults + merge-patch ----------
  const priorPrefsRaw = localStorage.getItem("lm_prefs");
  try {
    localStorage.removeItem("lm_prefs");
    const defaults = STORE.prefs();
    this.ok(defaults.model === "claude-opus-4-8", `STORE.prefs() default model is claude-opus-4-8 (got ${defaults.model})`);
    this.ok(defaults.target === "vray7max", `STORE.prefs() default target is vray7max (got ${defaults.target})`);
    STORE.setPrefs({ target: "vantage33" });
    const afterPatch = STORE.prefs();
    this.ok(afterPatch.target === "vantage33", "STORE.setPrefs patches target");
    this.ok(afterPatch.model === "claude-opus-4-8", "STORE.setPrefs merge keeps prior model untouched by an unrelated patch");
    STORE.setPrefs({ model: "gpt-5.5" });
    this.ok(STORE.prefs().model === "gpt-5.5" && STORE.prefs().target === "vantage33", "STORE.setPrefs merges (both patches survive)");
  } finally {
    if (priorPrefsRaw === null) localStorage.removeItem("lm_prefs"); else localStorage.setItem("lm_prefs", priorPrefsRaw);
  }

  // -- STORE.persistent flag: exists and is boolean (IDB open succeeded on this real
  // Chrome profile per probe 0.5; the flag still must be inspectable either way) ----
  this.ok(typeof STORE.persistent === "boolean", `STORE.persistent is a boolean (got ${typeof STORE.persistent})`);

  // -- STORE session round-trip: save, then read back via a FRESH loadLatest() and
  // compare ids. Uses a selftest-prefixed id + later timestamp so it sorts as the
  // latest without disturbing any real session the user has saved. -----------------
  const testId1 = "selftest-" + Date.now() + "-a";
  const testId2 = "selftest-" + Date.now() + "-b";
  try {
    const sessionA = {
      id: testId1, created: new Date(Date.now() - 10000).toISOString(),
      context: { scene: "exterior", time: "golden hour", rig: "sun+dome" },
      ref: { dataUrl: "data:image/png;base64,AAAA", metrics: { lum: { p50: 0.2 } } },
      base: { dataUrl: "data:image/png;base64,BBBB", metrics: { lum: { p50: 0.3 } } },
      settingsShot: null, activeTarget: "vray7max",
      chains: { vray7max: { recipe: null, attempts: [] }, vantage33: { recipe: null, attempts: [] } }
    };
    await STORE.saveSession(sessionA);
    const loaded1 = await STORE.loadLatest();
    this.ok(!!loaded1 && loaded1.id === testId1, `STORE.saveSession/loadLatest round-trip: id matches (got ${loaded1 && loaded1.id})`);
    this.ok(loaded1.context.scene === "exterior", "STORE round-trip: nested context field survives");
    this.ok(loaded1.chains.vray7max.attempts.length === 0, "STORE round-trip: chains structure survives");

    // -- loadLatest picks the HIGHEST `created`, not insertion order -----------------
    const sessionB = Object.assign({}, sessionA, { id: testId2, created: new Date().toISOString() });
    await STORE.saveSession(sessionB);
    const loaded2 = await STORE.loadLatest();
    this.ok(!!loaded2 && loaded2.id === testId2, `STORE.loadLatest returns the highest-created session (got ${loaded2 && loaded2.id})`);

    // -- saveSession upserts by id: saving testId1 again with a change updates in place,
    // does not create a duplicate row, and does not change which id is "latest" -------
    const sessionA2 = Object.assign({}, sessionA, { activeTarget: "vantage33" });
    await STORE.saveSession(sessionA2);
    const stillLatestIsB = await STORE.loadLatest();
    this.ok(stillLatestIsB.id === testId2, "STORE.saveSession upsert: re-saving an older id does not change which session is latest");

    // -- exportJSON / importJSON round-trip -------------------------------------------
    const exported = await STORE.exportJSON(sessionB);
    this.ok(typeof exported === "string", "STORE.exportJSON returns a string");
    const parsedExport = JSON.parse(exported);
    this.ok(parsedExport.id === testId2, "STORE.exportJSON: parsed JSON carries the session id");
    // exportJSON with NO argument falls back to STORE's own "current" (latest saved) --
    const exportedNoArg = await STORE.exportJSON();
    this.ok(JSON.parse(exportedNoArg).id === testId2, `STORE.exportJSON() with no arg exports the latest saved session (got ${JSON.parse(exportedNoArg).id})`);
    const importTargetId = "selftest-" + Date.now() + "-imported";
    const toImport = Object.assign({}, sessionB, { id: importTargetId, created: new Date().toISOString() });
    await STORE.importJSON(JSON.stringify(toImport));
    const loadedImport = await STORE.loadLatest();
    this.ok(loadedImport.id === importTargetId, "STORE.importJSON: saves and becomes loadLatest's result");
    await STORE.deleteSession(importTargetId);
  } finally {
    // -- cleanup: remove every selftest-* row this run created so repeated runs never
    // accumulate rows in the real `lightmatch` database. ------------------------------
    for (const id of [testId1, testId2]) { try { await STORE.deleteSession(id); } catch (e) {} }
  }

  // -- stub adapter: resolves immediately with a minimal VALID recipe/correction built
  // from REAL pack ids (cam.iso / cm.contrast), so SCHEMAS.validateRecipe(obj, target,
  // mode) genuinely passes rather than being hand-waved. Records every call() for
  // assertion on what ENGINE actually sent (mode, target implied by pack ids used,
  // image roles/order). NO network: this replaces ENGINE._adapter, globalThis.fetch is
  // never touched by this suite. -----------------------------------------------------
  // Per-target param ids (real pack ids, both targets) so the stub's recipe/correction
  // passes SCHEMAS.validateRecipe no matter which pack is active when it's called —
  // reanalyzeOtherTarget() switches ENGINE to the vantage33 pack mid-suite, and
  // vray7max-only ids (e.g. cam.iso) are correctly rejected as "unknown param" there.
  const STUB_PARAMS = {
    vray7max: ["cam.iso", "cm.contrast", "cam.fnumber", "vfb.exposure"],
    vantage33: ["cam.exposure_value", "post.contrast", "sun.intensity", "env.intensity"]
  };
  function detectTargetFromSystem(system) {
    if (typeof system === "string" && system.includes("Chaos Vantage 3.3")) return "vantage33";
    return "vray7max"; // default/fallback: also correct whenever the vray7max fragment is present
  }
  function makeStubAdapter() {
    const calls = [];
    return {
      calls,
      async call({ model, system, userContent, tool, validate }) {
        calls.push({ model, system, userContent, tool, validate });
        const isCorrection = tool.name === "emit_correction";
        const target = detectTargetFromSystem(system);
        const [p1, p2, p3, p4] = STUB_PARAMS[target];
        const obj = isCorrection ? {
          moves: [
            { param: p1, to: 200, from: 100, step: 1, confidence: "high", why: "stub brighten" },
            { param: p2, to: 0.1, from: 0, step: 5, confidence: "medium", why: "stub lift" }
          ],
          rationale: "stub correction", status: "continue", status_reason: "", applied_assumed: true
        } : {
          baseline: "factory_defaults", hdri_mood: "stub overcast",
          values: [
            { param: p1, set: 200, from: 100, step: 1, confidence: "high", why: "stub brighten" },
            { param: p2, set: 0.1, from: 0, step: 5, confidence: "medium", why: "stub lift" },
            { param: p3, set: 5.6, from: 8.0, step: 1, confidence: "high", why: "stub open up" },
            { param: p4, set: 0.3, from: 0, step: 1, confidence: "medium", why: "stub brighten more" }
          ],
          rationale: "stub recipe", gi_notes: "stub gi notes", status: "continue", status_reason: ""
        };
        const result = typeof validate === "function" ? validate(obj) : { ok: true, errors: [], cleaned: obj };
        if (!result.ok) throw new Error("stub adapter produced an object that failed validate(): " + JSON.stringify(result.errors));
        return result.cleaned;
      }
    };
  }

  // -- ENGINE state machine: empty -> ready -> analyzed -> refining -----------------
  // _testSessionId is set BEFORE the first reset() — reset()/_blankSession() reads it
  // at session-creation time, so setting it any later would leave that first blank
  // session on a random "lm-..." id that every subsequent _persist() call keeps
  // re-saving under (never cleaned up by the selftest-prefixed sweep below). This was
  // a real flake: it leaked a real-looking "lm-..." session with a fresh `created`
  // timestamp on every suite run, which could then outrank the STORE round-trip
  // section's deliberately-backdated test session in a LATER run's loadLatest().
  const engineTestId = "selftest-" + Date.now() + "-engine";
  ENGINE._testSessionId = engineTestId; // deterministic id so cleanup can find + delete it
  try {
    ENGINE.reset();
    this.ok(ENGINE.state() === "empty", `ENGINE starts in "empty" state (got ${ENGINE.state()})`);

    const stub = makeStubAdapter();
    ENGINE._adapter = stub;

    const refCanvas = solidCanvas(16, 16, 200, 180, 150);
    const baseCanvas = solidCanvas(16, 16, 120, 130, 140);

    await ENGINE.setImage("ref", refCanvas);
    this.ok(ENGINE.state() === "empty", "ENGINE: ref alone is not enough to reach ready (still empty)");
    await ENGINE.setImage("base", baseCanvas);
    this.ok(ENGINE.state() === "ready", `ENGINE: ref+base present -> ready (got ${ENGINE.state()})`);

    const sessionAfterImages = ENGINE.session();
    this.ok(!!sessionAfterImages.ref && typeof sessionAfterImages.ref.dataUrl === "string" && sessionAfterImages.ref.dataUrl.startsWith("data:"), "ENGINE.setImage(ref): stores a dataUrl on the session");
    this.ok(!!sessionAfterImages.ref.metrics && typeof sessionAfterImages.ref.metrics.lum.p50 === "number", "ENGINE.setImage(ref): stores METRICS.measure() output alongside the dataUrl");
    this.ok(!!sessionAfterImages.base && !!sessionAfterImages.base.metrics, "ENGINE.setImage(base): stores dataUrl + metrics too");

    // -- analyze(): requires ready-state, calls the (stubbed) adapter once, stores the
    // validated recipe under chains[activeTarget].recipe, transitions to analyzed ----
    STORE.setPrefs({ target: "vray7max" });
    ENGINE.setActiveTarget("vray7max");
    await ENGINE.analyze();
    this.ok(ENGINE.state() === "analyzed", `ENGINE.analyze(): state -> analyzed (got ${ENGINE.state()})`);
    this.ok(stub.calls.length === 1, `ENGINE.analyze(): calls the adapter exactly once (got ${stub.calls.length})`);
    const analyzeCall = stub.calls[0];
    this.ok(analyzeCall.tool.name === "emit_recipe", "ENGINE.analyze(): uses the emit_recipe tool");
    this.ok(typeof analyzeCall.system === "string" && analyzeCall.system.includes("V-Ray 7 for 3ds Max"), "ENGINE.analyze(): system prompt built for the active target (vray7max)");
    const sessionAfterAnalyze = ENGINE.session();
    this.ok(!!sessionAfterAnalyze.chains.vray7max.recipe, "ENGINE.analyze(): recipe stored under chains.vray7max.recipe");
    this.ok(Array.isArray(sessionAfterAnalyze.chains.vray7max.recipe.values) && sessionAfterAnalyze.chains.vray7max.recipe.values.length === 4, "ENGINE.analyze(): stored recipe carries the stub's 4 values");
    this.ok(sessionAfterAnalyze.chains.vantage33.recipe === null, "ENGINE.analyze(): the OTHER target's chain is untouched (still null)");

    // -- metricsBundle sent to the adapter: {reference, base, diff} with diff = base->reference
    const sentBundle = JSON.parse(analyzeCall.userContent.find(b => b.type === "text" && /COMPUTED EVIDENCE/.test(b.text)).text.split("\n").slice(1).join("\n"));
    this.ok(!!sentBundle.reference && !!sentBundle.base && !!sentBundle.diff, "ENGINE.analyze(): metricsBundle sent has reference/base/diff keys");
    const expectedDiff = METRICS.diff(sessionAfterImages.base.metrics, sessionAfterImages.ref.metrics);
    this.close(sentBundle.diff["lum.p50"], expectedDiff["lum.p50"], 1e-3, "ENGINE.analyze(): diff direction is base->reference (what must change)");

    // -- images sent to the adapter: ordered ref, base (no settings slot set here) ----
    const imageRoles = analyzeCall.userContent.filter(b => b.type === "text" && /^(REFERENCE:|BASE RENDER:|SETTINGS)/.test(b.text)).map(b => b.text);
    this.ok(imageRoles[0] === "REFERENCE:", `ENGINE.analyze(): first labeled image is REFERENCE: (got ${imageRoles[0]})`);
    this.ok(imageRoles[1] === "BASE RENDER:", `ENGINE.analyze(): second labeled image is BASE RENDER: (got ${imageRoles[1]})`);
    this.ok(imageRoles.length === 2, `ENGINE.analyze(): exactly 2 labeled images when no settings screenshot was set (got ${imageRoles.length})`);

    // -- addAttempt(): measures the attempt, computes a score, calls emit_correction,
    // stores {dataUrl, metrics, score, correction, appliedParams}, state -> refining --
    const attemptCanvas1 = solidCanvas(16, 16, 190, 175, 145);
    await ENGINE.addAttempt(attemptCanvas1);
    this.ok(ENGINE.state() === "refining", `ENGINE.addAttempt(): state -> refining (got ${ENGINE.state()})`);
    this.ok(stub.calls.length === 2, `ENGINE.addAttempt(): calls the adapter again (total calls: ${stub.calls.length})`);
    const attemptCall = stub.calls[1];
    this.ok(attemptCall.tool.name === "emit_correction", "ENGINE.addAttempt(): uses the emit_correction tool");
    let sessionAfterAttempt1 = ENGINE.session();
    const chain1 = sessionAfterAttempt1.chains.vray7max.attempts;
    this.ok(chain1.length === 1, `ENGINE.addAttempt(): one attempt stored in the active chain (got ${chain1.length})`);
    this.ok(typeof chain1[0].score === "number" && Number.isFinite(chain1[0].score), `ENGINE.addAttempt(): stored attempt carries a finite numeric score (got ${chain1[0].score})`);
    const expectedScore1 = METRICS.score(sessionAfterImages.ref.metrics, chain1[0].metrics);
    this.close(chain1[0].score, expectedScore1, 1e-6, "ENGINE.addAttempt(): score === METRICS.score(refMetrics, attemptMetrics)");
    this.ok(!!chain1[0].correction && Array.isArray(chain1[0].correction.moves), "ENGINE.addAttempt(): stored attempt carries the validated correction object");
    this.ok(typeof chain1[0].dataUrl === "string" && chain1[0].dataUrl.startsWith("data:"), "ENGINE.addAttempt(): stored attempt carries a dataUrl");

    // -- reanalyzeOtherTarget(): flips activeTarget, analyzes against the OTHER pack
    // using stored images/metrics (no re-upload), leaves the original chain untouched --
    const callsBeforeReanalyze = stub.calls.length;
    await ENGINE.reanalyzeOtherTarget();
    this.ok(ENGINE.activeTarget() === "vantage33", `ENGINE.reanalyzeOtherTarget(): activeTarget flips to vantage33 (got ${ENGINE.activeTarget()})`);
    this.ok(stub.calls.length === callsBeforeReanalyze + 1, `ENGINE.reanalyzeOtherTarget(): calls the adapter exactly once more (got ${stub.calls.length - callsBeforeReanalyze})`);
    const reanalyzeCall = stub.calls[stub.calls.length - 1];
    this.ok(reanalyzeCall.tool.name === "emit_recipe", "ENGINE.reanalyzeOtherTarget(): uses emit_recipe (a fresh analysis, not a correction)");
    this.ok(reanalyzeCall.system.includes("Chaos Vantage 3.3"), "ENGINE.reanalyzeOtherTarget(): system prompt built for the new active target (vantage33)");
    const sessionAfterReanalyze = ENGINE.session();
    this.ok(!!sessionAfterReanalyze.chains.vantage33.recipe, "ENGINE.reanalyzeOtherTarget(): vantage33 chain now has a recipe");
    this.ok(sessionAfterReanalyze.chains.vray7max.attempts.length === 1, "ENGINE.reanalyzeOtherTarget(): the ORIGINAL (vray7max) chain's attempts are untouched");
    this.ok(!!sessionAfterReanalyze.chains.vray7max.recipe, "ENGINE.reanalyzeOtherTarget(): the ORIGINAL (vray7max) chain's recipe is untouched (still present)");
    this.ok(ENGINE.state() === "analyzed", `ENGINE.reanalyzeOtherTarget(): new target's state is analyzed (got ${ENGINE.state()})`);

    // -- flip back to vray7max to keep filling its chain toward the 8-attempt cap -----
    ENGINE.setActiveTarget("vray7max");
    this.ok(ENGINE.activeTarget() === "vray7max", "ENGINE.setActiveTarget(): can flip back to the original target");
    this.ok(ENGINE.session().chains.vray7max.attempts.length === 1, "ENGINE.setActiveTarget(): switching back does not lose the original chain's attempt");

    // -- 8-attempt cap: add 7 more (total 8), all present; add a 9th, oldest dataUrl
    // dropped but its score retained ----------------------------------------------
    for (let i = 2; i <= 8; i++) {
      await ENGINE.addAttempt(solidCanvas(16, 16, 190 - i, 175, 145));
    }
    const sessionAt8 = ENGINE.session();
    this.ok(sessionAt8.chains.vray7max.attempts.length === 8, `ENGINE.addAttempt(): 8 attempts stored, all present (got ${sessionAt8.chains.vray7max.attempts.length})`);
    // Snapshot BOTH the attempt about to be evicted (index 0, "attempt #1") and the
    // attempt that should become the new index 0 after eviction ("attempt #2") — these
    // are two DIFFERENT attempts (different synthetic canvases -> different scores), so
    // the correct check after the 9th push is "index 0 now equals what #2 was", never
    // "index 0's score is unchanged" (that would only hold if nothing were evicted).
    const evictedAttemptSnapshot = sessionAt8.chains.vray7max.attempts[0];
    const survivingSecondSnapshot = sessionAt8.chains.vray7max.attempts[1];
    this.ok(typeof evictedAttemptSnapshot.dataUrl === "string" && evictedAttemptSnapshot.dataUrl.length > 0, "ENGINE.addAttempt(): sanity — oldest attempt has a real dataUrl before the 9th is added");

    await ENGINE.addAttempt(solidCanvas(16, 16, 100, 175, 145));
    const sessionAt9 = ENGINE.session();
    const attemptsAt9 = sessionAt9.chains.vray7max.attempts;
    this.ok(attemptsAt9.length === 8, `ENGINE.addAttempt(): adding a 9th keeps only the last 8 (got ${attemptsAt9.length})`);

    // -- oldest (attempt #1) is truly evicted, not merely shuffled: its dataUrl no
    // longer appears anywhere in the surviving array -----------------------------
    this.ok(!attemptsAt9.some(a => a.dataUrl === evictedAttemptSnapshot.dataUrl), "ENGINE.addAttempt(): the evicted (oldest) attempt's dataUrl is dropped, not present anywhere in the surviving 8");

    // -- FIFO shift: the new index 0 is what was index 1 (attempt #2) before eviction --
    this.close(attemptsAt9[0].score, survivingSecondSnapshot.score, 1e-9, "ENGINE.addAttempt(): after eviction, the new oldest-kept entry is the PRIOR #2 attempt (FIFO), not a stale copy of #1");
    this.ok(attemptsAt9[0].dataUrl === survivingSecondSnapshot.dataUrl, "ENGINE.addAttempt(): after eviction, the new index-0 dataUrl matches what was index 1 (proper FIFO shift)");

    // -- evicted attempt's SCORE is retained somewhere retrievable, per the plan
    // ("oldest dataUrl dropped, its score retained") — even though the entry itself
    // fell out of the capped attempts[] array. ------------------------------------
    const chainAt9 = sessionAt9.chains.vray7max;
    this.ok(Array.isArray(chainAt9._evictedScores) && chainAt9._evictedScores.length >= 1, "ENGINE.addAttempt(): chain retains a retrievable record of evicted attempts' scores");
    this.close(chainAt9._evictedScores[chainAt9._evictedScores.length - 1].score, evictedAttemptSnapshot.score, 1e-9, "ENGINE.addAttempt(): the retained score matches the evicted (oldest) attempt's own score");

    // -- newest (9th) attempt is present with a score at the tail ------------------
    this.ok(typeof attemptsAt9[attemptsAt9.length - 1].score === "number" && Number.isFinite(attemptsAt9[attemptsAt9.length - 1].score), "ENGINE.addAttempt(): newest (9th) attempt present with a finite score at the tail");

    // -- lookup(paramId): delegates to PACKS.lookup(activeTarget, paramId) ------------
    ENGINE.setActiveTarget("vray7max");
    const lookedUp = ENGINE.lookup("cam.iso");
    this.ok(!!lookedUp && lookedUp.id === "cam.iso", `ENGINE.lookup("cam.iso") returns the pack entry for the active target (got ${JSON.stringify(lookedUp && lookedUp.id)})`);
    this.ok(ENGINE.lookup("no.such_param") === null, "ENGINE.lookup(): unknown param id -> null");

    // -- persistence after every mutation: the session engine just built round-trips
    // through STORE under its own (deterministic test) id --------------------------
    const persisted = await STORE.loadLatest();
    this.ok(!!persisted, "ENGINE mutations persisted a session that STORE.loadLatest() can find");

    // -- ENGINE.lastError / typed-error scheme: adapter errors are caught and rethrown
    // in a way the UI can distinguish (auth vs shape vs network vs other). Reuses
    // engineTestId (set before the suite's first reset() above) — _testSessionId must
    // be set BEFORE reset()/_blankSession() runs, not after, since the session's `id`
    // is fixed at blank-session-creation time and never changes afterward. ------------
    ENGINE.reset();
    await ENGINE.setImage("ref", solidCanvas(16, 16, 200, 180, 150));
    await ENGINE.setImage("base", solidCanvas(16, 16, 120, 130, 140));
    const failingAdapter = { call: async () => { throw new ADAPTER.AuthError("stub 401"); } };
    ENGINE._adapter = failingAdapter;
    let threwAuth = null;
    try { await ENGINE.analyze(); } catch (e) { threwAuth = e; }
    this.ok(!!threwAuth, "ENGINE.analyze(): adapter AuthError propagates (throws), does not swallow silently");
    this.ok(!!ENGINE.lastError && /auth/i.test(ENGINE.lastError.kind || ENGINE.lastError.name || ""), `ENGINE.lastError records an auth-classifiable error after an AuthError (got ${JSON.stringify(ENGINE.lastError && (ENGINE.lastError.kind || ENGINE.lastError.name))})`);

    const failingShapeAdapter = { call: async () => { throw new ADAPTER.ShapeError("stub shape", "raw text"); } };
    ENGINE._adapter = failingShapeAdapter;
    let threwShape = null;
    try { await ENGINE.analyze(); } catch (e) { threwShape = e; }
    this.ok(!!threwShape, "ENGINE.analyze(): adapter ShapeError propagates");
    this.ok(!!ENGINE.lastError && /shape/i.test(ENGINE.lastError.kind || ENGINE.lastError.name || ""), `ENGINE.lastError records a shape-classifiable error after a ShapeError (got ${JSON.stringify(ENGINE.lastError && (ENGINE.lastError.kind || ENGINE.lastError.name))})`);

    // -- setImage decode-reject path: an undecodable "image" must surface a typed error,
    // never throw an unhandled raw exception past ENGINE's boundary -------------------
    ENGINE.reset();
    let threwDecode = null;
    try {
      await ENGINE.setImage("ref", new Blob(["not an image"], { type: "text/plain" }));
    } catch (e) { threwDecode = e; }
    this.ok(!!threwDecode, "ENGINE.setImage(): an undecodable file surfaces a typed/catchable error, not a silent hang");
  } finally {
    ENGINE._adapter = ADAPTER;
    // Order matters: delete _testSessionId BEFORE this reset() (not before any reset()
    // earlier in the try block above) — every reset() up to this point intentionally
    // rode on the same engineTestId so their _persist() calls kept upserting one
    // tracked row; only THIS final reset(), which nothing after it ever persists, is
    // safe to leave on a random real "lm-..." id. Do not hoist this delete earlier.
    delete ENGINE._testSessionId;
    ENGINE.reset();
    try { await STORE.deleteSession(engineTestId); } catch (e) {}
    // Best-effort broader sweep: delete any stray selftest-* session rows this suite
    // (or a previous interrupted run) may have left behind, so repeated runs never
    // accumulate garbage in the real `lightmatch` IndexedDB database.
    try {
      const all = await STORE._all();
      for (const s of all) if (s && typeof s.id === "string" && s.id.startsWith("selftest-")) await STORE.deleteSession(s.id);
    } catch (e) {}
  }

  // -- boot()/restore: loads the latest session on startup without throwing, even when
  // there is nothing to load (fresh STORE / empty DB) — never blocks boot -----------
  let bootThrew = null;
  try { await ENGINE.boot(); } catch (e) { bootThrew = e; }
  this.ok(bootThrew === null, `ENGINE.boot() does not throw (got ${bootThrew && bootThrew.message})`);
  ENGINE.reset();

  // -- in-flight guard: analyze()/addAttempt()/reanalyzeOtherTarget() share one
  // _inFlight promise gate. Two concurrent analyze() calls must hit the adapter only
  // ONCE (the second call returns the SAME promise, not a second op) — proven with a
  // slow stub adapter whose call() does not resolve until we release it. setImage()
  // must throw a typed BusyError (kind "busy") while an op is in flight, since
  // swapping images mid-analyze would silently mismatch the in-flight session.
  {
    const guardTestId = "selftest-" + Date.now() + "-guard";
    ENGINE._testSessionId = guardTestId;
    try {
      ENGINE.reset();
      let releaseCall;
      const gate = new Promise(r => { releaseCall = r; });
      let callCount = 0;
      const slowStub = {
        async call({ tool }) {
          callCount++;
          await gate;
          const isCorrection = tool.name === "emit_correction";
          return isCorrection
            ? { moves: [{ param: "cam.iso", to: 200, from: 100, step: 1, confidence: "high", why: "x" }], rationale: "r", status: "continue", status_reason: "", applied_assumed: true }
            : { baseline: "factory_defaults", hdri_mood: "m", values: [
                { param: "cam.iso", set: 200, from: 100, step: 1, confidence: "high", why: "x" },
                { param: "cm.contrast", set: 0.1, from: 0, step: 5, confidence: "high", why: "x" },
                { param: "cam.fnumber", set: 5.6, from: 8, step: 1, confidence: "high", why: "x" },
                { param: "vfb.exposure", set: 0.2, from: 0, step: 1, confidence: "high", why: "x" }
              ], rationale: "r", gi_notes: "g", status: "continue", status_reason: "" };
        }
      };
      ENGINE._adapter = slowStub;
      await ENGINE.setImage("ref", solidCanvas(8, 8, 200, 180, 150));
      await ENGINE.setImage("base", solidCanvas(8, 8, 120, 130, 140));

      const p1 = ENGINE.analyze();
      const p2 = ENGINE.analyze();
      this.ok(p1 === p2, "ENGINE: concurrent analyze() calls while in-flight return the SAME promise (second call does not start a new op)");

      // setImage must reject with a typed BusyError while the gate is held.
      let busyErr = null;
      try { await ENGINE.setImage("base", solidCanvas(8, 8, 90, 90, 90)); } catch (e) { busyErr = e; }
      this.ok(!!busyErr, "ENGINE.setImage(): throws while an op is in-flight (does not silently swap the image)");
      this.ok(busyErr instanceof ENGINE.BusyError, `ENGINE.setImage(): in-flight error is an ENGINE.BusyError instance (got ${busyErr && busyErr.name})`);
      this.ok(busyErr && busyErr.kind === "busy", `ENGINE.setImage(): in-flight BusyError carries kind "busy" (got ${busyErr && busyErr.kind})`);

      releaseCall();
      await p1;
      this.ok(callCount === 1, `ENGINE: the in-flight guard prevented a second adapter call — exactly 1 call total (got ${callCount})`);
      this.ok(ENGINE.state() === "analyzed", `ENGINE: after the gate releases, state reaches analyzed (got ${ENGINE.state()})`);

      // After the first op completes, the guard is clear (finally-cleared) and a fresh
      // op can start — proven by addAttempt() actually reaching the (now-resolved) gate.
      const gate2Promise = new Promise(r => { releaseCall = r; });
      let released2 = false;
      const slowStub2 = { async call({ tool }) {
        callCount++;
        await gate2Promise;
        released2 = true;
        return { moves: [{ param: "cam.iso", to: 210, from: 200, step: 1, confidence: "high", why: "x" }], rationale: "r", status: "continue", status_reason: "", applied_assumed: true };
      } };
      ENGINE._adapter = slowStub2;
      const p3 = ENGINE.addAttempt(solidCanvas(8, 8, 190, 175, 145));
      releaseCall();
      await p3;
      this.ok(released2 === true, "ENGINE: in-flight guard is cleared (finally) after a completed op, so the NEXT op actually runs");

      // The guard clears even when the underlying call throws (finally, not just on
      // success) — a failed analyze() must not permanently wedge the app.
      const failingStub = { call: async () => { throw new Error("stub failure"); } };
      ENGINE._adapter = failingStub;
      let threwGuarded = null;
      try { await ENGINE.reanalyzeOtherTarget(); } catch (e) { threwGuarded = e; }
      this.ok(!!threwGuarded, "ENGINE: reanalyzeOtherTarget() propagates an adapter failure");
      // Guard must be clear now — a subsequent setImage() must NOT throw BusyError.
      let noLongerBusy = null;
      try { await ENGINE.setImage("base", solidCanvas(8, 8, 90, 90, 90)); } catch (e) { noLongerBusy = e; }
      this.ok(noLongerBusy === null, `ENGINE: in-flight guard clears even after a THROWN op (finally), setImage works again (got ${noLongerBusy && noLongerBusy.message})`);
    } finally {
      ENGINE._adapter = ADAPTER;
      delete ENGINE._testSessionId;
      ENGINE.reset();
      try { await STORE.deleteSession(guardTestId); } catch (e) {}
    }
  }

  // -- public accessors: attemptInfo() and activeChain() — the UI must never read
  // _attemptCount/chains[...] paths directly; these are the documented read-only view.
  {
    const acTestId = "selftest-" + Date.now() + "-accessors";
    ENGINE._testSessionId = acTestId;
    try {
      ENGINE.reset();
      const emptyInfo = ENGINE.attemptInfo();
      this.ok(!!emptyInfo && typeof emptyInfo === "object", "ENGINE.attemptInfo(): returns an object even before any recipe exists");
      this.ok(emptyInfo.n === 0, `ENGINE.attemptInfo(): n===0 on a fresh chain (got ${emptyInfo.n})`);
      this.ok(emptyInfo.cap === ENGINE.ATTEMPTS_CAP, `ENGINE.attemptInfo(): cap===ATTEMPTS_CAP (got ${emptyInfo.cap})`);
      this.ok(emptyInfo.stored === 0, `ENGINE.attemptInfo(): stored===0 on a fresh chain (got ${emptyInfo.stored})`);
      this.ok(ENGINE.activeChain() === null || (typeof ENGINE.activeChain() === "object" && ENGINE.activeChain().recipe === null), "ENGINE.activeChain(): a chain with no recipe reads as null-recipe (not throwing)");

      const stubAC = { async call({ tool }) {
        const isCorrection = tool.name === "emit_correction";
        return isCorrection
          ? { moves: [{ param: "cam.iso", to: 200, from: 100, step: 1, confidence: "high", why: "x" }], rationale: "r", status: "continue", status_reason: "", applied_assumed: true }
          : { baseline: "factory_defaults", hdri_mood: "m", values: [
              { param: "cam.iso", set: 200, from: 100, step: 1, confidence: "high", why: "x" },
              { param: "cm.contrast", set: 0.1, from: 0, step: 5, confidence: "high", why: "x" },
              { param: "cam.fnumber", set: 5.6, from: 8, step: 1, confidence: "high", why: "x" },
              { param: "vfb.exposure", set: 0.2, from: 0, step: 1, confidence: "high", why: "x" }
            ], rationale: "r", gi_notes: "g", status: "continue", status_reason: "" };
      } };
      ENGINE._adapter = stubAC;
      await ENGINE.setImage("ref", solidCanvas(8, 8, 200, 180, 150));
      await ENGINE.setImage("base", solidCanvas(8, 8, 120, 130, 140));
      await ENGINE.analyze();

      const chainAfterAnalyze = ENGINE.activeChain();
      this.ok(!!chainAfterAnalyze && !!chainAfterAnalyze.recipe, "ENGINE.activeChain(): after analyze(), returns the active target's chain WITH its recipe");
      this.ok(Array.isArray(chainAfterAnalyze.attempts) && chainAfterAnalyze.attempts.length === 0, "ENGINE.activeChain(): attempts[] present and empty right after analyze()");
      this.ok(chainAfterAnalyze === ENGINE.session().chains[ENGINE.activeTarget()], "ENGINE.activeChain(): identity-matches session().chains[activeTarget] (a real view, not a detached copy)");

      const infoAfterAnalyze = ENGINE.attemptInfo();
      this.ok(infoAfterAnalyze.n === 0 && infoAfterAnalyze.stored === 0, `ENGINE.attemptInfo(): still n===0/stored===0 right after analyze(), before any attempt (got n=${infoAfterAnalyze.n}, stored=${infoAfterAnalyze.stored})`);

      await ENGINE.addAttempt(solidCanvas(8, 8, 190, 175, 145));
      const infoAfter1 = ENGINE.attemptInfo();
      this.ok(infoAfter1.n === 1, `ENGINE.attemptInfo(): n===1 after one addAttempt() (got ${infoAfter1.n})`);
      this.ok(infoAfter1.stored === 1, `ENGINE.attemptInfo(): stored===1 after one addAttempt() (got ${infoAfter1.stored})`);
      this.ok(infoAfter1.cap === ENGINE.ATTEMPTS_CAP, "ENGINE.attemptInfo(): cap is stable across calls");

      await ENGINE.addAttempt(solidCanvas(8, 8, 185, 170, 140));
      const infoAfter2 = ENGINE.attemptInfo();
      this.ok(infoAfter2.n === 2 && infoAfter2.stored === 2, `ENGINE.attemptInfo(): n and stored both track additional attempts (got n=${infoAfter2.n}, stored=${infoAfter2.stored})`);

      // n (monotonic _attemptCount) vs stored (capped array length) diverge past the cap.
      for (let i = 3; i <= 9; i++) await ENGINE.addAttempt(solidCanvas(8, 8, 190 - i, 175, 145));
      const infoAfter9 = ENGINE.attemptInfo();
      this.ok(infoAfter9.n === 9, `ENGINE.attemptInfo(): n keeps climbing past the cap (monotonic attempt count) (got ${infoAfter9.n})`);
      this.ok(infoAfter9.stored === ENGINE.ATTEMPTS_CAP, `ENGINE.attemptInfo(): stored is pinned at ATTEMPTS_CAP once eviction starts (got ${infoAfter9.stored})`);
      this.ok(infoAfter9.n !== infoAfter9.stored, "ENGINE.attemptInfo(): n and stored diverge past the cap (n keeps counting, stored is capped)");

      const chainAfter9 = ENGINE.activeChain();
      this.ok(chainAfter9.attempts.length === ENGINE.ATTEMPTS_CAP, `ENGINE.activeChain(): attempts[] length matches attemptInfo().stored (got ${chainAfter9.attempts.length})`);
    } finally {
      ENGINE._adapter = ADAPTER;
      delete ENGINE._testSessionId;
      ENGINE.reset();
      try { await STORE.deleteSession(acTestId); } catch (e) {}
    }
  }

  // -- setRecipeApplied + recipe-round applied history (Task 7a follow-up; spec:
  // "untoggle anything you skipped; correction calls receive the applied set").
  // chain.recipeApplied is a {param -> bool} map on the ACTIVE chain, absent/true =
  // applied. _historyForActiveChain()'s round-0 moves must consult it, and every
  // history round carries applied_assumed: true ONLY when its backing map is absent
  // (all-true applied flags are then assumptions, not user-confirmed toggle state).
  {
    const raTestId = "selftest-" + Date.now() + "-recipeapplied";
    ENGINE._testSessionId = raTestId;
    try {
      ENGINE.reset();
      const stubRA = { async call({ tool }) {
        const isCorrection = tool.name === "emit_correction";
        return isCorrection
          ? { moves: [{ param: "cam.iso", to: 210, from: 200, step: 1, confidence: "high", why: "x" }], rationale: "r", status: "continue", status_reason: "", applied_assumed: true }
          : { baseline: "factory_defaults", hdri_mood: "m", values: [
              { param: "cam.iso", set: 200, from: 100, step: 1, confidence: "high", why: "stub brighten" },
              { param: "cm.contrast", set: 0.1, from: 0, step: 5, confidence: "high", why: "x" },
              { param: "cam.fnumber", set: 5.6, from: 8, step: 1, confidence: "high", why: "x" },
              { param: "vfb.exposure", set: 0.2, from: 0, step: 1, confidence: "high", why: "x" }
            ], rationale: "r", gi_notes: "g", status: "continue", status_reason: "" };
      } };
      ENGINE._adapter = stubRA;
      await ENGINE.setImage("ref", solidCanvas(8, 8, 200, 180, 150));
      await ENGINE.setImage("base", solidCanvas(8, 8, 120, 130, 140));
      await ENGINE.analyze();

      // (pre) no map yet: round-0 all-applied AND honestly flagged as assumed.
      const hist0 = ENGINE._historyForActiveChain();
      this.ok(hist0.length === 1 && hist0[0].round === 0, "recipeApplied: sanity — history is just round 0 right after analyze()");
      this.ok(hist0[0].moves.every(m => m.applied === true), "recipeApplied: with no map, every round-0 move defaults to applied:true");
      this.ok(hist0[0].applied_assumed === true, `recipeApplied: with no map, round-0 carries applied_assumed:true (got ${JSON.stringify(hist0[0].applied_assumed)})`);

      // (a) setRecipeApplied(param,false) -> round-0 applied:false for that param only.
      this.ok(typeof ENGINE.setRecipeApplied === "function", "ENGINE.setRecipeApplied is a function");
      await ENGINE.setRecipeApplied("cam.iso", false);
      const hist1 = ENGINE._historyForActiveChain();
      const isoMove = hist1[0].moves.find(m => m.param === "cam.iso");
      this.ok(!!isoMove && isoMove.applied === false, `recipeApplied: untoggled param's round-0 move is applied:false (got ${JSON.stringify(isoMove)})`);
      this.ok(hist1[0].moves.filter(m => m.param !== "cam.iso").every(m => m.applied === true), "recipeApplied: every OTHER round-0 move stays applied:true");

      // (b) with a real map present, round-0 applied_assumed is false (honest flag).
      this.ok(hist1[0].applied_assumed === false, `recipeApplied: with a map present, round-0 applied_assumed:false (got ${JSON.stringify(hist1[0].applied_assumed)})`);

      // re-toggling back to true keeps the map (still user-confirmed, not assumed).
      await ENGINE.setRecipeApplied("cam.iso", true);
      const hist2 = ENGINE._historyForActiveChain();
      this.ok(hist2[0].moves.find(m => m.param === "cam.iso").applied === true, "recipeApplied: re-toggling a param back to true reads applied:true again");
      this.ok(hist2[0].applied_assumed === false, "recipeApplied: applied_assumed stays false once the user has touched the toggles (map exists)");

      // persistence: the map round-trips through STORE.
      await ENGINE.setRecipeApplied("cm.contrast", false);
      const persisted = await STORE.loadLatest();
      this.ok(!!persisted && !!persisted.chains[persisted.activeTarget].recipeApplied && persisted.chains[persisted.activeTarget].recipeApplied["cm.contrast"] === false, "recipeApplied: the map persists through STORE (loadLatest sees the untoggle)");

      // correction rounds share the same absent-map-means-assumed rule: every stored
      // attempt gets an appliedParams map at creation, so round 1 reads false.
      await ENGINE.addAttempt(solidCanvas(8, 8, 190, 175, 145));
      const hist3 = ENGINE._historyForActiveChain();
      const round1 = hist3.find(r => r.round === 1);
      this.ok(!!round1 && round1.applied_assumed === false, `recipeApplied: correction round with an appliedParams map is applied_assumed:false (got ${round1 && JSON.stringify(round1.applied_assumed)})`);

      // busy guard: matches setImage's discipline — BusyError while _inFlight is held.
      let releaseRA;
      const gateRA = new Promise(r => { releaseRA = r; });
      ENGINE._adapter = { async call() { await gateRA; return { moves: [{ param: "cam.iso", to: 220, from: 210, step: 1, confidence: "high", why: "x" }], rationale: "r", status: "continue", status_reason: "", applied_assumed: false }; } };
      const pRA = ENGINE.addAttempt(solidCanvas(8, 8, 185, 170, 140));
      let busyRA = null;
      try { await ENGINE.setRecipeApplied("cam.iso", false); } catch (e) { busyRA = e; }
      this.ok(busyRA instanceof ENGINE.BusyError, `recipeApplied: setRecipeApplied throws BusyError while an op is in flight (got ${busyRA && busyRA.name})`);
      releaseRA();
      await pRA;

      // a fresh analyze() resets the map: a NEW recipe's rows default back to checked
      // (stale unticks from the previous recipe must not leak onto the new one).
      ENGINE._adapter = stubRA;
      await ENGINE.analyze();
      const chainAfterReanalyze = ENGINE.activeChain();
      this.ok(!chainAfterReanalyze.recipeApplied, `recipeApplied: a fresh analyze() clears the map (got ${JSON.stringify(chainAfterReanalyze.recipeApplied)})`);
      this.ok(ENGINE._historyForActiveChain()[0].applied_assumed === true, "recipeApplied: after the reset, round-0 is back to applied_assumed:true");
    } finally {
      ENGINE._adapter = ADAPTER;
      delete ENGINE._testSessionId;
      ENGINE.reset();
      try { await STORE.deleteSession(raTestId); } catch (e) {}
    }
  }

  // -- STORE.importJSON: normalizes/validates `created` — missing or non-ISO becomes
  // "now" rather than silently storing garbage that later breaks loadLatest()'s
  // lexical-ISO-comparison sort.
  {
    const impId1 = "selftest-" + Date.now() + "-import-missing-created";
    const impId2 = "selftest-" + Date.now() + "-import-bad-created";
    const impId3 = "selftest-" + Date.now() + "-import-good-created";
    try {
      const validChains = { vray7max: { recipe: null, attempts: [] }, vantage33: { recipe: null, attempts: [] } };
      const beforeImport = new Date().toISOString();

      const missingCreated = { id: impId1, context: { scene: "", time: "", rig: "" }, ref: null, base: null, settingsShot: null, activeTarget: "vray7max", chains: validChains };
      const importedMissing = await STORE.importJSON(JSON.stringify(missingCreated));
      this.ok(typeof importedMissing.created === "string" && importedMissing.created.length > 0, `STORE.importJSON: missing "created" is normalized to a non-empty string (got ${JSON.stringify(importedMissing.created)})`);
      this.ok(!Number.isNaN(Date.parse(importedMissing.created)), "STORE.importJSON: normalized created for missing case is a valid parseable date");
      this.ok(importedMissing.created >= beforeImport, "STORE.importJSON: missing created is normalized to (approximately) now, not some earlier default");

      const badCreated = { id: impId2, created: "not-a-date", context: { scene: "", time: "", rig: "" }, ref: null, base: null, settingsShot: null, activeTarget: "vray7max", chains: validChains };
      const importedBad = await STORE.importJSON(JSON.stringify(badCreated));
      this.ok(!Number.isNaN(Date.parse(importedBad.created)), `STORE.importJSON: non-ISO "created" ("not-a-date") is normalized to a valid date (got ${JSON.stringify(importedBad.created)})`);

      const goodIso = "2026-01-01T00:00:00.000Z";
      const goodCreated = { id: impId3, created: goodIso, context: { scene: "", time: "", rig: "" }, ref: null, base: null, settingsShot: null, activeTarget: "vray7max", chains: validChains };
      const importedGood = await STORE.importJSON(JSON.stringify(goodCreated));
      this.ok(importedGood.created === goodIso, `STORE.importJSON: a valid ISO "created" is preserved verbatim, not overwritten (got ${importedGood.created})`);
    } finally {
      for (const id of [impId1, impId2, impId3]) { try { await STORE.deleteSession(id); } catch (e) {} }
    }
  }
};

// -- suite: engine-retention (Task 7a hardening) — session pruning on boot(). Its own
// suite (not appended into `engine` above) because it needs a clean multi-session IDB
// fixture unrelated to the stubbed-adapter state machine walk above.
SELFTEST.suites.engineRetention = async function () {
  const ids = [];
  try {
    // Create 7 tiny sessions with distinct `created` timestamps, oldest to newest,
    // all selftest-prefixed so the sweep below (and any interrupted-run cleanup)
    // finds them. Backdated by (7-i) seconds so ordering is deterministic and does
    // not depend on real wall-clock speed between saves.
    const now = Date.now();
    for (let i = 0; i < 7; i++) {
      const id = "selftest-" + now + "-retain" + i;
      ids.push(id);
      await STORE.saveSession({
        id, created: new Date(now - (7 - i) * 1000).toISOString(),
        context: { scene: "", time: "", rig: "" }, ref: null, base: null, settingsShot: null,
        activeTarget: "vray7max",
        chains: { vray7max: { recipe: null, attempts: [], _attemptCount: 0 }, vantage33: { recipe: null, attempts: [], _attemptCount: 0 } }
      });
    }
    const beforePrune = await STORE._all();
    const beforeCount = beforePrune.filter(s => ids.includes(s.id)).length;
    this.ok(beforeCount === 7, `engineRetention: sanity — all 7 fixture sessions saved before boot() (got ${beforeCount})`);

    await ENGINE.boot();

    const afterPrune = await STORE._all();
    this.ok(afterPrune.length <= 5, `ENGINE.boot(): prunes IDB to the newest 5 sessions total (got ${afterPrune.length})`);

    // The newest 5 of our 7 fixtures must be the survivors (retain4..retain6 are the
    // 3 newest overall among typical suite runs, but to be robust against any other
    // session STORE may already hold, just check that the OLDEST two of our fixtures
    // (retain0, retain1) are gone, since they are unconditionally the two oldest
    // sessions in the whole store at this point in a fresh test run).
    const survivingIds = new Set(afterPrune.map(s => s.id));
    this.ok(!survivingIds.has(ids[0]), "ENGINE.boot(): the oldest fixture session was pruned");
    this.ok(!survivingIds.has(ids[1]), "ENGINE.boot(): the second-oldest fixture session was pruned");
  } finally {
    for (const id of ids) { try { await STORE.deleteSession(id); } catch (e) {} }
    ENGINE.reset();
  }
};

// -- suite: ui (Task 7a UI structure) -- PURE-LOGIC ONLY, no DOM simulation. Exercises
// UI.routePaste, UI.acceptsFile, UI.buildSheet (the copy-sheet text builder), and the
// UI.MODELS constant. Anything DOM-dependent (rendering, event wiring, drag/drop) is
// verified separately by the Task 7.3 screenshot smoke, per the task's own scoping —
// this suite must never call document.querySelector or construct real DOM nodes.
SELFTEST.suites.ui = async function () {
  // -- UI.MODELS: exactly the two entries, value strings match STORE.PREFS_DEFAULTS'
  // model default and the plan's memory-recorded gateway ids. One constant so the
  // picker options and any future correction (live-smoke id drift) happen in ONE
  // place. --------------------------------------------------------------------------
  this.ok(Array.isArray(UI.MODELS), "UI.MODELS is an array");
  this.ok(UI.MODELS.length === 2, `UI.MODELS has exactly 2 entries (got ${UI.MODELS.length})`);
  const opusEntry = UI.MODELS.find(m => m.value === "claude-opus-4-8");
  this.ok(!!opusEntry, 'UI.MODELS contains {value:"claude-opus-4-8"}');
  this.ok(!!opusEntry && /opus/i.test(opusEntry.label) && /4\.8/.test(opusEntry.label), `UI.MODELS: Opus entry label mentions "Opus" and "4.8" (got ${opusEntry && opusEntry.label})`);
  const gptEntry = UI.MODELS.find(m => m.value === "gpt-5.5");
  this.ok(!!gptEntry, 'UI.MODELS contains {value:"gpt-5.5"}');
  this.ok(!!gptEntry && /gpt/i.test(gptEntry.label) && /5\.5/.test(gptEntry.label), `UI.MODELS: GPT entry label mentions "GPT" and "5.5" (got ${gptEntry && gptEntry.label})`);
  this.ok(UI.MODELS.every(m => typeof m.value === "string" && typeof m.label === "string"), "UI.MODELS: every entry has string value+label");

  // -- UI.routePaste(state, focusedSlot, filled) -> slot name. Pure decision function,
  // no DOM. Contract: a focused slot always wins outright; otherwise the first EMPTY
  // named slot in Reference -> Base -> Settings order; otherwise, if the session is
  // analyzed/refining (a recipe already exists for the active target), route to a
  // NEW ATTEMPT; otherwise (nothing focused, no empty named slot, not yet analyzed)
  // there is nowhere sensible to route the paste, so it returns null (caller drops
  // the paste rather than silently overwriting an anchor slot). >=6 cases required
  // by the task; this suite has more to pin down every branch precisely. -----------
  this.ok(typeof UI.routePaste === "function", "UI.routePaste is a function");

  // (1) focused slot wins outright, even over an empty earlier-priority slot.
  this.ok(UI.routePaste("empty", "base", { ref: false, base: false, settings: false }) === "base",
    "routePaste: a focused slot wins even when Reference (earlier in priority order) is still empty");

  // (2) focused "attempt" wins too (the Attempt slot is click-to-focus per spec).
  this.ok(UI.routePaste("analyzed", "attempt", { ref: true, base: true, settings: false }) === "attempt",
    "routePaste: focused \"attempt\" slot wins outright");

  // (3) no focus, empty state: first empty slot is "ref".
  this.ok(UI.routePaste("empty", null, { ref: false, base: false, settings: false }) === "ref",
    "routePaste: no focus, nothing filled -> routes to \"ref\" (first in Reference->Base->Settings order)");

  // (4) no focus, ref filled: next empty is "base".
  this.ok(UI.routePaste("ready", null, { ref: true, base: false, settings: false }) === "base",
    "routePaste: no focus, ref filled -> routes to \"base\"");

  // (5) no focus, ref+base filled, settings still empty, NOT yet analyzed: routes to
  // "settings" (the empty named slot), NOT to attempt (state is only "ready").
  this.ok(UI.routePaste("ready", null, { ref: true, base: true, settings: false }) === "settings",
    "routePaste: ref+base filled but not analyzed -> routes to the empty \"settings\" slot, not attempt");

  // (6) THE key "mid-session -> attempt" case: no focus, ref+base+settings all
  // filled, state is analyzed -> routes to a NEW ATTEMPT. This is the case the task
  // explicitly calls out ("paste becomes a new attempt").
  this.ok(UI.routePaste("analyzed", null, { ref: true, base: true, settings: true }) === "attempt",
    "routePaste: mid-session (analyzed), all named slots filled, no focus -> routes to a new attempt");

  // (7) same as (6) but "refining" (attempts already exist) -- still routes to attempt.
  this.ok(UI.routePaste("refining", null, { ref: true, base: true, settings: true }) === "attempt",
    "routePaste: refining state, all named slots filled, no focus -> still routes to a new attempt");

  // (8) mid-session but settings is STILL empty and unfocused: the empty named slot
  // takes priority over the attempt fallback, even though state >= analyzed.
  this.ok(UI.routePaste("analyzed", null, { ref: true, base: true, settings: false }) === "settings",
    "routePaste: analyzed state but settings still empty, no focus -> fills settings BEFORE falling to attempt");

  // (9) DROP mid-session = new attempt, same routing function, drop has no focused
  // slot (drops are never focus-tracked) -- identical call shape to case (6)/(7),
  // proving drop and paste share one decision function per the task.
  this.ok(UI.routePaste("refining", null, { ref: true, base: true, settings: true }) === "attempt",
    "routePaste: DROP mid-session (no focus) routes to attempt exactly like paste does (same pure function)");

  // (10) edge: nothing focused, all named slots filled, but NOT yet analyzed (state
  // "ready") -- no empty slot, no attempt available yet -> null (nowhere sensible to
  // route; caller must not silently overwrite an anchor).
  this.ok(UI.routePaste("ready", null, { ref: true, base: true, settings: true }) === null,
    "routePaste: ready state (not analyzed), all slots filled, no focus -> null (nothing sensible to route to)");

  // -- UI.acceptsFile(file) -> {ok, reason}. Pure function over a File-like object
  // (only .type/.name are read — works against a real File or a plain fake object,
  // so this suite never needs to construct a real Blob/File). ----------------------
  this.ok(typeof UI.acceptsFile === "function", "UI.acceptsFile is a function");
  const REJECT_MSG = "LightMatch reads display-referred sRGB screenshots/saves — PNG or JPG from the VFB/Vantage, not linear EXR.";

  for (const type of ["image/png", "image/jpeg", "image/webp"]) {
    const r = UI.acceptsFile({ name: "shot." + type.split("/")[1], type });
    this.ok(r.ok === true, `UI.acceptsFile: accepts ${type} (got ${JSON.stringify(r)})`);
  }

  // the task's exact selftest assert: a fake File name "x.exr" type "" -> rejected
  const rExr = UI.acceptsFile({ name: "x.exr", type: "" });
  this.ok(rExr.ok === false, 'UI.acceptsFile: fake File name "x.exr" type "" is rejected (task-mandated case)');
  this.ok(rExr.reason === REJECT_MSG, `UI.acceptsFile: rejection reason matches the spec message verbatim (got ${JSON.stringify(rExr.reason)})`);

  const rHdr = UI.acceptsFile({ name: "sky.hdr", type: "" });
  this.ok(rHdr.ok === false, "UI.acceptsFile: .hdr rejected");
  const rTif = UI.acceptsFile({ name: "render.tif", type: "image/tiff" });
  this.ok(rTif.ok === false, "UI.acceptsFile: .tif (image/tiff mime) rejected");
  const rHeic = UI.acceptsFile({ name: "photo.heic", type: "image/heic" });
  this.ok(rHeic.ok === false, "UI.acceptsFile: HEIC rejected");
  const rEmpty = UI.acceptsFile({ name: "", type: "" });
  this.ok(rEmpty.ok === false, "UI.acceptsFile: completely empty name+type rejected, does not crash");
  this.ok(rEmpty.reason === REJECT_MSG, "UI.acceptsFile: empty-type rejection carries the same spec message");

  // -- UI.buildSheet(recipe, targetLabel) -> exact copy-sheet text. Title line +
  // numbered steps: "N. <ui_path>: <value><unit> (from <from>) — <why>" for normal
  // rows; a kind:"placement" row omits unit AND "(from ...)" entirely, per the task
  // ("the string `set` as placement text, no unit/(from) pair"). -------------------
  this.ok(typeof UI.buildSheet === "function", "UI.buildSheet is a function");
  const fakeRecipe = {
    baseline: "factory_defaults",
    values: [
      { param: "cam.iso", set: 400, from: 100, step: 1, confidence: "high", why: "brighten the plate" },
      { param: "sun.placement_azimuth", set: "swing the sun to face camera-left", from: 135, step: 2, confidence: "medium", why: "match the reference's key direction" }
    ],
    rationale: "test", hdri_mood: "soft overcast", gi_notes: "brute force is fine",
    status: "continue", status_reason: ""
  };
  const isoEntry = PACKS.lookup("vray7max", "cam.iso");
  const azEntry = PACKS.lookup("vray7max", "sun.placement_azimuth");
  const sheet = UI.buildSheet(fakeRecipe, "vray7max");
  this.ok(typeof sheet === "string" && sheet.length > 0, "UI.buildSheet: returns a non-empty string");
  const sheetLines = sheet.split("\n");
  this.ok(sheetLines[0] === `${PACKS.vray7max.label} — LightMatch recipe`, `UI.buildSheet: title line is "<target label> — LightMatch recipe" (got ${JSON.stringify(sheetLines[0])})`);
  this.ok(sheet.includes(isoEntry.ui_path), "UI.buildSheet: contains the spinner row's verbatim ui_path");
  this.ok(sheet.includes(azEntry.ui_path), "UI.buildSheet: contains the placement row's verbatim ui_path");
  const isoLine = sheetLines.find(l => l.includes(isoEntry.ui_path));
  this.ok(!!isoLine && /^1\./.test(isoLine), `UI.buildSheet: the ISO row is numbered "1." (got ${JSON.stringify(isoLine)})`);
  this.ok(!!isoLine && isoLine.includes("400"), "UI.buildSheet: spinner row shows its set value (400)");
  this.ok(!!isoLine && isoLine.includes(isoEntry.unit), `UI.buildSheet: spinner row shows its unit (${isoEntry.unit})`);
  this.ok(!!isoLine && /\(from 100\)/.test(isoLine), "UI.buildSheet: spinner row shows \"(from 100)\"");
  this.ok(!!isoLine && isoLine.includes("brighten the plate"), "UI.buildSheet: spinner row includes its why");
  const azLine = sheetLines.find(l => l.includes(azEntry.ui_path));
  this.ok(!!azLine && /^2\./.test(azLine), `UI.buildSheet: the placement row is numbered "2." (got ${JSON.stringify(azLine)})`);
  this.ok(!!azLine && azLine.includes("swing the sun to face camera-left"), "UI.buildSheet: placement row shows its set text verbatim");
  this.ok(!!azLine && !/\(from/.test(azLine), 'UI.buildSheet: placement row has NO "(from ...)" pair (task-mandated)');
  this.ok(!!azLine && azLine.includes("match the reference's key direction"), "UI.buildSheet: placement row includes its why");

  // baseline label appears somewhere in the sheet (human-readable, not the raw enum
  // string) -- exact wording is a UI/copy decision, so this checks for the
  // human-facing phrase rather than the literal "factory_defaults" token.
  this.ok(/factory defaults/i.test(sheet), 'UI.buildSheet: mentions "factory defaults" in human-readable form for baseline:"factory_defaults"');

  const fakeRecipeScreenshot = Object.assign({}, fakeRecipe, { baseline: "settings_screenshot" });
  const sheetScreenshot = UI.buildSheet(fakeRecipeScreenshot, "vray7max");
  this.ok(/settings screenshot/i.test(sheetScreenshot), 'UI.buildSheet: mentions "settings screenshot" in human-readable form for baseline:"settings_screenshot"');

  // unknown target: must not throw, degrades gracefully (empty-ish output rather
  // than a crash -- pack lookups return null and buildSheet must not dereference
  // ui_path off a null entry).
  let threwUnknownTarget = null;
  let sheetUnknown = null;
  try { sheetUnknown = UI.buildSheet(fakeRecipe, "corona"); } catch (e) { threwUnknownTarget = e; }
  this.ok(threwUnknownTarget === null, `UI.buildSheet: unknown target does not throw (got ${threwUnknownTarget && threwUnknownTarget.message})`);
  this.ok(typeof sheetUnknown === "string", "UI.buildSheet: unknown target still returns a string");

  // -- UI.isRecipeApplied(chain, param): pure init-state helper for the recipe-row
  // applied checkboxes (Task 7a follow-up). Absent chain / absent map / absent key /
  // explicit true => applied (checked); ONLY an explicit false reads as unchecked —
  // exactly the same "absent/true = applied" rule ENGINE._historyForActiveChain uses
  // for round-0 moves, so checkbox state and sent history can never disagree.
  this.ok(typeof UI.isRecipeApplied === "function", "UI.isRecipeApplied is a function");
  this.ok(UI.isRecipeApplied(null, "cam.iso") === true, "isRecipeApplied: null chain -> true (default checked)");
  this.ok(UI.isRecipeApplied({}, "cam.iso") === true, "isRecipeApplied: chain without a recipeApplied map -> true");
  this.ok(UI.isRecipeApplied({ recipeApplied: {} }, "cam.iso") === true, "isRecipeApplied: map present but param absent -> true");
  this.ok(UI.isRecipeApplied({ recipeApplied: { "cam.iso": true } }, "cam.iso") === true, "isRecipeApplied: explicit true -> true");
  this.ok(UI.isRecipeApplied({ recipeApplied: { "cam.iso": false } }, "cam.iso") === false, "isRecipeApplied: explicit false -> false (the only unchecked case)");
  this.ok(UI.isRecipeApplied({ recipeApplied: { "cam.iso": false } }, "cm.contrast") === true, "isRecipeApplied: one param's false does not leak onto other params");
};

addEventListener("DOMContentLoaded", () => {
  if (location.search.includes("selftest")) SELFTEST.run(); else UI.boot();
});
</script></body></html>
