<!DOCTYPE html><html><head><meta charset="utf-8"><title>LightMatch</title>
<style>
/* ===== SECTION: STYLE ===== */
html, body {
  margin: 0;
  padding: 0;
  background: #141414;
  color: #e8e8e8;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
#app {
  padding: 16px;
}
</style></head><body>
<div id="app"></div>
<script>
/* ===== SECTION: PACKS ===== */
const PACKS = {};

/* ===== SECTION: SCHEMAS ===== */
const SCHEMAS = {};

/* ===== SECTION: METRICS ===== */
const METRICS = {};

/* ===== SECTION: STORE ===== */
const STORE = {};

/* ===== SECTION: ADAPTER ===== */
const ADAPTER = {};

/* ===== SECTION: ENGINE ===== */
const ENGINE = {};

/* ===== SECTION: UI ===== */
const UI = { boot() {} };

/* ===== SECTION: SELFTEST ===== */
const SELFTEST = { fails: [], n: 0,
  ok(cond, msg) { this.n++; if (!cond) this.fails.push(msg); },
  close(a, b, tol, msg) { this.ok(Math.abs(a - b) <= tol, `${msg} (got ${a}, want ${b}±${tol})`); },
  async run() {
    for (const [name, fn] of Object.entries(SELFTEST.suites)) { try { await fn.call(SELFTEST); } catch (e) { this.fails.push(name + " threw: " + e.message); } }
    const line = this.fails.length ? `SELFTEST: FAIL\n` + this.fails.join("\n") : `SELFTEST: PASS (${this.n} asserts)`;
    document.body.textContent = line; document.title = line.split("\n")[0];
  }, suites: {} };

addEventListener("DOMContentLoaded", () => {
  if (location.search.includes("selftest")) SELFTEST.run(); else UI.boot();
});
</script></body></html>
