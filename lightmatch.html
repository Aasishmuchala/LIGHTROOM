<!DOCTYPE html><html><head><meta charset="utf-8"><title>LightMatch</title>
<style>
/* ===== SECTION: STYLE =====
   Task 7a: semantic classes only, clean/readable/minimal placeholder styling — NO
   decorative effort (colors/spacing/typography are intentionally plain). Task 7b
   (design-taste pass) restyles this section; do not add polish here. */
html, body {
  margin: 0;
  padding: 0;
  background: #141414;
  color: #e8e8e8;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px;
}
#app {
  padding: 16px;
  max-width: 1400px;
  margin: 0 auto;
}
button, select, input {
  font: inherit;
  color: inherit;
}
a { color: inherit; }

/* -- banners --------------------------------------------------------------------- */
.banner {
  border: 1px solid #444;
  border-radius: 4px;
  padding: 8px 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.banner-warn { border-color: #8a6d1a; background: #2a2410; }
.banner-error { border-color: #8a2a2a; background: #2a1414; }
.banner-handoff { border-color: #2a6d4a; background: #10241a; margin-bottom: 8px; }
.banner .btn-small { margin-left: auto; }
.raw-details { width: 100%; }
.raw { white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow: auto; background: #0c0c0c; padding: 8px; border-radius: 4px; font-size: 11px; }

/* -- topbar ------------------------------------------------------------------------ */
#topbar { border-bottom: 1px solid #2c2c2c; padding-bottom: 12px; margin-bottom: 16px; }
.topbar-inner { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.brand { font-weight: 600; font-size: 16px; margin-right: 8px; }
.target-toggle { display: inline-flex; border: 1px solid #3a3a3a; border-radius: 4px; overflow: hidden; }
.toggle-btn { background: #1c1c1c; border: none; padding: 6px 10px; cursor: pointer; }
.toggle-btn.active { background: #3a5a7a; color: #fff; }
.model-picker { background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 4px; padding: 6px 8px; }
.key-area { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
.key-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.key-dot-ok { background: #3ea36b; }
.key-dot-missing { background: #a3603e; }
.key-field { background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 4px; padding: 6px 8px; width: 140px; }
.privacy-line { color: #8a8a8a; font-size: 11px; margin-top: 6px; }

/* -- main two-column layout -------------------------------------------------------- */
#main { display: flex; gap: 24px; align-items: flex-start; }
#leftrail { flex: 0 0 320px; }
#recipearea { flex: 1 1 auto; min-width: 0; }

/* -- slots -------------------------------------------------------------------------- */
.slots { display: flex; flex-direction: column; gap: 10px; }
.slot {
  border: 1px dashed #3a3a3a;
  border-radius: 4px;
  padding: 8px;
  cursor: pointer;
}
.slot-focused { border-color: #6a9ac4; border-style: solid; }
.slot-label { font-weight: 600; margin-bottom: 6px; }
.slot-hint { font-weight: 400; color: #8a8a8a; }
.slot-drop { min-height: 60px; display: flex; align-items: center; justify-content: center; }
.slot-empty { color: #8a8a8a; text-align: center; font-size: 12px; }
.slot-thumb { max-width: 100%; max-height: 100px; display: block; }
.slot-file-input { margin-top: 6px; font-size: 11px; }
.attempt-hint { color: #8a8a8a; font-size: 11px; margin: 10px 0; }

/* -- chips ---------------------------------------------------------------------------- */
.chips { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.chip-group-label { font-size: 11px; color: #8a8a8a; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 12px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
.chip-active { background: #3a5a7a; border-color: #6a9ac4; color: #fff; }

/* -- buttons -------------------------------------------------------------------------- */
.btn-primary { background: #3a5a7a; color: #fff; border: none; border-radius: 4px; padding: 8px 16px; cursor: pointer; width: 100%; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary { background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 4px; padding: 8px 16px; cursor: pointer; width: 100%; margin-top: 8px; }
.btn-small { background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px; }
.spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #ffffff88; border-top-color: #fff; border-radius: 50%; animation: lm-spin 0.7s linear infinite; }
@keyframes lm-spin { to { transform: rotate(360deg); } }

/* -- recipe card ------------------------------------------------------------------------ */
.empty-state { color: #8a8a8a; padding: 40px 0; text-align: center; }
.recipe-card { border: 1px solid #2c2c2c; border-radius: 4px; padding: 14px; margin-bottom: 14px; }
.correction-card { background: #1a1a1a; }
.recipe-card-header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.recipe-card-title { font-weight: 600; }
.recipe-card-baseline { color: #8a8a8a; font-size: 12px; }
.recipe-card-actions { margin-left: auto; display: flex; gap: 6px; }
.score-inline { color: #8a8a8a; font-weight: 400; font-size: 12px; margin-left: 8px; }
.step-group { margin-bottom: 12px; }
.step-header { font-weight: 600; font-size: 12px; color: #a8c4e0; margin-bottom: 6px; }
.rationale-foldout { margin-top: 10px; font-size: 12px; color: #c0c0c0; }
.rationale-foldout summary { cursor: pointer; color: #8a8a8a; }
.hdri-mood, .gi-notes { font-size: 12px; color: #a0a0a0; margin-top: 4px; }
.status-reason { font-size: 12px; color: #a0a0a0; margin-top: 6px; }

/* -- value rows ---------------------------------------------------------------------------- */
.value-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-top: 1px solid #232323;
}
.value-row-placement { font-style: italic; }
.value-row-main { flex: 1 1 auto; min-width: 0; }
.value-row-label { font-size: 12px; color: #dcdcdc; }
.value-row-value { font-size: 12px; margin-top: 2px; }
.from-text { color: #8a8a8a; }
.value-row-why { color: #8a8a8a; font-size: 11px; margin-top: 2px; }
.conf-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-top: 4px; flex-shrink: 0; }
.conf-high { background: #3ea36b; }
.conf-medium { background: #c4a23e; }
.conf-low { background: #a3603e; }
.clamped-flag { color: #c4a23e; font-size: 10px; border: 1px solid #c4a23e; border-radius: 3px; padding: 0 4px; margin-left: 6px; }
.applied-toggle { font-size: 11px; color: #8a8a8a; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.row-copy-btn { background: none; border: 1px solid #3a3a3a; border-radius: 3px; padding: 2px 6px; cursor: pointer; font-size: 10px; color: #8a8a8a; align-self: flex-start; }

/* -- session strip ------------------------------------------------------------------------ */
#sessionstrip { margin-top: 20px; border-top: 1px solid #2c2c2c; padding-top: 14px; }
.session-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
.strip-thumb { flex: 0 0 auto; width: 100px; text-align: center; }
.strip-thumb img { width: 100px; height: 70px; object-fit: cover; border-radius: 3px; display: block; }
.strip-caption { font-size: 10px; color: #a0a0a0; margin-top: 4px; }
.strip-caveat { font-size: 11px; color: #8a8a8a; margin-top: 8px; font-style: italic; }
.trend-up { color: #3ea36b; }
.trend-down { color: #a3603e; }

/* -- toasts ------------------------------------------------------------------------------- */
#toasts { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 1000; }
.toast { background: #2c2c2c; border: 1px solid #3a3a3a; border-radius: 4px; padding: 8px 12px; font-size: 12px; }
</style></head><body>
<div id="app"></div>
<script>
/* ===== SECTION: PACKS ===== */

//                          the value shipped here is conservative and flagged in notes.
// kinds: spinner (numeric field), dropdown (option list in notes, string default),

//        placement (instruction row: how to place/aim/set something; string or numeric).
const PACKS = {
  vray7max: {

      // -- environment / dome --------------------------------------------------------
      { id: "env.gi_skylight_on", ui_path: "Render Setup ▸ V-Ray tab ▸ Environment rollout ▸ GI Environment (Skylight) ▸ On",
        kind: "dropdown", unit: "", range: [0, 0], default: "off", verified: "2026-07-02",
        notes: "Options: on | off. Enables the GI environment (skylight) override; while off, the 3ds Max Environment dialog drives GI (docs)." },
      { id: "env.gi_skylight_mult", ui_path: "Render Setup ▸ V-Ray tab ▸ Environment rollout ▸ GI Environment (Skylight) ▸ Multiplier",
        kind: "spinner", unit: "x", range: [0, 20], default: 1.0, verified: "2026-07-02",

        kind: "slot", unit: "", range: [0, 0], default: "none", verified: "2026-07-02",
        notes: "Load the HDRI via a VRayBitmap map in this slot; a texture overrides the light's Color/Temperature (docs). Value = HDRI file or mood description, not a number." },
      { id: "dome.intensity", ui_path: "VRayLight (Dome) ▸ Modify panel ▸ General rollout ▸ Multiplier",
        kind: "spinner", unit: "x", range: [0, 100], default: 1.0, verified: false,
        notes: "Practical range; UI accepts higher. With Units = Default (image) the multiplier scales the HDRI brightness directly. Factory creation value not stated in current Chaos docs (1.0 assumed)." },
      { id: "dome.rotation_h", ui_path: "Dome HDRI: VRayBitmap ▸ Mapping ▸ Horiz. rotation",
        kind: "spinner", unit: "deg", range: [0, 360], default: 0, verified: "2026-07-02",
        notes: "Rotates the environment map left/right; ignored when Mapping type = 3ds Max standard (docs). Alternative: rotate the Dome light icon with Dome Light rollout ▸ Lock texture to icon enabled." },
      { id: "dome.invisible", ui_path: "VRayLight (Dome) ▸ Modify panel ▸ Options rollout ▸ Invisible",
        kind: "dropdown", unit: "", range: [0, 0], default: "off", verified: "2026-07-02",
        notes: "Options: on | off. Hides the dome from camera/refraction rays only; it still lights the scene and is still seen by GI rays (docs)." },
      { id: "dome.temperature", ui_path: "VRayLight (Dome) ▸ Modify panel ▸ General rollout ▸ Temperature (Mode = Temperature)",
        kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, verified: false,
        notes: "Tints an UNtextured dome; any Map in the texture slot overrides color (docs). Kelvin field active only when Mode = Temperature. Factory value not stated in current Chaos docs (6500 assumed)." },
      // -- sun -----------------------------------------------------------------------
      { id: "sun.placement_azimuth", ui_path: "VRaySun ▸ move/rotate the sun head in the viewport, or Create panel ▸ Systems ▸ Daylight ▸ Sunlight = VRaySun ▸ Position (Date/Time/Location or Manual)",
        kind: "placement", unit: "deg", range: [0, 360], default: 135, verified: "2026-07-02",
        notes: "V-Ray 7 has no azimuth spinner on VRaySun itself — position is set by moving the sun or via a 3ds Max Daylight system with VRaySun as the sun type (docs). Compass: 0 = North, 90 = East. Emit as a placement instruction; default is informational." },
      { id: "sun.placement_elevation", ui_path: "VRaySun ▸ move the sun head height in the viewport, or Create panel ▸ Systems ▸ Daylight ▸ Sunlight = VRaySun ▸ Position (Date/Time/Location or Manual)",
        kind: "placement", unit: "deg", range: [0, 90], default: 35, verified: "2026-07-02",
        notes: "Elevation above horizon; sun and sky color follow the position physically — a lower sun is warmer with longer, softer-lit shadows (docs). Emit as a placement instruction; default is informational." },
      { id: "sun.intensity_mult", ui_path: "VRaySun ▸ Modify panel ▸ Sun Parameters ▸ Intensity multiplier",
        kind: "spinner", unit: "x", range: [0, 2], default: 1.0, verified: "2026-07-02",
        notes: "1.0 = physical solar brightness; docs recommend keeping it and exposing via camera or color mapping. Values like 0.01-0.05 only when NO exposure control is used. UI accepts higher than 2 (practical range)." },
      { id: "sun.size_mult", ui_path: "VRaySun ▸ Modify panel ▸ Sun Parameters ▸ Size multiplier",
        kind: "spinner", unit: "x", range: [0.2, 40], default: 1.0, verified: "2026-07-02",
        notes: "Visible sun-disc size AND shadow-edge softness; overall illumination strength stays the same (docs). 1.0 = real sun; docs examples use 4-40 for visibly soft shadows. Practical range; UI accepts higher." },
      { id: "sun.kelvin", ui_path: "VRaySun ▸ Modify panel ▸ Sun Parameters ▸ Color mode + Filter color",
        kind: "placement", unit: "K", range: [1000, 20000], default: 5777, verified: "2026-07-02",
        notes: "V-Ray 7's VRaySun has NO Kelvin spinner — Color mode options are filter | direct | override (docs) and sun color is physical (elevation + Turbidity + Ozone). To hit a target kelvin: lower the elevation / raise Turbidity for warmth, or set Color mode = direct with a warm Filter color; numeric kelvin white balance lives on the camera (cam.wb_kelvin). 5777 K = physical solar temperature, informational." },
      { id: "sun.turbidity", ui_path: "VRaySun ▸ Modify panel ▸ Sky Parameters ▸ Turbidity",
        kind: "spinner", unit: "", range: [2, 20], default: 3.0, verified: false,
        notes: "Air dust: 2 = clear blue sky/sun, 8+ = yellow-orange haze (docs examples 2-8). Affects sun AND sky color. Practical range; UI accepts higher. Factory default not stated in current Chaos docs (3.0 assumed)." },

      { id: "fill.plane_intensity", ui_path: "VRayLight (Plane) ▸ Modify panel ▸ General rollout ▸ Multiplier",
        kind: "spinner", unit: "x", range: [0, 500], default: 30, verified: false,
        notes: "With Units = Default (image) the intensity also depends on the light's SIZE (docs). Practical range; UI accepts higher. Factory creation value not stated in current Chaos docs (30 assumed)." },
      { id: "fill.plane_kelvin", ui_path: "VRayLight (Plane) ▸ Modify panel ▸ General rollout ▸ Temperature (Mode = Temperature)",
        kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, verified: false,
        notes: "Kelvin field active only when Mode = Temperature (docs). Factory value not stated in current Chaos docs (6500 assumed)." },
      { id: "fill.sphere_intensity", ui_path: "VRayLight (Sphere) ▸ Modify panel ▸ General rollout ▸ Multiplier",
        kind: "spinner", unit: "x", range: [0, 500], default: 30, verified: false,
        notes: "Sphere size affects intensity with Default (image) / Luminance / Radiance units (docs). Practical range; UI accepts higher. Factory creation value not stated in current Chaos docs (30 assumed)." },
      { id: "fill.key_fill_guidance", ui_path: "Create menu ▸ Lights ▸ V-Ray ▸ V-Ray Plane/Sphere Light ▸ click and drag in a viewport",
        kind: "placement", unit: ":1", range: [1, 10], default: 4, verified: "2026-07-02",
        notes: "Guidance entry: emit fill placement (position/aim relative to the key light) plus a key:fill intensity ratio — e.g. 4:1 reads moody, 2:1 reads soft. Rendered as an instruction row, not a spinner." },
      // -- camera / exposure -----------------------------------------------------------
      { id: "cam.iso", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Aperture ▸ Film speed (ISO)",
        kind: "spinner", unit: "ISO", range: [25, 6400], default: 100, verified: false,
        notes: "Higher = brighter (docs: a V-Ray Sun day scene looks best around 100 ISO). Affects brightness when Exposure = Physical Exposure. Practical range. Factory default not stated in current Chaos docs (100 assumed)." },
      { id: "cam.fnumber", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Aperture ▸ F-Number",
        kind: "spinner", unit: "f/", range: [0.7, 64], default: 8.0, verified: false,
        notes: "Lower = brighter + more DOF (docs). Affects brightness only when Exposure = Physical Exposure. Practical range. Factory default not stated in current Chaos docs (8.0 assumed)." },
      { id: "cam.shutter", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Aperture ▸ Shutter speed (s^-1)",
        kind: "spinner", unit: "s^-1", range: [1, 2000], default: 200, verified: false,
        notes: "Inverse seconds: 30 means 1/30 s (docs); LOWER value = brighter image. Practical range. Factory default not stated in current Chaos docs (200 assumed)." },
      { id: "cam.wb_kelvin", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Color & Exposure ▸ Temperature (K) (White balance = Temperature)",
        kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, verified: false,
        notes: "Kelvin field applies only when the White balance dropdown = Temperature (docs); presets such as Daylight also exist. Factory value not stated in current Chaos docs (6500 assumed)." },
      { id: "cam.ev_readout", ui_path: "VRayPhysicalCamera ▸ Modify panel ▸ Color & Exposure ▸ Exposure value",
        kind: "spinner", unit: "EV", range: [-6, 26], default: 14, verified: "2026-07-02",
        notes: "derived: with Exposure = Physical Exposure this field is a greyed-out readout computed from ISO/F-Number/Shutter (docs); it is editable only when Exposure = Exposure Value (EV). Default shown is the approximate factory readout." },
      // -- color mapping / VFB -----------------------------------------------------------
      { id: "cm.type", ui_path: "Render Setup ▸ V-Ray tab ▸ Color mapping rollout ▸ Type",
        kind: "dropdown", unit: "", range: [0, 0], default: "Reinhard", verified: "2026-07-02",
        notes: "Options: Linear multiply | Exponential | HSV exponential | Intensity exponential | Gamma correction (deprecated) | Intensity gamma (deprecated) | Reinhard. Factory default is Reinhard with Burn value 1.0 = linear result (docs)." },
      { id: "cm.highlight_burn", ui_path: "Render Setup ▸ V-Ray tab ▸ Color mapping rollout ▸ Burn value (Type = Reinhard)",
        kind: "spinner", unit: "", range: [0, 1], default: 1.0, verified: "2026-07-02",
        notes: "Doc-stated range and default: 1.0 = Linear multiply, 0.0 = Exponential, in-between blends the two (docs). Lower it to tame blown highlights at the render level." },
      { id: "cm.contrast", ui_path: "V-Ray Frame Buffer ▸ Layers panel ▸ Exposure layer ▸ Contrast",
        kind: "spinner", unit: "", range: [-1, 1], default: 0, verified: "2026-07-02",
        notes: "0 = no change; positive pushes colors away from mid grey, negative toward it (docs). Practical range; slider bounds not stated in docs. Display-side: keep identical across attempts." },
      { id: "cm.saturation", ui_path: "V-Ray Frame Buffer ▸ Layers panel ▸ Hue/Saturation layer ▸ Saturation",
        kind: "spinner", unit: "", range: [-100, 100], default: 0, verified: "2026-07-02",

      { id: "vfb.exposure", ui_path: "V-Ray Frame Buffer ▸ Layers panel ▸ Exposure layer ▸ Exposure",
        kind: "spinner", unit: "stops", range: [-5, 5], default: 0, verified: "2026-07-02",
        notes: "Doc-stated default 0.0 = original brightness; +1.0 doubles, -1.0 halves (docs). Practical range; slider bounds not stated in docs. Display-side only — keep identical across attempts." },
      { id: "vfb.wb_kelvin", ui_path: "V-Ray Frame Buffer ▸ Layers panel ▸ White Balance layer ▸ Temperature",
        kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, verified: "2026-07-02",

        notes: "Options: Irradiance map (deprecated, slated for removal) | Brute force | Light cache. Factory default: Brute force (docs, Universal V-Ray Settings). Notes-only: engine choice changes noise/speed character, not the lighting targets." },
      { id: "gi.secondary", ui_path: "Render Setup ▸ GI tab ▸ Global illumination rollout ▸ Secondary engine",
        kind: "dropdown", unit: "", range: [0, 0], default: "Light cache", verified: "2026-07-02",
        notes: "Options: None | Brute force | Light cache. Factory default: Light cache (docs). Brute force defaults to 3 bounces, Light cache works with ~100 (docs); None removes indirect color bleeding." }
    ]

  vantage33: {
    label: "Chaos Vantage 3.3",
    entries: [

      { id: "env.mode", ui_path: "Environment tab ▸ Sky rollout ▸ Settings ▸ Environment mode",

        notes: "Intensity of the environment lighting in every Environment mode (docs). 1.0 = neutral. Practical range; spinner bounds not stated in docs." },
      { id: "env.rotation", ui_path: "Environment tab ▸ Sky rollout ▸ Settings ▸ Rotation (Environment mode = Texture)",
        kind: "spinner", unit: "deg", range: [0, 360], default: 0, verified: "2026-07-02",

      // -- sun -------------------------------------------------------------------------
      { id: "sun.enabled", ui_path: "Lights tab ▸ Sun (Vantage Default Sun / Sun Light) ▸ Basic settings ▸ Enabled",
        kind: "dropdown", unit: "", range: [0, 0], default: "on", verified: "2026-07-02",
        notes: "Options: on | off. Imported V-Ray suns list as Sun Light; Vantage's own sun as Vantage Default Sun — same parameters (docs). State follows the scene." },

        kind: "spinner", unit: "", range: [-100, 100], default: 0, verified: "2026-07-02",
        notes: "Positive = more vibrant, negative = desaturated (docs); 0 = no change. Requires the Hue / Saturation toggle ON. Practical range; slider bounds not stated in docs." },
      { id: "post.wb_kelvin", ui_path: "Color Corrections tab ▸ White balance ▸ Temperature",
        kind: "spinner", unit: "K", range: [1000, 20000], default: 6500, verified: "2026-07-02",
        notes: "Lower = bluer, higher = more amber (docs). 6500 K = neutral (no correction; derived, not doc-stated). Requires the White balance toggle ON. Practical range." },
      { id: "post.wb_tint", ui_path: "Color Corrections tab ▸ White balance ▸ Magenta-Green tint",
        kind: "spinner", unit: "", range: [-100, 100], default: 0, verified: "2026-07-02",
        notes: "Positive = greener, negative = more purple (docs); 0 = neutral. Practical range; slider bounds not stated in docs." },
      // -- render quality (GI character) -------------------------------------------------
      { id: "render.quality_preset", ui_path: "Viewport bar ▸ Render ▸ quality preset",
        kind: "dropdown", unit: "", range: [0, 0], default: "High", verified: false,
        notes: "Options: Low | Medium | High | Ultra | Custom. The preset drives GI on/off and bounce counts (docs: Low = GI off, Medium = GI on with 2 bounces, ...). Keep the SAME preset across attempts or comparisons are invalid. Startup preset not stated in current Chaos docs (High assumed)." }
    ]
  },

  targets() { return ["vray7max", "vantage33"]; },

  lookup(target, id) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return null;
    if (!pack._index) {
      pack._index = {};
      for (const e of pack.entries) pack._index[e.id] = e;
    }
    return pack._index[id] || null;
  },

  // Numeric values are clamped into the entry's range; strings and non-range kinds pass through.
  clamp(target, id, value) {
    const e = this.lookup(target, id);
    if (!e || typeof value !== "number" || !Number.isFinite(value) || !(e.range[0] < e.range[1]))
      return { value, clamped: false };
    const v = Math.min(e.range[1], Math.max(e.range[0], value));
    return { value: v, clamped: v !== value };
  },

  // Compact one-line-per-param listing for the system prompt: id, ui_path, kind, unit, range, default, notes.
  promptFragment(target) {
    const pack = this[target];
    if (!pack || !Array.isArray(pack.entries)) return "";
    const lines = pack.entries.map(e => {
      const unit = e.unit ? ` unit:${e.unit}` : "";
      const range = e.range[0] < e.range[1] ? ` range:[${e.range[0]},${e.range[1]}]` : "";
      return `${e.id} — ${e.ui_path} — kind:${e.kind}${unit}${range} default:${JSON.stringify(e.default)} — ${e.notes}`;
    });
    return `TARGET: ${pack.label}. Allowed parameter ids — choose ONLY from these; numeric values must stay inside the stated ranges:\n` + lines.join("\n");
  }
};

/* ===== SECTION: SCHEMAS ===== */
// Tool schemas, system prompts, and local (pre-network) validation for the model's
// structured output. SCHEMAS depends only on PACKS (prompt fragment + clamp/lookup
// inside validateRecipe) — never on ADAPTER, ENGINE, or the DOM.
const SCHEMAS = {
  // -- emit_recipe: the full-analysis tool. Byte-fixed by the plan (Step 4.1) — do
  // not restructure into the spec's grouped shape (environment/sun/fills[]/exposure/
  // color_mapping/step_order[]); flat values[] with a per-value `step: 1..5` is the
  // locked contract because it is far easier to validate parametrically and is
  // information-equivalent (fill placement + key:fill ratio already live as
  // kind:"placement" pack entries; step_order is redundant given the fixed order in
  // the system prompt). ------------------------------------------------------------
  emit_recipe: {
    name: "emit_recipe", strict: true, input_schema: {
      type: "object", additionalProperties: false,
      required: ["baseline", "values", "rationale", "hdri_mood", "gi_notes", "status"],
      properties: {
        baseline: { type: "string", enum: ["factory_defaults", "settings_screenshot"] },
        hdri_mood: { type: "string", description: "One line: what HDRI to reach for" },
        values: {
          type: "array", minItems: 4, maxItems: 24, items: {
            type: "object", additionalProperties: false,
            required: ["param", "set", "from", "step", "confidence", "why"],
            properties: {
              param: { type: "string", description: "MUST be an id from the provided pack" },
              set: { type: ["number", "string"] }, from: { type: ["number", "string"] },
              step: { type: "integer", minimum: 1, maximum: 5 },
              confidence: { type: "string", enum: ["high", "medium", "low"] },
              why: { type: "string" }
            }
          }
        },
        rationale: { type: "string" }, gi_notes: { type: "string" },
        status: { type: "string", enum: ["continue", "handoff_to_grade"] },
        status_reason: { type: "string" }
      }
    }
  },

  // -- emit_correction: the refine-round tool. Same value-object shape as
  // emit_recipe.values[] (locked identically: param/step/confidence/why, integer
  // step 1..5), but the array is `moves` (minItems 1, maxItems 5 — "small trims beat
  // re-matching") and the value key is `to` (not `set`, since a correction targets an
  // already-applied baseline rather than a fresh factory/screenshot one). Adds
  // `applied_assumed: boolean` — true when the model had to assume every prior-round
  // move was applied as recommended (the UI's per-row "applied" toggle can turn
  // individual moves off; when that toggle state isn't available to the model, it
  // must declare the assumption explicitly rather than silently guessing). ---------
  emit_correction: {
    name: "emit_correction", strict: true, input_schema: {
      type: "object", additionalProperties: false,
      required: ["moves", "rationale", "status", "status_reason", "applied_assumed"],
      properties: {
        moves: {
          type: "array", minItems: 1, maxItems: 5, items: {
            type: "object", additionalProperties: false,
            required: ["param", "to", "from", "step", "confidence", "why"],
            properties: {
              param: { type: "string", description: "MUST be an id from the provided pack" },
              to: { type: ["number", "string"] }, from: { type: ["number", "string"] },
              step: { type: "integer", minimum: 1, maximum: 5 },
              confidence: { type: "string", enum: ["high", "medium", "low"] },
              why: { type: "string" }
            }
          }
        },
        rationale: { type: "string" },
        status: { type: "string", enum: ["continue", "handoff_to_grade"] },
        status_reason: { type: "string" },
        applied_assumed: { type: "boolean" }
      }
    }
  },

  // -- systemPrompt(target, mode): full persona + contract text for one gateway call.
  // mode: "recipe" (full analysis, emit_recipe) | "correction" (refine round,
  // emit_correction). Deliberately target-agnostic in its own prose — every
  // parameter specific, unit, range, or host quirk (e.g. "this sun has no kelvin
  // spinner") comes from PACKS.promptFragment(target) appended at the end, never
  // hardcoded here. That keeps this function identical in shape for every future
  // pack (adding a host is a data task, per the spec's non-goals). -----------------
  systemPrompt(target, mode) {
    const isCorrection = mode === "correction";
    const lines = [];

    lines.push("You are a lighting technical director (TD) — the same disciplined, surgical role you would play " +
      "grading a shot against a reference plate, now applied to matching a 3D render's LIGHTING to a reference " +
      "image before any color grade happens.");
    lines.push("");
    lines.push("You do not measure. Measurements are provided to you as computed evidence — deterministic canvas " +
      "photometry run on both images before this prompt was assembled. Your job is to translate that evidence into " +
      "exact parameter moves in the target application's native vocabulary. Trust your eyes for direction, the " +
      "numbers for magnitude: the images tell you WHICH way something is wrong (warmer, brighter, softer shadows), " +
      "the measurements tell you HOW FAR to push it and confirm you are not chasing a false read.");
    lines.push("");
    lines.push("Parameter discipline: choose ONLY parameter ids that appear in the pack listing below — never invent " +
      "a setting, never rename one, never describe a control the pack does not list. Every numeric value you set " +
      "must stay inside that parameter's stated range; the app will clamp and flag anything outside it, so get it " +
      "right the first time.");
    lines.push("");
    lines.push("Baseline convention: unless a settings screenshot is supplied, assume the target is at its FACTORY " +
      "DEFAULTS and declare baseline:\"factory_defaults\" — every `from` value is then that parameter's pack " +
      "default. If a settings screenshot IS supplied, read the actual on-screen values from it and use those as " +
      "`from`, declaring baseline:\"settings_screenshot\" instead of assuming defaults.");
    lines.push("");
    lines.push("Fixed step order — always move in this sequence, and tag every value's `step` field accordingly:");
    lines.push("  1. exposure/WB lock — camera or VFB exposure and white balance, decided and held first.");
    lines.push("  2. sun/key — the primary light's direction, intensity, and color.");
    lines.push("  3. dome/environment — HDRI or skylight fill, mood, and rotation.");
    lines.push("  4. fills/rim — secondary/artificial lights and their key:fill ratio.");
    lines.push("  5. color mapping — highlight burn, contrast, saturation, and any display-side correction.");
    lines.push("Why this order is fixed, not a suggestion: doubling the sun's intensity and opening the camera by " +
      "+1 EV produce nearly the same pixels — it is a genuine degeneracy, not a matter of taste. Locking exposure " +
      "and WB FIRST removes that ambiguity before you touch the light itself; without a fixed order the refine " +
      "loop oscillates between \"brighten the sun\" and \"open the camera\" forever.");
    lines.push("");
    lines.push("Exactness goal: the user requires a ~99% match to the reference's lighting, not a pleasing " +
      "approximation. Be surgical, not tasteful — small, evidence-backed moves that close the measured gap beat " +
      "confident-sounding creative reinterpretation.");

    if (isCorrection) {
      lines.push("");
      lines.push("CORRECTION ROUND (refine mode): you are looking at an attempt that was rendered from a prior " +
        "recipe or correction, not a blank slate. The full move history from every previous round is provided to " +
        "you, along with which of those moves the user actually applied. Return a correction card, not a new " +
        "recipe: 3-5 moves max, each prioritized by how much of the remaining measured gap it closes. Small trims " +
        "beat re-matching from scratch.");
      lines.push("Oscillation guard: never reverse a prior move by more than half its distance from its own " +
        "`from` value — if round 2 pushed sun.kelvin from 6500 to 5000 (a move of 1500), round 3 may pull it back " +
        "toward 6500 by at most 750. If you see a metric ping-pong across rounds (it improves, then reverses, then " +
        "improves again), do not keep chasing it — name the exposure/light degeneracy to the user directly in " +
        "`status_reason` instead, so they understand why the number is not settling.");
      lines.push("Know when to stop: declare status:\"handoff_to_grade\" the moment the residual measured diff is " +
        "dominated by chromatic/tonal terms (tint, saturation, contrast curve) rather than light-transport terms " +
        "(luminance structure, where light enters the frame, shadow/highlight placement). At that point further " +
        "re-rendering will not help — the remaining 1% is a color grade, not a lighting problem, and belongs to a " +
        "grading tool, not this loop.");
    }

    lines.push("");
    lines.push(PACKS.promptFragment(target));

    return lines.join("\n");
  },

  // -- validateRecipe(obj, target, mode): local (pre-network) validation of a
  // model-returned tool call, before it ever reaches the UI. Handles BOTH shapes with
  // one function rather than two near-duplicate validators — recipe (`values[]`,
  // `set`) is the default when `mode` is omitted, `mode:"correction"` switches to
  // `moves[]`/`to`. Returns {ok, errors[], cleaned}:
  //   - unknown `param` (not in the target pack)      -> ERROR (value/move dropped from cleaned, ok:false)
  //   - non-finite numeric `set`/`to` (NaN/Infinity)   -> ERROR (never let it into cleaned; PACKS.clamp alone does
  //                                                        NOT catch this — it passes non-finite numbers through
  //                                                        unflagged by design, so this check is done HERE, first)
  //   - numeric `set`/`to` outside the pack's range    -> WARNING only: PACKS.clamp clamps it into range and the
  //                                                        cleaned value/move carries `clamped:true`; ok stays true
  //   - `step` outside the integer range 1..5          -> ERROR
  //   - string `set`/`to` (dropdown/slot/placement)    -> passed through untouched, never flagged clamped
  // `cleaned` always has the same top-level shape as `obj` (values[] or moves[]), with
  // per-item `clamped` added where applicable; items that hit an ERROR are dropped
  // from cleaned so nothing invalid can flow downstream even if a caller ignores `ok`.
  validateRecipe(obj, target, mode) {
    const isCorrection = mode === "correction";
    const arrKey = isCorrection ? "moves" : "values";
    const valKey = isCorrection ? "to" : "set";
    const errors = [];

    const cleaned = Object.assign({}, obj);
    const items = Array.isArray(obj && obj[arrKey]) ? obj[arrKey] : [];
    const cleanedItems = [];

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const where = `${arrKey}[${i}]`;
      if (!item || typeof item.param !== "string") {
        errors.push(`${where}: missing or non-string "param"`);
        continue;
      }
      const entry = PACKS.lookup(target, item.param);
      if (!entry) {
        errors.push(`${where}: unknown param "${item.param}" — not in pack "${target}"`);
        continue;
      }
      if (typeof item.step !== "number" || !Number.isInteger(item.step) || item.step < 1 || item.step > 5) {
        errors.push(`${where} (${item.param}): "step" must be an integer 1..5, got ${JSON.stringify(item.step)}`);
        continue;
      }

      const rawVal = item[valKey];
      let outItem = Object.assign({}, item);
      if (typeof rawVal === "number") {
        // Carry-forward fix (mandatory, Task 2 review): PACKS.clamp passes non-finite
        // numbers through UNFLAGGED — a NaN/Infinity `set`/`to` must be rejected here,
        // before clamp ever sees it, or it silently reaches `cleaned`.
        if (!Number.isFinite(rawVal)) {
          errors.push(`${where} (${item.param}): non-finite numeric "${valKey}" (${String(rawVal)}) — rejected`);
          continue;
        }
        const clampResult = PACKS.clamp(target, item.param, rawVal);
        outItem[valKey] = clampResult.value;
        outItem.clamped = clampResult.clamped;
      } else {
        // string (dropdown/slot/placement kinds): pass through untouched, unflagged.
        outItem.clamped = false;
      }
      cleanedItems.push(outItem);
    }

    cleaned[arrKey] = cleanedItems;
    return { ok: errors.length === 0, errors, cleaned };
  }
};

/* ===== SECTION: METRICS ===== */
// Pure canvas photometry: measure/diff/score a rendered image against a reference.
// No DOM reads beyond canvas creation + 2d context + createImageBitmap; no globals
// mutated. All functions accept a canvas, ImageBitmap, File, or Blob where noted.
const METRICS = {
  // -- constants -------------------------------------------------------------------
  HIST_BINS: 1024,
  CLIP_HI_THRESH: 250, // sRGB 0..255: a pixel counts toward clip.hi when max(r,g,b) >= this
  CLIP_LO_THRESH: 5,   // sRGB 0..255: a pixel counts toward clip.lo when max(r,g,b) <= this
  // Rationale for CLIP thresholds: max(r,g,b) (not min, not "all channels") is the
  // sRGB proxy used because it is monotone under a uniform exposure push (raising
  // exposure only ever raises max(r,g,b), never lowers it) and it satisfies the
  // three fixed points the contract requires: solid-255 -> hi===1 (max=255>=250 for
  // every pixel), solid-0 -> lo===1 (max=0<=5 for every pixel), solid-128 -> 0/0
  // (max=128 is on neither side). "All channels >=250" would under-count colored
  // highlights (e.g. blown-out warm sky where B never reaches 250); max(r,g,b) does
  // not have that blind spot.

  // -- linearize a single sRGB channel (0..1 in, 0..1 out) --------------------------
  _linearize(c) {
    return c <= 0.04045 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4;
  },

  // -- linear luminance from sRGB 0..1 channels --------------------------------------
  _lumLinear(r, g, b) {
    return 0.2126 * this._linearize(r) + 0.7152 * this._linearize(g) + 0.0722 * this._linearize(b);
  },

  // -- percentile bin INDICES via a fixed-bin histogram (0..nBins-1) ----------------
  // values: array-like of numbers already in [0,1]. ps: array of percentiles in [0,100].
  // Returns bin indices aligned with `ps`. Kept separate from the bin-center value
  // conversion below because shadow/highlight membership needs to compare each
  // pixel's OWN bin index against the cutoff bin index (self-consistent in the same
  // discretized space) rather than against the rounded bin-center value — comparing
  // a raw lum against a bin-center number can land it on the wrong side of <=/>= for
  // solid-color / low-cardinality inputs, since the bin center is a rounded stand-in
  // for the whole bin's value range, not the true percentile-rank value.
  _percentileBins(values, ps, nBins) {
    const bins = nBins || this.HIST_BINS;
    const hist = new Uint32Array(bins);
    const n = values.length;
    for (let i = 0; i < n; i++) {
      let idx = Math.floor(values[i] * bins);
      if (idx < 0) idx = 0; else if (idx >= bins) idx = bins - 1;
      hist[idx]++;
    }
    const out = new Array(ps.length);
    for (let pi = 0; pi < ps.length; pi++) {
      const target = (ps[pi] / 100) * n;
      let cum = 0, bin = bins - 1;
      for (let b = 0; b < bins; b++) {
        cum += hist[b];
        if (cum >= target) { bin = b; break; }
      }
      out[pi] = bin;
    }
    return out;
  },

  // -- percentile via a fixed-bin histogram; returns the bin-CENTER value -----------
  // Same binning as _percentileBins, converted to a representative 0..1 value.
  _percentiles(values, ps, nBins) {
    const bins = nBins || this.HIST_BINS;
    const binIdx = this._percentileBins(values, ps, bins);
    return binIdx.map(bin => (bin + 0.5) / bins);
  },

  // -- draw any supported source onto a canvas sized to fit within maxEdge, never
  //    upscaling (scale = min(1, maxEdge / longEdge)). Accepts a canvas or an
  //    ImageBitmap-like object (anything with width/height drawable via drawImage).
  thumb(source, maxEdge) {
    const sw = source.width, sh = source.height;
    const longEdge = Math.max(sw, sh);
    const scale = longEdge > maxEdge ? maxEdge / longEdge : 1;
    const w = Math.max(1, Math.round(sw * scale));
    const h = Math.max(1, Math.round(sh * scale));
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.drawImage(source, 0, 0, w, h);
    return c;
  },

  // -- core measurement --------------------------------------------------------------
  measure(imageBitmapOrCanvas) {
    const th = this.thumb(imageBitmapOrCanvas, 256);
    const ctx = th.getContext("2d");
    const w = th.width, h = th.height;
    const { data } = ctx.getImageData(0, 0, w, h);
    const n = w * h;

    const lumArr = new Float64Array(n);
    const satArr = new Float64Array(n);
    let clipHiCount = 0, clipLoCount = 0;
    let satSum = 0;
    let meanLinR = 0, meanLinG = 0, meanLinB = 0;

    for (let i = 0, p = 0; i < n; i++, p += 4) {
      const r255 = data[p], g255 = data[p + 1], b255 = data[p + 2];
      const r = r255 / 255, g = g255 / 255, b = b255 / 255;
      const lum = this._lumLinear(r, g, b);
      lumArr[i] = lum;

      const maxc = Math.max(r255, g255, b255);
      if (maxc >= this.CLIP_HI_THRESH) clipHiCount++;
      if (maxc <= this.CLIP_LO_THRESH) clipLoCount++;

      const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
      const s = mx === 0 ? 0 : (mx - mn) / mx;
      satArr[i] = s;
      satSum += s;

      meanLinR += this._linearize(r); meanLinG += this._linearize(g); meanLinB += this._linearize(b);
    }
    meanLinR /= n; meanLinG /= n; meanLinB /= n;

    // -- luminance percentiles (bin-center values, for the returned lum object) -------
    const [p1, p5, p25, p50, p75, p95, p99] = this._percentiles(lumArr, [1, 5, 25, 50, 75, 95, 99]);
    // -- same cutoffs as BIN INDICES, for robust shadow/highlight membership below.
    // See _percentileBins doc comment: comparing raw lum against the rounded
    // bin-center number can put every pixel of a solid-color / low-cardinality image
    // on the wrong side of <=/>= (e.g. solid red's true lum 0.2126 sits above its own
    // bin's center 0.21240..., so `lum <= p25(center)` is false for all pixels even
    // though the whole image IS the 25th percentile). Comparing bin index to bin
    // index is self-consistent and has no such rounding gap.
    const [p25Bin, p75Bin] = this._percentileBins(lumArr, [25, 75]);
    let lumSum = 0;
    for (let i = 0; i < n; i++) lumSum += lumArr[i];
    const lumMean = lumSum / n;

    // -- clip fractions ---------------------------------------------------------------
    const clip = { hi: clipHiCount / n, lo: clipLoCount / n };

    // -- contrast -----------------------------------------------------------------------
    const contrast = { spread: p95 - p5, midSlope: (p75 - p25) / 0.5 };

    // -- white balance: shadow = lum-bin<=p25-bin, highlight = lum-bin>=p75-bin,
    //    mean LINEAR channels over each set ------------------------------------------
    let shR = 0, shG = 0, shB = 0, shN = 0;
    let hiR = 0, hiG = 0, hiB = 0, hiN = 0;
    for (let i = 0, p = 0; i < n; i++, p += 4) {
      let binIdx = Math.floor(lumArr[i] * this.HIST_BINS);
      if (binIdx < 0) binIdx = 0; else if (binIdx >= this.HIST_BINS) binIdx = this.HIST_BINS - 1;
      const r = this._linearize(data[p] / 255), g = this._linearize(data[p + 1] / 255), b = this._linearize(data[p + 2] / 255);
      if (binIdx <= p25Bin) { shR += r; shG += g; shB += b; shN++; }
      if (binIdx >= p75Bin) { hiR += r; hiG += g; hiB += b; hiN++; }
    }
    // shN/hiN are always >=1 for any non-empty image: p25Bin/p75Bin are themselves
    // bin indices occupied by at least one real pixel, so at least the pixel(s) that
    // produced that bin satisfy the corresponding inequality (guards against
    // div-by-zero on degenerate 1-pixel inputs).
    const shadow = { r: shN ? shR / shN : 0, g: shN ? shG / shN : 0, b: shN ? shB / shN : 0 };
    const highlight = { r: hiN ? hiR / hiN : 0, g: hiN ? hiG / hiN : 0, b: hiN ? hiB / hiN : 0 };
    const warmthShadow = (shadow.r - shadow.b) / (shadow.r + shadow.b + 1e-9);
    const warmthHighlight = (highlight.r - highlight.b) / (highlight.r + highlight.b + 1e-9);
    // tint is a single whole-image green/magenta statistic (mirrors sat.mean being a
    // whole-image stat rather than shadow/highlight-split) — warmthShadow/warmthHighlight
    // already cover the per-tonal-region warm/cool read; tint uses the overall mean
    // LINEAR r,g,b across every pixel in the thumb, not just the shadow/highlight
    // quartile subsets, since the contract's return shape has one `tint` field, not a
    // tintShadow/tintHighlight pair.
    const tint = meanLinG - (meanLinR + meanLinB) / 2;
    const wb = { shadow, highlight, warmthShadow, warmthHighlight, tint };

    // -- saturation ---------------------------------------------------------------------
    const satMean = satSum / n;
    const [satP95] = this._percentiles(satArr, [95]);
    const sat = { mean: satMean, p95: satP95 };

    // -- 4x4 grid: mean linear luminance per cell, row-major -----------------------------
    const grid = new Array(16).fill(0);
    const gridCount = new Array(16).fill(0);
    for (let y = 0; y < h; y++) {
      let gy = Math.floor((y / h) * 4); if (gy > 3) gy = 3;
      for (let x = 0; x < w; x++) {
        let gx = Math.floor((x / w) * 4); if (gx > 3) gx = 3;
        const cell = gy * 4 + gx;
        grid[cell] += lumArr[y * w + x];
        gridCount[cell]++;
      }
    }
    for (let i = 0; i < 16; i++) grid[i] = gridCount[i] ? grid[i] / gridCount[i] : 0;

    return {
      lum: { p1, p5, p25, p50, p75, p95, p99, mean: lumMean },
      clip,
      contrast,
      wb,
      sat,
      grid
    };
  },

  // -- flat diff: (b - a) per scalar, plus grid.0..grid.15 ---------------------------
  diff(a, b) {
    const out = {
      "lum.p1": b.lum.p1 - a.lum.p1,
      "lum.p5": b.lum.p5 - a.lum.p5,
      "lum.p25": b.lum.p25 - a.lum.p25,
      "lum.p50": b.lum.p50 - a.lum.p50,
      "lum.p75": b.lum.p75 - a.lum.p75,
      "lum.p95": b.lum.p95 - a.lum.p95,
      "lum.p99": b.lum.p99 - a.lum.p99,
      "lum.mean": b.lum.mean - a.lum.mean,
      "clip.hi": b.clip.hi - a.clip.hi,
      "clip.lo": b.clip.lo - a.clip.lo,
      "contrast.spread": b.contrast.spread - a.contrast.spread,
      "contrast.midSlope": b.contrast.midSlope - a.contrast.midSlope,
      "wb.warmthShadow": b.wb.warmthShadow - a.wb.warmthShadow,
      "wb.warmthHighlight": b.wb.warmthHighlight - a.wb.warmthHighlight,
      "wb.tint": b.wb.tint - a.wb.tint,
      "sat.mean": b.sat.mean - a.sat.mean,
      "sat.p95": b.sat.p95 - a.sat.p95
    };
    for (let i = 0; i < 16; i++) out[`grid.${i}`] = b.grid[i] - a.grid[i];
    return out;
  },

  // -- deterministic 0..100 look-distance score --------------------------------------
  // score = min(100, 100 * sqrt( Σ w_i·d_i² / Σ w_i ) / 0.35)
  // Uses exactly the diff keys + weights below; d_i are diff(refM, attemptM) values.
  SCORE_WEIGHTS: {
    "lum.p5": 3, "lum.p50": 3, "lum.p95": 3,
    "contrast.spread": 2, "contrast.midSlope": 2,
    "wb.warmthShadow": 2, "wb.warmthHighlight": 2, "wb.tint": 2,
    "clip.hi": 1.5, "clip.lo": 1.5,
    "sat.mean": 1,
    "grid.0": 0.5, "grid.1": 0.5, "grid.2": 0.5, "grid.3": 0.5,
    "grid.4": 0.5, "grid.5": 0.5, "grid.6": 0.5, "grid.7": 0.5,
    "grid.8": 0.5, "grid.9": 0.5, "grid.10": 0.5, "grid.11": 0.5,
    "grid.12": 0.5, "grid.13": 0.5, "grid.14": 0.5, "grid.15": 0.5
  },
  score(refM, attemptM) {
    const d = this.diff(refM, attemptM);
    let wsum = 0, wdsum = 0;
    for (const [key, w] of Object.entries(this.SCORE_WEIGHTS)) {
      const di = d[key] || 0;
      wsum += w;
      wdsum += w * di * di;
    }
    const raw = 100 * Math.sqrt(wdsum / wsum) / 0.35;
    return Math.min(100, raw);
  },

  // -- downscale a File/Blob/canvas/ImageBitmap for sending to the model; never
  //    upscales (scale = min(1, maxEdge / longEdge), same rule as thumb()). Two call
  //    shapes cover the plan: lossy default (1568, image/jpeg, q=0.85) and a lossless
  //    variant for the settings screenshot (2048, image/png — q is ignored by PNG
  //    encoders but accepted here for a uniform signature). Rejects (throws) if the
  //    source is a File/Blob that the browser cannot decode as an image — callers
  //    must wrap this in try/catch (see SECTION: ADAPTER header comment). -----------
  async downscaleForSend(fileOrBlobOrCanvas, maxEdge, type, q) {
    maxEdge = maxEdge === undefined ? 1568 : maxEdge;
    type = type === undefined ? "image/jpeg" : type;
    q = q === undefined ? 0.85 : q;

    let source = fileOrBlobOrCanvas;
    const isCanvasLike = source && typeof source.getContext === "function"
      && typeof source.width === "number" && typeof source.height === "number";
    const isBitmapLike = typeof ImageBitmap !== "undefined" && source instanceof ImageBitmap;
    let decodedHere = false;
    if (!isCanvasLike && !isBitmapLike) {
      // File or Blob: decode to an ImageBitmap first. We own this bitmap and must
      // close it ourselves once drawn — a caller-supplied ImageBitmap (isBitmapLike)
      // is never closed here, since the caller still owns its lifecycle.
      source = await createImageBitmap(fileOrBlobOrCanvas);
      decodedHere = true;
    }
    const sw = source.width, sh = source.height;

    const longEdge = Math.max(sw, sh);
    const scale = longEdge > maxEdge ? maxEdge / longEdge : 1;
    const w = Math.max(1, Math.round(sw * scale));
    const h = Math.max(1, Math.round(sh * scale));

    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    ctx.drawImage(source, 0, 0, w, h);
    if (decodedHere) source.close();
    const dataUrl = c.toDataURL(type, q);
    return { dataUrl, w, h };
  }
};

/* ===== SECTION: STORE ===== */
// key()/setKey() (Task 5, localStorage) unchanged below. This task (6) adds:
//   - prefs()/setPrefs(): small localStorage JSON blob (model, target).
//   - IndexedDB session persistence: db "lightmatch" v1, one object store "sessions"
//     keyPath "id". Promisified, minimal, single shared connection (opened lazily on
//     first use, cached in _dbPromise so every call reuses the same connection rather
//     than re-opening per operation).
// Degrade-never-throw contract: if indexedDB.open(...) rejects/errors at runtime (a
// real failure mode — private browsing, disabled storage, exotic embedder policy),
// STORE falls back to an in-memory Map (_mem) and sets `persistent = false`. Nothing
// in STORE ever throws out of boot; a failed IDB open is caught internally and the
// in-memory path takes over silently for the rest of the page's lifetime.
const STORE = {
  key: () => localStorage.getItem("lm_key") || "",
  // trim: pasted keys carry trailing newlines/spaces and produce mystifying 401s.
  setKey: k => localStorage.setItem("lm_key", (k || "").trim()),

  // -- prefs: {model, target}, localStorage JSON, defaults filled in on read --------
  PREFS_DEFAULTS: { model: "claude-opus-4-8", target: "vray7max" },
  prefs() {
    let stored = {};
    try { stored = JSON.parse(localStorage.getItem("lm_prefs") || "{}") || {}; } catch (e) { stored = {}; }
    return Object.assign({}, this.PREFS_DEFAULTS, stored);
  },
  setPrefs(patch) {
    const merged = Object.assign({}, this.prefs(), patch || {});
    localStorage.setItem("lm_prefs", JSON.stringify(merged));
    return merged;
  },

  // -- IndexedDB plumbing -------------------------------------------------------------
  DB_NAME: "lightmatch", DB_VERSION: 1, STORE_NAME: "sessions",
  persistent: true,
  _dbPromise: null,
  _mem: new Map(), // in-memory fallback, keyed by session id — used only if IDB open fails

  _openDB() {
    if (this._dbPromise) return this._dbPromise;
    this._dbPromise = new Promise((resolve) => {
      let req;
      try {
        req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
      } catch (e) {
        this.persistent = false;
        resolve(null);
        return;
      }
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
          db.createObjectStore(this.STORE_NAME, { keyPath: "id" });
        }
      };
      req.onsuccess = () => { this.persistent = true; resolve(req.result); };
      req.onerror = () => { this.persistent = false; resolve(null); };
      req.onblocked = () => { this.persistent = false; resolve(null); };
    });
    return this._dbPromise;
  },

  // -- saveSession(s): upsert by id (IDB `put` is upsert-by-keyPath natively; the
  // in-memory fallback mirrors that with Map.set on the same id). Session fields must
  // stay JSON-safe (strings/numbers/booleans/plain objects/arrays/null) — the
  // in-memory path round-trips through JSON.parse(JSON.stringify(...)) to decouple the
  // stored copy from the caller's live object (matching IDB's own structured-clone
  // copy-on-write semantics), which would silently drop a Date/Function/undefined
  // field that the real IDB path would otherwise preserve. Every field this app
  // actually stores (dataUrls as strings, ISO date strings, numbers) already satisfies
  // this. ------------------------------------------------------------------------------
  async saveSession(s) {
    const db = await this._openDB();
    if (!db) { this._mem.set(s.id, JSON.parse(JSON.stringify(s))); return s; }
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, "readwrite");
      tx.objectStore(this.STORE_NAME).put(s);
      tx.oncomplete = () => resolve(s);
      tx.onerror = () => reject(tx.error);
    });
  },

  // -- _all(): every stored session, unordered. Internal helper for loadLatest() and
  // for selftest cleanup sweeps; not part of the plan's public API surface but kept
  // on STORE (not module-private) so both call sites can share one implementation.
  // In-memory path returns FRESH copies (not the live _mem-stored references) so it
  // matches IDB's getAll(), which always deserializes a new object per call — without
  // this, a caller mutating a session returned from _all()/loadLatest() in memory-
  // fallback mode would silently corrupt the "stored" copy with no saveSession() call. --
  async _all() {
    const db = await this._openDB();
    if (!db) return Array.from(this._mem.values()).map(s => JSON.parse(JSON.stringify(s)));
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, "readonly");
      const req = tx.objectStore(this.STORE_NAME).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  },

  // -- loadLatest(): the session with the highest `created` (ISO string — lexical
  // comparison is correct for same-format ISO-8601 timestamps). null if none exist. --
  async loadLatest() {
    const all = await this._all();
    if (!all.length) return null;
    let best = all[0];
    for (const s of all) if (s.created > best.created) best = s;
    return best;
  },

  // -- deleteSession(id): removes a session by id. Not one of the plan's headline API
  // methods (saveSession/loadLatest/exportJSON/importJSON), but the plan explicitly
  // calls for it as the selftest cleanup mechanism ("clean up test sessions afterward
  // ... use a test-only id you remove"); also the natural building block for a future
  // UI "delete session" action. ---------------------------------------------------------
  async deleteSession(id) {
    const db = await this._openDB();
    if (!db) { this._mem.delete(id); return; }
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, "readwrite");
      tx.objectStore(this.STORE_NAME).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },

  // -- exportJSON(session?) / importJSON(str): the file:// fallback for moving a
  // session between browser profiles/machines when IDB isn't usable (or just as a
  // manual backup). exportJSON accepts an explicit session object (so a caller who
  // already has one in hand — e.g. ENGINE.session() — exports exactly what's currently
  // in memory, including any not-yet-persisted edit) but falls back to STORE's own
  // "current" notion (the latest SAVED session) when called with no argument, per the
  // plan's "exportJSON() returns a JSON string of the current session". importJSON
  // does minimal shape validation — must be a parseable object with a string `id` and
  // a `chains` object — then saves it. `created` is normalized (Task 7a hardening):
  // missing or non-ISO-parseable becomes "now", since STORE.loadLatest() sorts
  // sessions by a lexical comparison of `created` — a garbage or absent value would
  // either crash that comparison's assumptions or silently sort the imported session
  // to the wrong end of "latest". A VALID ISO `created` is preserved verbatim (an
  // imported session should keep its true original timestamp, not be stamped as if
  // freshly created). -------------------------------------------------------------
  async exportJSON(session) {
    const s = session !== undefined ? session : await this.loadLatest();
    return JSON.stringify(s);
  },
  async importJSON(str) {
    let obj;
    try { obj = JSON.parse(str); } catch (e) { throw new Error("importJSON: not valid JSON"); }
    if (!obj || typeof obj !== "object" || typeof obj.id !== "string" || !obj.id) {
      throw new Error("importJSON: missing/invalid session.id");
    }
    if (!obj.chains || typeof obj.chains !== "object") {
      throw new Error("importJSON: missing session.chains");
    }
    if (typeof obj.created !== "string" || Number.isNaN(Date.parse(obj.created))) {
      obj.created = new Date().toISOString();
    }
    await this.saveSession(obj);
    return obj;
  }
};

/* ===== SECTION: ADAPTER ===== */
// Omega gateway client (Anthropic Messages wire, non-streaming, forced tool_choice).
// ADAPTER→STORE (key read only, via STORE.key()); nothing else. ADAPTER does NOT call
// METRICS.downscaleForSend itself — buildUserContent works on already-downscaled
// {dataUrl, mediaType} pairs, so the decode-reject path documented on
// downscaleForSend (SECTION: METRICS) is ENGINE's responsibility to try/catch when it
// downscales images before calling ADAPTER.buildUserContent/ADAPTER.call (Task 6).
const ADAPTER = {
  // -- error types: thrown by call(), never returned as a value, so a caller can
  // `catch (e) { if (e instanceof ADAPTER.AuthError) ... }` without inspecting a
  // status code again. Attached to ADAPTER (not module-private) so selftests and
  // ENGINE can both construct/instanceof-check them without a network call. --------
  AuthError: class AuthError extends Error {
    constructor(message) { super(message); this.name = "AuthError"; }
  },
  ShapeError: class ShapeError extends Error {
    constructor(message, raw) { super(message); this.name = "ShapeError"; this.raw = raw; }
  },

  // -- backoff schedule: a CONSTANT (not a function of attempt number), so it is
  // directly assertable in a selftest without calling fetch. 3 entries = 3 retry
  // attempts after the first try, per the plan's "3 attempts, backoff 2s/6s/15s". --
  BACKOFF_MS: [2000, 6000, 15000],

  // -- per-attempt fetch timeout (ms): a gateway that accepts the socket but never
  // responds would otherwise wedge `await fetch` forever and the retry loop would
  // never trigger. A constant on ADAPTER (like BACKOFF_MS) so tests can override it;
  // an abort is treated exactly like a network reject (retryable with backoff). ----
  TIMEOUT_MS: 120000,

  // -- _sleep(ms): promise-wrapped setTimeout, used for the backoff waits. ----------
  _sleep(ms) { return new Promise(r => setTimeout(r, ms)); },

  // -- classify(status): pure function, no fetch, no `this`. Maps an HTTP status code
  // to one of three retry-loop actions:
  //   "retry" — 429 (rate limit) or any 5xx (server error): try again with backoff.
  //   "auth"  — 401: the key is wrong/expired; caller throws AuthError, no retry.
  //   "fatal" — everything else (400, 403, 404, ... and any 2xx/3xx that should never
  //             reach this classifier in practice): do not retry, surface the error.
  // Network errors (fetch rejects, no status at all) are classified as "retry" by the
  // caller directly — see call()'s catch block — since there is no status code to
  // pass here. -----------------------------------------------------------------------
  classify(status) {
    if (status === 429) return "retry";
    if (status >= 500 && status <= 599) return "retry";
    if (status === 401) return "auth";
    return "fatal";
  },

  // -- buildUserContent({mode, images, metricsBundle, context, history}): assembles
  // the single user-turn `content` array for the Messages API. Pure/no network.
  //   mode: "recipe" (initial analysis) | "correction" (refine round) — only gates
  //         whether the move-history block is included; image labeling is driven by
  //         each image's own `role`/`n`, not by `mode`, so a settings screenshot can
  //         appear in either mode.
  //   images: [{ role: "reference"|"base"|"settings"|"attempt", n, dataUrl, mediaType }]
  //         — dataUrl is a full `data:<mediaType>;base64,<data>` string as returned by
  //         METRICS.downscaleForSend (ENGINE's job to produce; this function does not
  //         downscale or decode anything itself, so it never touches ImageBitmap and
  //         has no decode-reject path of its own).
  //   metricsBundle: any JSON-serializable object — whatever measurements+diff shape
  //         ENGINE assembled (kept opaque here; SCHEMAS/ENGINE own that shape).
  //   context: plain object of scene chips (scene/time/rig/etc.) rendered as a line.
  //   history: (correction mode only) array of prior rounds' moves + applied state.
  // Documented block order (alternating text/image; every image is immediately
  // preceded by its own labeling text block):
  //   [label, image]* for every entry in `images`, in array order
  //   -> evidence text block (units legend + JSON.stringify(metricsBundle))
  //   -> context chips text block
  //   -> (correction mode only) move-history + applied-set text block
  // -----------------------------------------------------------------------------------
  buildUserContent({ mode, images, metricsBundle, context, history }) {
    const content = [];

    const LABELS = {
      reference: "REFERENCE:",
      base: "BASE RENDER:",
      settings: "SETTINGS SCREENSHOT (baseline):",
      attempt: n => `ATTEMPT ${n}:`
    };

    for (const img of (images || [])) {
      const label = img.role === "attempt" ? LABELS.attempt(img.n) : (LABELS[img.role] || `IMAGE (${img.role}):`);
      content.push({ type: "text", text: label });
      const base64 = img.dataUrl.includes(",") ? img.dataUrl.slice(img.dataUrl.indexOf(",") + 1) : img.dataUrl;
      content.push({ type: "image", source: { type: "base64", media_type: img.mediaType, data: base64 } });
    }

    // Units legend prefixes the raw JSON so the model does not have to guess what a
    // bare "0.211" or "-0.03" means — see METRICS section header for the same facts
    // from the producer's side (lum linearized 0..1; warmth = (R-B)/(R+B) on linear
    // means; tint = G-(R+B)/2, positive = green).
    const legend = "COMPUTED EVIDENCE — deterministic, trust for magnitude. Units: luminance values are " +
      "linearized 0-1 (not sRGB 0-255); warmth* is (R-B)/(R+B) computed on linear channel means, positive = " +
      "warmer, negative = cooler, roughly +-0.05 ~= a few hundred kelvin; tint is positive = green, negative = " +
      "magenta.";
    // Token precision: 4 decimals is well past the metrics' meaningful resolution;
    // full float64 digit-runs only burn tokens and invite false precision.
    const round4 = (k, v) => typeof v === "number" && Number.isFinite(v) ? Math.round(v * 1e4) / 1e4 : v;
    content.push({ type: "text", text: `${legend}\n${JSON.stringify(metricsBundle, round4)}` });

    if (context && Object.keys(context).length) {
      const chips = Object.entries(context).map(([k, v]) => `${k}: ${v}`).join(", ");
      content.push({ type: "text", text: `SCENE CONTEXT — ${chips}` });
    }

    if (mode === "correction" && Array.isArray(history) && history.length) {
      const lines = ["MOVE HISTORY (prior rounds — do not reverse any move here by more than half; applied=false means the user skipped that row when re-rendering):"];
      for (const round of history) {
        for (const mv of (round.moves || [])) {
          lines.push(`  round ${round.round}: ${mv.param} ${mv.from} -> ${mv.to} (applied: ${mv.applied}) — ${mv.why || ""}`.trimEnd());
        }
      }
      content.push({ type: "text", text: lines.join("\n") });
    }

    return content;
  },

  // -- call({model, system, userContent, tool, validate}) -> Promise<toolInput>
  //   model:       exact gateway model id string (ADAPTER hardcodes none of these).
  //   system:      system prompt string (SCHEMAS.systemPrompt(...) output).
  //   userContent: the content array from buildUserContent(...).
  //   tool:        one SCHEMAS.emit_recipe / SCHEMAS.emit_correction object; also
  //                forced via tool_choice so the model cannot answer in prose.
  //   validate:    optional (toolInput) => {ok, errors[], cleaned} — when provided
  //                and the first response fails validation, call() re-asks ONCE by
  //                appending the assistant turn plus a wire-valid user turn whose
  //                content is a tool_result block (matching tool_use_id,
  //                is_error:true) naming the errors, then re-validates the second
  //                response. A second failure surfaces the validation error to the
  //                caller (throws) rather than looping again.
  // Retries (429/5xx/network/timeout): up to 3 retry attempts after the first try,
  // backoff BACKOFF_MS[attempt] between attempts. Each attempt is bounded by
  // TIMEOUT_MS via an AbortController; an abort is treated exactly like a network
  // reject (retryable). 401 throws AuthError immediately, no retry. A response with
  // no tool_use block throws ShapeError carrying the raw response text.
  // Note: this gateway family can return pseudo-errors as HTTP 200 — those surface
  // as ShapeError with .raw for the caller to inspect. -------------------------------
  async call({ model, system, userContent, tool, validate }) {
    const messages = [{ role: "user", content: userContent }];

    const send = async () => {
      let lastErr = null;
      for (let attempt = 0; attempt < this.BACKOFF_MS.length + 1; attempt++) {
        let res = null;
        const ac = new AbortController();
        const t = setTimeout(() => ac.abort(), this.TIMEOUT_MS);
        try {
          res = await fetch("https://omega.kesarcloud.in/v1/messages", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "authorization": "Bearer " + STORE.key(),
              "anthropic-version": "2023-06-01"
            },
            body: JSON.stringify({
              model, max_tokens: 4096, stream: false, system, messages,
              tools: [tool], tool_choice: { type: "tool", name: tool.name }
            }),
            signal: ac.signal
          });
        } catch (networkErr) {
          // fetch rejected (offline, DNS, CORS preflight failure, ...) OR our
          // TIMEOUT_MS abort fired (gateway accepted the socket, never answered).
          // No status code to classify in either case, but both ARE the "network"
          // case in the plan's "429/5xx/network" retry list — treated as retryable.
          lastErr = networkErr;
        } finally {
          clearTimeout(t);
        }
        if (res === null) {
          if (attempt < this.BACKOFF_MS.length) { await this._sleep(this.BACKOFF_MS[attempt]); continue; }
          throw lastErr;
        }

        if (res.ok) {
          const json = await res.json();
          return json;
        }

        const action = this.classify(res.status);
        if (action === "auth") {
          throw new this.AuthError(`Gateway returned 401 — the API key is missing or invalid.`);
        }
        if (action === "retry" && attempt < this.BACKOFF_MS.length) {
          await this._sleep(this.BACKOFF_MS[attempt]);
          continue;
        }
        const bodyText = await res.text().catch(() => "");
        throw new Error(`Gateway request failed: HTTP ${res.status}${bodyText ? " — " + bodyText : ""}`);
      }
      // Defensive: the loop always returns or throws earlier; unreachable in practice.
      throw lastErr || new Error("Gateway request failed after retries.");
    };

    const extractToolInput = (json) => {
      const block = Array.isArray(json.content) ? json.content.find(b => b.type === "tool_use") : null;
      if (!block) throw new this.ShapeError("Response contained no tool_use block.", JSON.stringify(json));
      return block.input;
    };

    const first = await send();
    let toolInput = extractToolInput(first);

    if (typeof validate === "function") {
      const result = validate(toolInput);
      if (!result.ok) {
        // Wire-valid re-ask: on the Anthropic Messages wire an assistant tool_use
        // turn MUST be answered by a user turn whose content holds a tool_result
        // block with the matching tool_use_id — a bare text turn is a 400
        // ("tool_use ids were found without tool_result blocks").
        const toolUse = first.content.find(b => b.type === "tool_use");
        messages.push({ role: "assistant", content: first.content });
        messages.push({ role: "user", content: [{
          type: "tool_result", tool_use_id: toolUse.id, is_error: true,
          content: `Your emit was invalid: ${JSON.stringify(result.errors)}. Re-emit the full corrected tool call.`
        }]});
        const second = await send();
        toolInput = extractToolInput(second);
        const secondResult = validate(toolInput);
        if (!secondResult.ok) {
          throw new Error(`Gateway response failed validation twice: ${JSON.stringify(secondResult.errors)}`);
        }
        return secondResult.cleaned;
      }
      return result.cleaned;
    }

    return toolInput;
  }
};

/* ===== SECTION: ENGINE ===== */
// Orchestration + session state machine. ENGINE→{METRICS, PACKS, SCHEMAS, STORE,
// ADAPTER} per the plan's dependency graph — never touches the DOM (no querySelector,
// no event listeners on page elements; UI owns all of that and drives ENGINE through
// its action methods). ENGINE._adapter defaults to the real ADAPTER and is the sole
// injection seam selftests use to avoid any network call.
//
// State machine: empty -> ready (ref+base present) -> analyzed(target) -> refining(target).
// State is DERIVED from the current session + activeTarget on every read (ENGINE.state()),
// not tracked as a separate mutable flag — this guarantees state can never drift out of
// sync with the data it describes. "analyzed"/"refining" are per the ACTIVE target's own
// chain: switching activeTarget can move you from "refining" (old target had attempts)
// back to "analyzed" or even "ready" for a target that has no recipe yet.
const ENGINE = {
  _adapter: null, // set to ADAPTER below, after ADAPTER is defined; selftests overwrite this
  _session: null,
  _testSessionId: null, // selftest-only override so STORE round-trips use a deterministic id
  lastError: null,

  // -- BusyError: thrown by setImage() when a call is in flight (Task 7a hardening —
  // see _inFlight below). Lives on ENGINE (not ADAPTER — ADAPTER is untouched by this
  // task) since being "busy" is an ENGINE-level concurrency concept, not a gateway
  // response classification. Carries `kind:"busy"` directly on the instance (unlike
  // ADAPTER.AuthError/ShapeError, which only get a `kind` string via
  // ENGINE._classifyError) so a caller can branch on it without going through
  // ENGINE.lastError at all — the busy state is synchronous/local, not a
  // network-classified failure. -----------------------------------------------------
  BusyError: class BusyError extends Error {
    constructor(message) { super(message); this.name = "BusyError"; this.kind = "busy"; }
  },

  // -- _inFlight: a single shared promise gate (Task 7a hardening). analyze(),
  // addAttempt(), and reanalyzeOtherTarget() all funnel through _guarded() below,
  // which sets this to the in-progress promise and clears it (finally) when that
  // promise settles — success OR failure. While set, a second call to any of those
  // three methods returns the SAME promise instead of starting a second network op
  // (two concurrent analyze() calls on the same session would otherwise race two
  // gateway calls against one chain and silently keep whichever response lands
  // last). setImage() checks this flag and throws a typed BusyError instead of
  // swapping session images out from under an in-flight call, which would produce a
  // recipe/correction that no longer matches what the model actually saw. --------
  _inFlight: null,

  // -- _guarded(fn): runs fn() (an async op) behind the _inFlight gate. If a gated op
  // is already running, returns THAT SAME promise unchanged (fn is never invoked a
  // second time). Otherwise starts fn(), stores its promise on _inFlight immediately
  // (synchronously, before any await inside fn can run) so a synchronously-following
  // second call sees the gate already set, and clears _inFlight in a finally so a
  // thrown/rejected op still unblocks the next call. ------------------------------
  _guarded(fn) {
    if (this._inFlight) return this._inFlight;
    const p = (async () => {
      try {
        return await fn();
      } finally {
        this._inFlight = null;
      }
    })();
    this._inFlight = p;
    return p;
  },

  // -- ATTEMPTS_CAP: keep the last N attempts per chain (plan: 8). A constant (not a
  // magic number inline) so the selftest and any future UI copy ("up to N attempts")
  // read the same source of truth. ---------------------------------------------------
  ATTEMPTS_CAP: 8,

  // -- SESSION_RETENTION_CAP: keep only the newest N whole sessions in IDB (Task 7a
  // hardening — sessions carry full-resolution image dataUrls per slot/attempt, and
  // an unbounded row count would eventually strain IndexedDB comfort the same way an
  // uncapped attempts[] array would). Pruned on boot(), after loading the latest
  // session (never before — boot must not delete the very session it is about to
  // restore). ---------------------------------------------------------------------
  SESSION_RETENTION_CAP: 5,

  // -- blank session factory: the shape documented in the plan/task, with both chains
  // pre-created (empty) so downstream code never has to null-check chains[target]. ---
  _blankSession() {
    return {
      id: this._testSessionId || ("lm-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8)),
      created: new Date().toISOString(),
      context: { scene: "", time: "", rig: "" },
      ref: null, base: null, settingsShot: null,
      activeTarget: STORE.prefs().target || "vray7max",
      // _attemptCount: monotonic per-chain counter, NEVER decremented by eviction — this
      // is what "ATTEMPT N:" labels (sent to the model) are numbered from, so numbering
      // keeps climbing truthfully past the ATTEMPTS_CAP window rather than sticking at
      // (cap+1) forever once chain.attempts.length itself stops growing.
      chains: {
        vray7max: { recipe: null, attempts: [], _attemptCount: 0 },
        vantage33: { recipe: null, attempts: [], _attemptCount: 0 }
      }
    };
  },

  // -- reset(): back to a blank "empty" session. Used by boot() when there is nothing
  // to restore, and by selftests between scenarios. ----------------------------------
  reset() {
    this._session = this._blankSession();
    this.lastError = null;
    return this._session;
  },

  // -- session()/activeTarget(): read accessors. session() returns the live object —
  // callers (UI, selftests) may read deeply into it, but should treat it as
  // ENGINE-owned; ENGINE always persists after mutating it. --------------------------
  session() { if (!this._session) this.reset(); return this._session; },
  activeTarget() { return this.session().activeTarget; },

  // -- state(): derives empty/ready/analyzed/refining from the current session, scoped
  // to the ACTIVE target's own chain (per the plan: "analyzed(target)"/"refining(target)"
  // are target-scoped states — the active target is the one the UI is looking at). ---
  state() {
    const s = this.session();
    if (!s.ref || !s.base) return "empty";
    const chain = s.chains[s.activeTarget];
    if (!chain || !chain.recipe) return "ready";
    if (chain.attempts.length > 0) return "refining";
    return "analyzed";
  },

  // -- setActiveTarget(target): flips which target's chain the UI/state() looks at,
  // WITHOUT running any analysis (plain switch — reanalyzeOtherTarget() is the action
  // that also triggers a fresh analyze() call). Persists the switch. -----------------
  async setActiveTarget(target) {
    const s = this.session();
    s.activeTarget = target;
    await this._persist();
    return s;
  },

  // -- setContext(patch): merge-patches session.context (scene/time/rig chips) and
  // persists — same shape as setActiveTarget's plain-switch-then-persist pattern.
  // Small, explicitly requested addition (Commit 2's UI wiring: "stored on
  // session.context via ENGINE — add a small ENGINE.setContext(patch) if missing") so
  // the UI never mutates session.context directly; every session field change still
  // flows through one ENGINE action method that owns the persist step. -------------
  async setContext(patch) {
    const s = this.session();
    s.context = Object.assign({}, s.context || {}, patch || {});
    await this._persist();
    return s;
  },

  // -- setRecipeApplied(param, applied): records the recipe-row applied toggle on the
  // ACTIVE chain as chain.recipeApplied[param] = bool ({param -> bool} map; absent or
  // true = applied), then persists — same shape as setContext (Task 7a follow-up;
  // spec: "untoggle anything you skipped; correction calls receive the applied set").
  // _historyForActiveChain()'s round-0 moves read this map, so the first correction
